<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>辺境コンビニ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700;900&family=Shippori+Mincho:wght@500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  body{margin:0;background:#101812;}
  @keyframes scfade{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:none}}
  @keyframes blinkled{0%,100%{opacity:.35}50%{opacity:1}}
  @keyframes receiptout{from{transform:translateY(-14px);opacity:0}to{transform:none;opacity:1}}
  ::-webkit-scrollbar{width:10px;height:10px}
  ::-webkit-scrollbar-thumb{background:rgba(47,158,95,.35);border-radius:8px}
  ::-webkit-scrollbar-track{background:transparent}
</style>
</head>
<body>
<div id="app"></div>
<template id="dc-template">
<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:34px 20px 96px;box-sizing:border-box;font-family:'Zen Kaku Gothic New',sans-serif;background:radial-gradient(120% 95% at 50% 0%,#1a2a1e 0%,#101812 58%,#0a0f0b 100%);color:#25332a;">

  <div style="position:relative;width:{{ frameW }}px;height:{{ frameH }}px;max-width:100%;background:#f7faf7;border:1px solid #d7e4d8;border-radius:8px;box-shadow:0 34px 90px -22px rgba(0,0,0,.75),0 0 0 8px rgba(7,10,8,.55);overflow:hidden;display:flex;flex-direction:column;">

    <div style="height:7px;flex:none;background:linear-gradient(90deg,#2f9e5f 0 34%,#f08c2e 34% 67%,#2f5d9e 67% 100%);"></div>

    <header style="position:relative;z-index:2;display:flex;align-items:center;justify-content:space-between;gap:14px;padding:11px 22px;border-bottom:2px solid #2f9e5f;background:linear-gradient(180deg,#ffffff,#f0f6f0);">
      <div style="display:flex;align-items:center;gap:12px;">
        <span style="display:inline-flex;align-items:center;justify-content:center;width:30px;height:30px;flex:none;border-radius:7px;background:#2f9e5f;color:#fff;font-weight:900;font-size:14px;">辺</span>
        <div>
          <div style="font-size:9px;letter-spacing:2px;color:#7f927f;display:{{ taglineDisp }};">フランチャイズ辺境1号店 ・ ダンジョン「大穴」前 ・ 年中無休</div>
          <div style="display:flex;align-items:baseline;gap:10px;">
            <span style="font-weight:900;font-size:{{ titleSize }}px;letter-spacing:2px;color:#25332a;white-space:nowrap;">辺境マート 大穴前店</span>
            <span style="font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:1px;color:#f08c2e;display:{{ enDisp }};">LAST STOP BEFORE DUNGEON</span>
          </div>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:10px;">
        <span style="font-size:12px;letter-spacing:1px;color:#7f927f;display:{{ playLabelDisp }};white-space:nowrap;">{{ playLabel }}</span>
        <span style="display:inline-flex;align-items:center;gap:6px;font-family:'IBM Plex Mono',monospace;font-size:11px;padding:4px 10px;border:1px solid rgba(47,158,95,.4);border-radius:6px;color:#2f9e5f;background:rgba(47,158,95,.05);white-space:nowrap;"><span style="width:7px;height:7px;border-radius:50%;background:#2f9e5f;animation:blinkled 1.6s ease-in-out infinite;"></span>レジ1 稼働中</span>
      </div>
    </header>

    <div style="position:relative;z-index:2;flex:1;display:flex;min-height:0;">

      <sc-if value="{{ showRail }}" hint-placeholder-val="{{ true }}">
        <nav style="width:{{ railW }}px;flex:none;border-right:1px solid rgba(47,158,95,.2);background:linear-gradient(180deg,rgba(47,158,95,.04),transparent);padding:15px 10px;display:flex;flex-direction:column;gap:3px;overflow-y:auto;">
          <sc-for list="{{ nav }}" as="item" hint-placeholder-count="8">
            <button onClick="{{ item.go }}" style="display:flex;align-items:center;gap:11px;width:100%;padding:9px 11px;border:0;border-radius:7px;cursor:pointer;text-align:left;background:{{ item.bg }};color:{{ item.color }};font-family:'Zen Kaku Gothic New',sans-serif;font-size:14px;font-weight:{{ item.weight }};">
              <span style="width:22px;height:22px;flex:none;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;border-radius:6px;background:{{ item.badgeBg }};color:{{ item.badgeColor }};border:{{ item.badgeBorder }};">{{ item.badge }}</span>
              <span style="{{ item.labelStyle }}">{{ item.label }}</span>
            </button>
          </sc-for>
        </nav>
      </sc-if>

      <main style="flex:1;min-width:0;overflow-y:auto;padding:{{ mainPad }};">

        <sc-if value="{{ isTop }}" hint-placeholder-val="{{ true }}">
          <div data-screen-label="店内モニター" style="animation:scfade .4s ease;max-width:760px;margin:0 auto;">
            <p style="font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:2px;color:#7f927f;margin:0 0 7px;">早朝シフト ・ 05:30 ・ ダンジョン開門まで 30分</p>
            <h1 style="font-weight:900;font-size:31px;line-height:1.4;margin:0 0 14px;color:#25332a;">いらっしゃいませ。<br>ここが最後のコンビニです。</h1>
            <p style="font-size:15px;line-height:2.0;color:#4a5a4e;margin:0 0 10px;max-width:58ch;">ダンジョン「大穴」の入口まで徒歩30秒。冒険者はここで最後の買い物をし、帰ってきた者はここで生還の肉まんを食う。あなたはこの店の店長。仕事はレジ打ち、発注、おでんの仕込み、そして<b style="color:#f08c2e;">魔物のお客様も人間のお客様も、等しく「お客様」として扱うこと。</b></p>
            <p style="font-size:12px;color:#a3b3a3;margin:0 0 24px;">※店内での戦闘行為はご遠慮ください（ポイント没収の対象となります）。</p>

            <div style="border:1px solid rgba(47,158,95,.3);border-radius:10px;overflow:hidden;margin:0 0 26px;background:#fff;">
              <div style="padding:9px 14px;background:rgba(47,158,95,.06);border-bottom:1px solid rgba(47,158,95,.2);font-size:11px;font-weight:700;letter-spacing:2px;color:#2f9e5f;">■ 本日の店内モニター</div>
              <div style="display:grid;grid-template-columns:repeat({{ statCols }},1fr);gap:0;">
                <div style="padding:13px 10px;text-align:center;border-right:1px solid rgba(47,158,95,.12);"><div style="font-family:'IBM Plex Mono',monospace;font-size:24px;font-weight:600;color:#25332a;line-height:1.2;">¥84,200</div><div style="font-size:10px;color:#7f927f;margin-top:2px;">本日売上（金貨換算込）</div></div>
                <div style="padding:13px 10px;text-align:center;border-right:1px solid rgba(47,158,95,.12);"><div style="font-family:'IBM Plex Mono',monospace;font-size:24px;font-weight:600;color:#25332a;line-height:1.2;">61 : 39</div><div style="font-size:10px;color:#7f927f;margin-top:2px;">客層比（人間 : 魔物）</div></div>
                <div style="padding:13px 10px;text-align:center;border-right:1px solid rgba(47,158,95,.12);"><div style="font-family:'IBM Plex Mono',monospace;font-size:24px;font-weight:600;color:#f08c2e;line-height:1.2;">残3</div><div style="font-size:10px;color:#7f927f;margin-top:2px;">肉まん（生還者需要 高）</div></div>
                <div style="padding:13px 10px;text-align:center;"><div style="font-family:'IBM Plex Mono',monospace;font-size:24px;font-weight:600;color:#c65448;line-height:1.2;">⚠ 4F</div><div style="font-size:10px;color:#7f927f;margin-top:2px;">大穴の機嫌（おでん指数）</div></div>
              </div>
            </div>

            <p style="font-size:11px;letter-spacing:3px;color:#2f9e5f;font-weight:700;margin:0 0 12px;">■ シフト形態を選択</p>
            <div style="display:grid;grid-template-columns:{{ modeCols }};gap:12px;margin:0 0 28px;">
              <sc-for list="{{ playModes }}" as="m" hint-placeholder-count="3">
                <button onClick="{{ m.go }}" style="text-align:left;padding:14px 15px;border-radius:10px;cursor:pointer;border:{{ m.border }};background:{{ m.bg }};">
                  <div style="font-size:14px;font-weight:700;color:{{ m.titleColor }};margin-bottom:5px;">{{ m.t }}</div>
                  <div style="font-size:12px;line-height:1.7;color:#7f927f;">{{ m.d }}</div>
                </button>
              </sc-for>
            </div>

            <p style="font-size:11px;letter-spacing:3px;color:#2f9e5f;font-weight:700;margin:0 0 14px;">■ 本日のシフトイン</p>
            <div style="display:flex;gap:16px;flex-wrap:wrap;margin-bottom:26px;">
              <div style="display:flex;flex-direction:column;align-items:center;gap:7px;width:96px;"><div style="width:62px;height:62px;border-radius:50%;border:2px solid #2f9e5f;background:repeating-linear-gradient(45deg,rgba(47,158,95,.1) 0 5px,transparent 5px 10px),#fff;"></div><div style="font-size:13px;font-weight:700;color:#25332a;">真弓 タケル</div><div style="font-size:11px;color:#7f927f;">店長（三代目）</div></div>
              <div style="display:flex;flex-direction:column;align-items:center;gap:7px;width:96px;"><div style="width:62px;height:62px;border-radius:50%;border:2px solid #f08c2e;background:repeating-linear-gradient(45deg,rgba(240,140,46,.12) 0 5px,transparent 5px 10px),#fff;"></div><div style="font-size:13px;font-weight:700;color:#25332a;">ギギ</div><div style="font-size:11px;color:#7f927f;">バイト（ゴブリン・週5）</div></div>
              <div style="display:flex;flex-direction:column;align-items:center;gap:7px;width:96px;"><div style="width:62px;height:62px;border-radius:50%;border:2px solid #2f5d9e;background:repeating-linear-gradient(45deg,rgba(47,93,158,.1) 0 5px,transparent 5px 10px),#fff;"></div><div style="font-size:13px;font-weight:700;color:#25332a;">聖騎士ノエル</div><div style="font-size:11px;color:#7f927f;">副業バイト（訳あり）</div></div>
              <div style="display:flex;flex-direction:column;align-items:center;gap:7px;width:96px;"><div style="width:62px;height:62px;border-radius:50%;border:2px dashed #7f927f;background:radial-gradient(circle at 40% 35%,rgba(37,51,42,.15),rgba(37,51,42,.04)),#fff;"></div><div style="font-size:13px;font-weight:700;color:#25332a;">おでん鍋</div><div style="font-size:11px;color:#7f927f;">先代から継承（何かが宿る）</div></div>
            </div>

            <button onClick="{{ goStory }}" style="display:inline-flex;align-items:center;gap:10px;padding:13px 30px;border:0;border-radius:8px;cursor:pointer;background:#2f9e5f;color:#fff;font-weight:900;font-size:15px;letter-spacing:3px;box-shadow:0 5px 0 #217346;white-space:nowrap;">開店の照明を点ける　➜</button>
          </div>
        </sc-if>

        <sc-if value="{{ isSheet }}" hint-placeholder-val="{{ false }}">
          <div data-screen-label="店長ファイル" style="animation:scfade .4s ease;max-width:820px;margin:0 auto;">
            <div style="display:flex;gap:20px;align-items:flex-start;flex-wrap:wrap;margin-bottom:20px;">
              <div style="width:88px;height:110px;flex:none;border:1px solid rgba(47,158,95,.4);border-radius:8px;background:repeating-linear-gradient(45deg,rgba(47,158,95,.07) 0 6px,transparent 6px 12px),#fff;display:flex;align-items:center;justify-content:center;font-size:9px;letter-spacing:1px;color:#a3b3a3;text-align:center;">店長証写真<br>（制服着用）</div>
              <div style="flex:1;min-width:240px;">
                <p style="font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:2px;color:#7f927f;margin:0 0 4px;">従業員コード FM-0001 ・ 店長職務ファイル</p>
                <h1 style="font-weight:900;font-size:28px;margin:0 0 4px;color:#25332a;">真弓 タケル</h1>
                <p style="font-size:13px;color:#7f927f;margin:0 0 10px;">店長（三代目） ・ 二十九歳 ・ 元冒険者（Cランクで引退）</p>
                <div style="display:flex;gap:7px;flex-wrap:wrap;">
                  <span style="font-size:11px;padding:3px 9px;border-radius:6px;border:1px solid rgba(47,158,95,.4);color:#4a5a4e;">検品の鬼</span>
                  <span style="font-size:11px;padding:3px 9px;border-radius:6px;border:1px solid rgba(47,158,95,.4);color:#4a5a4e;">おでんの守人</span>
                  <span style="font-size:11px;padding:3px 9px;border-radius:6px;border:1px solid rgba(240,140,46,.5);color:#f08c2e;">魔物語：接客レベル</span>
                </div>
              </div>
            </div>

            <div style="display:grid;grid-template-columns:{{ modeCols }};gap:13px;margin-bottom:22px;">
              <div style="background:#fff;border:1px solid rgba(47,158,95,.2);border-radius:10px;padding:11px 13px;"><div style="display:flex;justify-content:space-between;font-size:12px;color:#7f927f;margin-bottom:5px;"><span>体力</span><span style="font-family:'IBM Plex Mono',monospace;">{{ tai }} / 17</span></div><div style="height:9px;border-radius:6px;background:rgba(37,51,42,.06);overflow:hidden;"><div style="width:{{ taiPct }}%;height:100%;background:#2f9e5f;"></div></div><div style="display:flex;gap:5px;margin-top:6px;"><button onClick="{{ taiDown }}" style="width:24px;height:24px;border:1px solid rgba(47,158,95,.3);border-radius:6px;background:#fff;color:#7f927f;cursor:pointer;font-size:13px;line-height:1;">−</button><button onClick="{{ taiUp }}" style="width:24px;height:24px;border:1px solid rgba(47,158,95,.3);border-radius:6px;background:#fff;color:#7f927f;cursor:pointer;font-size:13px;line-height:1;">＋</button></div></div>
              <div style="background:#fff;border:1px solid rgba(47,158,95,.2);border-radius:10px;padding:11px 13px;"><div style="display:flex;justify-content:space-between;font-size:12px;color:#7f927f;margin-bottom:5px;"><span>接客スマイル</span><span style="font-family:'IBM Plex Mono',monospace;">{{ smile }} / 10</span></div><div style="height:9px;border-radius:6px;background:rgba(37,51,42,.06);overflow:hidden;"><div style="width:{{ smilePct }}%;height:100%;background:#f08c2e;"></div></div><div style="font-size:9px;color:#a3b3a3;margin-top:4px;">※0で「真顔接客」。魔物のお客様はむしろ落ち着く</div><div style="display:flex;gap:5px;margin-top:6px;"><button onClick="{{ smileDown }}" style="width:24px;height:24px;border:1px solid rgba(47,158,95,.3);border-radius:6px;background:#fff;color:#7f927f;cursor:pointer;font-size:13px;line-height:1;">−</button><button onClick="{{ smileUp }}" style="width:24px;height:24px;border:1px solid rgba(47,158,95,.3);border-radius:6px;background:#fff;color:#7f927f;cursor:pointer;font-size:13px;line-height:1;">＋</button></div></div>
              <div style="background:#fff;border:1px solid rgba(47,158,95,.2);border-radius:10px;padding:11px 13px;"><div style="display:flex;justify-content:space-between;font-size:12px;color:#7f927f;margin-bottom:5px;"><span>本部からの信頼</span><span style="font-family:'IBM Plex Mono',monospace;color:#2f9e5f;">{{ shinrai }} / 100</span></div><div style="height:9px;border-radius:6px;background:rgba(37,51,42,.06);overflow:hidden;"><div style="width:{{ shinrai }}%;height:100%;background:linear-gradient(90deg,#2f9e5f,#2f5d9e);"></div></div><div style="font-size:9px;color:#a3b3a3;margin-top:4px;">※100で「辺境2号店」の出店権。誰も望んでいない</div><div style="display:flex;gap:5px;margin-top:6px;"><button onClick="{{ shinraiDown }}" style="width:24px;height:24px;border:1px solid rgba(47,158,95,.3);border-radius:6px;background:#fff;color:#7f927f;cursor:pointer;font-size:13px;line-height:1;">−</button><button onClick="{{ shinraiUp }}" style="width:24px;height:24px;border:1px solid rgba(47,158,95,.3);border-radius:6px;background:#fff;color:#7f927f;cursor:pointer;font-size:13px;line-height:1;">＋</button></div></div>
            </div>

            <p style="font-size:11px;letter-spacing:3px;color:#2f9e5f;font-weight:700;margin:0 0 12px;">■ 能力</p>
            <div style="display:grid;grid-template-columns:repeat({{ abilityCols }},1fr);gap:0;border:1px solid rgba(47,158,95,.3);border-radius:10px;overflow:hidden;margin-bottom:24px;background:#fff;">
              <div style="padding:10px 4px;text-align:center;border-right:1px solid rgba(47,158,95,.12);background:rgba(47,158,95,.04);"><div style="font-size:10px;color:#2f9e5f;">レジ速</div><div style="font-family:'IBM Plex Mono',monospace;font-size:23px;font-weight:600;color:#2f9e5f;line-height:1.25;">17</div><div style="font-size:10px;color:#2f8a5c;">＋3</div></div>
              <div style="padding:10px 4px;text-align:center;border-right:1px solid rgba(47,158,95,.12);"><div style="font-size:10px;color:#7f927f;">品出し</div><div style="font-family:'IBM Plex Mono',monospace;font-size:23px;font-weight:600;color:#25332a;line-height:1.25;">14</div><div style="font-size:10px;color:#2f8a5c;">＋2</div></div>
              <div style="padding:10px 4px;text-align:center;border-right:1px solid rgba(47,158,95,.12);"><div style="font-size:10px;color:#7f927f;">目利き</div><div style="font-family:'IBM Plex Mono',monospace;font-size:23px;font-weight:600;color:#25332a;line-height:1.25;">15</div><div style="font-size:10px;color:#2f8a5c;">＋2</div></div>
              <div style="padding:10px 4px;text-align:center;border-right:1px solid rgba(47,158,95,.12);"><div style="font-size:10px;color:#7f927f;">交渉</div><div style="font-family:'IBM Plex Mono',monospace;font-size:23px;font-weight:600;color:#25332a;line-height:1.25;">12</div><div style="font-size:10px;color:#2f8a5c;">＋1</div></div>
              <div style="padding:10px 4px;text-align:center;border-right:1px solid rgba(47,158,95,.12);"><div style="font-size:10px;color:#7f927f;">胆力</div><div style="font-family:'IBM Plex Mono',monospace;font-size:23px;font-weight:600;color:#25332a;line-height:1.25;">16</div><div style="font-size:10px;color:#2f8a5c;">＋3</div></div>
              <div style="padding:10px 4px;text-align:center;"><div style="font-size:10px;color:#7f927f;">経営</div><div style="font-family:'IBM Plex Mono',monospace;font-size:23px;font-weight:600;color:#25332a;line-height:1.25;">9</div><div style="font-size:10px;color:#c65448;">−1（どんぶり）</div></div>
            </div>

            <div style="display:grid;grid-template-columns:{{ twoCols }};gap:24px;">
              <div>
                <p style="font-size:11px;letter-spacing:3px;color:#2f9e5f;font-weight:700;margin:0 0 10px;">■ 技能</p>
                <div style="display:flex;justify-content:space-between;font-size:14px;color:#4a5a4e;padding:6px 0;border-bottom:1px dashed rgba(47,158,95,.25);"><span>会計しながら世間話</span><span style="font-family:'IBM Plex Mono',monospace;color:#2f8a5c;">+6</span></div>
                <div style="display:flex;justify-content:space-between;font-size:14px;color:#4a5a4e;padding:6px 0;border-bottom:1px dashed rgba(47,158,95,.25);"><span>装備の値踏み（買取査定）</span><span style="font-family:'IBM Plex Mono',monospace;color:#2f8a5c;">+5</span></div>
                <div style="display:flex;justify-content:space-between;font-size:14px;color:#4a5a4e;padding:6px 0;border-bottom:1px dashed rgba(47,158,95,.25);"><span>おでんの火加減（大穴連動）</span><span style="font-family:'IBM Plex Mono',monospace;color:#2f8a5c;">+4</span></div>
                <div style="display:flex;justify-content:space-between;font-size:14px;color:#4a5a4e;padding:6px 0;"><span>「二度と行くな」と言う</span><span style="font-family:'IBM Plex Mono',monospace;color:#c65448;">−3（言えない）</span></div>
              </div>
              <div>
                <p style="font-size:11px;letter-spacing:3px;color:#2f9e5f;font-weight:700;margin:0 0 10px;">■ 特性</p>
                <div style="border:1px solid rgba(47,158,95,.25);border-radius:10px;padding:11px 13px;margin-bottom:9px;background:#fff;"><div style="font-size:13px;font-weight:700;color:#25332a;margin-bottom:3px;">レシートは嘘をつかない</div><div style="font-size:12px;line-height:1.7;color:#7f927f;">会計を終えた客の「今日の生存率」が、レシートの余白になんとなく滲む。タケルにだけ読める。</div></div>
                <div style="border:1px solid rgba(240,140,46,.4);border-radius:10px;padding:11px 13px;background:rgba(240,140,46,.04);"><div style="font-size:13px;font-weight:700;color:#f08c2e;margin-bottom:3px;">元Cランクの勘</div><div style="font-size:12px;line-height:1.7;color:#7f927f;">大穴の空気が変わる日は、朝からおでんが煮詰まりやすい。理屈は不明。当たる。</div></div>
              </div>
            </div>
            <p style="margin-top:22px;font-size:13px;line-height:1.9;color:#7f927f;border-left:3px solid rgba(47,158,95,.4);padding-left:14px;">先代（祖父）の遺した店訓：「売るのは商品。持たせるのは、帰ってくる理由。」</p>
          </div>
        </sc-if>

        <sc-if value="{{ isDice }}" hint-placeholder-val="{{ false }}">
          <div data-screen-label="レジ判定" style="animation:scfade .4s ease;max-width:560px;margin:0 auto;text-align:center;">

        <sc-if value="{{ isCombat }}" hint-placeholder-val="{{ false }}">

              <div style="display:flex;gap:8px;"><button onClick="{{ callHelp }}" style="padding:8px 15px;border:1px solid rgba(47,158,95,.35);border-radius:7px;background:#fff;color:#7f927f;cursor:pointer;font-size:13px;font-family:'Zen Kaku Gothic New',sans-serif;white-space:nowrap;flex:none;">レジ応援を呼ぶ</button><button onClick="{{ nextCustomer }}" style="padding:8px 15px;border:0;border-radius:7px;background:#2f9e5f;color:#fff;cursor:pointer;font-weight:700;font-size:13px;font-family:'Zen Kaku Gothic New',sans-serif;box-shadow:0 4px 0 #217346;white-space:nowrap;flex:none;">次のお客様へ</button></div>
            </div>
            <p style="font-size:12px;color:#a3b3a3;margin:0 0 14px;">※開門前ラッシュは一日最大の山場。行列ゲージが満ちると「お客様の声」に本部激辛コメントが載ります。</p>

              <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;">
                <div><div style="display:flex;justify-content:space-between;font-size:11px;color:#7f927f;margin-bottom:3px;"><span>行列ゲージ</span><span style="font-family:'IBM Plex Mono',monospace;">{{ queue }}/100</span></div><div style="height:8px;border-radius:5px;background:rgba(37,51,42,.06);overflow:hidden;"><div style="width:{{ queue }}%;height:100%;background:#f08c2e;"></div></div></div>
                <div><div style="display:flex;justify-content:space-between;font-size:11px;color:#7f927f;margin-bottom:3px;"><span>レジ2（ギギ）</span><span style="font-family:'IBM Plex Mono',monospace;">処理中</span></div><div style="height:8px;border-radius:5px;background:rgba(37,51,42,.06);overflow:hidden;"><div style="width:48%;height:100%;background:#2f9e5f;"></div></div></div>
                <div><div style="display:flex;justify-content:space-between;font-size:11px;color:#7f927f;margin-bottom:3px;"><span>おでん残量</span><span style="font-family:'IBM Plex Mono',monospace;">大根×2 卵×5</span></div><div style="height:8px;border-radius:5px;background:rgba(37,51,42,.06);overflow:hidden;"><div style="width:30%;height:100%;background:#c65448;"></div></div></div>
              </div>
            </div>

            <p style="font-size:11px;letter-spacing:3px;color:#2f9e5f;font-weight:700;margin:0 0 10px;">■ レジ待ち列（対応順）</p>
            <sc-for list="{{ customers }}" as="cu">

        <sc-if value="{{ isInv }}" hint-placeholder-val="{{ false }}">

              <h1 style="font-weight:900;font-size:24px;margin:0;color:#25332a;">発注端末 ・ 棚卸モード</h1>
              <span style="font-family:'IBM Plex Mono',monospace;font-size:12px;color:#7f927f;white-space:nowrap;">締切 09:00 ・ 便：竜車 第2便</span>
            </div>
            <div style="display:grid;grid-template-columns:{{ invCols }};gap:22px;">
              <div>
                <p style="font-size:11px;letter-spacing:3px;color:#2f9e5f;font-weight:700;margin:0 0 11px;">■ 要発注（在庫僅少）</p>
                <div style="padding:12px 14px;border:1px solid rgba(240,140,46,.5);border-radius:10px;margin-bottom:8px;background:rgba(240,140,46,.04);"><div style="display:flex;justify-content:space-between;gap:8px;"><div style="font-size:14px;font-weight:700;color:#25332a;">肉まん（生還者の定番）</div><span style="font-size:10px;color:#c65448;font-family:'IBM Plex Mono',monospace;flex:none;">残3 ／ 発注点10</span></div><div style="font-size:12px;color:#7f927f;margin-top:3px;line-height:1.7;">大穴からの生還率と売上が正比例する謎商品。多めに発注すると、なぜか生還者も増える。</div></div>

                <div style="padding:12px 14px;border:1px solid rgba(47,158,95,.3);border-radius:10px;background:#fff;"><div style="display:flex;justify-content:space-between;gap:8px;"><div style="font-size:14px;font-weight:700;color:#25332a;">魔物用おやつ（骨型・にぼし）</div><span style="font-size:10px;color:#2f8a5c;font-family:'IBM Plex Mono',monospace;flex:none;">残41 ／ 適正</span></div><div style="font-size:12px;color:#7f927f;margin-top:3px;line-height:1.7;">魔物客リピートの柱。スライムはにぼし派。ドラゴンは骨型を「懐かしい」と言う。</div></div>
              </div>
              <div>
                <p style="font-size:11px;letter-spacing:3px;color:#2f9e5f;font-weight:700;margin:0 0 11px;">■ 買取カウンター（本日の持込）</p>
                <div style="border:1px solid rgba(47,158,95,.25);border-radius:10px;padding:10px 13px;margin-bottom:8px;background:#fff;"><div style="display:flex;justify-content:space-between;gap:8px;font-size:13px;color:#25332a;"><span style="font-weight:700;">魔剣（呪い付き・査定済）</span><span style="font-family:'IBM Plex Mono',monospace;color:#2f9e5f;flex:none;">¥12,000</span></div><div style="font-size:11px;color:#7f927f;margin-top:2px;">夜中に少し泣く。バックヤードの「訳あり棚」へ。</div></div>
                <div style="border:1px solid rgba(47,158,95,.25);border-radius:10px;padding:10px 13px;margin-bottom:8px;background:#fff;"><div style="display:flex;justify-content:space-between;gap:8px;align-items:center;font-size:13px;color:#25332a;"><span style="font-weight:700;">地図の切れ端（大穴・第9層）</span><span style="display:flex;align-items:center;gap:8px;"><sc-if value="{{ mapPending }}"><button onClick="{{ appraiseMap }}" style="font-size:10px;padding:2px 10px;border:1px solid rgba(165,133,31,.5);border-radius:6px;background:#fff;color:#a5851f;cursor:pointer;">査定を進める</button></sc-if><span style="font-family:'IBM Plex Mono',monospace;color:{{ mapColor }};flex:none;">{{ mapStatus }}</span></span></div><div style="font-size:11px;color:#7f927f;margin-top:2px;">{{ mapNote }}</div></div>
                <div style="border:2px solid rgba(47,93,158,.5);border-radius:10px;padding:10px 13px;background:rgba(47,93,158,.03);"><div style="display:flex;justify-content:space-between;gap:8px;font-size:13px;color:#25332a;"><span style="font-weight:700;">聖騎士団の紋章入りマント</span><span style="font-family:'IBM Plex Mono',monospace;color:#2f5d9e;flex:none;">買取不可</span></div><div style="font-size:11px;color:#2f5d9e;margin-top:2px;">持込者：ノエル本人。「もう要らないので」。タケルは買取を保留にしている。</div></div>
                <div style="margin-top:14px;border:1px solid rgba(47,158,95,.3);border-radius:10px;padding:13px 15px;background:#fff;"><div style="font-size:13px;font-weight:700;color:#25332a;margin-bottom:5px;">発注メモ（先代の字のコピー）</div><div style="font-size:12px;line-height:1.8;color:#7f927f;">「傘は晴れの日に発注しろ。ポーションは平和な週にこそ切らすな。」</div></div>

        <sc-if value="{{ isStory }}" hint-placeholder-val="{{ false }}">

            <sc-if value="{{ storyHasNote }}">
              <p style="text-align:center;font-size:13px;letter-spacing:1px;color:{{ storyNoteColor }};margin:0 0 16px;">{{ storyNote }}</p>
            </sc-if>
            <sc-for list="{{ storyBlocks }}" as="b">
              <sc-if value="{{ b.isP }}"><p style="font-family:'Shippori Mincho',serif;font-size:16px;line-height:2.1;color:#31402f;margin:0 0 18px;">{{ b.t }}</p></sc-if>
              <sc-if value="{{ b.isQ }}"><blockquote style="margin:22px 0;padding:14px 20px;border-left:3px solid #2f9e5f;background:rgba(47,158,95,.04);font-family:'Shippori Mincho',serif;font-size:16px;line-height:1.9;color:#4a5a4e;">{{ b.t }}</blockquote></sc-if>

          </div>

        <sc-if value="{{ isMap }}" hint-placeholder-val="{{ false }}">

            <p style="font-size:12px;color:#a3b3a3;margin:0 0 16px;">売場は18坪。ただし「訳あり棚」の奥行きだけ、測るたびに違う。</p>
            <div style="display:grid;grid-template-columns:{{ mapCols }};gap:20px;">

                <div style="position:absolute;left:5%;top:7%;width:42%;height:22%;border:2px solid #2f9e5f;border-radius:8px;background:rgba(47,158,95,.05);padding:7px 10px;box-sizing:border-box;"><div style="font-size:12px;font-weight:900;color:#2f9e5f;">レジ1・2 ◉ 現在地</div><div style="font-size:10px;color:#7f927f;margin-top:2px;">買取カウンター併設</div></div>
                <div style="position:absolute;right:5%;top:7%;width:30%;height:22%;border:2px solid #f08c2e;border-radius:8px;background:rgba(240,140,46,.05);padding:7px 10px;box-sizing:border-box;"><div style="font-size:12px;font-weight:700;color:#f08c2e;">ホットスナック・おでん</div><div style="font-size:10px;color:#7f927f;margin-top:2px;">鍋は先代から火を絶やさず</div></div>
                <div style="position:absolute;left:5%;top:38%;width:56%;height:20%;border:2px solid rgba(127,146,127,.5);border-radius:8px;background:rgba(127,146,127,.05);padding:7px 10px;box-sizing:border-box;"><div style="font-size:12px;font-weight:700;color:#5c6f5c;">売場（冒険用品・食品・日用品）</div><div style="font-size:10px;color:#7f927f;margin-top:2px;">最上段はドラゴン用。脚立はギギ専用</div></div>
                <div style="position:absolute;right:5%;top:38%;width:30%;height:20%;border:2px dashed rgba(47,93,158,.55);border-radius:8px;background:rgba(47,93,158,.04);padding:7px 10px;box-sizing:border-box;"><div style="font-size:12px;font-weight:700;color:#2f5d9e;">イートイン（3席）</div><div style="font-size:10px;color:#7f927f;margin-top:2px;">生還者の聖地。譲り合い推奨</div></div>
                <div style="position:absolute;left:5%;bottom:6%;width:42%;height:26%;border:2px dashed rgba(198,84,72,.55);border-radius:8px;background:rgba(198,84,72,.03);padding:7px 10px;box-sizing:border-box;"><div style="font-size:12px;font-weight:700;color:#c65448;">バックヤード・訳あり棚</div><div style="font-size:10px;color:#7f927f;margin-top:2px;">呪物・遺失物・夜泣きする魔剣。施錠は二重</div></div>
                <div style="position:absolute;right:5%;bottom:6%;width:44%;height:26%;border:2px solid rgba(37,51,42,.4);border-radius:8px;background:rgba(37,51,42,.03);padding:7px 10px;box-sizing:border-box;"><div style="font-size:12px;font-weight:900;color:#25332a;">駐竜場 ⇄ 大穴入口（徒歩30秒）</div><div style="font-size:10px;color:#7f927f;margin-top:2px;">第9層の話は、ここではしないこと。壁が薄い</div></div>

<script>
/*
 * Claude Design の x-dc テンプレート（sc-if / sc-for / {{ 変数 }} / onClick）を
 * そのまま解釈して描画するミニランタイム。support.js（React ベースのプレビュー用）の代替。
 * 状態変更のたびにテンプレート全体を再構築する（プロトタイプの再レンダーと同等）。
 */
(function () {
  var cache = new Map();
  function compile(expr) {
    var fn = cache.get(expr);
    if (!fn) {
      fn = new Function('__s', 'with(__s){return(' + expr + ');}');
      cache.set(expr, fn);
    }
    return fn;
  }
  function evalExpr(expr, scope) {
    return compile(expr)(scope);
  }
  // "{{ expr }}" 単体の属性値から式を取り出す
  function single(text) {
    var m = /^\s*\{\{\s*([\s\S]+?)\s*\}\}\s*$/.exec(text || '');
    return m ? m[1] : null;
  }
  function interpolate(text, scope) {
    if (text.indexOf('{{') === -1) return text;
    return text.replace(/\{\{\s*([\s\S]+?)\s*\}\}/g, function (_, expr) {
      var v = evalExpr(expr, scope);
      return v == null ? '' : String(v);
    });
  }
  function build(nodes, scope, parent) {
    for (var i = 0; i < nodes.length; i++) {
      var node = nodes[i];
      if (node.nodeType === Node.TEXT_NODE) {
        parent.appendChild(document.createTextNode(interpolate(node.nodeValue, scope)));
        continue;
      }
      if (node.nodeType !== Node.ELEMENT_NODE) continue;
      var tag = node.localName;
      if (tag === 'sc-if') {
        var cond = single(node.getAttribute('value'));
        if (cond && evalExpr(cond, scope)) build(node.childNodes, scope, parent);
        continue;
      }
      if (tag === 'sc-for') {
        var listExpr = single(node.getAttribute('list'));
        var as = node.getAttribute('as') || 'item';
        var list = (listExpr && evalExpr(listExpr, scope)) || [];
        for (var j = 0; j < list.length; j++) {
          var child = Object.assign({}, scope);
          child[as] = list[j];
          build(node.childNodes, child, parent);
        }
        continue;
      }
      var el = document.createElementNS(node.namespaceURI, tag);
      for (var k = 0; k < node.attributes.length; k++) {
        var attr = node.attributes[k];
        if (attr.name.indexOf('hint-placeholder') === 0) continue;
        if (attr.name === 'onclick') {
          var handlerExpr = single(attr.value);
          var fn = handlerExpr ? evalExpr(handlerExpr, scope) : null;
          if (typeof fn === 'function') el.addEventListener('click', fn);
          continue;
        }
        el.setAttribute(attr.name, interpolate(attr.value, scope));
      }
      build(node.childNodes, scope, el);
      parent.appendChild(el);
    }
  }
  window.DCLogic = class DCLogic {
    mount(rootEl, templateEl) {
      this._root = rootEl;
      this._tpl = templateEl.content;
      this.render();
    }
    setState(update) {
      var patch = typeof update === 'function' ? update(this.state) : update;
      Object.assign(this.state, patch);
      this.render();
    }
    render() {
      var scope = this.renderVals();
      var frag = document.createDocumentFragment();
      build(this._tpl.childNodes, scope, frag);
      this._root.replaceChildren(frag);
    }
  };
})();

class Component extends DCLogic {
  state = { device: 'desktop', play: 'gmpl', screen: 'top' };

  renderVals() {
    const { device, play, screen } = this.state;

      isTop: screen === 'top', isSheet: screen === 'sheet', isDice: screen === 'dice',
      isCombat: screen === 'combat', isInv: screen === 'inventory', isStory: screen === 'story',
      isMap: screen === 'map', isGM: screen === 'gm',

/*
 * 全作品共通のゲームエンジン。ダイス・d20判定・localStorage 永続化と、
 * シェル（DCLogic コンポーネント）へのゲーム状態の合流（attach）を担う。
 * 作品ごとの中身（シナリオ・画面の値）は games/<id>.game.js が window.__GAME__ に定義する。
 */
(function () {
  function rollDie(sides) {
    return 1 + Math.floor(Math.random() * sides);
  }
  function pickKeys(obj, keys) {
    var o = {};
    for (var i = 0; i < keys.length; i++) o[keys[i]] = obj[keys[i]];
    return o;
  }
  window.GameEngine = {
    rollDie: rollDie,
    clamp: function (v, lo, hi) {
      return Math.max(lo, Math.min(hi, v));
    },
    // d20 判定。20 は大成功、1 は大失敗（出目優先）
    check: function (mod, dc) {
      var die = rollDie(20);
      var total = die + mod;
      var outcome = die === 20 ? 'crit' : die === 1 ? 'fumble' : total >= dc ? 'success' : 'fail';
      return { die: die, mod: mod, total: total, dc: dc, outcome: outcome, ok: outcome === 'crit' || outcome === 'success' };
    },
    outcomeText: function (outcome) {
      return { crit: '大成功', success: '成功', fail: '失敗', fumble: '大失敗' }[outcome] || '';
    },
    attach: function (app, game) {
      var key = 'trpg-game-' + game.id;
      var saved = null;
      try { saved = JSON.parse(localStorage.getItem(key) || 'null'); } catch (e) {}
      Object.assign(app.state, game.initialState(), saved || {});
      if (game.migrate) game.migrate(app.state);
      var baseRenderVals = app.renderVals.bind(app);
      app.renderVals = function () {
        var vals = baseRenderVals();
        return Object.assign(vals, game.vals(app, vals));
      };
      var baseSetState = app.setState.bind(app);
      app.setState = function (update) {
        baseSetState(update);
        try { localStorage.setItem(key, JSON.stringify(pickKeys(app.state, game.persist))); } catch (e) {}
      };
      // ゲーム状態のみ初期値へ戻す（device / play / screen は保持）
      app._resetGame = function () {
        try { localStorage.removeItem(key); } catch (e) {}
        Object.assign(app.state, game.initialState());
        app.render();
      };
    },
  };
})();

/*
 * 1l-辺境コンビニ のゲーム内容。
 * - レジ判定: d4〜d100。d20 判定はレシート印字で3段階（成功／一部成功／失敗）。出目1は「レジ詰まり」
 * - 店長ファイル: 体力 / 接客スマイル / 本部からの信頼 の増減
 * - 開門ラッシュ: 行列ゲージ（共有）と4件のお客様対応（新人パーティの生存率／常連／生還者／ドラゴン）
 * - 発注端末: 「地図の切れ端（第9層）」だけ査定を進められ、進めるとGM秘匿に繋がる伏線が育つ
 * - 業務日報: 分岐シナリオ「最後の肉まんの、渡し先」（体力・信頼ルール・複数エンディング）。
 *   GM 秘匿（聖騎士ノエル＝大穴を守るため脱走・討伐隊が迫っている／おでん鍋＝境界の釜）を
 *   発見する真ルートあり
 * - バックヤード: 幕切替・大穴の異変度・来店ハプニング表 d6
 */
(function () {
  var E = null;
  function eng() { return E || (E = window.GameEngine); }

  var TAI_MAX = 17, SMILE_MAX = 10;

  var SKILLS = [
    { name: '会計しながら世間話', mod: 6 },
    { name: '装備の値踏み（買取査定）', mod: 5 },
    { name: 'おでんの火加減（大穴連動）', mod: 4 },
    { name: '「二度と行くな」と言う', mod: -3 },
    { name: '胆力', mod: 3 },
  ];
  var DICE_SIDES = [4, 6, 8, 10, 12, 20, 100];

  // レジ判定: 3段階（成功／一部成功／失敗）。出目1は「レジ詰まり」
  function receiptInfo(r) {
    if (r.die === 1) return { word: 'レジ詰まり', color: '#c65448', verdict: '＝ ' + r.total + ' ・ レジ詰まり。行列が1段階悪化し、魔物のお客様が舌打ちする' };
    if (r.total >= r.dc) return { word: '成功', color: '#2f8a5c', verdict: '＝ ' + r.total + ' ・ 査定・応対、共に問題なし' };
    if (r.total >= r.dc - 4) return { word: '一部成功', color: '#a5851f', verdict: '＝ ' + r.total + ' ・ お値引き交渉までは至らず' };
    return { word: '失敗', color: '#c65448', verdict: '＝ ' + r.total + ' ・ うまく手続きできなかった' };
  }

  var CUSTOMER_DEFS = [
    { key: 'newbie', num: 1, title: '新人冒険者パーティ（4名）', gauge: '推定生存率', max: 100, unit: '%', tag: '対応中', tagColor: '#2f9e5f', note: 'ポーション0本で入ろうとしている', titleColor: '#25332a', border: '2px solid #2f9e5f', bg: 'rgba(47,158,95,.04)', numBg: '#2f9e5f', numColor: '#fff', valColor: '#c65448', barColor: '#c65448', hasBtns: true },

          };
        }
        return {
          num: d.isEnemyLike ? '!' : d.num, title: d.title, titleColor: d.titleColor,
          tag: d.tag, tagColor: d.tagColor, note: d.note,
          border: d.border, bg: d.bg,
          numBg: d.numBg, numColor: d.numColor,
          gauge: d.gauge, value: v + d.unit, valColor: d.valColor, pct: Math.round((v / d.max) * 100), barColor: d.barColor,
          hasBtns: d.hasBtns, dec: adj(-5), inc: adj(5),
        };
      });

      // ── 発注端末 ──
      out.mapPending = st.items.mapStatus === 'pending';
      out.mapStatus = st.items.mapStatus === 'pending' ? '査定中' : '照合済';
      out.mapColor = st.items.mapStatus === 'pending' ? '#a5851f' : '#2f5d9e';
      out.mapNote = st.items.mapStatus === 'pending' ? MAP_NOTE_PENDING : MAP_NOTE_DONE;
      out.appraiseMap = function () {
        var items = Object.assign({}, st.items);
        items.mapStatus = 'done';
        app.setState({ items: items });
      };

      // ── 業務日報 ──
      var node = NODES[st.storyNode] || NODES.l1;
      out.storyKicker = node.kicker;
      out.storyTitle = node.title;
      out.storyBlocks = node.text.map(function (b) {
        return typeof b === 'string' ? { isP: true, isQ: false, t: b } : { isP: false, isQ: true, t: b.q };
      });
      out.storyHasNote = !!st.storyNote;
      out.storyNote = st.storyNote || '';
      out.storyNoteColor = st.storyNoteColor || '#7f927f';
      out.storyPct = node.pct;
      out.storyPctLabel = node.end
        ? '日報 提出完了 ・ 結審'
        : '日報 ' + node.pct + '% ・ 閉店処理まで ' + Math.max(0, 60 - Math.round(node.pct / 2)) + '分 ・ おでん指数 ' + Math.min(6, Math.round(st.ihen / 16)) + 'F';
      out.storyCanRestart = st.storyNode !== 'l1';
      out.storyRestart = function () { app._resetGame(); };

      function choose(c) {
        return function () {
          var patch = { storyNote: null, storyNoteColor: '#7f927f' };
          var target = c.to;
          if (c.check) {
            var dc = typeof c.check.dc === 'function' ? c.check.dc(st) : c.check.dc;
            var r = E.check(c.check.mod, dc);
            patch.storyNote = c.check.name + '判定 — d20〈' + r.die + '〉＋' + r.mod + ' ＝ ' + r.total + ' ／ 難度' + dc + ' ・ ' + (r.ok ? '成功' : '失敗');
            patch.storyNoteColor = r.ok ? '#2f8a5c' : '#c65448';
            pushLog(st, 'タケル ・ ' + c.check.name + '（業務日報）', r.total + ' ／ ' + (r.ok ? '成功' : '失敗'), r.ok ? '#2f8a5c' : '#c65448');
            patch.rollLog = st.rollLog;
            target = r.ok ? c.success : c.fail;
          }
          var nextNode = NODES[target];
          applyFx(st, nextNode.fx, patch);
          var taiNow = 'tai' in patch ? patch.tai : st.tai;
          var shinraiNow = 'shinrai' in patch ? patch.shinrai : st.shinrai;
          if (taiNow <= 0 && !nextNode.end) {
            target = 'E_faint';
            applyFx(st, NODES.E_faint.fx, patch);
          } else if (shinraiNow <= 0 && !nextNode.end) {
            target = 'E_abandoned';
            applyFx(st, NODES.E_abandoned.fx, patch);
          }
          patch.storyNode = target;
          app.setState(patch);
        };
      }
      var defs = node.end ? END_CHOICES : node.choices;
      out.storyChoices = defs.filter(function (c) {
        return !c.if || c.if(st);
      }).map(function (c) {
        var dc = c.check ? (typeof c.check.dc === 'function' ? c.check.dc(st) : c.check.dc) : null;
        return {
          num: c.num || '', pre: c.pre, skillText: c.skillText || '', post: c.post || '',
          dcLabel: dc != null ? '難度' + dc : '',
          go: c.restart ? function () { app._resetGame(); }
            : c.top ? function () { app.setState({ screen: 'top' }); }
            : choose(c),
        };
      });

      // ── バックヤード ──
      out.gmScenes = GM_SCENES.map(function (t, i) {
        var active = i === st.gmScene;
        return {
          t: t, tag: active ? '進行中' : '',
          go: function () { app.setState({ gmScene: i }); },
          border: active ? '2px solid #2f9e5f' : '1px solid rgba(47,158,95,.3)',
          bg: active ? 'rgba(47,158,95,.04)' : '#fff',
          color: active ? '#25332a' : '#7f927f',
          weight: active ? '700' : '400',
        };
      });
      out.ihen = st.ihen;
      out.ihenMinus = function () { app.setState({ ihen: E.clamp(st.ihen - 5, 0, 100) }); };
      out.ihenPlus = function () { app.setState({ ihen: E.clamp(st.ihen + 5, 0, 100) }); };
      out.gmHasTable = !!st.gmTable;
      out.gmTableD = st.gmTable ? st.gmTable.d : '';
      out.gmTableText = st.gmTable ? st.gmTable.text : '';
      out.rollTable = function () {
        var d = E.rollDie(6);
        var text = GM_TABLE[d - 1];
        pushLog(st, 'バックヤード ・ 来店ハプニング表', d + ' ／ ' + text, '#2f9e5f');
        app.setState({ gmTable: { d: d, text: text }, rollLog: st.rollLog });
      };

      return out;
    },
  };
})();

window.__dcApp = new Component();
if (typeof GameEngine !== 'undefined' && window.__GAME__) GameEngine.attach(window.__dcApp, window.__GAME__);
window.__dcApp.mount(document.getElementById('app'), document.getElementById('dc-template'));
</script>
