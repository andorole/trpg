<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>反省文ドラゴン</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700;900&family=Shippori+Mincho:wght@500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  body{margin:0;background:#15151a;}
  @keyframes scfade{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:none}}
  @keyframes stampin{0%{transform:rotate(-11deg) scale(1.6);opacity:0}60%{transform:rotate(-6deg) scale(.97);opacity:1}100%{transform:rotate(-6deg) scale(1)}}
  @keyframes smolder{0%,100%{opacity:.5}50%{opacity:1}}
  ::-webkit-scrollbar{width:10px;height:10px}
  ::-webkit-scrollbar-thumb{background:rgba(91,58,143,.3);border-radius:8px}
  ::-webkit-scrollbar-track{background:transparent}
</style>
</head>
<body>
<div id="app"></div>
<template id="dc-template">
<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:34px 20px 96px;box-sizing:border-box;font-family:'Zen Kaku Gothic New',sans-serif;background:radial-gradient(120% 95% at 50% 0%,#1e1c26 0%,#15151a 58%,#0d0d11 100%);color:#2b2b33;">

  <div style="position:relative;width:{{ frameW }}px;height:{{ frameH }}px;max-width:100%;background:#f2f0ea;border:1px solid #cfcabc;border-radius:5px;box-shadow:0 34px 90px -22px rgba(0,0,0,.72),0 0 0 8px rgba(10,10,14,.55);overflow:hidden;display:flex;flex-direction:column;">

    <div style="position:absolute;inset:0;pointer-events:none;background-image:repeating-linear-gradient(0deg,rgba(43,43,51,.025) 0 1px,transparent 1px 30px),radial-gradient(circle at 92% 4%,rgba(196,90,42,.06),transparent 26%);"></div>

    <header style="position:relative;z-index:2;display:flex;align-items:center;justify-content:space-between;gap:14px;padding:12px 22px;border-bottom:2px solid #2b2b33;background:linear-gradient(180deg,#f7f5f0,#efece4);">
      <div style="display:flex;align-items:center;gap:12px;">
        <span style="display:inline-flex;align-items:center;justify-content:center;width:30px;height:30px;flex:none;border-radius:4px;background:#5b3a8f;color:#f2f0ea;font-family:'Shippori Mincho',serif;font-weight:800;font-size:13px;">魔</span>
        <div>
          <div style="font-size:9px;letter-spacing:2px;color:#7a7668;">株式会社 元魔王軍（勇者ホールディングス傘下） 総務部 人事考課課</div>
          <div style="display:flex;align-items:baseline;gap:10px;">
            <span style="font-family:'Shippori Mincho',serif;font-weight:800;font-size:20px;letter-spacing:2px;color:#2b2b33;">反省文ドラゴン</span>
            <span style="font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:1px;color:#5b3a8f;">FORM-9 : LETTER OF APOLOGY</span>
          </div>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:10px;">
        <span style="font-size:12px;letter-spacing:1px;color:#7a7668;">{{ playLabel }}</span>
        <span style="font-family:'IBM Plex Mono',monospace;font-size:11px;padding:4px 10px;border:1px solid rgba(196,60,60,.5);border-radius:3px;color:#c43c3c;background:rgba(196,60,60,.05);">提出期限 本日17:00</span>
      </div>
    </header>

    <div style="position:relative;z-index:2;flex:1;display:flex;min-height:0;">

      <sc-if value="{{ showRail }}" hint-placeholder-val="{{ true }}">
        <nav style="width:{{ railW }}px;flex:none;border-right:1px solid rgba(43,43,51,.18);background:linear-gradient(180deg,rgba(91,58,143,.04),transparent);padding:15px 10px;display:flex;flex-direction:column;gap:3px;overflow-y:auto;">
          <sc-for list="{{ nav }}" as="item" hint-placeholder-count="8">
            <button onClick="{{ item.go }}" style="display:flex;align-items:center;gap:11px;width:100%;padding:9px 11px;border:0;border-radius:4px;cursor:pointer;text-align:left;background:{{ item.bg }};color:{{ item.color }};font-family:'Zen Kaku Gothic New',sans-serif;font-size:14px;font-weight:{{ item.weight }};">
              <span style="width:22px;height:22px;flex:none;display:flex;align-items:center;justify-content:center;font-size:11px;font-family:'Shippori Mincho',serif;font-weight:700;border-radius:3px;background:{{ item.badgeBg }};color:{{ item.badgeColor }};border:{{ item.badgeBorder }};">{{ item.badge }}</span>
              <span style="{{ item.labelStyle }}">{{ item.label }}</span>
            </button>
          </sc-for>
        </nav>
      </sc-if>

      <main style="flex:1;min-width:0;overflow-y:auto;padding:{{ mainPad }};">

        <sc-if value="{{ isTop }}" hint-placeholder-val="{{ true }}">
          <div data-screen-label="総務受付" style="animation:scfade .4s ease;max-width:760px;margin:0 auto;">
            <p style="font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:2px;color:#7a7668;margin:0 0 7px;">社内報 ・ 合併後 第14四半期</p>
            <h1 style="font-family:'Shippori Mincho',serif;font-weight:800;font-size:34px;line-height:1.3;margin:0 0 14px;color:#2b2b33;">本日も、燃やしたら書く。</h1>
            <p style="font-size:15px;line-height:2.0;color:#4a4a52;margin:0 0 10px;max-width:60ch;">魔王城陥落から三年——我が社は勇者ホールディングスに吸収合併され、破壊と侵略は「事業内容の見直し」の対象となりました。しかし我々はドラゴン。<b style="color:#c43c3c;">うっかり燃やす</b>のです。会議室を。決裁書類を。ときどき上司の前髪を。</p>
            <p style="font-size:12px;color:#a09a88;margin:0 0 24px;">※本作のダンジョンは「経緯の説明」、ボスは「誠意の言語化」です。</p>

            <div style="border:1px solid rgba(43,43,51,.25);border-radius:4px;padding:14px 16px;margin:0 0 28px;background:#faf8f3;">
              <p style="font-size:11px;letter-spacing:3px;color:#5b3a8f;font-weight:700;margin:0 0 9px;">■ 今期の始末書 提出状況（部署別）</p>
              <div style="display:flex;align-items:center;gap:10px;margin-bottom:7px;"><span style="width:110px;font-size:12px;color:#4a4a52;">火竜課</span><div style="flex:1;height:10px;border-radius:2px;background:rgba(43,43,51,.08);overflow:hidden;"><div style="width:94%;height:100%;background:linear-gradient(90deg,#c45a2a,#c43c3c);"></div></div><span style="font-family:'IBM Plex Mono',monospace;font-size:11px;color:#c43c3c;width:64px;text-align:right;">147件 ⚠</span></div>
              <div style="display:flex;align-items:center;gap:10px;margin-bottom:7px;"><span style="width:110px;font-size:12px;color:#4a4a52;">氷竜課</span><div style="flex:1;height:10px;border-radius:2px;background:rgba(43,43,51,.08);overflow:hidden;"><div style="width:31%;height:100%;background:#5b7fa8;"></div></div><span style="font-family:'IBM Plex Mono',monospace;font-size:11px;color:#5b6472;width:64px;text-align:right;">48件</span></div>
              <div style="display:flex;align-items:center;gap:10px;"><span style="width:110px;font-size:12px;color:#4a4a52;">スライム課</span><div style="flex:1;height:10px;border-radius:2px;background:rgba(43,43,51,.08);overflow:hidden;"><div style="width:4%;height:100%;background:#3d8a5f;"></div></div><span style="font-family:'IBM Plex Mono',monospace;font-size:11px;color:#5b6472;width:64px;text-align:right;">6件</span></div>
              <p style="font-size:10px;color:#a09a88;margin:8px 0 0;">※スライム課は物理的に何も壊せないため常に優良部署です。</p>
            </div>

            <p style="font-size:11px;letter-spacing:3px;color:#5b3a8f;font-weight:700;margin:0 0 12px;">■ 反省の形式を選択</p>
            <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:0 0 28px;">
              <sc-for list="{{ playModes }}" as="m" hint-placeholder-count="3">
                <button onClick="{{ m.go }}" style="text-align:left;padding:14px 15px;border-radius:4px;cursor:pointer;border:{{ m.border }};background:{{ m.bg }};">
                  <div style="font-size:14px;font-weight:700;color:{{ m.titleColor }};margin-bottom:5px;">{{ m.t }}</div>
                  <div style="font-size:12px;line-height:1.7;color:#7a7668;">{{ m.d }}</div>
                </button>
              </sc-for>
            </div>

            <p style="font-size:11px;letter-spacing:3px;color:#5b3a8f;font-weight:700;margin:0 0 14px;">■ 本日の反省者一同</p>
            <div style="display:flex;gap:16px;flex-wrap:wrap;margin-bottom:26px;">
              <div style="display:flex;flex-direction:column;align-items:center;gap:7px;width:96px;"><div style="width:62px;height:62px;border-radius:8px;border:2px solid #c45a2a;background:repeating-linear-gradient(45deg,rgba(196,90,42,.14) 0 5px,transparent 5px 10px),#fff;"></div><div style="font-size:13px;font-weight:700;color:#2b2b33;">ヴォルガ</div><div style="font-size:11px;color:#7a7668;">火竜課 課長</div></div>
              <div style="display:flex;flex-direction:column;align-items:center;gap:7px;width:96px;"><div style="width:62px;height:62px;border-radius:8px;border:2px solid #5b7fa8;background:repeating-linear-gradient(45deg,rgba(91,127,168,.14) 0 5px,transparent 5px 10px),#fff;"></div><div style="font-size:13px;font-weight:700;color:#2b2b33;">グラキエ</div><div style="font-size:11px;color:#7a7668;">氷竜課 主任</div></div>
              <div style="display:flex;flex-direction:column;align-items:center;gap:7px;width:96px;"><div style="width:62px;height:62px;border-radius:8px;border:2px solid #5b3a8f;background:repeating-linear-gradient(45deg,rgba(91,58,143,.14) 0 5px,transparent 5px 10px),#fff;"></div><div style="font-size:13px;font-weight:700;color:#2b2b33;">ノワール</div><div style="font-size:11px;color:#7a7668;">闇竜課 新卒</div></div>
              <div style="display:flex;flex-direction:column;align-items:center;gap:7px;width:96px;"><div style="width:62px;height:62px;border-radius:50%;border:2px solid #3d8a5f;background:radial-gradient(circle at 40% 35%,rgba(61,138,95,.3),rgba(61,138,95,.1)),#fff;"></div><div style="font-size:13px;font-weight:700;color:#2b2b33;">ぷに男</div><div style="font-size:11px;color:#7a7668;">スライム課（監査役）</div></div>
            </div>

            <button onClick="{{ goStory }}" style="display:inline-flex;align-items:center;gap:10px;padding:13px 30px;border:2px solid #2b2b33;border-radius:4px;cursor:pointer;background:#2b2b33;color:#f2f0ea;font-family:'Zen Kaku Gothic New',sans-serif;font-weight:700;font-size:15px;letter-spacing:3px;box-shadow:3px 3px 0 rgba(43,43,51,.2);">始末書を書き始める　➜</button>
          </div>
        </sc-if>

        <sc-if value="{{ isSheet }}" hint-placeholder-val="{{ false }}">
          <div data-screen-label="人事ファイル" style="animation:scfade .4s ease;max-width:820px;margin:0 auto;">
            <div style="display:flex;gap:20px;align-items:flex-start;margin-bottom:20px;">
              <div style="width:88px;height:110px;flex:none;border:1px solid rgba(43,43,51,.35);background:repeating-linear-gradient(45deg,rgba(196,90,42,.08) 0 6px,transparent 6px 12px),#fff;display:flex;align-items:center;justify-content:center;font-size:9px;letter-spacing:1px;color:#a09a88;text-align:center;">社員証写真<br>（翼は畳んで）</div>
              <div style="flex:1;min-width:0;">
                <p style="font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:2px;color:#7a7668;margin:0 0 4px;">社員番号 DRG-0084 ・ 人事考課ファイル</p>
                <h1 style="font-family:'Shippori Mincho',serif;font-weight:800;font-size:28px;margin:0 0 4px;color:#2b2b33;">ヴォルガノフ・炎帝・第三世</h1>
                <p style="font-size:13px;color:#7a7668;margin:0 0 10px;">火竜課 課長 ・ 勤続1,204年（うち侵略業務1,201年） ・ 体長22m</p>
                <div style="display:flex;gap:7px;flex-wrap:wrap;">
                  <span style="font-size:11px;padding:3px 9px;border-radius:2px;border:1px solid rgba(43,43,51,.3);color:#4a4a52;">元・四天王</span>
                  <span style="font-size:11px;padding:3px 9px;border-radius:2px;border:1px solid rgba(43,43,51,.3);color:#4a4a52;">デスクは特注（耐火）</span>
                  <span style="font-size:11px;padding:3px 9px;border-radius:2px;border:1px solid rgba(196,60,60,.5);color:#c43c3c;">くしゃみ注意（過去3回全焼）</span>
                </div>
              </div>
            </div>

            <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:13px;margin-bottom:22px;">
              <div style="background:#faf8f3;border:1px solid rgba(43,43,51,.14);border-radius:4px;padding:11px 13px;"><div style="display:flex;justify-content:space-between;font-size:12px;color:#7a7668;margin-bottom:5px;"><span>体力（竜格）</span><span style="font-family:'IBM Plex Mono',monospace;">{{ tai }} / 92</span></div><div style="height:9px;border-radius:2px;background:rgba(43,43,51,.08);overflow:hidden;"><div style="width:{{ taiPct }}%;height:100%;background:linear-gradient(90deg,#c45a2a,#c43c3c);"></div></div><div style="display:flex;gap:5px;margin-top:6px;"><button onClick="{{ taiDown }}" style="width:24px;height:24px;border:1px solid rgba(43,43,51,.25);border-radius:3px;background:#fff;color:#7a7668;cursor:pointer;font-size:13px;line-height:1;">−</button><button onClick="{{ taiUp }}" style="width:24px;height:24px;border:1px solid rgba(43,43,51,.25);border-radius:3px;background:#fff;color:#7a7668;cursor:pointer;font-size:13px;line-height:1;">＋</button></div></div>
              <div style="background:#faf8f3;border:1px solid rgba(43,43,51,.14);border-radius:4px;padding:11px 13px;"><div style="display:flex;justify-content:space-between;font-size:12px;color:#7a7668;margin-bottom:5px;"><span>社会性（人間界適応）</span><span style="font-family:'IBM Plex Mono',monospace;color:#c43c3c;">{{ shakai }} / 20</span></div><div style="height:9px;border-radius:2px;background:rgba(43,43,51,.08);overflow:hidden;"><div style="width:{{ shakaiPct }}%;height:100%;background:#5b7fa8;"></div></div><div style="display:flex;gap:5px;margin-top:6px;"><button onClick="{{ shakaiDown }}" style="width:24px;height:24px;border:1px solid rgba(43,43,51,.25);border-radius:3px;background:#fff;color:#7a7668;cursor:pointer;font-size:13px;line-height:1;">−</button><button onClick="{{ shakaiUp }}" style="width:24px;height:24px;border:1px solid rgba(43,43,51,.25);border-radius:3px;background:#fff;color:#7a7668;cursor:pointer;font-size:13px;line-height:1;">＋</button></div></div>
              <div style="background:#faf8f3;border:1px solid rgba(43,43,51,.14);border-radius:4px;padding:11px 13px;"><div style="display:flex;justify-content:space-between;font-size:12px;color:#7a7668;margin-bottom:5px;"><span>上司からの信頼</span><span style="font-family:'IBM Plex Mono',monospace;color:{{ trustColor }};">{{ trustLabel }}</span></div><div style="height:9px;border-radius:2px;background:rgba(43,43,51,.08);overflow:hidden;"><div style="width:{{ trust }}%;height:100%;background:linear-gradient(90deg,#b58a1f,#3d8a5f);"></div></div><div style="font-size:9px;color:#a09a88;margin-top:3px;">※前回の「誠意ある放火」で急落</div><div style="display:flex;gap:5px;margin-top:6px;"><button onClick="{{ trustDown }}" style="width:24px;height:24px;border:1px solid rgba(43,43,51,.25);border-radius:3px;background:#fff;color:#7a7668;cursor:pointer;font-size:13px;line-height:1;">−</button><button onClick="{{ trustUp }}" style="width:24px;height:24px;border:1px solid rgba(43,43,51,.25);border-radius:3px;background:#fff;color:#7a7668;cursor:pointer;font-size:13px;line-height:1;">＋</button></div></div>
            </div>

            <p style="font-size:11px;letter-spacing:3px;color:#5b3a8f;font-weight:700;margin:0 0 12px;">■ 能力（考課基礎点）</p>
            <div style="display:grid;grid-template-columns:repeat(6,1fr);gap:0;border:1px solid rgba(43,43,51,.3);border-radius:4px;overflow:hidden;margin-bottom:24px;background:#fff;">
              <div style="padding:10px 4px;text-align:center;border-right:1px solid rgba(43,43,51,.14);"><div style="font-size:10px;color:#7a7668;">破壊力</div><div style="font-family:'IBM Plex Mono',monospace;font-size:23px;font-weight:600;color:#c43c3c;line-height:1.25;">20</div><div style="font-size:10px;color:#c43c3c;">評価対象外</div></div>
              <div style="padding:10px 4px;text-align:center;border-right:1px solid rgba(43,43,51,.14);"><div style="font-size:10px;color:#7a7668;">文章力</div><div style="font-family:'IBM Plex Mono',monospace;font-size:23px;font-weight:600;color:#2b2b33;line-height:1.25;">8</div><div style="font-size:10px;color:#b58a1f;">−1</div></div>
              <div style="padding:10px 4px;text-align:center;border-right:1px solid rgba(43,43,51,.14);background:rgba(91,58,143,.05);"><div style="font-size:10px;color:#5b3a8f;">誠意</div><div style="font-family:'IBM Plex Mono',monospace;font-size:23px;font-weight:600;color:#5b3a8f;line-height:1.25;">17</div><div style="font-size:10px;color:#3d8a5f;">＋3</div></div>
              <div style="padding:10px 4px;text-align:center;border-right:1px solid rgba(43,43,51,.14);"><div style="font-size:10px;color:#7a7668;">言い訳</div><div style="font-family:'IBM Plex Mono',monospace;font-size:23px;font-weight:600;color:#2b2b33;line-height:1.25;">14</div><div style="font-size:10px;color:#3d8a5f;">＋2</div></div>
              <div style="padding:10px 4px;text-align:center;border-right:1px solid rgba(43,43,51,.14);"><div style="font-size:10px;color:#7a7668;">土下座</div><div style="font-family:'IBM Plex Mono',monospace;font-size:23px;font-weight:600;color:#2b2b33;line-height:1.25;">15</div><div style="font-size:10px;color:#3d8a5f;">＋2 <span style="color:#a09a88;">体格で減点</span></div></div>
              <div style="padding:10px 4px;text-align:center;"><div style="font-size:10px;color:#7a7668;">堪忍袋</div><div style="font-family:'IBM Plex Mono',monospace;font-size:23px;font-weight:600;color:#c43c3c;line-height:1.25;">5</div><div style="font-size:10px;color:#c43c3c;">−2</div></div>
            </div>

            <div style="display:grid;grid-template-columns:1fr 1fr;gap:24px;">
              <div>
                <p style="font-size:11px;letter-spacing:3px;color:#5b3a8f;font-weight:700;margin:0 0 10px;">■ 保有スキル</p>
                <div style="display:flex;justify-content:space-between;font-size:14px;color:#4a4a52;padding:6px 0;border-bottom:1px dotted rgba(43,43,51,.25);"><span>灼熱のブレス</span><span style="font-family:'IBM Plex Mono',monospace;color:#c43c3c;">社内使用禁止</span></div>
                <div style="display:flex;justify-content:space-between;font-size:14px;color:#4a4a52;padding:6px 0;border-bottom:1px dotted rgba(43,43,51,.25);"><span>謝罪文の口述</span><span style="font-family:'IBM Plex Mono',monospace;color:#3d8a5f;">+4</span></div>
                <div style="display:flex;justify-content:space-between;font-size:14px;color:#4a4a52;padding:6px 0;border-bottom:1px dotted rgba(43,43,51,.25);"><span>菓子折り選定</span><span style="font-family:'IBM Plex Mono',monospace;color:#3d8a5f;">+6</span></div>
                <div style="display:flex;justify-content:space-between;font-size:14px;color:#4a4a52;padding:6px 0;"><span>ハンコをまっすぐ押す</span><span style="font-family:'IBM Plex Mono',monospace;color:#b58a1f;">−3（爪が大きい）</span></div>
              </div>
              <div>
                <p style="font-size:11px;letter-spacing:3px;color:#5b3a8f;font-weight:700;margin:0 0 10px;">■ 特性</p>
                <div style="border:1px solid rgba(43,43,51,.2);border-radius:4px;padding:11px 13px;margin-bottom:9px;background:#faf8f3;"><div style="font-size:13px;font-weight:700;color:#2b2b33;margin-bottom:3px;">元・四天王の矜持</div><div style="font-size:12px;line-height:1.7;color:#7a7668;">謝罪しても威厳が滲む。「申し訳ないが、余の炎は真実であった」等と書いてしまい差戻しされる。</div></div>
                <div style="border:1px solid rgba(61,138,95,.4);border-radius:4px;padding:11px 13px;background:rgba(61,138,95,.04);"><div style="font-size:13px;font-weight:700;color:#3d8a5f;margin-bottom:3px;">部下想い</div><div style="font-size:12px;line-height:1.7;color:#7a7668;">部下の失敗を自分の始末書に書いて庇う。147件のうち52件は他人の分。</div></div>
              </div>
            </div>
            <p style="margin-top:22px;font-size:13px;line-height:1.9;color:#7a7668;border-left:3px solid rgba(91,58,143,.4);padding-left:14px;">自己申告欄：「破壊は得意です。創造も、書類仕事でなければ。今期の目標は『会議室を燃やさない（3ヶ月連続達成中）』です」</p>
          </div>
        </sc-if>

        <sc-if value="{{ isDice }}" hint-placeholder-val="{{ false }}">
          <div data-screen-label="決裁判定" style="animation:scfade .4s ease;max-width:560px;margin:0 auto;text-align:center;">

        <sc-if value="{{ isMap }}" hint-placeholder-val="{{ false }}">

            <div style="display:grid;grid-template-columns:1.5fr 1fr;gap:20px;">
              <div style="position:relative;height:340px;border:1px solid rgba(43,43,51,.3);border-radius:4px;background:repeating-linear-gradient(0deg,rgba(43,43,51,.04) 0 1px,transparent 1px 24px),repeating-linear-gradient(90deg,rgba(43,43,51,.04) 0 1px,transparent 1px 24px),#fff;overflow:hidden;">

                <div style="position:absolute;left:8%;right:8%;top:67%;height:48px;border:2px solid #2f7a4f;border-radius:3px;background:rgba(47,122,79,.05);display:flex;align-items:center;justify-content:space-between;padding:0 14px;"><span style="font-size:12px;font-weight:700;color:#2f7a4f;">2F 上司の執務室</span><span style="font-size:10px;color:#7a7668;">ノックは爪でなく指関節で</span></div>
                <div style="position:absolute;left:8%;right:8%;top:86%;height:36px;border:2px dashed rgba(43,43,51,.3);border-radius:3px;opacity:.7;display:flex;align-items:center;justify-content:space-between;padding:0 14px;"><span style="font-size:12px;font-weight:700;color:#7a7668;">B1F 反省室（旧・地下牢）</span><span style="font-size:10px;color:#a09a88;">Wi-Fiあり</span></div>
              </div>

<script>
/*
 * Claude Design の x-dc テンプレート（sc-if / sc-for / {{ 変数 }} / onClick）を
 * そのまま解釈して描画するミニランタイム。support.js（React ベースのプレビュー用）の代替。
 * 状態変更のたびにテンプレート全体を再構築する（プロトタイプの再レンダーと同等）。
 */
(function () {
  var cache = new Map();
  function compile(expr) {
    var fn = cache.get(expr);
    if (!fn) {
      fn = new Function('__s', 'with(__s){return(' + expr + ');}');
      cache.set(expr, fn);
    }
    return fn;
  }
  function evalExpr(expr, scope) {
    return compile(expr)(scope);
  }
  // "{{ expr }}" 単体の属性値から式を取り出す
  function single(text) {
    var m = /^\s*\{\{\s*([\s\S]+?)\s*\}\}\s*$/.exec(text || '');
    return m ? m[1] : null;
  }
  function interpolate(text, scope) {
    if (text.indexOf('{{') === -1) return text;
    return text.replace(/\{\{\s*([\s\S]+?)\s*\}\}/g, function (_, expr) {
      var v = evalExpr(expr, scope);
      return v == null ? '' : String(v);
    });
  }
  function build(nodes, scope, parent) {
    for (var i = 0; i < nodes.length; i++) {
      var node = nodes[i];
      if (node.nodeType === Node.TEXT_NODE) {
        parent.appendChild(document.createTextNode(interpolate(node.nodeValue, scope)));
        continue;
      }
      if (node.nodeType !== Node.ELEMENT_NODE) continue;
      var tag = node.localName;
      if (tag === 'sc-if') {
        var cond = single(node.getAttribute('value'));
        if (cond && evalExpr(cond, scope)) build(node.childNodes, scope, parent);
        continue;
      }
      if (tag === 'sc-for') {
        var listExpr = single(node.getAttribute('list'));
        var as = node.getAttribute('as') || 'item';
        var list = (listExpr && evalExpr(listExpr, scope)) || [];
        for (var j = 0; j < list.length; j++) {
          var child = Object.assign({}, scope);
          child[as] = list[j];
          build(node.childNodes, child, parent);
        }
        continue;
      }
      var el = document.createElementNS(node.namespaceURI, tag);
      for (var k = 0; k < node.attributes.length; k++) {
        var attr = node.attributes[k];
        if (attr.name.indexOf('hint-placeholder') === 0) continue;
        if (attr.name === 'onclick') {
          var handlerExpr = single(attr.value);
          var fn = handlerExpr ? evalExpr(handlerExpr, scope) : null;
          if (typeof fn === 'function') el.addEventListener('click', fn);
          continue;
        }
        el.setAttribute(attr.name, interpolate(attr.value, scope));
      }
      build(node.childNodes, scope, el);
      parent.appendChild(el);
    }
  }
  window.DCLogic = class DCLogic {
    mount(rootEl, templateEl) {
      this._root = rootEl;
      this._tpl = templateEl.content;
      this.render();
    }
    setState(update) {
      var patch = typeof update === 'function' ? update(this.state) : update;
      Object.assign(this.state, patch);
      this.render();
    }
    render() {
      var scope = this.renderVals();
      var frag = document.createDocumentFragment();
      build(this._tpl.childNodes, scope, frag);
      this._root.replaceChildren(frag);
    }
  };
})();

class Component extends DCLogic {
  state = { device: 'desktop', play: 'gmpl', screen: 'top' };

/*
 * 全作品共通のゲームエンジン。ダイス・d20判定・localStorage 永続化と、
 * シェル（DCLogic コンポーネント）へのゲーム状態の合流（attach）を担う。
 * 作品ごとの中身（シナリオ・画面の値）は games/<id>.game.js が window.__GAME__ に定義する。
 */
(function () {
  function rollDie(sides) {
    return 1 + Math.floor(Math.random() * sides);
  }
  function pickKeys(obj, keys) {
    var o = {};
    for (var i = 0; i < keys.length; i++) o[keys[i]] = obj[keys[i]];
    return o;
  }
  window.GameEngine = {
    rollDie: rollDie,
    clamp: function (v, lo, hi) {
      return Math.max(lo, Math.min(hi, v));
    },
    // d20 判定。20 は大成功、1 は大失敗（出目優先）
    check: function (mod, dc) {
      var die = rollDie(20);
      var total = die + mod;
      var outcome = die === 20 ? 'crit' : die === 1 ? 'fumble' : total >= dc ? 'success' : 'fail';
      return { die: die, mod: mod, total: total, dc: dc, outcome: outcome, ok: outcome === 'crit' || outcome === 'success' };
    },
    outcomeText: function (outcome) {
      return { crit: '大成功', success: '成功', fail: '失敗', fumble: '大失敗' }[outcome] || '';
    },
    attach: function (app, game) {
      var key = 'trpg-game-' + game.id;
      var saved = null;
      try { saved = JSON.parse(localStorage.getItem(key) || 'null'); } catch (e) {}
      Object.assign(app.state, game.initialState(), saved || {});
      if (game.migrate) game.migrate(app.state);
      var baseRenderVals = app.renderVals.bind(app);
      app.renderVals = function () {
        var vals = baseRenderVals();
        return Object.assign(vals, game.vals(app, vals));
      };
      var baseSetState = app.setState.bind(app);
      app.setState = function (update) {
        baseSetState(update);
        try { localStorage.setItem(key, JSON.stringify(pickKeys(app.state, game.persist))); } catch (e) {}
      };
      // ゲーム状態のみ初期値へ戻す（device / play / screen は保持）
      app._resetGame = function () {
        try { localStorage.removeItem(key); } catch (e) {}
        Object.assign(app.state, game.initialState());
        app.render();
      };
    },
  };
})();

/*
 * 1g-反省文ドラゴン のゲーム内容。
 * - 決裁判定: d4〜d100。d20 判定は決裁印を3段階（承認／条件付差戻／差戻）で判定する
 * - 人事ファイル: 体力（竜格）/ 社会性（人間界適応）/ 上司からの信頼(0-100、閾値でラベルが変わる) の増減
 * - 査問会議: ボス「呆れゲージ」（0で和解・100で「もういい」）を0まで下げるトラッカー。竜たちは平常心ゲージ
 * - 添付資料: 「下書き47枚目（本音）」に印をつけられる。印をつけると経緯書終盤の選択肢が変化する
 * - 経緯書: 分岐シナリオ「会議室Cが全焼するまでの経緯」（社会性ルール・複数エンディング）。
 *   GM 秘匿（ユーリ課長代理＝竜たちのリストラを止めようとしている）を発見する真ルートあり
 * - 人事部長室: 案件切替・全社「うっかり」警戒度・社内ハプニング表 d6
 */
(function () {
  var E = null;
  function eng() { return E || (E = window.GameEngine); }

  var TAI_MAX = 92, SHAKAI_MAX = 20;

  var SKILLS = [
    { name: '謝罪文の口述', mod: 4 },
    { name: '菓子折り選定', mod: 6 },
    { name: 'ハンコをまっすぐ押す', mod: -3 },
    { name: '誠意', mod: 3 },
    { name: '堪忍袋', mod: -2 },
  ];
  var DICE_SIDES = [4, 6, 8, 10, 12, 20, 100];

  // 決裁印: 3段階（承認／条件付差戻／差戻）。出目20は特別評価、出目1は大目玉
  function stampInfo(r) {
    if (r.die === 20) return { word: '承認', color: '#2f7a4f', bg: 'rgba(47,122,79,.05)', verdict: '＝ ' + r.total + ' ・ 承認（再発防止策が具体的、と評判に）' };
    if (r.outcome === 'fumble') return { word: '差戻', color: '#c43c3c', bg: 'rgba(196,60,60,.04)', verdict: '＝ ' + r.total + ' ・ 差戻（大目玉つき）' };
    if (r.total >= r.dc) return { word: '承認', color: '#2f7a4f', bg: 'rgba(47,122,79,.05)', verdict: '＝ ' + r.total + ' ・ 承認' };
    if (r.total >= r.dc - 3) return { word: '条件付差戻', color: '#b58a1f', bg: 'rgba(181,138,31,.04)', verdict: '＝ ' + r.total + ' ・ 惜しい。「反省の具体性が不足」との付箋つき' };
    return { word: '差戻', color: '#c43c3c', bg: 'rgba(196,60,60,.04)', verdict: '＝ ' + r.total + ' ・ 差戻' };
  }

  function trustInfo(v) {
    if (v >= 67) return { label: '良好', color: '#2f7a4f' };
    if (v >= 34) return { label: '回復中', color: '#b58a1f' };
    return { label: '低下中', color: '#c43c3c' };
  }

  var COMBATANTS = [
    { key: 'hpVoruga', name: 'ヴォルガ', init: 18, max: 30, tokenBorder: '#c45a2a', tokenPat: 'rgba(196,90,42,.14)', tags: [{ t: '菓子折り所持（虎屋）', bg: 'rgba(61,138,95,.12)', color: '#3d8a5f', anim: '' }, { t: '鼻から微煙', bg: 'rgba(196,60,60,.1)', color: '#c43c3c', anim: 'animation:smolder 2s ease-in-out infinite;' }] },
    { key: 'hpGlacie', name: 'グラキエ', init: 14, max: 28, tokenBorder: '#5b7fa8', tokenPat: 'rgba(91,127,168,.14)', tags: [{ t: '議事録係（正確無比）', bg: 'rgba(91,127,168,.12)', color: '#5b7fa8', anim: '' }] },
    { key: 'hpNoir', name: 'ノワール', init: 9, max: 24, tokenBorder: '#5b3a8f', tokenPat: 'rgba(91,58,143,.14)', tags: [{ t: '緊張で実体化が不安定', bg: 'rgba(196,60,60,.1)', color: '#c43c3c', anim: '' }] },
  ];

      };
      function aliveIdx(from) {
        for (var i = 1; i <= COMBATANTS.length; i++) {
          var idx = (from + i) % COMBATANTS.length;
          if (st[COMBATANTS[idx].key] > 0) return idx;
        }
        return from;
      }
      out.nextTurn = function () {
        var next = aliveIdx(st.turnIdx);
        var patch = { turnIdx: next };
        if (next <= st.turnIdx) patch.kai = st.kai + 1;
        app.setState(patch);
      };
      out.combatants = COMBATANTS.map(function (c, i) {
        var hp = st[c.key];
        var dead = hp <= 0;
        var active = i === st.turnIdx && !dead;
        var tags = dead ? [{ t: '退室（休憩室へ）', bg: 'rgba(196,60,60,.1)', color: '#c43c3c', anim: '' }] : c.tags;
        function adj(d) {
          return function () {
            var patch = {};
            patch[c.key] = E.clamp(hp + d, 0, c.max);
            app.setState(patch);
          };
        }
        return {
          name: c.name, init: c.init, hp: hp, max: c.max,
          pct: Math.round((hp / c.max) * 100),
          side: active ? '弁明中' : '',
          border: active ? '2px solid #c45a2a' : '1px solid rgba(43,43,51,.2)',
          bg: active ? 'rgba(196,90,42,.04)' : '#faf8f3',
          op: dead ? '.6' : '1',
          initBg: active ? '#c45a2a' : 'rgba(43,43,51,.1)',
          initColor: active ? '#fff' : '#4a4a52',
          tokenBorder: c.tokenBorder, tokenPat: c.tokenPat,
          hasTags: tags.length > 0, tags: tags,
          dmg5: adj(-5), dmg1: adj(-1), heal1: adj(1), heal5: adj(5),
        };
      });

      // ── 添付資料 ──
      out.honneUnmarked = !st.items.honneMarked;
      out.honneText = st.items.honneMarked ? HONNE_TEXT_MARKED : HONNE_TEXT;
      out.markHonne = function () {
        var items = Object.assign({}, st.items);
        items.honneMarked = 1;
        app.setState({ items: items, flags: Object.assign({}, st.flags, { honneMarked: 1 }) });
      };

      // ── 経緯書 ──
      var node = NODES[st.storyNode] || NODES.g1;
      out.storyKicker = node.kicker;
      out.storyTitle = node.title;
      out.storyBlocks = node.text.map(function (b) {
        return typeof b === 'string' ? { isP: true, isQ: false, t: b } : { isP: false, isQ: true, t: b.q };
      });
      out.storyHasNote = !!st.storyNote;
      out.storyNote = st.storyNote || '';
      out.storyNoteColor = st.storyNoteColor || '#7a7668';
      out.storyPct = node.pct;
      out.storyPctLabel = node.end
        ? '経緯書 提出完了 ・ 査問結審'
        : '経緯書 進捗' + node.pct + '% ・ 提出期限まで あと' + Math.max(0, Math.round((100 - node.pct) / 10)) + '0分';
      out.storyCanRestart = st.storyNode !== 'g1';
      out.storyRestart = function () { app._resetGame(); };

      function choose(c) {
        return function () {
          var patch = { storyNote: null, storyNoteColor: '#7a7668' };
          var target = c.to;
          if (c.check) {
            var dc = typeof c.check.dc === 'function' ? c.check.dc(st) : c.check.dc;
            var r = E.check(c.check.mod, dc);
            patch.storyNote = c.check.name + '判定 — d20〈' + r.die + '〉＋' + r.mod + ' ＝ ' + r.total + ' ／ 難度' + dc + ' ・ ' + (r.ok ? '成功' : '失敗');
            patch.storyNoteColor = r.ok ? '#2f7a4f' : '#c43c3c';
            pushLog(st, 'ヴォルガ ・ ' + c.check.name + '（経緯書）', r.total + ' ／ ' + (r.ok ? '成功' : '失敗'), r.ok ? '#2f7a4f' : '#c43c3c');
            patch.rollLog = st.rollLog;
            target = r.ok ? c.success : c.fail;
          }
          var nextNode = NODES[target];
          applyFx(st, nextNode.fx, patch);
          var taiNow = 'tai' in patch ? patch.tai : st.tai;
          var shakaiNow = 'shakai' in patch ? patch.shakai : st.shakai;
          if (taiNow <= 0 && !nextNode.end) {
            target = 'E_faint';
            applyFx(st, NODES.E_faint.fx, patch);
          } else if (shakaiNow <= 0 && !nextNode.end) {
            target = 'E_feral';
            applyFx(st, NODES.E_feral.fx, patch);
          }
          patch.storyNode = target;
          app.setState(patch);
        };
      }
      var defs = node.end ? END_CHOICES : node.choices;
      out.storyChoices = defs.filter(function (c) {
        return !c.if || c.if(st);
      }).map(function (c) {
        var dc = c.check ? (typeof c.check.dc === 'function' ? c.check.dc(st) : c.check.dc) : null;
        return {
          num: c.num || '', pre: c.pre, skillText: c.skillText || '', post: c.post || '',
          dcLabel: dc != null ? '難度' + dc : '',
          go: c.restart ? function () { app._resetGame(); }
            : c.top ? function () { app.setState({ screen: 'top' }); }
            : choose(c),
        };
      });

      // ── 人事部長室 ──
      out.gmScenes = GM_SCENES.map(function (t, i) {
        var active = i === st.gmScene;
        return {
          t: t, tag: active ? '進行中' : '',
          go: function () { app.setState({ gmScene: i }); },
          border: active ? '2px solid #5b3a8f' : '1px solid rgba(43,43,51,.25)',
          bg: active ? 'rgba(91,58,143,.04)' : '#faf8f3',
          color: active ? '#2b2b33' : '#7a7668',
          weight: active ? '700' : '400',
        };
      });
      out.keikai = st.keikai;
      out.keikaiMinus = function () { app.setState({ keikai: E.clamp(st.keikai - 5, 0, 100) }); };
      out.keikaiPlus = function () { app.setState({ keikai: E.clamp(st.keikai + 5, 0, 100) }); };
      out.gmHasTable = !!st.gmTable;
      out.gmTableD = st.gmTable ? st.gmTable.d : '';
      out.gmTableText = st.gmTable ? st.gmTable.text : '';
      out.rollTable = function () {
        var d = E.rollDie(6);
        var text = GM_TABLE[d - 1];
        pushLog(st, '人事部長 ・ 社内ハプニング表', d + ' ／ ' + text, '#5b3a8f');
        app.setState({ gmTable: { d: d, text: text }, rollLog: st.rollLog });
      };

      return out;
    },
  };
})();

window.__dcApp = new Component();
if (typeof GameEngine !== 'undefined' && window.__GAME__) GameEngine.attach(window.__dcApp, window.__GAME__);
window.__dcApp.mount(document.getElementById('app'), document.getElementById('dc-template'));
</script>
