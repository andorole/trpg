<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>深宴</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Old+Mincho:wght@400;500;600;700;900&family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500;1,600&display=swap" rel="stylesheet">
<style>
  body{margin:0;background:#0a0d12;}
  @keyframes scfade{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:none}}
  @keyframes diceflip{0%{transform:rotate(-8deg) scale(.86);opacity:.4}55%{transform:rotate(5deg) scale(1.06)}100%{transform:none;opacity:1}}
  @keyframes glow{0%,100%{box-shadow:0 0 0 6px rgba(79,216,201,.08),0 16px 34px -12px rgba(0,0,0,.6),inset 0 0 22px rgba(0,0,0,.4)}50%{box-shadow:0 0 0 9px rgba(79,216,201,.14),0 16px 34px -12px rgba(0,0,0,.6),inset 0 0 22px rgba(0,0,0,.4)}}
  ::-webkit-scrollbar{width:10px;height:10px}
  ::-webkit-scrollbar-thumb{background:rgba(205,164,78,.28);border-radius:8px}
  ::-webkit-scrollbar-track{background:transparent}
</style>
</head>
<body>
<div id="app"></div>
<template id="dc-template">
<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:34px 20px 96px;box-sizing:border-box;font-family:'Zen Old Mincho',serif;background:radial-gradient(120% 95% at 50% 0%,#141d27 0%,#0a0d12 58%,#05070a 100%);color:#ece4d0;">

  <div style="position:relative;width:{{ frameW }}px;height:{{ frameH }}px;max-width:100%;background:linear-gradient(175deg,#121a24,#0b0f16 55%,#080a0f);border:1px solid rgba(205,164,78,.32);border-radius:9px;box-shadow:0 34px 90px -22px rgba(0,0,0,.82),0 0 0 8px rgba(5,7,10,.6),inset 0 0 130px rgba(30,60,70,.1);overflow:hidden;display:flex;flex-direction:column;">

    <div style="position:absolute;inset:0;pointer-events:none;background-image:radial-gradient(circle at 84% 12%,rgba(79,216,201,.07),transparent 40%),radial-gradient(circle at 10% 88%,rgba(205,164,78,.06),transparent 42%),repeating-linear-gradient(90deg,rgba(255,255,255,.014) 0 1px,transparent 1px 3px);"></div>

    <header style="position:relative;z-index:2;display:flex;align-items:center;justify-content:space-between;gap:14px;padding:12px 22px;border-bottom:1px solid rgba(205,164,78,.24);background:linear-gradient(180deg,rgba(20,28,38,.85),rgba(14,19,27,.5));">
      <div style="display:flex;align-items:center;gap:12px;">
        <span style="display:inline-flex;align-items:center;justify-content:center;width:30px;height:30px;flex:none;border-radius:50%;background:radial-gradient(circle at 35% 30%,#e9cd82,#a6813a 72%);color:#171008;font-family:'Zen Old Mincho',serif;font-weight:700;font-size:15px;box-shadow:0 2px 6px rgba(0,0,0,.45),0 0 0 1px rgba(228,198,117,.35);">饗</span>
        <span style="font-family:'Zen Old Mincho',serif;font-weight:700;font-size:22px;color:#ece4d0;letter-spacing:5px;">深宴</span>
        <span style="font-family:'Cormorant Garamond',serif;font-style:italic;font-size:11px;letter-spacing:2px;color:#cda44e;">SHIN-EN ・ ABYSSAL GASTRONOMY</span>
      </div>
      <div style="display:flex;align-items:center;gap:9px;">
        <span style="font-size:12px;letter-spacing:1.5px;color:#8b93a0;">{{ playLabel }}</span>
        <span style="width:6px;height:6px;border-radius:50%;background:#cda44e;box-shadow:0 0 0 3px rgba(205,164,78,.2);"></span>
      </div>
    </header>

    <div style="position:relative;z-index:2;flex:1;display:flex;min-height:0;">

      <sc-if value="{{ showRail }}" hint-placeholder-val="{{ true }}">
        <nav style="width:{{ railW }}px;flex:none;border-right:1px solid rgba(205,164,78,.16);background:linear-gradient(180deg,rgba(205,164,78,.05),transparent);padding:15px 10px;display:flex;flex-direction:column;gap:3px;overflow-y:auto;">
          <sc-for list="{{ nav }}" as="item" hint-placeholder-count="8">
            <button onClick="{{ item.go }}" style="position:relative;display:flex;align-items:center;gap:12px;width:100%;padding:10px 12px;border:0;border-radius:7px;cursor:pointer;text-align:left;background:{{ item.bg }};color:{{ item.color }};font-family:'Zen Old Mincho',serif;font-size:15px;font-weight:{{ item.weight }};">
              <span style="width:20px;height:20px;flex:none;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-family:'Zen Old Mincho',serif;background:{{ item.badgeBg }};color:{{ item.badgeColor }};border:{{ item.badgeBorder }};">{{ item.badge }}</span>
              <span style="{{ item.labelStyle }}">{{ item.label }}</span>
            </button>
          </sc-for>
        </nav>
      </sc-if>

      <main style="flex:1;min-width:0;overflow-y:auto;padding:{{ mainPad }};">

        <sc-if value="{{ isTop }}" hint-placeholder-val="{{ true }}">
          <div data-screen-label="献立" style="animation:scfade .4s ease;max-width:760px;margin:0 auto;">
            <p style="font-size:11px;letter-spacing:4px;color:#cda44e;margin:0 0 7px;">本日の貸切 ・ 深々度特別室</p>
            <h1 style="font-family:'Zen Old Mincho',serif;font-weight:700;font-size:37px;line-height:1.15;margin:0 0 14px;color:#ece4d0;">深き沖の伯爵、ご来店</h1>
            <p style="font-size:17px;line-height:1.75;color:#c3bda9;margin:0 0 28px;max-width:58ch;">予約は一月前、名前欄にはただ「観測者」とだけ。氷室の奥では、触れるなと言われた食材が三つ、静かに呼吸している。開店の鐘まで、あと十二分。</p>

            <p style="font-size:11px;letter-spacing:3px;color:#cda44e;margin:0 0 12px;">営業の形を択ぶ</p>
            <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:0 0 30px;">
              <sc-for list="{{ playModes }}" as="m" hint-placeholder-count="3">
                <button onClick="{{ m.go }}" style="text-align:left;padding:14px 15px;border-radius:9px;cursor:pointer;border:{{ m.border }};background:{{ m.bg }};">
                  <div style="font-family:'Zen Old Mincho',serif;font-size:14px;font-weight:700;color:{{ m.titleColor }};margin-bottom:5px;">{{ m.t }}</div>
                  <div style="font-size:13px;line-height:1.5;color:#8b93a0;">{{ m.d }}</div>
                </button>
              </sc-for>
            </div>

            <p style="font-size:11px;letter-spacing:3px;color:#cda44e;margin:0 0 14px;">本日の給仕陣</p>
            <div style="display:flex;gap:16px;flex-wrap:wrap;">
              <div style="display:flex;flex-direction:column;align-items:center;gap:7px;width:92px;"><div style="width:62px;height:62px;border-radius:50%;border:2px solid #cda44e;background:repeating-linear-gradient(45deg,rgba(205,164,78,.14) 0 5px,transparent 5px 10px),rgba(20,26,34,.6);box-shadow:0 4px 10px rgba(0,0,0,.3);"></div><div style="font-size:13px;color:#ece4d0;">桐生 遥</div><div style="font-size:11px;color:#8b93a0;">見習い給仕</div></div>
              <div style="display:flex;flex-direction:column;align-items:center;gap:7px;width:92px;"><div style="width:62px;height:62px;border-radius:50%;border:2px solid #cda44e;background:repeating-linear-gradient(45deg,rgba(205,164,78,.14) 0 5px,transparent 5px 10px),rgba(20,26,34,.6);box-shadow:0 4px 10px rgba(0,0,0,.3);"></div><div style="font-size:13px;color:#ece4d0;">黒瀬</div><div style="font-size:11px;color:#8b93a0;">支配人</div></div>
              <div style="display:flex;flex-direction:column;align-items:center;gap:7px;width:92px;"><div style="width:62px;height:62px;border-radius:50%;border:2px solid #cda44e;background:repeating-linear-gradient(45deg,rgba(205,164,78,.14) 0 5px,transparent 5px 10px),rgba(20,26,34,.6);box-shadow:0 4px 10px rgba(0,0,0,.3);"></div><div style="font-size:13px;color:#ece4d0;">藍原</div><div style="font-size:11px;color:#8b93a0;">ソムリエ</div></div>
              <div style="display:flex;flex-direction:column;align-items:center;gap:7px;width:92px;"><div style="width:62px;height:62px;border-radius:50%;border:2px solid #cda44e;background:repeating-linear-gradient(45deg,rgba(205,164,78,.14) 0 5px,transparent 5px 10px),rgba(20,26,34,.6);box-shadow:0 4px 10px rgba(0,0,0,.3);"></div><div style="font-size:13px;color:#ece4d0;">司</div><div style="font-size:11px;color:#8b93a0;">焼き場</div></div>
            </div>

            <button onClick="{{ goStory }}" style="margin-top:30px;display:inline-flex;align-items:center;gap:10px;padding:13px 28px;border:0;border-radius:9px;cursor:pointer;background:linear-gradient(180deg,#e4c675,#a6813a);color:#171008;font-family:'Zen Old Mincho',serif;font-weight:700;font-size:15px;letter-spacing:2px;box-shadow:0 10px 24px -8px rgba(166,129,58,.5);">開店の鐘を鳴らす　➜</button>
          </div>
        </sc-if>

        <sc-if value="{{ isSheet }}" hint-placeholder-val="{{ false }}">
          <div data-screen-label="給仕人記録" style="animation:scfade .4s ease;max-width:820px;margin:0 auto;">
            <div style="display:flex;gap:20px;align-items:flex-start;margin-bottom:22px;">
              <div style="width:96px;height:96px;flex:none;border-radius:6px;border:1px solid rgba(205,164,78,.35);background:repeating-linear-gradient(45deg,rgba(205,164,78,.1) 0 6px,transparent 6px 12px),rgba(20,26,34,.5);display:flex;align-items:center;justify-content:center;font-size:9px;letter-spacing:1px;color:#8b7f5e;">制服写真</div>
              <div style="flex:1;min-width:0;">
                <p style="font-size:11px;letter-spacing:3px;color:#cda44e;margin:0 0 4px;">給仕人記録 ・ 名簿其の壱</p>
                <h1 style="font-family:'Zen Old Mincho',serif;font-weight:700;font-size:29px;margin:0 0 4px;color:#ece4d0;">桐生 遥</h1>
                <p style="font-size:14px;color:#8b93a0;margin:0 0 10px;">見習い給仕 ・ 就業三月目 ・ 二十一</p>
                <div style="display:flex;gap:7px;flex-wrap:wrap;">
                  <span style="font-size:11px;padding:3px 9px;border-radius:999px;border:1px solid rgba(205,164,78,.35);color:#8b93a0;">皿運び自慢</span>
                  <span style="font-size:11px;padding:3px 9px;border-radius:999px;border:1px solid rgba(205,164,78,.35);color:#8b93a0;">香に聡い</span>
                  <span style="font-size:11px;padding:3px 9px;border-radius:999px;border:1px solid rgba(205,164,78,.35);color:#8b93a0;">悲鳴を飲み込む</span>
                </div>
              </div>
            </div>

            <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:13px;margin-bottom:22px;">
              <div><div style="display:flex;justify-content:space-between;font-size:12px;color:#8b93a0;margin-bottom:4px;"><span>気力</span><span>{{ ki }} / 13</span></div><div style="height:9px;border-radius:6px;background:rgba(255,255,255,.08);overflow:hidden;"><div style="width:{{ kiPct }}%;height:100%;background:linear-gradient(90deg,#9c4a3a,#c96a52);"></div></div><div style="display:flex;gap:5px;margin-top:6px;"><button onClick="{{ kiDown }}" style="width:24px;height:24px;border:1px solid rgba(205,164,78,.3);border-radius:7px;background:rgba(255,255,255,.05);color:#8b93a0;cursor:pointer;font-size:13px;line-height:1;">−</button><button onClick="{{ kiUp }}" style="width:24px;height:24px;border:1px solid rgba(205,164,78,.3);border-radius:7px;background:rgba(255,255,255,.05);color:#8b93a0;cursor:pointer;font-size:13px;line-height:1;">＋</button></div></div>
              <div><div style="display:flex;justify-content:space-between;font-size:12px;color:#8b93a0;margin-bottom:4px;"><span>品位</span><span>{{ hin }} / 9</span></div><div style="height:9px;border-radius:6px;background:rgba(255,255,255,.08);overflow:hidden;"><div style="width:{{ hinPct }}%;height:100%;background:linear-gradient(90deg,#1f6d68,#3fc9bb);"></div></div><div style="display:flex;gap:5px;margin-top:6px;"><button onClick="{{ hinDown }}" style="width:24px;height:24px;border:1px solid rgba(205,164,78,.3);border-radius:7px;background:rgba(255,255,255,.05);color:#8b93a0;cursor:pointer;font-size:13px;line-height:1;">−</button><button onClick="{{ hinUp }}" style="width:24px;height:24px;border:1px solid rgba(205,164,78,.3);border-radius:7px;background:rgba(255,255,255,.05);color:#8b93a0;cursor:pointer;font-size:13px;line-height:1;">＋</button></div></div>
              <div><div style="display:flex;justify-content:space-between;font-size:12px;color:#8b93a0;margin-bottom:4px;"><span>常心</span><span>{{ jo }} / 100</span></div><div style="height:9px;border-radius:6px;background:rgba(255,255,255,.08);overflow:hidden;"><div style="width:{{ jo }}%;height:100%;background:linear-gradient(90deg,#2c3c54,#46618a);"></div></div><div style="display:flex;gap:5px;margin-top:6px;"><button onClick="{{ joDown }}" style="width:24px;height:24px;border:1px solid rgba(205,164,78,.3);border-radius:7px;background:rgba(255,255,255,.05);color:#8b93a0;cursor:pointer;font-size:13px;line-height:1;">−</button><button onClick="{{ joUp }}" style="width:24px;height:24px;border:1px solid rgba(205,164,78,.3);border-radius:7px;background:rgba(255,255,255,.05);color:#8b93a0;cursor:pointer;font-size:13px;line-height:1;">＋</button></div></div>
            </div>

            <p style="font-size:11px;letter-spacing:3px;color:#cda44e;margin:0 0 12px;">能力</p>
            <div style="display:grid;grid-template-columns:repeat(6,1fr);gap:9px;margin-bottom:24px;">
              <div style="border:1px solid rgba(205,164,78,.22);border-radius:8px;padding:9px 4px;text-align:center;background:rgba(255,255,255,.03);"><div style="font-size:10px;letter-spacing:1px;color:#cda44e;">所作</div><div style="font-family:'Zen Old Mincho',serif;font-size:24px;font-weight:700;color:#ece4d0;line-height:1.15;">16</div><div style="font-size:11px;color:#8b93a0;">＋3</div></div>
              <div style="border:1px solid rgba(205,164,78,.22);border-radius:8px;padding:9px 4px;text-align:center;background:rgba(255,255,255,.03);"><div style="font-size:10px;letter-spacing:1px;color:#cda44e;">膳力</div><div style="font-family:'Zen Old Mincho',serif;font-size:24px;font-weight:700;color:#ece4d0;line-height:1.15;">10</div><div style="font-size:11px;color:#8b93a0;">±0</div></div>
              <div style="border:1px solid rgba(205,164,78,.22);border-radius:8px;padding:9px 4px;text-align:center;background:rgba(255,255,255,.03);"><div style="font-size:10px;letter-spacing:1px;color:#cda44e;">舌識</div><div style="font-family:'Zen Old Mincho',serif;font-size:24px;font-weight:700;color:#ece4d0;line-height:1.15;">14</div><div style="font-size:11px;color:#8b93a0;">＋2</div></div>
              <div style="border:1px solid rgba(205,164,78,.22);border-radius:8px;padding:9px 4px;text-align:center;background:rgba(255,255,255,.03);"><div style="font-size:10px;letter-spacing:1px;color:#cda44e;">度胸</div><div style="font-family:'Zen Old Mincho',serif;font-size:24px;font-weight:700;color:#ece4d0;line-height:1.15;">9</div><div style="font-size:11px;color:#8b93a0;">－1</div></div>
              <div style="border:1px solid rgba(205,164,78,.22);border-radius:8px;padding:9px 4px;text-align:center;background:rgba(255,255,255,.03);"><div style="font-size:10px;letter-spacing:1px;color:#cda44e;">愛想</div><div style="font-family:'Zen Old Mincho',serif;font-size:24px;font-weight:700;color:#ece4d0;line-height:1.15;">15</div><div style="font-size:11px;color:#8b93a0;">＋2</div></div>
              <div style="border:1px solid rgba(205,164,78,.22);border-radius:8px;padding:9px 4px;text-align:center;background:rgba(255,255,255,.03);"><div style="font-size:10px;letter-spacing:1px;color:#cda44e;">耐性</div><div style="font-family:'Zen Old Mincho',serif;font-size:24px;font-weight:700;color:#ece4d0;line-height:1.15;">12</div><div style="font-size:11px;color:#8b93a0;">＋1</div></div>
            </div>

            <div style="display:grid;grid-template-columns:1fr 1fr;gap:24px;">
              <div>
                <p style="font-size:11px;letter-spacing:3px;color:#cda44e;margin:0 0 10px;">技能</p>
                <div style="display:flex;justify-content:space-between;font-size:14px;color:#c3bda9;padding:6px 0;border-bottom:1px dotted rgba(205,164,78,.22);"><span>配膳</span><span style="color:#cda44e;">＋7</span></div>
                <div style="display:flex;justify-content:space-between;font-size:14px;color:#c3bda9;padding:6px 0;border-bottom:1px dotted rgba(205,164,78,.22);"><span>味見</span><span style="color:#cda44e;">＋6</span></div>
                <div style="display:flex;justify-content:space-between;font-size:14px;color:#c3bda9;padding:6px 0;border-bottom:1px dotted rgba(205,164,78,.22);"><span>接客話術</span><span style="color:#cda44e;">＋5</span></div>
                <div style="display:flex;justify-content:space-between;font-size:14px;color:#c3bda9;padding:6px 0;"><span>悲鳴を殺す</span><span style="color:#cda44e;">＋3</span></div>
              </div>
              <div>
                <p style="font-size:11px;letter-spacing:3px;color:#cda44e;margin:0 0 10px;">特性</p>
                <div style="border:1px solid rgba(205,164,78,.22);border-radius:8px;padding:11px 13px;margin-bottom:9px;background:rgba(255,255,255,.03);"><div style="font-size:13px;font-weight:700;color:#ece4d0;margin-bottom:3px;">無表情の礼</div><div style="font-size:12px;line-height:1.5;color:#8b93a0;">どれほど異形の客であろうと、表情筋ひとつ動かさず一礼できる。看破・威圧への判定に有利。</div></div>
                <div style="border:1px solid rgba(205,164,78,.22);border-radius:8px;padding:11px 13px;background:rgba(255,255,255,.03);"><div style="font-size:13px;font-weight:700;color:#ece4d0;margin-bottom:3px;">盆の上の胆力</div><div style="font-size:12px;line-height:1.5;color:#8b93a0;">盆を落とさぬ限り、常心を失っても手だけは震えない。</div></div>
              </div>
            </div>
            <p style="margin-top:22px;font-style:italic;font-size:14px;line-height:1.7;color:#8b93a0;border-left:2px solid rgba(205,164,78,.45);padding-left:14px;">「お客様は選べない。選べるのは、笑顔を保つかどうかだけ」――研修初日、支配人の言葉。</p>
          </div>
        </sc-if>

        <sc-if value="{{ isDice }}" hint-placeholder-val="{{ false }}">
          <div data-screen-label="鑑定" style="animation:scfade .4s ease;max-width:560px;margin:0 auto;text-align:center;">
            <p style="font-size:11px;letter-spacing:4px;color:#cda44e;margin:0 0 4px;">{{ diceHead }}</p>
            <sc-if value="{{ diceIsCheck }}">
              <div style="display:flex;justify-content:center;align-items:center;gap:9px;margin:6px 0 0;">
                <button onClick="{{ dcMinus }}" style="width:24px;height:24px;border:1px solid rgba(205,164,78,.3);border-radius:7px;background:rgba(255,255,255,.05);color:#8b93a0;cursor:pointer;font-size:13px;line-height:1;">−</button>
                <span style="font-size:12px;letter-spacing:2px;color:#8b93a0;">評価基準を調整</span>
                <button onClick="{{ dcPlus }}" style="width:24px;height:24px;border:1px solid rgba(205,164,78,.3);border-radius:7px;background:rgba(255,255,255,.05);color:#8b93a0;cursor:pointer;font-size:13px;line-height:1;">＋</button>
              </div>
            </sc-if>
            <div style="display:flex;flex-direction:column;align-items:center;gap:7px;margin:18px 0 24px;">
              <div style="width:122px;height:122px;border-radius:50%;animation:diceflip .55s ease,glow 2.6s ease-in-out infinite;background:radial-gradient(circle at 32% 28%,#3a4a5c,#0f1620 72%);border:2px solid #cda44e;display:flex;align-items:center;justify-content:center;color:#e8c876;font-family:'Zen Old Mincho',serif;font-weight:700;font-size:52px;">{{ diceFace }}</div>
              <div style="font-size:14px;color:#8b93a0;">{{ diceFormula }}</div>
              <div style="font-family:'Zen Old Mincho',serif;font-size:16px;letter-spacing:4px;color:{{ diceVerdictColor }};">{{ diceVerdict }}</div>
            </div>
            <div style="display:flex;justify-content:center;gap:7px;flex-wrap:wrap;margin-bottom:14px;">
              <sc-for list="{{ diceTypes }}" as="dt">
                <button onClick="{{ dt.go }}" style="font-family:'Zen Old Mincho',serif;font-size:13px;padding:7px 13px;border-radius:8px;cursor:pointer;border:{{ dt.border }};color:{{ dt.color }};background:{{ dt.bg }};">{{ dt.label }}</button>
              </sc-for>
            </div>
            <sc-if value="{{ diceIsCheck }}">
              <div style="display:flex;justify-content:center;gap:7px;flex-wrap:wrap;margin-bottom:16px;">
                <sc-for list="{{ diceSkills }}" as="sk">
                  <button onClick="{{ sk.go }}" style="font-family:'Zen Old Mincho',serif;font-size:12px;padding:5px 11px;border-radius:999px;cursor:pointer;border:{{ sk.border }};color:{{ sk.color }};background:{{ sk.bg }};">{{ sk.label }}</button>
                </sc-for>
              </div>
            </sc-if>

/*
 * Claude Design の x-dc テンプレート（sc-if / sc-for / {{ 変数 }} / onClick）を
 * そのまま解釈して描画するミニランタイム。support.js（React ベースのプレビュー用）の代替。

    if (text.indexOf('{{') === -1) return text;
    return text.replace(/\{\{\s*([\s\S]+?)\s*\}\}/g, function (_, expr) {
      var v = evalExpr(expr, scope);
      return v == null ? '' : String(v);

      var node = nodes[i];
      if (node.nodeType === Node.TEXT_NODE) {
        parent.appendChild(document.createTextNode(interpolate(node.nodeValue, scope)));
        continue;
      }
      if (node.nodeType !== Node.ELEMENT_NODE) continue;
      var tag = node.localName;
      if (tag === 'sc-if') {
        var cond = single(node.getAttribute('value'));
        if (cond && evalExpr(cond, scope)) build(node.childNodes, scope, parent);
        continue;
      }
      if (tag === 'sc-for') {
        var listExpr = single(node.getAttribute('list'));
        var as = node.getAttribute('as') || 'item';
        var list = (listExpr && evalExpr(listExpr, scope)) || [];
        for (var j = 0; j < list.length; j++) {
          var child = Object.assign({}, scope);
          child[as] = list[j];
          build(node.childNodes, child, parent);
        }
        continue;
      }
      var el = document.createElementNS(node.namespaceURI, tag);
      for (var k = 0; k < node.attributes.length; k++) {
        var attr = node.attributes[k];
        if (attr.name.indexOf('hint-placeholder') === 0) continue;
        if (attr.name === 'onclick') {
          var handlerExpr = single(attr.value);
          var fn = handlerExpr ? evalExpr(handlerExpr, scope) : null;
          if (typeof fn === 'function') el.addEventListener('click', fn);
          continue;
        }
        el.setAttribute(attr.name, interpolate(attr.value, scope));
      }
      build(node.childNodes, scope, el);
      parent.appendChild(el);

    mount(rootEl, templateEl) {
      this._root = rootEl;
      this._tpl = templateEl.content;
      this.render();
    }
    setState(update) {
      var patch = typeof update === 'function' ? update(this.state) : update;
      Object.assign(this.state, patch);
      this.render();
    }
    render() {
      var scope = this.renderVals();
      var frag = document.createDocumentFragment();
      build(this._tpl.childNodes, scope, frag);
      this._root.replaceChildren(frag);
    }
  };
})();

/*
 * 全作品共通のゲームエンジン。ダイス・d20判定・localStorage 永続化と、
 * シェル（DCLogic コンポーネント）へのゲーム状態の合流（attach）を担う。
 * 作品ごとの中身（シナリオ・画面の値）は games/<id>.game.js が window.__GAME__ に定義する。
 */
(function () {
  function rollDie(sides) {
    return 1 + Math.floor(Math.random() * sides);
  }
  function pickKeys(obj, keys) {
    var o = {};
    for (var i = 0; i < keys.length; i++) o[keys[i]] = obj[keys[i]];
    return o;
  }
  window.GameEngine = {
    rollDie: rollDie,
    clamp: function (v, lo, hi) {
      return Math.max(lo, Math.min(hi, v));
    },
    // d20 判定。20 は大成功、1 は大失敗（出目優先）
    check: function (mod, dc) {
      var die = rollDie(20);
      var total = die + mod;
      var outcome = die === 20 ? 'crit' : die === 1 ? 'fumble' : total >= dc ? 'success' : 'fail';
      return { die: die, mod: mod, total: total, dc: dc, outcome: outcome, ok: outcome === 'crit' || outcome === 'success' };
    },
    outcomeText: function (outcome) {
      return { crit: '大成功', success: '成功', fail: '失敗', fumble: '大失敗' }[outcome] || '';
    },
    attach: function (app, game) {
      var key = 'trpg-game-' + game.id;
      var saved = null;
      try { saved = JSON.parse(localStorage.getItem(key) || 'null'); } catch (e) {}
      Object.assign(app.state, game.initialState(), saved || {});
      if (game.migrate) game.migrate(app.state);
      var baseRenderVals = app.renderVals.bind(app);
      app.renderVals = function () {
        var vals = baseRenderVals();
        return Object.assign(vals, game.vals(app, vals));
      };
      var baseSetState = app.setState.bind(app);
      app.setState = function (update) {
        baseSetState(update);
        try { localStorage.setItem(key, JSON.stringify(pickKeys(app.state, game.persist))); } catch (e) {}
      };
      // ゲーム状態のみ初期値へ戻す（device / play / screen は保持）
      app._resetGame = function () {
        try { localStorage.removeItem(key); } catch (e) {}
        Object.assign(app.state, game.initialState());
        app.render();
      };
    },
  };
})();

    if (fx.items) {
      var items = Object.assign({}, get('items'));
      for (var k in fx.items) items[k] = Math.max(0, (items[k] || 0) + fx.items[k]);
      patch.items = items;

    if (fx.flags) patch.flags = Object.assign({}, get('flags'), fx.flags);
  }

      function aliveIdx(from) {
        for (var i = 1; i <= COMBATANTS.length; i++) {
          var idx = (from + i) % COMBATANTS.length;
          if (st[COMBATANTS[idx].key] > 0) return idx;
        }
        return from;
      }
      out.nextTurn = function () {
        var next = aliveIdx(st.turnIdx);
        var patch = { turnIdx: next };
        if (next <= st.turnIdx) patch.jun = st.jun + 1;
        app.setState(patch);
      };
      out.nextRound = function () {
        var first = st[COMBATANTS[0].key] > 0 ? 0 : aliveIdx(0);
        app.setState({ jun: st.jun + 1, turnIdx: first });
      };
      out.combatants = COMBATANTS.map(function (c, i) {
        var hp = st[c.key];
        var dead = hp <= 0;
        var active = i === st.turnIdx && !dead;
        var tags = dead
          ? [{ t: c.deadTag, bg: 'rgba(178,84,100,.16)', color: '#b25464' }]
          : c.tags;
        function adj(d) {
          return function () {
            var patch = {};
            patch[c.key] = E.clamp(hp + d, 0, c.max);
            app.setState(patch);
          };
        }
        return {
          name: c.name, init: c.init, hp: hp, max: c.max, gauge: c.gauge,
          pct: Math.round((hp / c.max) * 100),
          side: active ? '行動中' : c.guest ? '賓客' : '',
          border: active ? '1px solid #cda44e' : c.guest ? '1px solid rgba(79,216,201,.3)' : '1px solid rgba(205,164,78,.18)',
          bg: active ? 'linear-gradient(90deg,rgba(205,164,78,.14),transparent)' : c.guest ? 'rgba(79,216,201,.05)' : 'rgba(255,255,255,.03)',
          op: dead ? '.55' : '1',
          initBg: active ? '#a6813a' : 'rgba(255,255,255,.08)',
          initColor: active ? '#171008' : '#8b93a0',
          tokenStyle: c.guest ? TOKEN_GUEST : TOKEN_HUMAN,
          nameColor: c.guest ? '#4fd8c9' : '#ece4d0',
          barBg: c.guest ? 'linear-gradient(90deg,#1f6d68,#cda44e)' : 'linear-gradient(90deg,#9c4a3a,#c96a52)',
          hasTags: tags.length > 0, tags: tags,
          dmg5: adj(-5), dmg1: adj(-1), heal1: adj(1), heal5: adj(5),
        };
      });

      // ── 食材庫 ──
      out.shells = st.shells;
      out.bagItems = ITEM_DEFS.filter(function (d) {
        return !(d.hidden0 && (st.items[d.k] || 0) <= 0);
      }).map(function (d) {
        var qty = st.items[d.k] || 0;
        return {
          name: d.name, dot: d.dot, qty: qty,
          op: qty > 0 ? '1' : '.45',
          usable: !!d.salt && qty > 0 && st.jo < JO_MAX,
          use: function () {
            var items = Object.assign({}, st.items);
            items[d.k] = qty - 1;
            pushLog(st, '遥 ・ 深海塩', '常心 ＋5', '#4fd8c9');
            app.setState({ items: items, jo: E.clamp(st.jo + 5, 0, JO_MAX), rollLog: st.rollLog });
          },
        };
      });

      // ── 給仕の書 ──
      var node = NODES[st.storyNode] || NODES.c1;
      out.storyKicker = node.kicker;
      out.storyTitle = node.title;
      var lead = node.text[0];
      out.storyLead = lead.charAt(0);
      out.storyLeadRest = lead.slice(1);
      out.storyBlocks = node.text.slice(1).map(function (b) {
        return typeof b === 'string' ? { isP: true, isQ: false, t: b } : { isP: false, isQ: true, t: b.q };
      });
      out.storyHasNote = !!st.storyNote;
      out.storyNote = st.storyNote || '';
      out.storyNoteColor = st.storyNoteColor || '#8b93a0';
      out.storyPct = node.pct;
      out.storyPctLabel = node.end ? '第参夜 ・ 完売御礼' : '第参夜 ・ ' + node.pct + '% 供出済み';
      out.storyCanRestart = st.storyNode !== 'c1';
      out.storyRestart = function () { app._resetGame(); };

      function choose(c) {
        return function () {
          var patch = { storyNote: null, storyNoteColor: '#8b93a0' };
          var target = c.to;
          if (c.check) {
            var dc = typeof c.check.dc === 'function' ? c.check.dc(st) : c.check.dc;
            var r = E.check(c.check.mod, dc);
            var rank = starRank(r);
            patch.storyNote = c.check.name + 'の鑑定 — 骰〈' + r.die + '〉＋' + r.mod + ' ＝ ' + r.total + ' ／ 基準' + dc + ' ・ ' + rank.s;
            patch.storyNoteColor = rank.color;
            pushLog(st, '遥 ・ ' + c.check.name + '（給仕の書）', r.total + ' ／ ' + rank.s, rank.color);
            patch.rollLog = st.rollLog;
            target = r.ok ? c.success : c.fail;
          }
          var nextNode = NODES[target];
          applyFx(st, nextNode.fx, patch);
          // 気力が尽きたら「給仕、倒れる」、常心が尽きたら「悲鳴」へ
          var kiNow = 'kiHaru' in patch ? patch.kiHaru : st.kiHaru;
          var joNow = 'jo' in patch ? patch.jo : st.jo;
          if (kiNow <= 0 && !nextNode.end) {
            target = 'E_faint';
            applyFx(st, NODES.E_faint.fx, patch);
          } else if (joNow <= 0 && !nextNode.end) {
            target = 'E_broken';
            applyFx(st, NODES.E_broken.fx, patch);
          }
          patch.storyNode = target;
          app.setState(patch);
        };
      }
      var defs = node.end ? END_CHOICES : node.choices;
      out.storyChoices = defs.filter(function (c) {
        return !c.if || c.if(st);
      }).map(function (c) {
        var dc = c.check ? (typeof c.check.dc === 'function' ? c.check.dc(st) : c.check.dc) : null;
        return {
          pre: c.pre, skillText: c.skillText || '', post: c.post || '',
          dcLabel: dc != null ? '基準' + dc : '',
          go: c.restart ? function () { app._resetGame(); }
            : c.top ? function () { app.setState({ screen: 'top' }); }
            : choose(c),
        };
      });

      // ── 厨長 ──
      out.gmScenes = GM_SCENES.map(function (t, i) {
        var active = i === st.gmScene;
        return {
          t: t, tag: active ? '進行中' : '',
          go: function () { app.setState({ gmScene: i }); },
          border: active ? '1px solid #cda44e' : '1px solid rgba(205,164,78,.22)',
          bg: active ? 'linear-gradient(90deg,rgba(205,164,78,.14),transparent)' : 'rgba(255,255,255,.03)',
          color: active ? '#ece4d0' : '#8b93a0',
        };
      });
      out.kigen = st.kigen;
      out.kigenMinus = function () { app.setState({ kigen: E.clamp(st.kigen - 5, 0, 100) }); };
      out.kigenPlus = function () { app.setState({ kigen: E.clamp(st.kigen + 5, 0, 100) }); };
      out.gmHasTable = !!st.gmTable;
      out.gmTableD = st.gmTable ? st.gmTable.d : '';
      out.gmTableText = st.gmTable ? st.gmTable.text : '';
      out.rollTable = function () {
        var d = E.rollDie(6);
        var text = GM_TABLE[d - 1];
        pushLog(st, '厨長 ・ まかない事故表', d + ' ／ ' + text, '#e8c876');
        app.setState({ gmTable: { d: d, text: text }, rollLog: st.rollLog });
      };

      return out;
    },
  };
})();

window.__dcApp = new Component();
if (typeof GameEngine !== 'undefined' && window.__GAME__) GameEngine.attach(window.__dcApp, window.__GAME__);
window.__dcApp.mount(document.getElementById('app'), document.getElementById('dc-template'));
</script>
