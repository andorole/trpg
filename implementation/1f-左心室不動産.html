<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>左心室不動産</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700;900&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  body{margin:0;background:#101216;}
  @keyframes scfade{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:none}}
  @keyframes heartbeat{0%,100%{transform:scale(1)}12%{transform:scale(1.18)}24%{transform:scale(1)}36%{transform:scale(1.12)}48%{transform:scale(1)}}
  @keyframes stampin{0%{transform:rotate(-10deg) scale(1.6);opacity:0}60%{transform:rotate(-5deg) scale(.97);opacity:1}100%{transform:rotate(-5deg) scale(1)}}
  ::-webkit-scrollbar{width:10px;height:10px}
  ::-webkit-scrollbar-thumb{background:rgba(207,63,79,.3);border-radius:8px}
  ::-webkit-scrollbar-track{background:transparent}
</style>
</head>
<body>
<div id="app"></div>
<template id="dc-template">
<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:34px 20px 96px;box-sizing:border-box;font-family:'Zen Maru Gothic',sans-serif;background:radial-gradient(120% 95% at 50% 0%,#1a1d24 0%,#101216 58%,#0a0b0e 100%);color:#3a352e;">

  <div style="position:relative;width:{{ frameW }}px;height:{{ frameH }}px;max-width:100%;background:#fdfaf4;border:1px solid #e2d7c5;border-radius:14px;box-shadow:0 34px 90px -22px rgba(0,0,0,.75),0 0 0 8px rgba(8,9,12,.55);overflow:hidden;display:flex;flex-direction:column;">

    <div style="position:absolute;inset:0;pointer-events:none;background-image:radial-gradient(circle at 88% 6%,rgba(207,63,79,.05),transparent 34%),radial-gradient(circle at 8% 92%,rgba(63,95,168,.04),transparent 38%);"></div>

    <header style="position:relative;z-index:2;display:flex;align-items:center;justify-content:space-between;gap:14px;padding:12px 22px;border-bottom:1px solid rgba(207,63,79,.18);background:linear-gradient(180deg,#fffdf9,#fbf5ec);">
      <div style="display:flex;align-items:center;gap:12px;">
        <span style="display:inline-flex;align-items:center;justify-content:center;width:32px;height:32px;flex:none;border-radius:50%;background:radial-gradient(circle at 35% 30%,#e8697a,#b32e3f 75%);color:#fff;font-size:15px;animation:heartbeat 1.6s ease-in-out infinite;box-shadow:0 3px 8px rgba(179,46,63,.35);">♥</span>
        <div>
          <div style="font-size:9px;letter-spacing:2px;color:#a89a86;">体内賃貸専門 ・ 宅体建物取引業 王国知事（生）第1号</div>
          <div style="display:flex;align-items:baseline;gap:10px;">
            <span style="font-weight:900;font-size:20px;letter-spacing:1px;color:#b32e3f;">左心室不動産</span>
            <span style="font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:1px;color:#a89a86;">SASHINSHITSU HOUSING</span>
          </div>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:10px;">
        <span style="font-size:12px;letter-spacing:1px;color:#7a7264;">{{ playLabel }}</span>
        <span style="font-family:'IBM Plex Mono',monospace;font-size:11px;padding:4px 10px;border:1px solid rgba(207,63,79,.4);border-radius:999px;color:#b32e3f;background:rgba(207,63,79,.06);">♥ 心拍 72bpm ・ 平常</span>
      </div>
    </header>

    <div style="position:relative;z-index:2;flex:1;display:flex;min-height:0;">

      <sc-if value="{{ showRail }}" hint-placeholder-val="{{ true }}">
        <nav style="width:{{ railW }}px;flex:none;border-right:1px solid rgba(207,63,79,.14);background:linear-gradient(180deg,rgba(207,63,79,.03),transparent);padding:15px 10px;display:flex;flex-direction:column;gap:3px;overflow-y:auto;">
          <sc-for list="{{ nav }}" as="item" hint-placeholder-count="8">
            <button onClick="{{ item.go }}" style="display:flex;align-items:center;gap:11px;width:100%;padding:9px 11px;border:0;border-radius:999px;cursor:pointer;text-align:left;background:{{ item.bg }};color:{{ item.color }};font-family:'Zen Maru Gothic',sans-serif;font-size:14px;font-weight:{{ item.weight }};">
              <span style="width:22px;height:22px;flex:none;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;border-radius:50%;background:{{ item.badgeBg }};color:{{ item.badgeColor }};border:{{ item.badgeBorder }};">{{ item.badge }}</span>
              <span style="{{ item.labelStyle }}">{{ item.label }}</span>
            </button>
          </sc-for>
        </nav>
      </sc-if>

      <main style="flex:1;min-width:0;overflow-y:auto;padding:{{ mainPad }};">

        <sc-if value="{{ isTop }}" hint-placeholder-val="{{ true }}">
          <div data-screen-label="物件一覧" style="animation:scfade .4s ease;max-width:760px;margin:0 auto;">
            <p style="font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:2px;color:#a89a86;margin:0 0 7px;">本日の新着 2件 ・ 宿主のご機嫌：おおむね良好</p>
            <h1 style="font-weight:900;font-size:34px;line-height:1.25;margin:0 0 12px;color:#3a352e;">あなたの終の棲家は、<br>誰かの身体の中に。</h1>
            <p style="font-size:15px;line-height:2.0;color:#6b6353;margin:0 0 18px;max-width:58ch;">大森林を三日歩いても端に着かない——それもそのはず、あれは<b style="color:#b32e3f;">巨大生物〈オオヌシ様〉</b>の背中です。当社は体内物件のパイオニアとして、心臓から盲腸まで、あたたかい（36.8℃）お部屋をご紹介しています。</p>

            <div style="display:flex;gap:8px;flex-wrap:wrap;margin:0 0 24px;">
              <span style="font-size:12px;padding:6px 14px;border-radius:999px;border:1px solid rgba(207,63,79,.35);color:#b32e3f;background:#fff;">家賃上限 1,000cc/月</span>
              <span style="font-size:12px;padding:6px 14px;border-radius:999px;border:1px solid rgba(58,53,46,.2);color:#6b6353;background:#fff;">間取り 1R〜3LDK</span>
              <span style="font-size:12px;padding:6px 14px;border-radius:999px;border:1px solid rgba(58,53,46,.2);color:#6b6353;background:#fff;">室温 36℃〜38℃</span>
              <span style="font-size:12px;padding:6px 14px;border-radius:999px;border:1px solid rgba(58,53,46,.2);color:#6b6353;background:#fff;">ペット可（寄生虫に限る）</span>
            </div>

            <p style="font-size:11px;letter-spacing:3px;color:#b32e3f;font-weight:700;margin:0 0 12px;">● ご契約形態をお選びください</p>
            <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:0 0 28px;">
              <sc-for list="{{ playModes }}" as="m" hint-placeholder-count="3">
                <button onClick="{{ m.go }}" style="text-align:left;padding:14px 15px;border-radius:12px;cursor:pointer;border:{{ m.border }};background:{{ m.bg }};box-shadow:0 3px 10px rgba(58,53,46,.05);">
                  <div style="font-size:14px;font-weight:700;color:{{ m.titleColor }};margin-bottom:5px;">{{ m.t }}</div>
                  <div style="font-size:12px;line-height:1.7;color:#7a7264;">{{ m.d }}</div>
                </button>
              </sc-for>
            </div>

            <p style="font-size:11px;letter-spacing:3px;color:#b32e3f;font-weight:700;margin:0 0 12px;">● 本日のおすすめ物件</p>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:26px;">
              <div style="border:2px solid #cf3f4f;border-radius:12px;overflow:hidden;background:#fff;box-shadow:0 6px 16px rgba(207,63,79,.12);">
                <div style="height:110px;background:radial-gradient(circle at 50% 45%,rgba(207,63,79,.28),rgba(207,63,79,.08)),repeating-linear-gradient(45deg,rgba(207,63,79,.06) 0 8px,transparent 8px 16px),#fbeaea;display:flex;align-items:center;justify-content:center;position:relative;">
                  <span style="font-size:11px;color:#b32e3f;letter-spacing:1px;">物件写真（拍動のためブレています）</span>
                  <span style="position:absolute;top:8px;left:8px;font-size:10px;font-weight:700;padding:3px 9px;border-radius:999px;background:#cf3f4f;color:#fff;">本日内見可</span>
                </div>
                <div style="padding:12px 14px;">
                  <div style="font-size:15px;font-weight:900;color:#3a352e;">左心室 2LDK 〈角部屋・拍動あり〉</div>
                  <div style="font-family:'IBM Plex Mono',monospace;font-size:18px;color:#b32e3f;font-weight:600;margin:4px 0 6px;">800cc<span style="font-size:11px;">/月（血液）</span></div>
                  <div style="font-size:11px;color:#7a7264;line-height:1.8;">大動脈駅 徒歩3分 ・ 床暖房（体温）完備<br>敷金：血液2L ・ 礼金：なし（キャンペーン中）</div>
                  <div style="display:flex;gap:5px;flex-wrap:wrap;margin-top:8px;"><span style="font-size:10px;padding:2px 8px;border-radius:999px;background:rgba(61,138,95,.12);color:#3d8a5f;">駅近</span><span style="font-size:10px;padding:2px 8px;border-radius:999px;background:rgba(61,138,95,.12);color:#3d8a5f;">24時間警備※白血球</span><span style="font-size:10px;padding:2px 8px;border-radius:999px;background:rgba(201,138,42,.14);color:#c98a2a;">音あり（ドクン）</span></div>
                </div>
              </div>
              <div style="border:1px solid rgba(58,53,46,.18);border-radius:12px;overflow:hidden;background:#fff;box-shadow:0 3px 10px rgba(58,53,46,.06);">
                <div style="height:110px;background:radial-gradient(circle at 50% 45%,rgba(63,95,168,.2),rgba(63,95,168,.06)),#eef0f6;display:flex;align-items:center;justify-content:center;position:relative;">
                  <span style="font-size:11px;color:#3f5fa8;letter-spacing:1px;">物件写真（なぜか毎回ピンボケ）</span>
                  <span style="position:absolute;top:8px;left:8px;font-size:10px;font-weight:700;padding:3px 9px;border-radius:999px;background:#5b6472;color:#fff;">訳あり</span>
                </div>
                <div style="padding:12px 14px;">
                  <div style="font-size:15px;font-weight:900;color:#3a352e;">盲腸 1R 〈静かな袋小路〉</div>
                  <div style="font-family:'IBM Plex Mono',monospace;font-size:18px;color:#3f5fa8;font-weight:600;margin:4px 0 6px;">120cc<span style="font-size:11px;">/月（血液）</span></div>
                  <div style="font-size:11px;color:#7a7264;line-height:1.8;">大腸本線 盲腸支線 終点 ・ 行き止まり静穏<br>敷金：なし ・ 礼金：なし ・ 仲介手数料：応相談</div>
                  <div style="display:flex;gap:5px;flex-wrap:wrap;margin-top:8px;"><span style="font-size:10px;padding:2px 8px;border-radius:999px;background:rgba(63,95,168,.12);color:#3f5fa8;">格安</span><span style="font-size:10px;padding:2px 8px;border-radius:999px;background:rgba(201,138,42,.14);color:#c98a2a;">静かすぎる</span><span style="font-size:10px;padding:2px 8px;border-radius:999px;background:rgba(207,63,79,.1);color:#b32e3f;">前入居者：連絡不能</span></div>
                </div>
              </div>
            </div>

            <button style="display:inline-flex;align-items:center;gap:10px;padding:13px 30px;border:0;border-radius:999px;cursor:pointer;background:linear-gradient(180deg,#e0566a,#b32e3f);color:#fff;font-family:'Zen Maru Gothic',sans-serif;font-weight:900;font-size:15px;letter-spacing:2px;box-shadow:0 10px 24px -8px rgba(179,46,63,.5);">内見ツアーへ出発　➜</button>
          </div>
        </sc-if>

        <sc-if value="{{ isSheet }}" hint-placeholder-val="{{ false }}">
          <div data-screen-label="入居者カード" style="animation:scfade .4s ease;max-width:820px;margin:0 auto;">
            <div style="display:flex;gap:20px;align-items:flex-start;margin-bottom:20px;">
              <div style="width:88px;height:88px;flex:none;border-radius:50%;border:3px solid #cf3f4f;background:repeating-linear-gradient(45deg,rgba(207,63,79,.1) 0 6px,transparent 6px 12px),#fff;display:flex;align-items:center;justify-content:center;font-size:9px;letter-spacing:1px;color:#a89a86;text-align:center;">笑顔の<br>写真</div>
              <div style="flex:1;min-width:0;">
                <p style="font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:2px;color:#a89a86;margin:0 0 4px;">入居審査書類 ・ 受付 No.0088</p>
                <h1 style="font-weight:900;font-size:28px;margin:0 0 4px;color:#3a352e;">ツグミ・ハコベラ</h1>
                <p style="font-size:13px;color:#7a7264;margin:0 0 10px;">元・地上住まい ・ 引っ越し理由：家が竜に燃やされた ・ 26歳</p>
                <div style="display:flex;gap:7px;flex-wrap:wrap;">
                  <span style="font-size:11px;padding:3px 10px;border-radius:999px;border:1px solid rgba(61,138,95,.4);color:#3d8a5f;background:#fff;">保証人あり（幽霊）</span>
                  <span style="font-size:11px;padding:3px 10px;border-radius:999px;border:1px solid rgba(58,53,46,.25);color:#6b6353;background:#fff;">きれい好き</span>
                  <span style="font-size:11px;padding:3px 10px;border-radius:999px;border:1px solid rgba(207,63,79,.4);color:#b32e3f;background:#fff;">くすぐりに弱い（致命的）</span>
                </div>
              </div>
            </div>

            <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:13px;margin-bottom:22px;">
              <div style="background:#fff;border:1px solid rgba(58,53,46,.14);border-radius:12px;padding:11px 13px;"><div style="display:flex;justify-content:space-between;font-size:12px;color:#7a7264;margin-bottom:5px;"><span>体力</span><span style="font-family:'IBM Plex Mono',monospace;">14 / 17</span></div><div style="height:9px;border-radius:999px;background:rgba(58,53,46,.1);overflow:hidden;"><div style="width:82%;height:100%;background:linear-gradient(90deg,#e0566a,#b32e3f);"></div></div></div>
              <div style="background:#fff;border:1px solid rgba(58,53,46,.14);border-radius:12px;padding:11px 13px;"><div style="display:flex;justify-content:space-between;font-size:12px;color:#7a7264;margin-bottom:5px;"><span>血液残量（家賃原資）</span><span style="font-family:'IBM Plex Mono',monospace;">3.4L</span></div><div style="height:9px;border-radius:999px;background:rgba(58,53,46,.1);overflow:hidden;"><div style="width:68%;height:100%;background:linear-gradient(90deg,#cf3f4f,#8f1f2e);"></div></div><div style="font-size:9px;color:#a89a86;margin-top:4px;">※4.2ヶ月分。滞納時は直接徴収されます</div></div>
              <div style="background:#fff;border:1px solid rgba(58,53,46,.14);border-radius:12px;padding:11px 13px;"><div style="display:flex;justify-content:space-between;font-size:12px;color:#7a7264;margin-bottom:5px;"><span>宿主適合率</span><span style="font-family:'IBM Plex Mono',monospace;color:#3d8a5f;">76%</span></div><div style="height:9px;border-radius:999px;background:rgba(58,53,46,.1);overflow:hidden;"><div style="width:76%;height:100%;background:linear-gradient(90deg,#57a87c,#3d8a5f);"></div></div><div style="font-size:9px;color:#a89a86;margin-top:4px;">※下がると「異物」と認定されます</div></div>
            </div>

            <p style="font-size:11px;letter-spacing:3px;color:#b32e3f;font-weight:700;margin:0 0 12px;">● 能力（入居適性）</p>
            <div style="display:grid;grid-template-columns:repeat(6,1fr);gap:9px;margin-bottom:24px;">
              <div style="background:#fff;border:1px solid rgba(58,53,46,.14);border-radius:12px;padding:9px 4px;text-align:center;"><div style="font-size:10px;color:#7a7264;">交渉</div><div style="font-family:'IBM Plex Mono',monospace;font-size:22px;font-weight:600;color:#3a352e;line-height:1.3;">15</div><div style="font-size:10px;color:#3d8a5f;">+2</div></div>
              <div style="background:#fff;border:2px solid #cf3f4f;border-radius:12px;padding:9px 4px;text-align:center;"><div style="font-size:10px;color:#b32e3f;">探索</div><div style="font-family:'IBM Plex Mono',monospace;font-size:22px;font-weight:600;color:#b32e3f;line-height:1.3;">17</div><div style="font-size:10px;color:#3d8a5f;">+3</div></div>
              <div style="background:#fff;border:1px solid rgba(58,53,46,.14);border-radius:12px;padding:9px 4px;text-align:center;"><div style="font-size:10px;color:#7a7264;">衛生</div><div style="font-family:'IBM Plex Mono',monospace;font-size:22px;font-weight:600;color:#3a352e;line-height:1.3;">14</div><div style="font-size:10px;color:#3d8a5f;">+2</div></div>
              <div style="background:#fff;border:1px solid rgba(58,53,46,.14);border-radius:12px;padding:9px 4px;text-align:center;"><div style="font-size:10px;color:#7a7264;">膂力</div><div style="font-family:'IBM Plex Mono',monospace;font-size:22px;font-weight:600;color:#3a352e;line-height:1.3;">11</div><div style="font-size:10px;color:#7a7264;">+0</div></div>
              <div style="background:#fff;border:1px solid rgba(58,53,46,.14);border-radius:12px;padding:9px 4px;text-align:center;"><div style="font-size:10px;color:#7a7264;">感覚</div><div style="font-family:'IBM Plex Mono',monospace;font-size:22px;font-weight:600;color:#3a352e;line-height:1.3;">13</div><div style="font-size:10px;color:#3d8a5f;">+1</div></div>
              <div style="background:#fff;border:1px solid rgba(58,53,46,.14);border-radius:12px;padding:9px 4px;text-align:center;"><div style="font-size:10px;color:#7a7264;">免疫</div><div style="font-family:'IBM Plex Mono',monospace;font-size:22px;font-weight:600;color:#c98a2a;line-height:1.3;">9</div><div style="font-size:10px;color:#c98a2a;">−1</div></div>
            </div>

            <div style="display:grid;grid-template-columns:1fr 1fr;gap:24px;">
              <div>
                <p style="font-size:11px;letter-spacing:3px;color:#b32e3f;font-weight:700;margin:0 0 10px;">● 技能</p>
                <div style="display:flex;justify-content:space-between;font-size:14px;color:#4a4436;padding:6px 0;border-bottom:1px dotted rgba(58,53,46,.25);"><span>内見（見抜く目）</span><span style="font-family:'IBM Plex Mono',monospace;color:#3d8a5f;">+7</span></div>
                <div style="display:flex;justify-content:space-between;font-size:14px;color:#4a4436;padding:6px 0;border-bottom:1px dotted rgba(58,53,46,.25);"><span>値下げ交渉</span><span style="font-family:'IBM Plex Mono',monospace;color:#3d8a5f;">+5</span></div>
                <div style="display:flex;justify-content:space-between;font-size:14px;color:#4a4436;padding:6px 0;border-bottom:1px dotted rgba(58,53,46,.25);"><span>応急処置</span><span style="font-family:'IBM Plex Mono',monospace;color:#3d8a5f;">+4</span></div>
                <div style="display:flex;justify-content:space-between;font-size:14px;color:#4a4436;padding:6px 0;"><span>逃げ足</span><span style="font-family:'IBM Plex Mono',monospace;color:#3d8a5f;">+3</span></div>
              </div>
              <div>
                <p style="font-size:11px;letter-spacing:3px;color:#b32e3f;font-weight:700;margin:0 0 10px;">● 特性</p>
                <div style="border:1px solid rgba(58,53,46,.14);border-radius:12px;padding:11px 13px;margin-bottom:9px;background:#fff;"><div style="font-size:13px;font-weight:700;color:#3a352e;margin-bottom:3px;">抗体持ち</div><div style="font-size:12px;line-height:1.7;color:#7a7264;">一度かかった「異物認定」には二度目から抵抗できる。引っ越し歴の賜物。</div></div>
                <div style="border:1px solid rgba(201,138,42,.4);border-radius:12px;padding:11px 13px;background:rgba(201,138,42,.05);"><div style="font-size:13px;font-weight:700;color:#c98a2a;margin-bottom:3px;">フローリング派</div><div style="font-size:12px;line-height:1.7;color:#7a7264;">粘膜床の物件では毎朝、正気判定が必要。「慣れって怖いですね」</div></div>
              </div>
            </div>
            <p style="margin-top:22px;font-size:13px;line-height:1.9;color:#7a7264;border-left:3px solid rgba(207,63,79,.4);padding-left:14px;">入居希望動機（自筆）：「日当たりは諦めています。せめて、雨風と竜をしのげれば。あとできれば、大家さんがくしゃみをしない物件で」</p>
          </div>
        </sc-if>

        <sc-if value="{{ isDice }}" hint-placeholder-val="{{ false }}">
          <div data-screen-label="入居審査" style="animation:scfade .4s ease;max-width:560px;margin:0 auto;text-align:center;">
            <p style="font-size:11px;letter-spacing:3px;color:#b32e3f;font-weight:700;margin:0 0 4px;">● 値下げ交渉の判定 ・ 難度 14（大家：心臓）</p>
            <div style="display:flex;flex-direction:column;align-items:center;gap:8px;margin:18px 0 24px;">
              <div style="width:118px;height:118px;border:4px solid #3d8a5f;border-radius:16px;transform:rotate(-5deg);animation:stampin .5s ease;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#3d8a5f;background:rgba(61,138,95,.05);">
                <span style="font-family:'IBM Plex Mono',monospace;font-size:44px;font-weight:600;line-height:1;">17</span>

            <p style="font-size:16px;line-height:2.05;color:#4a4436;margin:0 0 18px;">たしかに暖かい。暖かいというか、脈打っている。ドクン、ドクン。二拍ごとに照明（発光器官）がまたたく。ピリカが壁を撫でて言った。「この壁紙、呼吸してません？」カナメさんのスマイルは揺るがない。「<b>換気機能</b>です」</p>

<script>
/*
 * Claude Design の x-dc テンプレート（sc-if / sc-for / {{ 変数 }} / onClick）を
 * そのまま解釈して描画するミニランタイム。support.js（React ベースのプレビュー用）の代替。
 * 状態変更のたびにテンプレート全体を再構築する（プロトタイプの再レンダーと同等）。
 */
(function () {
  var cache = new Map();
  function compile(expr) {
    var fn = cache.get(expr);
    if (!fn) {
      fn = new Function('__s', 'with(__s){return(' + expr + ');}');
      cache.set(expr, fn);
    }
    return fn;
  }
  function evalExpr(expr, scope) {
    return compile(expr)(scope);
  }
  // "{{ expr }}" 単体の属性値から式を取り出す
  function single(text) {
    var m = /^\s*\{\{\s*([\s\S]+?)\s*\}\}\s*$/.exec(text || '');
    return m ? m[1] : null;
  }
  function interpolate(text, scope) {
    if (text.indexOf('{{') === -1) return text;
    return text.replace(/\{\{\s*([\s\S]+?)\s*\}\}/g, function (_, expr) {
      var v = evalExpr(expr, scope);
      return v == null ? '' : String(v);
    });
  }
  function build(nodes, scope, parent) {
    for (var i = 0; i < nodes.length; i++) {
      var node = nodes[i];
      if (node.nodeType === Node.TEXT_NODE) {
        parent.appendChild(document.createTextNode(interpolate(node.nodeValue, scope)));
        continue;
      }
      if (node.nodeType !== Node.ELEMENT_NODE) continue;
      var tag = node.localName;
      if (tag === 'sc-if') {
        var cond = single(node.getAttribute('value'));
        if (cond && evalExpr(cond, scope)) build(node.childNodes, scope, parent);
        continue;
      }
      if (tag === 'sc-for') {
        var listExpr = single(node.getAttribute('list'));
        var as = node.getAttribute('as') || 'item';
        var list = (listExpr && evalExpr(listExpr, scope)) || [];
        for (var j = 0; j < list.length; j++) {
          var child = Object.assign({}, scope);
          child[as] = list[j];
          build(node.childNodes, child, parent);
        }
        continue;
      }
      var el = document.createElementNS(node.namespaceURI, tag);
      for (var k = 0; k < node.attributes.length; k++) {
        var attr = node.attributes[k];
        if (attr.name.indexOf('hint-placeholder') === 0) continue;
        if (attr.name === 'onclick') {
          var handlerExpr = single(attr.value);
          var fn = handlerExpr ? evalExpr(handlerExpr, scope) : null;
          if (typeof fn === 'function') el.addEventListener('click', fn);
          continue;
        }
        el.setAttribute(attr.name, interpolate(attr.value, scope));
      }
      build(node.childNodes, scope, el);
      parent.appendChild(el);
    }
  }
  window.DCLogic = class DCLogic {
    mount(rootEl, templateEl) {
      this._root = rootEl;
      this._tpl = templateEl.content;
      this.render();
    }
    setState(update) {
      var patch = typeof update === 'function' ? update(this.state) : update;
      Object.assign(this.state, patch);
      this.render();
    }
    render() {
      var scope = this.renderVals();
      var frag = document.createDocumentFragment();
      build(this._tpl.childNodes, scope, frag);
      this._root.replaceChildren(frag);
    }
  };
})();

class Component extends DCLogic {
  state = { device: 'desktop', play: 'gmpl', screen: 'top' };

  renderVals() {
    const { device, play, screen } = this.state;
    const frames = { phone: { w: 392, h: 828 }, tablet: { w: 900, h: 660 }, desktop: { w: 1240, h: 772 } };
    const f = frames[device] || frames.desktop;
    const isPhone = device === 'phone';
    const compact = device === 'tablet';

    const setScreen = (s) => this.setState({ screen: s });
    const setPlay = (p) => this.setState((st) => ({ play: p, screen: (p === 'solo' && st.screen === 'gm') ? 'top' : st.screen }));
    const setDevice = (d) => this.setState({ device: d });

    const playLabel = { solo: '単身入居', gmpl: '仲介つき内見', gmless: 'ルームシェア合議' }[play] || '';

    const navDefs = [
      ['top', '物件一覧', '家'],
      ['sheet', '入居者票', '入'],
      ['dice', '入居審査', '審'],
      ['combat', '免疫対応', '免'],
      ['inventory', '契約書類', '契'],
      ['story', '内見記録', '録'],
      ['map', '体内図', '図'],
      ['gm', play === 'gmless' ? '管理組合' : '管理会社', '管'],
    ];
    const nav = navDefs
      .filter((d) => d[0] !== 'gm' || play !== 'solo')
      .map(([id, label, badge]) => {
        const active = id === screen;
        return {
          id, label, badge, active,
          go: () => setScreen(id),
          color: active ? '#b32e3f' : '#7a7264',
          bg: active ? 'rgba(207,63,79,0.08)' : 'transparent',
          tbBg: active ? 'rgba(207,63,79,0.08)' : 'transparent',
          weight: active ? '700' : '500',
          badgeBg: active ? '#cf3f4f' : 'transparent',
          badgeColor: active ? '#fff' : '#cf3f4f',
          badgeBorder: active ? 'none' : '1.5px solid rgba(207,63,79,.5)',
          labelStyle: compact ? 'display:none' : 'display:inline',
        };
      });

    const playModes = [
      ['solo', '単身入居', '営業担当なし。しおり片手に独りで内見・契約・生活を切り抜ける。'],
      ['gmpl', '仲介つき内見', '営業担当（GM）が物件と大家を、入居希望者たちが内見と交渉を担う卓。'],
      ['gmless', 'ルームシェア合議', '担当を持ち回り、皆で物件を査定し合って住処を決める卓。'],
    ].map(([id, t, d]) => {
      const active = id === play;
      return {
        id, t, d, active,
        go: () => setPlay(id),
        border: active ? '2px solid #cf3f4f' : '1px solid rgba(58,53,46,.18)',
        bg: active ? 'rgba(207,63,79,.05)' : '#fff',
        titleColor: active ? '#b32e3f' : '#4a4436',
      };
    });

    const devs = [
      ['phone', 'スマホ'], ['tablet', 'タブ'], ['desktop', 'PC'],
    ].map(([id, label]) => {
      const active = id === device;
      return {
        id, label, active,
        go: () => setDevice(id),
        bg: active ? '#cf3f4f' : 'transparent',
        color: active ? '#fff' : '#c9c2ad',
      };
    });

    return {
      frameW: f.w, frameH: f.h, railW: compact ? 66 : 214,
      mainPad: isPhone ? '22px 18px 26px' : '30px 34px 38px',
      showRail: !isPhone, showTabbar: isPhone,
      playLabel, nav, playModes, devs,
      isTop: screen === 'top', isSheet: screen === 'sheet', isDice: screen === 'dice',
      isCombat: screen === 'combat', isInv: screen === 'inventory', isStory: screen === 'story',
      isMap: screen === 'map', isGM: screen === 'gm',
      gmTitle: play === 'gmless' ? '管理組合 — 持ち回りの理事会' : '管理会社 — 大家さまの帳簿',
    };
  }
}

window.__dcApp = new Component();
if (typeof GameEngine !== 'undefined' && window.__GAME__) GameEngine.attach(window.__dcApp, window.__GAME__);
window.__dcApp.mount(document.getElementById('app'), document.getElementById('dc-template'));
</script>
