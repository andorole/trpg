<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>左心室不動産</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700;900&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  body{margin:0;background:#101216;}
  @keyframes scfade{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:none}}
  @keyframes heartbeat{0%,100%{transform:scale(1)}12%{transform:scale(1.18)}24%{transform:scale(1)}36%{transform:scale(1.12)}48%{transform:scale(1)}}
  @keyframes stampin{0%{transform:rotate(-10deg) scale(1.6);opacity:0}60%{transform:rotate(-5deg) scale(.97);opacity:1}100%{transform:rotate(-5deg) scale(1)}}
  ::-webkit-scrollbar{width:10px;height:10px}
  ::-webkit-scrollbar-thumb{background:rgba(207,63,79,.3);border-radius:8px}
  ::-webkit-scrollbar-track{background:transparent}
</style>
</head>
<body>
<div id="app"></div>
<template id="dc-template">
<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:34px 20px 96px;box-sizing:border-box;font-family:'Zen Maru Gothic',sans-serif;background:radial-gradient(120% 95% at 50% 0%,#1a1d24 0%,#101216 58%,#0a0b0e 100%);color:#3a352e;">

  <div style="position:relative;width:{{ frameW }}px;height:{{ frameH }}px;max-width:100%;background:#fdfaf4;border:1px solid #e2d7c5;border-radius:14px;box-shadow:0 34px 90px -22px rgba(0,0,0,.75),0 0 0 8px rgba(8,9,12,.55);overflow:hidden;display:flex;flex-direction:column;">

    <div style="position:absolute;inset:0;pointer-events:none;background-image:radial-gradient(circle at 88% 6%,rgba(207,63,79,.05),transparent 34%),radial-gradient(circle at 8% 92%,rgba(63,95,168,.04),transparent 38%);"></div>

    <header style="position:relative;z-index:2;display:flex;align-items:center;justify-content:space-between;gap:14px;padding:12px 22px;border-bottom:1px solid rgba(207,63,79,.18);background:linear-gradient(180deg,#fffdf9,#fbf5ec);">
      <div style="display:flex;align-items:center;gap:12px;">
        <span style="display:inline-flex;align-items:center;justify-content:center;width:32px;height:32px;flex:none;border-radius:50%;background:radial-gradient(circle at 35% 30%,#e8697a,#b32e3f 75%);color:#fff;font-size:15px;animation:heartbeat 1.6s ease-in-out infinite;box-shadow:0 3px 8px rgba(179,46,63,.35);">♥</span>
        <div>
          <div style="font-size:9px;letter-spacing:2px;color:#a89a86;">体内賃貸専門 ・ 宅体建物取引業 王国知事（生）第1号</div>
          <div style="display:flex;align-items:baseline;gap:10px;">
            <span style="font-weight:900;font-size:20px;letter-spacing:1px;color:#b32e3f;">左心室不動産</span>
            <span style="font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:1px;color:#a89a86;">SASHINSHITSU HOUSING</span>
          </div>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:10px;">
        <span style="font-size:12px;letter-spacing:1px;color:#7a7264;">{{ playLabel }}</span>
        <span style="font-family:'IBM Plex Mono',monospace;font-size:11px;padding:4px 10px;border:1px solid rgba(207,63,79,.4);border-radius:999px;color:#b32e3f;background:rgba(207,63,79,.06);">♥ 心拍 72bpm ・ 平常</span>
      </div>
    </header>

    <div style="position:relative;z-index:2;flex:1;display:flex;min-height:0;">

      <sc-if value="{{ showRail }}" hint-placeholder-val="{{ true }}">
        <nav style="width:{{ railW }}px;flex:none;border-right:1px solid rgba(207,63,79,.14);background:linear-gradient(180deg,rgba(207,63,79,.03),transparent);padding:15px 10px;display:flex;flex-direction:column;gap:3px;overflow-y:auto;">
          <sc-for list="{{ nav }}" as="item" hint-placeholder-count="8">
            <button onClick="{{ item.go }}" style="display:flex;align-items:center;gap:11px;width:100%;padding:9px 11px;border:0;border-radius:999px;cursor:pointer;text-align:left;background:{{ item.bg }};color:{{ item.color }};font-family:'Zen Maru Gothic',sans-serif;font-size:14px;font-weight:{{ item.weight }};">
              <span style="width:22px;height:22px;flex:none;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;border-radius:50%;background:{{ item.badgeBg }};color:{{ item.badgeColor }};border:{{ item.badgeBorder }};">{{ item.badge }}</span>
              <span style="{{ item.labelStyle }}">{{ item.label }}</span>
            </button>
          </sc-for>
        </nav>
      </sc-if>

      <main style="flex:1;min-width:0;overflow-y:auto;padding:{{ mainPad }};">

        <sc-if value="{{ isTop }}" hint-placeholder-val="{{ true }}">
          <div data-screen-label="物件一覧" style="animation:scfade .4s ease;max-width:760px;margin:0 auto;">
            <p style="font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:2px;color:#a89a86;margin:0 0 7px;">本日の新着 2件 ・ 宿主のご機嫌：おおむね良好</p>
            <h1 style="font-weight:900;font-size:34px;line-height:1.25;margin:0 0 12px;color:#3a352e;">あなたの終の棲家は、<br>誰かの身体の中に。</h1>
            <p style="font-size:15px;line-height:2.0;color:#6b6353;margin:0 0 18px;max-width:58ch;">大森林を三日歩いても端に着かない——それもそのはず、あれは<b style="color:#b32e3f;">巨大生物〈オオヌシ様〉</b>の背中です。当社は体内物件のパイオニアとして、心臓から盲腸まで、あたたかい（36.8℃）お部屋をご紹介しています。</p>

            <div style="display:flex;gap:8px;flex-wrap:wrap;margin:0 0 24px;">
              <span style="font-size:12px;padding:6px 14px;border-radius:999px;border:1px solid rgba(207,63,79,.35);color:#b32e3f;background:#fff;">家賃上限 1,000cc/月</span>
              <span style="font-size:12px;padding:6px 14px;border-radius:999px;border:1px solid rgba(58,53,46,.2);color:#6b6353;background:#fff;">間取り 1R〜3LDK</span>
              <span style="font-size:12px;padding:6px 14px;border-radius:999px;border:1px solid rgba(58,53,46,.2);color:#6b6353;background:#fff;">室温 36℃〜38℃</span>
              <span style="font-size:12px;padding:6px 14px;border-radius:999px;border:1px solid rgba(58,53,46,.2);color:#6b6353;background:#fff;">ペット可（寄生虫に限る）</span>
            </div>

            <p style="font-size:11px;letter-spacing:3px;color:#b32e3f;font-weight:700;margin:0 0 12px;">● ご契約形態をお選びください</p>
            <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:0 0 28px;">
              <sc-for list="{{ playModes }}" as="m" hint-placeholder-count="3">
                <button onClick="{{ m.go }}" style="text-align:left;padding:14px 15px;border-radius:12px;cursor:pointer;border:{{ m.border }};background:{{ m.bg }};box-shadow:0 3px 10px rgba(58,53,46,.05);">
                  <div style="font-size:14px;font-weight:700;color:{{ m.titleColor }};margin-bottom:5px;">{{ m.t }}</div>
                  <div style="font-size:12px;line-height:1.7;color:#7a7264;">{{ m.d }}</div>
                </button>
              </sc-for>
            </div>

            <p style="font-size:11px;letter-spacing:3px;color:#b32e3f;font-weight:700;margin:0 0 12px;">● 本日のおすすめ物件</p>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:26px;">
              <div style="border:2px solid #cf3f4f;border-radius:12px;overflow:hidden;background:#fff;box-shadow:0 6px 16px rgba(207,63,79,.12);">
                <div style="height:110px;background:radial-gradient(circle at 50% 45%,rgba(207,63,79,.28),rgba(207,63,79,.08)),repeating-linear-gradient(45deg,rgba(207,63,79,.06) 0 8px,transparent 8px 16px),#fbeaea;display:flex;align-items:center;justify-content:center;position:relative;">
                  <span style="font-size:11px;color:#b32e3f;letter-spacing:1px;">物件写真（拍動のためブレています）</span>
                  <span style="position:absolute;top:8px;left:8px;font-size:10px;font-weight:700;padding:3px 9px;border-radius:999px;background:#cf3f4f;color:#fff;">本日内見可</span>
                </div>
                <div style="padding:12px 14px;">
                  <div style="font-size:15px;font-weight:900;color:#3a352e;">左心室 2LDK 〈角部屋・拍動あり〉</div>
                  <div style="font-family:'IBM Plex Mono',monospace;font-size:18px;color:#b32e3f;font-weight:600;margin:4px 0 6px;">800cc<span style="font-size:11px;">/月（血液）</span></div>
                  <div style="font-size:11px;color:#7a7264;line-height:1.8;">大動脈駅 徒歩3分 ・ 床暖房（体温）完備<br>敷金：血液2L ・ 礼金：なし（キャンペーン中）</div>
                  <div style="display:flex;gap:5px;flex-wrap:wrap;margin-top:8px;"><span style="font-size:10px;padding:2px 8px;border-radius:999px;background:rgba(61,138,95,.12);color:#3d8a5f;">駅近</span><span style="font-size:10px;padding:2px 8px;border-radius:999px;background:rgba(61,138,95,.12);color:#3d8a5f;">24時間警備※白血球</span><span style="font-size:10px;padding:2px 8px;border-radius:999px;background:rgba(201,138,42,.14);color:#c98a2a;">音あり（ドクン）</span></div>
                </div>
              </div>
              <div style="border:1px solid rgba(58,53,46,.18);border-radius:12px;overflow:hidden;background:#fff;box-shadow:0 3px 10px rgba(58,53,46,.06);">
                <div style="height:110px;background:radial-gradient(circle at 50% 45%,rgba(63,95,168,.2),rgba(63,95,168,.06)),#eef0f6;display:flex;align-items:center;justify-content:center;position:relative;">
                  <span style="font-size:11px;color:#3f5fa8;letter-spacing:1px;">物件写真（なぜか毎回ピンボケ）</span>
                  <span style="position:absolute;top:8px;left:8px;font-size:10px;font-weight:700;padding:3px 9px;border-radius:999px;background:#5b6472;color:#fff;">訳あり</span>
                </div>
                <div style="padding:12px 14px;">
                  <div style="font-size:15px;font-weight:900;color:#3a352e;">盲腸 1R 〈静かな袋小路〉</div>
                  <div style="font-family:'IBM Plex Mono',monospace;font-size:18px;color:#3f5fa8;font-weight:600;margin:4px 0 6px;">120cc<span style="font-size:11px;">/月（血液）</span></div>
                  <div style="font-size:11px;color:#7a7264;line-height:1.8;">大腸本線 盲腸支線 終点 ・ 行き止まり静穏<br>敷金：なし ・ 礼金：なし ・ 仲介手数料：応相談</div>
                  <div style="display:flex;gap:5px;flex-wrap:wrap;margin-top:8px;"><span style="font-size:10px;padding:2px 8px;border-radius:999px;background:rgba(63,95,168,.12);color:#3f5fa8;">格安</span><span style="font-size:10px;padding:2px 8px;border-radius:999px;background:rgba(201,138,42,.14);color:#c98a2a;">静かすぎる</span><span style="font-size:10px;padding:2px 8px;border-radius:999px;background:rgba(207,63,79,.1);color:#b32e3f;">前入居者：連絡不能</span></div>
                </div>
              </div>
            </div>

            <button onClick="{{ goStory }}" style="display:inline-flex;align-items:center;gap:10px;padding:13px 30px;border:0;border-radius:999px;cursor:pointer;background:linear-gradient(180deg,#e0566a,#b32e3f);color:#fff;font-family:'Zen Maru Gothic',sans-serif;font-weight:900;font-size:15px;letter-spacing:2px;box-shadow:0 10px 24px -8px rgba(179,46,63,.5);">内見ツアーへ出発　➜</button>
          </div>
        </sc-if>

        <sc-if value="{{ isSheet }}" hint-placeholder-val="{{ false }}">
          <div data-screen-label="入居者カード" style="animation:scfade .4s ease;max-width:820px;margin:0 auto;">
            <div style="display:flex;gap:20px;align-items:flex-start;margin-bottom:20px;">
              <div style="width:88px;height:88px;flex:none;border-radius:50%;border:3px solid #cf3f4f;background:repeating-linear-gradient(45deg,rgba(207,63,79,.1) 0 6px,transparent 6px 12px),#fff;display:flex;align-items:center;justify-content:center;font-size:9px;letter-spacing:1px;color:#a89a86;text-align:center;">笑顔の<br>写真</div>
              <div style="flex:1;min-width:0;">
                <p style="font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:2px;color:#a89a86;margin:0 0 4px;">入居審査書類 ・ 受付 No.0088</p>
                <h1 style="font-weight:900;font-size:28px;margin:0 0 4px;color:#3a352e;">ツグミ・ハコベラ</h1>
                <p style="font-size:13px;color:#7a7264;margin:0 0 10px;">元・地上住まい ・ 引っ越し理由：家が竜に燃やされた ・ 26歳</p>
                <div style="display:flex;gap:7px;flex-wrap:wrap;">
                  <span style="font-size:11px;padding:3px 10px;border-radius:999px;border:1px solid rgba(61,138,95,.4);color:#3d8a5f;background:#fff;">保証人あり（幽霊）</span>
                  <span style="font-size:11px;padding:3px 10px;border-radius:999px;border:1px solid rgba(58,53,46,.25);color:#6b6353;background:#fff;">きれい好き</span>
                  <span style="font-size:11px;padding:3px 10px;border-radius:999px;border:1px solid rgba(207,63,79,.4);color:#b32e3f;background:#fff;">くすぐりに弱い（致命的）</span>
                </div>
              </div>
            </div>

            <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:13px;margin-bottom:22px;">
              <div style="background:#fff;border:1px solid rgba(58,53,46,.14);border-radius:12px;padding:11px 13px;"><div style="display:flex;justify-content:space-between;font-size:12px;color:#7a7264;margin-bottom:5px;"><span>体力</span><span style="font-family:'IBM Plex Mono',monospace;">{{ tai }} / 17</span></div><div style="height:9px;border-radius:999px;background:rgba(58,53,46,.1);overflow:hidden;"><div style="width:{{ taiPct }}%;height:100%;background:linear-gradient(90deg,#e0566a,#b32e3f);"></div></div><div style="display:flex;gap:5px;margin-top:6px;"><button onClick="{{ taiDown }}" style="width:24px;height:24px;border:1px solid rgba(58,53,46,.2);border-radius:999px;background:#fff;color:#7a7264;cursor:pointer;font-size:13px;line-height:1;">−</button><button onClick="{{ taiUp }}" style="width:24px;height:24px;border:1px solid rgba(58,53,46,.2);border-radius:999px;background:#fff;color:#7a7264;cursor:pointer;font-size:13px;line-height:1;">＋</button></div></div>
              <div style="background:#fff;border:1px solid rgba(58,53,46,.14);border-radius:12px;padding:11px 13px;"><div style="display:flex;justify-content:space-between;font-size:12px;color:#7a7264;margin-bottom:5px;"><span>血液残量（家賃原資）</span><span style="font-family:'IBM Plex Mono',monospace;">{{ bloodLabel }}</span></div><div style="height:9px;border-radius:999px;background:rgba(58,53,46,.1);overflow:hidden;"><div style="width:{{ bloodPct }}%;height:100%;background:linear-gradient(90deg,#cf3f4f,#8f1f2e);"></div></div><div style="font-size:9px;color:#a89a86;margin-top:4px;">※滞納時は直接徴収されます</div><div style="display:flex;gap:5px;margin-top:6px;"><button onClick="{{ bloodDown }}" style="width:24px;height:24px;border:1px solid rgba(58,53,46,.2);border-radius:999px;background:#fff;color:#7a7264;cursor:pointer;font-size:13px;line-height:1;">−</button><button onClick="{{ bloodUp }}" style="width:24px;height:24px;border:1px solid rgba(58,53,46,.2);border-radius:999px;background:#fff;color:#7a7264;cursor:pointer;font-size:13px;line-height:1;">＋</button></div></div>
              <div style="background:#fff;border:1px solid rgba(58,53,46,.14);border-radius:12px;padding:11px 13px;"><div style="display:flex;justify-content:space-between;font-size:12px;color:#7a7264;margin-bottom:5px;"><span>宿主適合率</span><span style="font-family:'IBM Plex Mono',monospace;color:#3d8a5f;">{{ tekigo }}%</span></div><div style="height:9px;border-radius:999px;background:rgba(58,53,46,.1);overflow:hidden;"><div style="width:{{ tekigo }}%;height:100%;background:linear-gradient(90deg,#57a87c,#3d8a5f);"></div></div><div style="font-size:9px;color:#a89a86;margin-top:4px;">※下がると「異物」と認定されます</div><div style="display:flex;gap:5px;margin-top:6px;"><button onClick="{{ tekigoDown }}" style="width:24px;height:24px;border:1px solid rgba(58,53,46,.2);border-radius:999px;background:#fff;color:#7a7264;cursor:pointer;font-size:13px;line-height:1;">−</button><button onClick="{{ tekigoUp }}" style="width:24px;height:24px;border:1px solid rgba(58,53,46,.2);border-radius:999px;background:#fff;color:#7a7264;cursor:pointer;font-size:13px;line-height:1;">＋</button></div></div>
            </div>

            <p style="font-size:11px;letter-spacing:3px;color:#b32e3f;font-weight:700;margin:0 0 12px;">● 能力（入居適性）</p>
            <div style="display:grid;grid-template-columns:repeat(6,1fr);gap:9px;margin-bottom:24px;">
              <div style="background:#fff;border:1px solid rgba(58,53,46,.14);border-radius:12px;padding:9px 4px;text-align:center;"><div style="font-size:10px;color:#7a7264;">交渉</div><div style="font-family:'IBM Plex Mono',monospace;font-size:22px;font-weight:600;color:#3a352e;line-height:1.3;">15</div><div style="font-size:10px;color:#3d8a5f;">+2</div></div>
              <div style="background:#fff;border:2px solid #cf3f4f;border-radius:12px;padding:9px 4px;text-align:center;"><div style="font-size:10px;color:#b32e3f;">探索</div><div style="font-family:'IBM Plex Mono',monospace;font-size:22px;font-weight:600;color:#b32e3f;line-height:1.3;">17</div><div style="font-size:10px;color:#3d8a5f;">+3</div></div>
              <div style="background:#fff;border:1px solid rgba(58,53,46,.14);border-radius:12px;padding:9px 4px;text-align:center;"><div style="font-size:10px;color:#7a7264;">衛生</div><div style="font-family:'IBM Plex Mono',monospace;font-size:22px;font-weight:600;color:#3a352e;line-height:1.3;">14</div><div style="font-size:10px;color:#3d8a5f;">+2</div></div>
              <div style="background:#fff;border:1px solid rgba(58,53,46,.14);border-radius:12px;padding:9px 4px;text-align:center;"><div style="font-size:10px;color:#7a7264;">膂力</div><div style="font-family:'IBM Plex Mono',monospace;font-size:22px;font-weight:600;color:#3a352e;line-height:1.3;">11</div><div style="font-size:10px;color:#7a7264;">+0</div></div>
              <div style="background:#fff;border:1px solid rgba(58,53,46,.14);border-radius:12px;padding:9px 4px;text-align:center;"><div style="font-size:10px;color:#7a7264;">感覚</div><div style="font-family:'IBM Plex Mono',monospace;font-size:22px;font-weight:600;color:#3a352e;line-height:1.3;">13</div><div style="font-size:10px;color:#3d8a5f;">+1</div></div>
              <div style="background:#fff;border:1px solid rgba(58,53,46,.14);border-radius:12px;padding:9px 4px;text-align:center;"><div style="font-size:10px;color:#7a7264;">免疫</div><div style="font-family:'IBM Plex Mono',monospace;font-size:22px;font-weight:600;color:#c98a2a;line-height:1.3;">9</div><div style="font-size:10px;color:#c98a2a;">−1</div></div>
            </div>

            <div style="display:grid;grid-template-columns:1fr 1fr;gap:24px;">
              <div>
                <p style="font-size:11px;letter-spacing:3px;color:#b32e3f;font-weight:700;margin:0 0 10px;">● 技能</p>
                <div style="display:flex;justify-content:space-between;font-size:14px;color:#4a4436;padding:6px 0;border-bottom:1px dotted rgba(58,53,46,.25);"><span>内見（見抜く目）</span><span style="font-family:'IBM Plex Mono',monospace;color:#3d8a5f;">+7</span></div>
                <div style="display:flex;justify-content:space-between;font-size:14px;color:#4a4436;padding:6px 0;border-bottom:1px dotted rgba(58,53,46,.25);"><span>値下げ交渉</span><span style="font-family:'IBM Plex Mono',monospace;color:#3d8a5f;">+5</span></div>
                <div style="display:flex;justify-content:space-between;font-size:14px;color:#4a4436;padding:6px 0;border-bottom:1px dotted rgba(58,53,46,.25);"><span>応急処置</span><span style="font-family:'IBM Plex Mono',monospace;color:#3d8a5f;">+4</span></div>
                <div style="display:flex;justify-content:space-between;font-size:14px;color:#4a4436;padding:6px 0;"><span>逃げ足</span><span style="font-family:'IBM Plex Mono',monospace;color:#3d8a5f;">+3</span></div>
              </div>
              <div>
                <p style="font-size:11px;letter-spacing:3px;color:#b32e3f;font-weight:700;margin:0 0 10px;">● 特性</p>
                <div style="border:1px solid rgba(58,53,46,.14);border-radius:12px;padding:11px 13px;margin-bottom:9px;background:#fff;"><div style="font-size:13px;font-weight:700;color:#3a352e;margin-bottom:3px;">抗体持ち</div><div style="font-size:12px;line-height:1.7;color:#7a7264;">一度かかった「異物認定」には二度目から抵抗できる。引っ越し歴の賜物。</div></div>
                <div style="border:1px solid rgba(201,138,42,.4);border-radius:12px;padding:11px 13px;background:rgba(201,138,42,.05);"><div style="font-size:13px;font-weight:700;color:#c98a2a;margin-bottom:3px;">フローリング派</div><div style="font-size:12px;line-height:1.7;color:#7a7264;">粘膜床の物件では毎朝、正気判定が必要。「慣れって怖いですね」</div></div>
              </div>
            </div>

                <button onClick="{{ dt.go }}" style="font-size:12px;font-family:'IBM Plex Mono',monospace;padding:7px 12px;border-radius:999px;cursor:pointer;border:{{ dt.border }};color:{{ dt.color }};background:{{ dt.bg }};font-weight:{{ dt.weight }};">{{ dt.label }}</button>

        <sc-if value="{{ isCombat }}" hint-placeholder-val="{{ false }}">

            </div>
            <p style="font-size:12px;color:#a89a86;margin:0 0 14px;">※免疫システムはあなたを「敵」ではなく「汚れ」として処理します。悪意はありません。それが一番怖い。</p>

            <div style="border:1px solid rgba(201,138,42,.5);border-radius:12px;padding:10px 14px;margin-bottom:14px;background:rgba(201,138,42,.06);display:flex;align-items:center;gap:12px;">
              <span style="font-size:20px;">⚠</span>
              <div style="flex:1;"><div style="font-size:13px;font-weight:700;color:#c98a2a;">パーティ共有ゲージ：抗原認識度</div><div style="font-size:11px;color:#7a7264;">満タンで全館一斉退去（くしゃみ）が発動します</div></div>
              <div style="width:170px;"><div style="height:10px;border-radius:999px;background:rgba(58,53,46,.1);overflow:hidden;"><div style="width:{{ ninshiki }}%;height:100%;background:linear-gradient(90deg,#c98a2a,#cf3f4f);"></div></div><div style="font-family:'IBM Plex Mono',monospace;font-size:10px;color:#c98a2a;text-align:right;margin-top:2px;">{{ ninshiki }} / 100</div></div>

                    <button onClick="{{ cb.dmg1 }}" style="font-size:10px;padding:2px 6px;border:1px solid rgba(58,53,46,.2);border-radius:999px;background:#fff;color:#b32e3f;cursor:pointer;">−1</button>
                    <button onClick="{{ cb.heal1 }}" style="font-size:10px;padding:2px 6px;border:1px solid rgba(58,53,46,.2);border-radius:999px;background:#fff;color:#3d8a5f;cursor:pointer;">＋1</button>
                    <button onClick="{{ cb.heal5 }}" style="font-size:10px;padding:2px 6px;border:1px solid rgba(58,53,46,.2);border-radius:999px;background:#fff;color:#3d8a5f;cursor:pointer;">＋5</button>
                  </div>
                </div>
              </div>
            </sc-for>
          </div>
        </sc-if>

        <sc-if value="{{ isInv }}" hint-placeholder-val="{{ false }}">
          <div data-screen-label="契約書類" style="animation:scfade .4s ease;max-width:820px;margin:0 auto;">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;">
              <h1 style="font-weight:900;font-size:24px;margin:0;color:#3a352e;">契約書類・お荷物</h1>
              <div style="display:flex;align-items:center;gap:18px;"><span style="font-family:'IBM Plex Mono',monospace;font-size:13px;color:#b32e3f;">血液残高 3.4L</span><span style="font-family:'IBM Plex Mono',monospace;font-size:13px;color:#7a7264;">段ボール 7箱</span></div>
            </div>
            <div style="display:grid;grid-template-columns:1fr 1.4fr;gap:22px;">
              <div>
                <p style="font-size:11px;letter-spacing:3px;color:#b32e3f;font-weight:700;margin:0 0 11px;">● 重要書類</p>
                <div style="padding:12px 14px;border:2px solid #cf3f4f;border-radius:12px;margin-bottom:8px;background:#fff;"><div style="font-size:14px;font-weight:900;color:#3a352e;">賃貸借契約書（血判済）</div><div style="font-size:12px;color:#7a7264;margin-top:3px;line-height:1.7;">第13条：宿主のくしゃみは天災とみなし、貸主は責を負わない。</div></div>
                <div style="padding:12px 14px;border:1px solid rgba(58,53,46,.16);border-radius:12px;margin-bottom:8px;background:#fff;"><div style="font-size:14px;font-weight:900;color:#3a352e;">重要事項説明書</div><div style="font-size:12px;color:#7a7264;margin-top:3px;line-height:1.7;">「本物件は生きています。稀に引っ越します（宿主が）。」</div></div>
                <div style="padding:12px 14px;border:1px solid rgba(58,53,46,.16);border-radius:12px;background:#fff;"><div style="font-size:14px;font-weight:900;color:#3a352e;">鍵〈音叉〉</div><div style="font-size:12px;color:#7a7264;margin-top:3px;line-height:1.7;">正しい音程で鳴らすと弁が開く。ラの音。絶対にシではない。</div></div>
              </div>
              <div>
                <p style="font-size:11px;letter-spacing:3px;color:#b32e3f;font-weight:700;margin:0 0 11px;">● お荷物リスト</p>
                <div style="display:flex;align-items:center;gap:11px;font-size:14px;color:#4a4436;padding:9px 4px;border-bottom:1px dotted rgba(58,53,46,.25);background:transparent;"><span style="width:8px;height:8px;border-radius:50%;background:#3d8a5f;"></span><span style="flex:1;">内見用スリッパ（粘膜対応）</span><span style="color:#7a7264;">×2足</span></div>
                <div style="display:flex;align-items:center;gap:11px;font-size:14px;color:#4a4436;padding:9px 4px;border-bottom:1px dotted rgba(58,53,46,.25);"><span style="width:8px;height:8px;border-radius:50%;background:#3d8a5f;"></span><span style="flex:1;">消臭剤〈自分のニオイを宿主に寄せる〉</span><span style="color:#7a7264;">×3本</span></div>
                <div style="display:flex;align-items:center;gap:11px;font-size:14px;color:#4a4436;padding:9px 4px;border-bottom:1px dotted rgba(58,53,46,.25);"><span style="width:8px;height:8px;border-radius:50%;background:#cf3f4f;"></span><span style="flex:1;">血液パック（家賃3ヶ月分）</span><span style="color:#7a7264;">×3</span></div>
                <div style="display:flex;align-items:center;gap:11px;font-size:14px;color:#4a4436;padding:9px 4px;border-bottom:1px dotted rgba(58,53,46,.25);"><span style="width:8px;height:8px;border-radius:50%;background:#3f5fa8;"></span><span style="flex:1;">メジャー（天井高そして脈拍を測る）</span><span style="color:#7a7264;">×1</span></div>
                <div style="display:flex;align-items:center;gap:11px;font-size:14px;color:#4a4436;padding:9px 4px;"><span style="width:8px;height:8px;border-radius:50%;background:#c98a2a;"></span><span style="flex:1;">前の住人の日記（39日目で終わっている）</span><span style="color:#7a7264;">×1</span></div>

              </div>
            </div>
          </div>
        </sc-if>

        <sc-if value="{{ isStory }}" hint-placeholder-val="{{ false }}">
          <div data-screen-label="内見記録" style="animation:scfade .4s ease;max-width:640px;margin:0 auto;">
            <p style="font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:2px;color:#a89a86;text-align:center;margin:0 0 6px;">{{ storyKicker }}</p>

            <sc-if value="{{ storyHasNote }}">
              <p style="text-align:center;font-size:13px;letter-spacing:1px;color:{{ storyNoteColor }};margin:0 0 16px;">{{ storyNote }}</p>

            <sc-for list="{{ storyChoices }}" as="c">
              <button onClick="{{ c.go }}" style="display:block;width:100%;text-align:left;padding:13px 16px;margin-bottom:9px;border:1px solid rgba(58,53,46,.2);border-radius:12px;background:#fff;cursor:pointer;font-family:'Zen Maru Gothic',sans-serif;font-size:14px;color:#4a4436;box-shadow:0 2px 8px rgba(58,53,46,.05);">{{ c.num }}　{{ c.pre }}<span style="color:#b32e3f;font-weight:700;">{{ c.skillText }}</span>{{ c.post }} <span style="float:right;color:#b32e3f;font-weight:700;">{{ c.dcLabel }}</span></button>

                <div style="position:absolute;left:46%;top:20%;transform:translate(-50%,-50%);display:flex;flex-direction:column;align-items:center;gap:3px;"><span style="width:13px;height:13px;border-radius:50%;background:#fff;border:3px solid #cf3f4f;"></span><span style="font-size:10px;font-weight:700;color:#4a4436;margin-top:4px;">左心室〈内見中〉</span></div>

<script>
/*
 * Claude Design の x-dc テンプレート（sc-if / sc-for / {{ 変数 }} / onClick）を
 * そのまま解釈して描画するミニランタイム。support.js（React ベースのプレビュー用）の代替。
 * 状態変更のたびにテンプレート全体を再構築する（プロトタイプの再レンダーと同等）。
 */
(function () {
  var cache = new Map();
  function compile(expr) {
    var fn = cache.get(expr);
    if (!fn) {
      fn = new Function('__s', 'with(__s){return(' + expr + ');}');
      cache.set(expr, fn);
    }
    return fn;
  }
  function evalExpr(expr, scope) {
    return compile(expr)(scope);
  }
  // "{{ expr }}" 単体の属性値から式を取り出す
  function single(text) {
    var m = /^\s*\{\{\s*([\s\S]+?)\s*\}\}\s*$/.exec(text || '');
    return m ? m[1] : null;
  }
  function interpolate(text, scope) {
    if (text.indexOf('{{') === -1) return text;
    return text.replace(/\{\{\s*([\s\S]+?)\s*\}\}/g, function (_, expr) {
      var v = evalExpr(expr, scope);
      return v == null ? '' : String(v);
    });
  }
  function build(nodes, scope, parent) {
    for (var i = 0; i < nodes.length; i++) {
      var node = nodes[i];
      if (node.nodeType === Node.TEXT_NODE) {
        parent.appendChild(document.createTextNode(interpolate(node.nodeValue, scope)));
        continue;
      }
      if (node.nodeType !== Node.ELEMENT_NODE) continue;
      var tag = node.localName;
      if (tag === 'sc-if') {
        var cond = single(node.getAttribute('value'));
        if (cond && evalExpr(cond, scope)) build(node.childNodes, scope, parent);
        continue;
      }
      if (tag === 'sc-for') {
        var listExpr = single(node.getAttribute('list'));
        var as = node.getAttribute('as') || 'item';
        var list = (listExpr && evalExpr(listExpr, scope)) || [];
        for (var j = 0; j < list.length; j++) {
          var child = Object.assign({}, scope);
          child[as] = list[j];
          build(node.childNodes, child, parent);
        }
        continue;
      }
      var el = document.createElementNS(node.namespaceURI, tag);
      for (var k = 0; k < node.attributes.length; k++) {
        var attr = node.attributes[k];
        if (attr.name.indexOf('hint-placeholder') === 0) continue;
        if (attr.name === 'onclick') {
          var handlerExpr = single(attr.value);
          var fn = handlerExpr ? evalExpr(handlerExpr, scope) : null;
          if (typeof fn === 'function') el.addEventListener('click', fn);
          continue;
        }
        el.setAttribute(attr.name, interpolate(attr.value, scope));
      }
      build(node.childNodes, scope, el);
      parent.appendChild(el);
    }
  }
  window.DCLogic = class DCLogic {
    mount(rootEl, templateEl) {
      this._root = rootEl;
      this._tpl = templateEl.content;
      this.render();
    }
    setState(update) {
      var patch = typeof update === 'function' ? update(this.state) : update;
      Object.assign(this.state, patch);
      this.render();
    }
    render() {
      var scope = this.renderVals();
      var frag = document.createDocumentFragment();
      build(this._tpl.childNodes, scope, frag);
      this._root.replaceChildren(frag);
    }
  };
})();

class Component extends DCLogic {
  state = { device: 'desktop', play: 'gmpl', screen: 'top' };

/*
 * 全作品共通のゲームエンジン。ダイス・d20判定・localStorage 永続化と、
 * シェル（DCLogic コンポーネント）へのゲーム状態の合流（attach）を担う。
 * 作品ごとの中身（シナリオ・画面の値）は games/<id>.game.js が window.__GAME__ に定義する。
 */
(function () {
  function rollDie(sides) {
    return 1 + Math.floor(Math.random() * sides);
  }
  function pickKeys(obj, keys) {
    var o = {};
    for (var i = 0; i < keys.length; i++) o[keys[i]] = obj[keys[i]];
    return o;
  }
  window.GameEngine = {
    rollDie: rollDie,
    clamp: function (v, lo, hi) {
      return Math.max(lo, Math.min(hi, v));
    },
    // d20 判定。20 は大成功、1 は大失敗（出目優先）
    check: function (mod, dc) {
      var die = rollDie(20);
      var total = die + mod;
      var outcome = die === 20 ? 'crit' : die === 1 ? 'fumble' : total >= dc ? 'success' : 'fail';
      return { die: die, mod: mod, total: total, dc: dc, outcome: outcome, ok: outcome === 'crit' || outcome === 'success' };
    },
    outcomeText: function (outcome) {
      return { crit: '大成功', success: '成功', fail: '失敗', fumble: '大失敗' }[outcome] || '';
    },
    attach: function (app, game) {
      var key = 'trpg-game-' + game.id;
      var saved = null;
      try { saved = JSON.parse(localStorage.getItem(key) || 'null'); } catch (e) {}
      Object.assign(app.state, game.initialState(), saved || {});
      if (game.migrate) game.migrate(app.state);
      var baseRenderVals = app.renderVals.bind(app);
      app.renderVals = function () {
        var vals = baseRenderVals();
        return Object.assign(vals, game.vals(app, vals));
      };
      var baseSetState = app.setState.bind(app);
      app.setState = function (update) {
        baseSetState(update);
        try { localStorage.setItem(key, JSON.stringify(pickKeys(app.state, game.persist))); } catch (e) {}
      };
      // ゲーム状態のみ初期値へ戻す（device / play / screen は保持）
      app._resetGame = function () {
        try { localStorage.removeItem(key); } catch (e) {}
        Object.assign(app.state, game.initialState());
        app.render();
      };
    },
  };
})();

/*
 * 1f-左心室不動産 のゲーム内容。
 * - 入居審査: d4〜d100。d20 判定は審査印（審査通過／却下）。値下げ交渉での成功は家賃を実際に下げる
 * - 入居者カード: 体力 / 血液残量(L) / 宿主適合率(0-100%) の増減
 * - 免疫対応: パーティ共有ゲージ「抗原認識度」。異物認定タグを持つ入居者は毎手番ゲージを押し上げる。
 *   満タンで「くしゃみ」イベント（軽い巻き戻し）が発生する
 * - 契約書類: 「前の住人の日記」だけ読める。読むと内見記録の終盤に専用の対決選択肢が解禁される
 * - 内見記録: 分岐シナリオ「内見、はじまる（ドクン）」（宿主適合率ルール・複数エンディング）。
 *   GM 秘匿（営業担当カナメ＝前の住人。39日目に免疫と和解して転職した）を発見する真ルートあり
 * - 管理会社: 案件切替・宿主の体調・体内の異変表 d6
 */
(function () {
  var E = null;
  function eng() { return E || (E = window.GameEngine); }

  var TAI_MAX = 17;

  var SKILLS = [
    { name: '内見（見抜く目）', mod: 7 },
    { name: '値下げ交渉', mod: 5 },
    { name: '応急処置', mod: 4 },
    { name: '逃げ足', mod: 3 },
    { name: '探索', mod: 3 },
  ];
  var DICE_SIDES = [4, 6, 8, 10, 12, 20, 100];

  function bloodLabel(dl) { return (dl / 10).toFixed(1) + 'L'; }

  // 審査印: 値下げ交渉なら家賃反映。それ以外は審査通過／却下の一般判定
  function stampInfo(r, skillName, rent) {
    var ok = r.ok != null ? r.ok : (r.outcome === 'crit' || r.outcome === 'success');
    var isNego = skillName === '値下げ交渉';
    if (r.outcome === 'fumble') {
      return { word: '却下', color: '#b32e3f', bg: 'rgba(207,63,79,.05)', verdict: '＝ ' + r.total + ' ・ 却下（心室痙攣）', rentDelta: 0, hp: -2 };
    }
    if (ok && isNego) {
      var cut = (r.total - r.dc + 1) * 10;
      var bonus = r.die === 20 ? cut : 0;
      var total = cut + bonus;
      return { word: '審査通過', color: '#3d8a5f', bg: 'rgba(61,138,95,.05)', verdict: '＝ ' + r.total + ' ・ 家賃 ' + rent + '→' + Math.max(50, rent - total) + 'cc/月に成功！' + (bonus ? '（特別優遇）' : ''), rentDelta: -total, hp: 0 };
    }
    if (ok) {
      return { word: '審査通過', color: '#3d8a5f', bg: 'rgba(61,138,95,.05)', verdict: '＝ ' + r.total + ' ・ 審査通過', rentDelta: 0, hp: 0 };
    }
    return { word: '却下', color: '#b32e3f', bg: 'rgba(207,63,79,.05)', verdict: '＝ ' + r.total + ' ・ 却下', rentDelta: 0, hp: 0 };
  }

  var COMBATANTS = [
    { key: 'hpMacro', name: 'マクロファージ〈お掃除の大きい人〉', init: 19, max: 30, gauge: 'お掃除意欲', toggleable: false, tokenStyle: "width:30px;height:30px;flex:none;border-radius:50%;background:radial-gradient(circle at 35% 30%,#fff,#dfe4ee 70%);border:2px solid #8d93a0;", baseTags: [{ t: '包み込み体勢', bg: 'rgba(207,63,79,.1)', color: '#b32e3f' }, { t: '悪意なし', bg: 'rgba(58,53,46,.08)', color: '#6b6353' }] },
    { key: 'hpTsugumi', name: 'ツグミ', init: 15, max: 17, gauge: '体力', toggleable: true, tokenStyle: "width:30px;height:30px;flex:none;border-radius:50%;border:3px solid #cf3f4f;background:repeating-linear-gradient(45deg,rgba(207,63,79,.12) 0 4px,transparent 4px 8px),#fff;", identifiedDefault: false },
    { key: 'hpDozuru', name: 'ドズル', init: 12, max: 28, gauge: '体力', toggleable: true, tokenStyle: "width:30px;height:30px;flex:none;border-radius:50%;border:3px solid #cf3f4f;background:repeating-linear-gradient(45deg,rgba(207,63,79,.12) 0 4px,transparent 4px 8px),#fff;", identifiedDefault: true },

          var v = E.rollDie(st.diceSides);
          pushLog(st, 'ツグミ ・ d' + st.diceSides, v + ' ／ 出目', '#7a7264');
          app.setState({ lastRoll: { kind: 'plain', sides: st.diceSides, value: v }, rollLog: st.rollLog });
        }
      };
      out.logRows = st.rollLog;

      // ── 免疫対応 ──
      out.waveTitle = '退去勧告 ・ 第' + st.wave + '波';
      out.ninshiki = st.ninshiki;
      out.hasSneeze = !!st.sneezeMsg;
      out.sneezeMsg = st.sneezeMsg || '';
      function aliveIdx(from) {
        for (var i = 1; i <= COMBATANTS.length; i++) {
          var idx = (from + i) % COMBATANTS.length;
          if (st[COMBATANTS[idx].key] > 0) return idx;
        }
        return from;
      }
      function identifiedGrowth() {
        var total = 0;
        COMBATANTS.forEach(function (c) {
          if (c.toggleable && st.identified[c.key] && st[c.key] > 0) total += 6;
        });
        return total;
      }
      out.nextTurn = function () {
        var next = aliveIdx(st.turnIdx);
        var patch = { turnIdx: next, sneezeMsg: null };
        if (next <= st.turnIdx) {
          patch.wave = st.wave + 1;
          var grown = E.clamp(st.ninshiki + identifiedGrowth(), 0, 999);
          if (grown >= 100) {
            patch.ninshiki = 20;
            patch.sneezeMsg = '——満タンにより、全館一斉退去（くしゃみ）発生！ 認識度は20まで巻き戻り、全員に軽い衝撃（体力−1）。';
            COMBATANTS.forEach(function (c) {
              patch[c.key] = E.clamp((c.key in patch ? patch[c.key] : st[c.key]) - 1, 0, c.max);
            });
          } else {
            patch.ninshiki = grown;
          }
        }
        app.setState(patch);
      };
      out.hideBehind = function () {
        app.setState({ ninshiki: E.clamp(st.ninshiki - 5, 0, 100) });
      };
      out.combatants = COMBATANTS.map(function (c, i) {
        var hp = st[c.key];
        var dead = hp <= 0;
        var active = i === st.turnIdx && !dead;
        var tags = (c.baseTags || []).slice();
        var toggleLabel = '', toggleFn = null;
        if (c.toggleable) {
          var isId = !!st.identified[c.key];
          tags.push(isId
            ? { t: '異物認定（毎ターン認識度+6）', bg: 'rgba(207,63,79,.1)', color: '#b32e3f' }
            : { t: '消臭済み（認識度+0）', bg: 'rgba(61,138,95,.12)', color: '#3d8a5f' });
          toggleLabel = isId ? '消臭する' : '認定させる';
          toggleFn = function () {
            var identified = Object.assign({}, st.identified);
            identified[c.key] = !isId;
            app.setState({ identified: identified });
          };
        }
        if (dead) tags = [{ t: '戦線離脱', bg: 'rgba(207,63,79,.1)', color: '#b32e3f' }];
        function adj(d) {
          return function () {
            var patch = {};
            patch[c.key] = E.clamp(hp + d, 0, c.max);
            app.setState(patch);
          };
        }
        return {
          name: c.name, init: c.init, gauge: c.gauge, hp: hp, max: c.max,
          pct: Math.round((hp / c.max) * 100),
          side: active ? '行動中' : '',
          border: active ? '2px solid #cf3f4f' : '1px solid rgba(58,53,46,.16)',
          shadow: active ? '0 4px 12px rgba(207,63,79,.1)' : 'none',
          pad: '11px 14px', op: dead ? '.6' : '1',
          initBg: active ? '#cf3f4f' : 'rgba(58,53,46,.1)',
          initColor: active ? '#fff' : '#6b6353',
          tokenStyle: c.tokenStyle,
          barBg: c.key === 'hpMacro' ? '#8d93a0' : 'linear-gradient(90deg,#e0566a,#b32e3f)',
          tags: tags, toggleable: c.toggleable, toggle: toggleFn, toggleLabel: toggleLabel,
          dmg5: adj(-5), dmg1: adj(-1), heal1: adj(1), heal5: adj(5),
        };
      });

      // ── 契約書類 ──
      out.diaryUnread = !st.items.diaryRead;
      out.diaryText = st.items.diaryRead ? DIARY_TEXT_READ : DIARY_TEXT;
      out.readDiary = function () {
        var items = Object.assign({}, st.items);
        items.diaryRead = 1;
        app.setState({ items: items, flags: Object.assign({}, st.flags, { readDiary: 1 }) });
      };

      // ── 内見記録 ──
      var node = NODES[st.storyNode] || NODES.f1;
      out.storyKicker = node.kicker;
      out.storyTitle = node.title;
      out.storyBlocks = node.text.map(function (b) {
        return typeof b === 'string' ? { isP: true, isQ: false, t: b } : { isP: false, isQ: true, t: b.q };
      });
      out.storyHasNote = !!st.storyNote;
      out.storyNote = st.storyNote || '';
      out.storyNoteColor = st.storyNoteColor || '#7a7264';
      out.storyPct = node.pct;
      out.storyPctLabel = node.end
        ? '内見ツアー完了 ・ 契約結審'
        : '内見ツアー進捗 ' + node.pct + '% ・ 心拍 ' + (72 + Math.round(node.pct / 4)) + 'bpm';
      out.storyCanRestart = st.storyNode !== 'f1';
      out.storyRestart = function () { app._resetGame(); };

      function choose(c) {
        return function () {
          var patch = { storyNote: null, storyNoteColor: '#7a7264' };
          var target = c.to;
          if (c.check) {
            var dc = typeof c.check.dc === 'function' ? c.check.dc(st) : c.check.dc;
            var r = E.check(c.check.mod, dc);
            patch.storyNote = c.check.name + '判定 — d20〈' + r.die + '〉＋' + r.mod + ' ＝ ' + r.total + ' ／ 難度' + dc + ' ・ ' + (r.ok ? '成功' : '失敗');
            patch.storyNoteColor = r.ok ? '#3d8a5f' : '#b32e3f';
            pushLog(st, 'ツグミ ・ ' + c.check.name + '（内見記録）', r.total + ' ／ ' + (r.ok ? '成功' : '失敗'), r.ok ? '#3d8a5f' : '#b32e3f');
            patch.rollLog = st.rollLog;
            target = r.ok ? c.success : c.fail;
          }
          var nextNode = NODES[target];
          applyFx(st, nextNode.fx, patch);
          var taiNow = 'tai' in patch ? patch.tai : st.tai;
          var tekigoNow = 'tekigo' in patch ? patch.tekigo : st.tekigo;
          if (taiNow <= 0 && !nextNode.end) {
            target = 'E_faint';
            applyFx(st, NODES.E_faint.fx, patch);
          } else if (tekigoNow <= 0 && !nextNode.end) {
            target = 'E_rejected';
            applyFx(st, NODES.E_rejected.fx, patch);
          }
          patch.storyNode = target;
          app.setState(patch);
        };
      }
      var defs = node.end ? END_CHOICES : node.choices;
      out.storyChoices = defs.filter(function (c) {
        return !c.if || c.if(st);
      }).map(function (c) {
        var dc = c.check ? (typeof c.check.dc === 'function' ? c.check.dc(st) : c.check.dc) : null;
        return {
          num: c.num || '', pre: c.pre, skillText: c.skillText || '', post: c.post || '',
          dcLabel: dc != null ? '難度' + dc : '',
          go: c.restart ? function () { app._resetGame(); }
            : c.top ? function () { app.setState({ screen: 'top' }); }
            : choose(c),
        };
      });

      // ── 管理会社 ──
      out.gmScenes = GM_SCENES.map(function (t, i) {
        var active = i === st.gmScene;
        return {
          t: t, tag: active ? '進行中' : '',
          go: function () { app.setState({ gmScene: i }); },
          border: active ? '2px solid #cf3f4f' : '1px solid rgba(58,53,46,.18)',
          bg: active ? 'rgba(207,63,79,.04)' : '#fff',
          color: active ? '#3a352e' : '#7a7264',
          weight: active ? '900' : '400',
        };
      });
      out.taicho = st.taicho;
      out.taichoMinus = function () { app.setState({ taicho: E.clamp(st.taicho - 5, 0, 100) }); };
      out.taichoPlus = function () { app.setState({ taicho: E.clamp(st.taicho + 5, 0, 100) }); };
      out.gmHasTable = !!st.gmTable;
      out.gmTableD = st.gmTable ? st.gmTable.d : '';
      out.gmTableText = st.gmTable ? st.gmTable.text : '';
      out.rollTable = function () {
        var d = E.rollDie(6);
        var text = GM_TABLE[d - 1];
        pushLog(st, '管理会社 ・ 体内の異変表', d + ' ／ ' + text, '#c98a2a');
        app.setState({ gmTable: { d: d, text: text }, rollLog: st.rollLog });
      };

      return out;
    },
  };
})();

window.__dcApp = new Component();
if (typeof GameEngine !== 'undefined' && window.__GAME__) GameEngine.attach(window.__dcApp, window.__GAME__);
window.__dcApp.mount(document.getElementById('app'), document.getElementById('dc-template'));
</script>
</body>
