<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>和風伝奇</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;600;700;800&family=Yuji+Syuku&display=swap" rel="stylesheet">
<style>
  body{margin:0;background:#14110d;}
  @keyframes scfade{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:none}}
  @keyframes diceflip{0%{transform:rotate(-7deg) scale(.86);opacity:.4}55%{transform:rotate(5deg) scale(1.05)}100%{transform:none;opacity:1}}
  ::-webkit-scrollbar{width:10px;height:10px}
  ::-webkit-scrollbar-thumb{background:rgba(120,90,40,.3);border-radius:8px}
  ::-webkit-scrollbar-track{background:transparent}
</style>
</head>
<body>
<div id="app"></div>
<template id="dc-template">
<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:34px 20px 96px;box-sizing:border-box;font-family:'Shippori Mincho',serif;background:radial-gradient(120% 95% at 50% 0%,#241c14 0%,#14110d 58%,#0d0a06 100%);color:#211c16;">

  <div style="position:relative;width:{{ frameW }}px;height:{{ frameH }}px;max-width:100%;background:#e6d9bf;border:1px solid #c3ad84;border-radius:6px;box-shadow:0 34px 90px -22px rgba(0,0,0,.72),0 0 0 8px rgba(18,14,9,.55),inset 0 0 130px rgba(150,110,60,.1);overflow:hidden;display:flex;flex-direction:column;">

    <div style="position:absolute;inset:0;pointer-events:none;background-image:radial-gradient(circle at 84% 12%,rgba(177,58,42,.06),transparent 30%),radial-gradient(circle at 14% 82%,rgba(120,90,40,.07),transparent 40%),repeating-linear-gradient(90deg,rgba(90,70,30,.022) 0 1px,transparent 1px 3px);mix-blend-mode:multiply;"></div>

    <header style="position:relative;z-index:2;display:flex;align-items:center;justify-content:space-between;gap:14px;padding:12px 22px;border-bottom:1px solid rgba(90,79,63,.32);background:linear-gradient(180deg,rgba(239,230,207,.92),rgba(226,214,185,.5));">
      <div style="display:flex;align-items:center;gap:12px;">
        <span style="display:inline-flex;align-items:center;justify-content:center;width:30px;height:30px;background:#b13a2a;color:#f3ead3;font-family:'Yuji Syuku',serif;font-size:16px;border-radius:3px;box-shadow:0 2px 5px rgba(0,0,0,.2);">祓</span>
        <span style="font-family:'Yuji Syuku',serif;font-size:23px;color:#211c16;letter-spacing:3px;">怪異録</span>
        <span style="font-size:10px;letter-spacing:3px;color:#8f2c1f;">KAII ・ CASE LEDGER</span>
      </div>
      <div style="display:flex;align-items:center;gap:9px;">
        <span style="font-size:12px;letter-spacing:1.5px;color:#5a4f3f;">{{ playLabel }}</span>
        <span style="width:6px;height:6px;border-radius:50%;background:#b13a2a;box-shadow:0 0 0 3px rgba(177,58,42,.16);"></span>
      </div>
    </header>

    <div style="position:relative;z-index:2;flex:1;display:flex;min-height:0;">

      <sc-if value="{{ showRail }}" hint-placeholder-val="{{ true }}">
        <nav style="width:{{ railW }}px;flex:none;border-right:1px solid rgba(90,79,63,.26);background:linear-gradient(180deg,rgba(177,58,42,.04),transparent);padding:15px 10px;display:flex;flex-direction:column;gap:3px;overflow-y:auto;">
          <sc-for list="{{ nav }}" as="item" hint-placeholder-count="8">
            <button onClick="{{ item.go }}" style="display:flex;align-items:center;gap:11px;width:100%;padding:10px 12px;border:0;border-radius:5px;cursor:pointer;text-align:left;background:{{ item.bg }};color:{{ item.color }};font-family:'Shippori Mincho',serif;font-size:15px;font-weight:{{ item.weight }};">
              <span style="width:8px;height:8px;flex:none;border-radius:1px;background:{{ item.markerBg }};box-shadow:inset 0 0 0 1px {{ item.markerBorder }};"></span>
              <span>{{ item.railLabel }}</span>
            </button>
          </sc-for>
        </nav>
      </sc-if>

      <main style="flex:1;min-width:0;overflow-y:auto;padding:{{ mainPad }};">

        <sc-if value="{{ isTop }}" hint-placeholder-val="{{ true }}">
          <div style="animation:scfade .4s ease;max-width:760px;margin:0 auto;">
            <p style="font-size:11px;letter-spacing:4px;color:#8f2c1f;margin:0 0 7px;">怪異 第七號 ・ 鏡沼村</p>
            <h1 style="font-family:'Yuji Syuku',serif;font-weight:400;font-size:40px;line-height:1.12;margin:0 0 14px;color:#211c16;">鏡沼の影攫い</h1>
            <p style="font-size:17px;line-height:1.85;color:#3f372b;margin:0 0 28px;max-width:58ch;">沼のほとりの村で、人の影がひとつ、またひとつと失われている。鏡を割れば助かると古老は言うが——調べは、まだ何ひとつ裏が取れていない。帳面を開こう。</p>

            <p style="font-size:11px;letter-spacing:3px;color:#8f2c1f;margin:0 0 12px;">祓い方を択ぶ</p>
            <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:0 0 30px;">
              <sc-for list="{{ playModes }}" as="m" hint-placeholder-count="3">
                <button onClick="{{ m.go }}" style="text-align:left;padding:14px 15px;border-radius:6px;cursor:pointer;border:{{ m.border }};background:{{ m.bg }};">
                  <div style="font-family:'Shippori Mincho',serif;font-size:14px;font-weight:700;color:{{ m.titleColor }};margin-bottom:5px;">{{ m.t }}</div>
                  <div style="font-size:13px;line-height:1.55;color:#5a4f3f;">{{ m.d }}</div>
                </button>
              </sc-for>
            </div>

            <p style="font-size:11px;letter-spacing:3px;color:#8f2c1f;margin:0 0 14px;">調べの一行</p>
            <div style="display:flex;gap:16px;flex-wrap:wrap;">
              <div style="display:flex;flex-direction:column;align-items:center;gap:7px;width:92px;"><div style="width:62px;height:62px;border-radius:50%;border:2px solid #b13a2a;background:repeating-linear-gradient(45deg,rgba(120,90,40,.12) 0 5px,transparent 5px 10px),rgba(239,230,207,.7);box-shadow:0 4px 10px rgba(0,0,0,.12);"></div><div style="font-size:13px;color:#211c16;">久遠寺 紗那</div><div style="font-size:11px;color:#5a4f3f;">民俗学者</div></div>
              <div style="display:flex;flex-direction:column;align-items:center;gap:7px;width:92px;"><div style="width:62px;height:62px;border-radius:50%;border:2px solid #b13a2a;background:repeating-linear-gradient(45deg,rgba(120,90,40,.12) 0 5px,transparent 5px 10px),rgba(239,230,207,.7);box-shadow:0 4px 10px rgba(0,0,0,.12);"></div><div style="font-size:13px;color:#211c16;">柊 十三</div><div style="font-size:11px;color:#5a4f3f;">退魔師</div></div>
              <div style="display:flex;flex-direction:column;align-items:center;gap:7px;width:92px;"><div style="width:62px;height:62px;border-radius:50%;border:2px solid #b13a2a;background:repeating-linear-gradient(45deg,rgba(120,90,40,.12) 0 5px,transparent 5px 10px),rgba(239,230,207,.7);box-shadow:0 4px 10px rgba(0,0,0,.12);"></div><div style="font-size:13px;color:#211c16;">あやめ</div><div style="font-size:11px;color:#5a4f3f;">巫女</div></div>
              <div style="display:flex;flex-direction:column;align-items:center;gap:7px;width:92px;"><div style="width:62px;height:62px;border-radius:50%;border:2px solid #b13a2a;background:repeating-linear-gradient(45deg,rgba(120,90,40,.12) 0 5px,transparent 5px 10px),rgba(239,230,207,.7);box-shadow:0 4px 10px rgba(0,0,0,.12);"></div><div style="font-size:13px;color:#211c16;">犬飼 剛</div><div style="font-size:11px;color:#5a4f3f;">巡査</div></div>
            </div>

            <button onClick="{{ goStory }}" style="margin-top:30px;display:inline-flex;align-items:center;gap:10px;padding:13px 28px;border:0;border-radius:6px;cursor:pointer;background:linear-gradient(180deg,#b13a2a,#8f2c1f);color:#f3ead3;font-family:'Shippori Mincho',serif;font-weight:700;font-size:15px;letter-spacing:2px;box-shadow:0 10px 24px -8px rgba(143,44,31,.55);">調べを進める　➜</button>
          </div>
        </sc-if>

        <sc-if value="{{ isSheet }}" hint-placeholder-val="{{ false }}">
          <div style="animation:scfade .4s ease;max-width:820px;margin:0 auto;">
            <div style="display:flex;gap:20px;align-items:flex-start;margin-bottom:22px;">
              <div style="width:96px;height:120px;flex:none;border-radius:4px;border:1px solid rgba(90,79,63,.4);background:repeating-linear-gradient(45deg,rgba(120,90,40,.10) 0 6px,transparent 6px 12px),rgba(239,230,207,.6);display:flex;align-items:center;justify-content:center;font-size:9px;letter-spacing:1px;color:#9c8657;">人 相 書</div>
              <div style="flex:1;min-width:0;">
                <p style="font-size:11px;letter-spacing:3px;color:#8f2c1f;margin:0 0 4px;">調書 ・ 第参號</p>
                <h1 style="font-family:'Yuji Syuku',serif;font-weight:400;font-size:30px;margin:0 0 4px;color:#211c16;">久遠寺 紗那</h1>
                <p style="font-size:14px;color:#5a4f3f;margin:0 0 10px;">民俗学者 ・ 調査二年 ・ 二十四</p>
                <div style="display:flex;gap:7px;flex-wrap:wrap;">
                  <span style="font-size:11px;padding:3px 9px;border-radius:3px;border:1px solid rgba(90,79,63,.4);color:#5a4f3f;">古文書</span>
                  <span style="font-size:11px;padding:3px 9px;border-radius:3px;border:1px solid rgba(90,79,63,.4);color:#5a4f3f;">見鬼の才</span>
                  <span style="font-size:11px;padding:3px 9px;border-radius:3px;border:1px solid rgba(90,79,63,.4);color:#5a4f3f;">怖がり</span>
                </div>
              </div>
            </div>

            <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:13px;margin-bottom:22px;">
              <div><div style="display:flex;justify-content:space-between;font-size:12px;color:#5a4f3f;margin-bottom:4px;"><span>気力</span><span>{{ ki }} / 14</span></div><div style="height:9px;border-radius:5px;background:rgba(90,79,63,.16);overflow:hidden;"><div style="width:{{ kiPct }}%;height:100%;background:linear-gradient(90deg,#b13a2a,#cc5a44);"></div></div><div style="display:flex;gap:5px;margin-top:6px;"><button onClick="{{ kiDown }}" style="width:24px;height:24px;border:1px solid rgba(90,79,63,.35);border-radius:5px;background:rgba(239,230,207,.6);color:#5a4f3f;cursor:pointer;font-size:13px;line-height:1;">−</button><button onClick="{{ kiUp }}" style="width:24px;height:24px;border:1px solid rgba(90,79,63,.35);border-radius:5px;background:rgba(239,230,207,.6);color:#5a4f3f;cursor:pointer;font-size:13px;line-height:1;">＋</button></div></div>
              <div><div style="display:flex;justify-content:space-between;font-size:12px;color:#5a4f3f;margin-bottom:4px;"><span>霊力</span><span>{{ rei }} / 10</span></div><div style="height:9px;border-radius:5px;background:rgba(90,79,63,.16);overflow:hidden;"><div style="width:{{ reiPct }}%;height:100%;background:linear-gradient(90deg,#2c3c54,#46618a);"></div></div><div style="display:flex;gap:5px;margin-top:6px;"><button onClick="{{ reiDown }}" style="width:24px;height:24px;border:1px solid rgba(90,79,63,.35);border-radius:5px;background:rgba(239,230,207,.6);color:#5a4f3f;cursor:pointer;font-size:13px;line-height:1;">−</button><button onClick="{{ reiUp }}" style="width:24px;height:24px;border:1px solid rgba(90,79,63,.35);border-radius:5px;background:rgba(239,230,207,.6);color:#5a4f3f;cursor:pointer;font-size:13px;line-height:1;">＋</button></div></div>
              <div><div style="display:flex;justify-content:space-between;font-size:12px;color:#5a4f3f;margin-bottom:4px;"><span>正気</span><span>{{ san }}</span></div><div style="height:9px;border-radius:5px;background:rgba(90,79,63,.16);overflow:hidden;"><div style="width:{{ san }}%;height:100%;background:linear-gradient(90deg,#5a7a4a,#7a9a64);"></div></div><div style="display:flex;gap:5px;margin-top:6px;"><button onClick="{{ sanDown }}" style="width:24px;height:24px;border:1px solid rgba(90,79,63,.35);border-radius:5px;background:rgba(239,230,207,.6);color:#5a4f3f;cursor:pointer;font-size:13px;line-height:1;">−</button><button onClick="{{ sanUp }}" style="width:24px;height:24px;border:1px solid rgba(90,79,63,.35);border-radius:5px;background:rgba(239,230,207,.6);color:#5a4f3f;cursor:pointer;font-size:13px;line-height:1;">＋</button></div></div>
            </div>

            <p style="font-size:11px;letter-spacing:3px;color:#8f2c1f;margin:0 0 12px;">能力</p>
            <div style="display:grid;grid-template-columns:repeat(6,1fr);gap:9px;margin-bottom:24px;">
              <div style="border:1px solid rgba(90,79,63,.28);border-radius:4px;padding:9px 4px;text-align:center;background:rgba(239,230,207,.5);"><div style="font-size:11px;color:#8f2c1f;">体</div><div style="font-family:'Yuji Syuku',serif;font-size:24px;color:#211c16;line-height:1.2;">11</div><div style="font-size:11px;color:#5a4f3f;">＋1</div></div>
              <div style="border:1px solid rgba(90,79,63,.28);border-radius:4px;padding:9px 4px;text-align:center;background:rgba(239,230,207,.5);"><div style="font-size:11px;color:#8f2c1f;">業</div><div style="font-family:'Yuji Syuku',serif;font-size:24px;color:#211c16;line-height:1.2;">13</div><div style="font-size:11px;color:#5a4f3f;">＋1</div></div>
              <div style="border:1px solid rgba(90,79,63,.28);border-radius:4px;padding:9px 4px;text-align:center;background:rgba(239,230,207,.5);"><div style="font-size:11px;color:#8f2c1f;">知</div><div style="font-family:'Yuji Syuku',serif;font-size:24px;color:#211c16;line-height:1.2;">17</div><div style="font-size:11px;color:#5a4f3f;">＋3</div></div>
              <div style="border:1px solid rgba(90,79,63,.28);border-radius:4px;padding:9px 4px;text-align:center;background:rgba(239,230,207,.5);"><div style="font-size:11px;color:#8f2c1f;">胆</div><div style="font-family:'Yuji Syuku',serif;font-size:24px;color:#211c16;line-height:1.2;">9</div><div style="font-size:11px;color:#5a4f3f;">±0</div></div>
              <div style="border:1px solid rgba(90,79,63,.28);border-radius:4px;padding:9px 4px;text-align:center;background:rgba(239,230,207,.5);"><div style="font-size:11px;color:#8f2c1f;">縁</div><div style="font-family:'Yuji Syuku',serif;font-size:24px;color:#211c16;line-height:1.2;">15</div><div style="font-size:11px;color:#5a4f3f;">＋2</div></div>
              <div style="border:1px solid rgba(90,79,63,.28);border-radius:4px;padding:9px 4px;text-align:center;background:rgba(239,230,207,.5);"><div style="font-size:11px;color:#8f2c1f;">呪</div><div style="font-family:'Yuji Syuku',serif;font-size:24px;color:#211c16;line-height:1.2;">14</div><div style="font-size:11px;color:#5a4f3f;">＋2</div></div>
            </div>

            <div style="display:grid;grid-template-columns:1fr 1fr;gap:24px;">
              <div>
                <p style="font-size:11px;letter-spacing:3px;color:#8f2c1f;margin:0 0 10px;">技能</p>
                <div style="display:flex;justify-content:space-between;font-size:14px;color:#3f372b;padding:6px 0;border-bottom:1px dotted rgba(90,79,63,.3);"><span>民俗学</span><span style="color:#8f2c1f;">＋8</span></div>
                <div style="display:flex;justify-content:space-between;font-size:14px;color:#3f372b;padding:6px 0;border-bottom:1px dotted rgba(90,79,63,.3);"><span>目星</span><span style="color:#8f2c1f;">＋6</span></div>
                <div style="display:flex;justify-content:space-between;font-size:14px;color:#3f372b;padding:6px 0;border-bottom:1px dotted rgba(90,79,63,.3);"><span>聞き込み</span><span style="color:#8f2c1f;">＋5</span></div>
                <div style="display:flex;justify-content:space-between;font-size:14px;color:#3f372b;padding:6px 0;"><span>呪術</span><span style="color:#8f2c1f;">＋4</span></div>
              </div>
              <div>
                <p style="font-size:11px;letter-spacing:3px;color:#8f2c1f;margin:0 0 10px;">特性</p>
                <div style="border:1px solid rgba(90,79,63,.28);border-radius:4px;padding:11px 13px;margin-bottom:9px;background:rgba(239,230,207,.5);"><div style="font-size:13px;font-weight:700;color:#211c16;margin-bottom:3px;">見鬼</div><div style="font-size:12px;line-height:1.5;color:#5a4f3f;">常人に見えぬ怪異の気配を察する。</div></div>
                <div style="border:1px solid rgba(90,79,63,.28);border-radius:4px;padding:11px 13px;background:rgba(239,230,207,.5);"><div style="font-size:13px;font-weight:700;color:#211c16;margin-bottom:3px;">博識</div><div style="font-size:12px;line-height:1.5;color:#5a4f3f;">怪異の正体に関する判定で優位を得る。</div></div>
              </div>
            </div>
            <p style="margin-top:22px;font-size:14px;line-height:1.85;color:#5a4f3f;border-right:2px solid rgba(177,58,42,.5);padding-right:14px;text-align:right;">幼い頃、祖母の村で「視て」しまった。以来、怪異は彼女にとって学問であり、贖いでもある。</p>
          </div>
        </sc-if>

        <sc-if value="{{ isDice }}" hint-placeholder-val="{{ false }}">
          <div style="animation:scfade .4s ease;max-width:560px;margin:0 auto;text-align:center;">
            <p style="font-size:11px;letter-spacing:4px;color:#8f2c1f;margin:0 0 4px;">{{ diceHead }}</p>
            <sc-if value="{{ diceIsCheck }}">
              <div style="display:flex;justify-content:center;align-items:center;gap:9px;margin:6px 0 0;">
                <button onClick="{{ dcMinus }}" style="width:24px;height:24px;border:1px solid rgba(90,79,63,.35);border-radius:5px;background:rgba(239,230,207,.6);color:#5a4f3f;cursor:pointer;font-size:13px;line-height:1;">−</button>
                <span style="font-size:12px;letter-spacing:2px;color:#5a4f3f;">難度を調整</span>
                <button onClick="{{ dcPlus }}" style="width:24px;height:24px;border:1px solid rgba(90,79,63,.35);border-radius:5px;background:rgba(239,230,207,.6);color:#5a4f3f;cursor:pointer;font-size:13px;line-height:1;">＋</button>
              </div>
            </sc-if>
            <div style="display:flex;flex-direction:column;align-items:center;gap:7px;margin:18px 0 24px;">
              <div style="width:122px;height:122px;border-radius:8px;animation:diceflip .55s ease;background:linear-gradient(145deg,#c0432f,#8f2c1f);border:2px solid #6f2014;box-shadow:0 16px 34px -12px rgba(0,0,0,.5),inset 0 0 26px rgba(0,0,0,.25);display:flex;align-items:center;justify-content:center;color:#f3ead3;font-family:'Yuji Syuku',serif;font-size:56px;">{{ diceFace }}</div>
              <div style="font-size:14px;color:#5a4f3f;">{{ diceFormula }}</div>
              <div style="font-family:'Yuji Syuku',serif;font-size:17px;letter-spacing:6px;color:{{ diceVerdictColor }};">{{ diceVerdict }}</div>
            </div>
            <div style="display:flex;justify-content:center;gap:7px;flex-wrap:wrap;margin-bottom:14px;">
              <sc-for list="{{ diceTypes }}" as="dt">
                <button onClick="{{ dt.go }}" style="font-family:'Shippori Mincho',serif;font-size:13px;padding:7px 13px;border-radius:4px;cursor:pointer;border:{{ dt.border }};color:{{ dt.color }};background:{{ dt.bg }};">{{ dt.label }}</button>
              </sc-for>
            </div>
            <sc-if value="{{ diceIsCheck }}">
              <div style="display:flex;justify-content:center;gap:7px;flex-wrap:wrap;margin-bottom:16px;">
                <sc-for list="{{ diceSkills }}" as="sk">
                  <button onClick="{{ sk.go }}" style="font-family:'Shippori Mincho',serif;font-size:12px;padding:5px 11px;border-radius:3px;cursor:pointer;border:{{ sk.border }};color:{{ sk.color }};background:{{ sk.bg }};">{{ sk.label }}</button>
                </sc-for>
              </div>
            </sc-if>
            <button onClick="{{ rollNow }}" style="display:inline-flex;align-items:center;gap:10px;padding:12px 30px;border:0;border-radius:6px;cursor:pointer;background:linear-gradient(180deg,#b13a2a,#8f2c1f);color:#f3ead3;font-family:'Shippori Mincho',serif;font-weight:700;font-size:15px;letter-spacing:2px;box-shadow:0 10px 24px -8px rgba(143,44,31,.5);">卜を立てる</button>
            <div style="margin-top:26px;text-align:left;">
              <p style="font-size:11px;letter-spacing:3px;color:#8f2c1f;margin:0 0 9px;">帳面の記録</p>
              <sc-for list="{{ logRows }}" as="r">
                <div style="display:flex;justify-content:space-between;font-size:13px;color:#3f372b;padding:7px 0;border-bottom:1px dotted rgba(90,79,63,.3);"><span>{{ r.left }}</span><span style="color:{{ r.color }};">{{ r.right }}</span></div>
              </sc-for>
            </div>
          </div>
        </sc-if>

        <sc-if value="{{ isCombat }}" hint-placeholder-val="{{ false }}">
          <div style="animation:scfade .4s ease;max-width:780px;margin:0 auto;">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;">
              <h1 style="font-family:'Yuji Syuku',serif;font-weight:400;font-size:26px;margin:0;color:#211c16;">{{ kokuTitle }}</h1>

<script>
/*
 * Claude Design の x-dc テンプレート（sc-if / sc-for / {{ 変数 }} / onClick）を
 * そのまま解釈して描画するミニランタイム。support.js（React ベースのプレビュー用）の代替。
 * 状態変更のたびにテンプレート全体を再構築する（プロトタイプの再レンダーと同等）。

  function compile(expr) {

    });
  }
  function build(nodes, scope, parent) {
    for (var i = 0; i < nodes.length; i++) {
      var node = nodes[i];

        parent.appendChild(document.createTextNode(interpolate(node.nodeValue, scope)));
        continue;
      }
      if (node.nodeType !== Node.ELEMENT_NODE) continue;
      var tag = node.localName;
      if (tag === 'sc-if') {
        var cond = single(node.getAttribute('value'));
        if (cond && evalExpr(cond, scope)) build(node.childNodes, scope, parent);
        continue;
      }
      if (tag === 'sc-for') {
        var listExpr = single(node.getAttribute('list'));
        var as = node.getAttribute('as') || 'item';
        var list = (listExpr && evalExpr(listExpr, scope)) || [];
        for (var j = 0; j < list.length; j++) {
          var child = Object.assign({}, scope);
          child[as] = list[j];
          build(node.childNodes, child, parent);
        }
        continue;
      }
      var el = document.createElementNS(node.namespaceURI, tag);
      for (var k = 0; k < node.attributes.length; k++) {
        var attr = node.attributes[k];
        if (attr.name.indexOf('hint-placeholder') === 0) continue;

          var handlerExpr = single(attr.value);

/*
 * 全作品共通のゲームエンジン。ダイス・d20判定・localStorage 永続化と、
 * シェル（DCLogic コンポーネント）へのゲーム状態の合流（attach）を担う。
 * 作品ごとの中身（シナリオ・画面の値）は games/<id>.game.js が window.__GAME__ に定義する。
 */
(function () {
  function rollDie(sides) {
    return 1 + Math.floor(Math.random() * sides);
  }
  function pickKeys(obj, keys) {
    var o = {};
    for (var i = 0; i < keys.length; i++) o[keys[i]] = obj[keys[i]];
    return o;
  }
  window.GameEngine = {
    rollDie: rollDie,
    clamp: function (v, lo, hi) {
      return Math.max(lo, Math.min(hi, v));
    },
    // d20 判定。20 は大成功、1 は大失敗（出目優先）
    check: function (mod, dc) {
      var die = rollDie(20);
      var total = die + mod;
      var outcome = die === 20 ? 'crit' : die === 1 ? 'fumble' : total >= dc ? 'success' : 'fail';
      return { die: die, mod: mod, total: total, dc: dc, outcome: outcome, ok: outcome === 'crit' || outcome === 'success' };
    },
    outcomeText: function (outcome) {
      return { crit: '大成功', success: '成功', fail: '失敗', fumble: '大失敗' }[outcome] || '';
    },
    attach: function (app, game) {
      var key = 'trpg-game-' + game.id;
      var saved = null;
      try { saved = JSON.parse(localStorage.getItem(key) || 'null'); } catch (e) {}
      Object.assign(app.state, game.initialState(), saved || {});
      if (game.migrate) game.migrate(app.state);
      var baseRenderVals = app.renderVals.bind(app);
      app.renderVals = function () {
        var vals = baseRenderVals();
        return Object.assign(vals, game.vals(app, vals));
      };
      var baseSetState = app.setState.bind(app);
      app.setState = function (update) {
        baseSetState(update);
        try { localStorage.setItem(key, JSON.stringify(pickKeys(app.state, game.persist))); } catch (e) {}
      };
      // ゲーム状態のみ初期値へ戻す（device / play / screen は保持）
      app._resetGame = function () {
        try { localStorage.removeItem(key); } catch (e) {}
        Object.assign(app.state, game.initialState());
        app.render();
      };
    },
  };
})();

        return typeof b === 'string' ? { isP: true, isQ: false, t: b } : { isP: false, isQ: true, t: b.q };
      });
      out.storyHasNote = !!st.storyNote;
      out.storyNote = st.storyNote || '';
      out.storyNoteColor = st.storyNoteColor || '#5a4f3f';
      out.storyPct = node.pct;
      out.storyPctLabel = node.end ? '第七號 ・ 結' : '第七號 ・ ' + node.pct + '% 了';
      out.storyCanRestart = st.storyNode !== 's1';
      out.storyRestart = function () { app._resetGame(); };

      function choose(c) {
        return function () {
          var patch = { storyNote: null, storyNoteColor: '#5a4f3f' };
          var target = c.to;
          if (c.check) {
            var dc = typeof c.check.dc === 'function' ? c.check.dc(st) : c.check.dc;
            var r = E.check(c.check.mod, dc);
            patch.storyNote = c.check.name + 'の卜 — 骰〈' + r.die + '〉＋' + r.mod + ' ＝ ' + r.total + ' ／ 難度' + dc + ' ・ ' + outcomeKanji(r.outcome);
            patch.storyNoteColor = r.ok ? '#5a7a4a' : '#8f2c1f';
            pushLog(st, '紗那 ・ ' + c.check.name + '（怪異録）', r.total + ' ／ ' + outcomeShort(r.outcome), r.ok ? '#5a7a4a' : '#8f2c1f');
            patch.rollLog = st.rollLog;
            target = r.ok ? c.success : c.fail;
          }
          var nextNode = NODES[target];
          applyFx(st, nextNode.fx, patch);
          // 気力が尽きたら「泥の味」、正気が尽きたら「水鏡」へ
          var kiNow = 'kiSana' in patch ? patch.kiSana : st.kiSana;
          var sanNow = 'san' in patch ? patch.san : st.san;
          if (kiNow <= 0 && !nextNode.end) {
            target = 'E_down';
            applyFx(st, NODES.E_down.fx, patch);
          } else if (sanNow <= 0 && !nextNode.end) {
            target = 'E_mad';
            applyFx(st, NODES.E_mad.fx, patch);
          }
          patch.storyNode = target;
          app.setState(patch);
        };
      }
      var defs = node.end ? END_CHOICES : node.choices;
      out.storyChoices = defs.filter(function (c) {
        return !c.if || c.if(st);
      }).map(function (c) {
        var dc = c.check ? (typeof c.check.dc === 'function' ? c.check.dc(st) : c.check.dc) : null;
        return {
          pre: c.pre, skillText: c.skillText || '', post: c.post || '',
          dcLabel: dc != null ? '難度' + dc : '',
          go: c.restart ? function () { app._resetGame(); }
            : c.top ? function () { app.setState({ screen: 'top' }); }
            : choose(c),
        };
      });

      // ── 差配 ──
      out.gmScenes = GM_SCENES.map(function (t, i) {
        var active = i === st.gmScene;
        return {
          t: t, tag: active ? '進行中' : '',
          go: function () { app.setState({ gmScene: i }); },
          border: active ? '1px solid #b13a2a' : '1px solid rgba(90,79,63,.3)',
          bg: active ? 'linear-gradient(90deg,rgba(177,58,42,.12),transparent)' : 'rgba(239,230,207,.5)',
          color: active ? '#211c16' : '#5a4f3f',
          weight: active ? '700' : '400',
        };
      });
      out.kegare = st.kegare;
      out.kegareMinus = function () { app.setState({ kegare: E.clamp(st.kegare - 5, 0, 100) }); };
      out.kegarePlus = function () { app.setState({ kegare: E.clamp(st.kegare + 5, 0, 100) }); };
      out.gmHasTable = !!st.gmTable;
      out.gmTableD = st.gmTable ? st.gmTable.d : '';
      out.gmTableText = st.gmTable ? st.gmTable.text : '';
      out.rollTable = function () {
        var d = E.rollDie(6);
        var text = GM_TABLE[d - 1];
        pushLog(st, '差配 ・ 乱表（沼の兆し）', d + ' ／ ' + text, '#8f2c1f');
        app.setState({ gmTable: { d: d, text: text }, rollLog: st.rollLog });
      };

      return out;
    },
  };
})();

window.__dcApp = new Component();
if (typeof GameEngine !== 'undefined' && window.__GAME__) GameEngine.attach(window.__dcApp, window.__GAME__);
window.__dcApp.mount(document.getElementById('app'), document.getElementById('dc-template'));
</script>
