<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>魔法少女コールセンター</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700;900&family=Shippori+Mincho:wght@500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  body{margin:0;background:#141019;}
  @keyframes scfade{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:none}}
  @keyframes ringpulse{0%,100%{box-shadow:0 0 0 0 rgba(224,68,124,.35)}50%{box-shadow:0 0 0 8px rgba(224,68,124,0)}}
  @keyframes blinkled{0%,100%{opacity:.35}50%{opacity:1}}
  @keyframes stampin{0%{transform:rotate(6deg) scale(1.6);opacity:0}60%{transform:rotate(-2deg) scale(.97);opacity:1}100%{transform:rotate(-2deg) scale(1)}}
  ::-webkit-scrollbar{width:10px;height:10px}
  ::-webkit-scrollbar-thumb{background:rgba(224,68,124,.35);border-radius:8px}
  ::-webkit-scrollbar-track{background:transparent}
</style>
</head>
<body>
<div id="app"></div>
<template id="dc-template">
<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:34px 20px 96px;box-sizing:border-box;font-family:'Zen Kaku Gothic New',sans-serif;background:radial-gradient(120% 95% at 50% 0%,#221a2e 0%,#141019 58%,#0d0a11 100%);color:#2d2438;">

  <div style="position:relative;width:{{ frameW }}px;height:{{ frameH }}px;max-width:100%;background:#faf7fb;border:1px solid #e6dbe8;border-radius:8px;box-shadow:0 34px 90px -22px rgba(0,0,0,.75),0 0 0 8px rgba(10,7,13,.55);overflow:hidden;display:flex;flex-direction:column;">

    <div style="position:absolute;inset:0;pointer-events:none;background-image:radial-gradient(circle at 90% 4%,rgba(224,68,124,.05),transparent 32%),repeating-linear-gradient(0deg,rgba(45,36,56,.015) 0 1px,transparent 1px 30px);"></div>

    <header style="position:relative;z-index:2;display:flex;align-items:center;justify-content:space-between;gap:14px;padding:12px 22px;border-bottom:2px solid #e0447c;background:linear-gradient(180deg,#ffffff,#f7eef4);">
      <div style="display:flex;align-items:center;gap:12px;">
        <span style="display:inline-flex;align-items:center;justify-content:center;width:30px;height:30px;flex:none;border-radius:50%;background:#e0447c;color:#fff;font-weight:900;font-size:14px;animation:ringpulse 2.4s ease-in-out infinite;">☎</span>
        <div>
          <div style="font-size:9px;letter-spacing:2px;color:#93829b;display:{{ taglineDisp }};">魔法少女統括機構 市民対応部 ・ 第3コンタクトセンター</div>
          <div style="display:flex;align-items:baseline;gap:10px;">
            <span style="font-weight:900;font-size:{{ titleSize }}px;letter-spacing:2px;color:#2d2438;white-space:nowrap;">魔法少女コールセンター</span>
            <span style="font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:1px;color:#e0447c;display:{{ enDisp }};">MAGICAL GIRL SUPPORT DESK</span>
          </div>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:10px;">
        <span style="font-size:12px;letter-spacing:1px;color:#93829b;display:{{ playLabelDisp }};white-space:nowrap;">{{ playLabel }}</span>
        <span style="display:inline-flex;align-items:center;gap:6px;font-family:'IBM Plex Mono',monospace;font-size:11px;padding:4px 10px;border:1px solid rgba(224,68,124,.4);border-radius:999px;color:#e0447c;background:rgba(224,68,124,.05);white-space:nowrap;"><span style="width:7px;height:7px;border-radius:50%;background:#e0447c;animation:blinkled 1.2s ease-in-out infinite;"></span>待呼 12件</span>
      </div>
    </header>

    <div style="position:relative;z-index:2;flex:1;display:flex;min-height:0;">

      <sc-if value="{{ showRail }}" hint-placeholder-val="{{ true }}">
        <nav style="width:{{ railW }}px;flex:none;border-right:1px solid rgba(224,68,124,.18);background:linear-gradient(180deg,rgba(224,68,124,.03),transparent);padding:15px 10px;display:flex;flex-direction:column;gap:3px;overflow-y:auto;">
          <sc-for list="{{ nav }}" as="item" hint-placeholder-count="8">
            <button onClick="{{ item.go }}" style="display:flex;align-items:center;gap:11px;width:100%;padding:9px 11px;border:0;border-radius:8px;cursor:pointer;text-align:left;background:{{ item.bg }};color:{{ item.color }};font-family:'Zen Kaku Gothic New',sans-serif;font-size:14px;font-weight:{{ item.weight }};">
              <span style="width:22px;height:22px;flex:none;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;border-radius:50%;background:{{ item.badgeBg }};color:{{ item.badgeColor }};border:{{ item.badgeBorder }};">{{ item.badge }}</span>
              <span style="{{ item.labelStyle }}">{{ item.label }}</span>
            </button>
          </sc-for>
        </nav>
      </sc-if>

      <main style="flex:1;min-width:0;overflow-y:auto;padding:{{ mainPad }};">

        <sc-if value="{{ isTop }}" hint-placeholder-val="{{ true }}">
          <div data-screen-label="受電状況" style="animation:scfade .4s ease;max-width:760px;margin:0 auto;">
            <p style="font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:2px;color:#93829b;margin:0 0 7px;">夜勤シフト ・ 22:00–06:00 ・ 本日の変身事案 3件</p>
            <h1 style="font-weight:900;font-size:31px;line-height:1.4;margin:0 0 14px;color:#2d2438;">お電話ありがとうございます。<br>魔法少女に関する窓口です。</h1>
            <p style="font-size:15px;line-height:2.0;color:#54465f;margin:0 0 10px;max-width:58ch;">街を守る魔法少女たち。しかし変身の閃光は眩しく、戦闘の余波でビルは壊れ、必殺技の名前は深夜には少しうるさい。ここは市民からの<b style="color:#e0447c;">苦情・相談・応援</b>をすべて受け止める窓口——そして時々、<b style="color:#7a5a9e;">魔法少女本人から泣きながら掛かってくる</b>、世界でいちばん忙しい電話番号です。</p>
            <p style="font-size:12px;color:#b3a3ba;margin:0 0 24px;">※応対品質（CSAT）は世界の平和度に直結します。理由はまだ解明されていません。</p>

            <div style="border:1px solid rgba(224,68,124,.3);border-radius:10px;overflow:hidden;margin:0 0 26px;background:#fff;">
              <div style="padding:9px 14px;background:rgba(224,68,124,.06);border-bottom:1px solid rgba(224,68,124,.2);font-size:11px;font-weight:700;letter-spacing:2px;color:#e0447c;">■ 入電キュー（リアルタイム）</div>
              <div style="display:grid;grid-template-columns:.8fr 1.5fr .9fr .7fr;font-size:11px;color:#93829b;border-bottom:1px solid rgba(224,68,124,.15);background:rgba(45,36,56,.02);"><span style="padding:7px 14px;font-weight:700;">受付ID</span><span style="padding:7px 14px;border-left:1px solid rgba(224,68,124,.1);font-weight:700;">用件</span><span style="padding:7px 14px;border-left:1px solid rgba(224,68,124,.1);font-weight:700;">種別</span><span style="padding:7px 14px;border-left:1px solid rgba(224,68,124,.1);font-weight:700;">待ち</span></div>
              <div style="display:grid;grid-template-columns:.8fr 1.5fr .9fr .7fr;font-size:13px;color:#2d2438;border-bottom:1px dashed rgba(224,68,124,.18);"><span style="padding:9px 14px;font-family:'IBM Plex Mono',monospace;color:#e0447c;">#4471</span><span style="padding:9px 14px;border-left:1px solid rgba(224,68,124,.06);font-weight:700;">変身の閃光で防犯カメラが全滅した（商店会長）</span><span style="padding:9px 14px;border-left:1px solid rgba(224,68,124,.06);color:#c65448;">苦情</span><span style="padding:9px 14px;border-left:1px solid rgba(224,68,124,.06);font-family:'IBM Plex Mono',monospace;color:#c65448;">08:12</span></div>
              <div style="display:grid;grid-template-columns:.8fr 1.5fr .9fr .7fr;font-size:13px;color:#2d2438;border-bottom:1px dashed rgba(224,68,124,.18);"><span style="padding:9px 14px;font-family:'IBM Plex Mono',monospace;color:#e0447c;">#4472</span><span style="padding:9px 14px;border-left:1px solid rgba(224,68,124,.06);font-weight:700;">「必殺技の名前を一緒に考えてほしい」（本人・3年目）</span><span style="padding:9px 14px;border-left:1px solid rgba(224,68,124,.06);color:#7a5a9e;">本人相談</span><span style="padding:9px 14px;border-left:1px solid rgba(224,68,124,.06);font-family:'IBM Plex Mono',monospace;">02:40</span></div>
              <div style="display:grid;grid-template-columns:.8fr 1.5fr .9fr .7fr;font-size:13px;color:#2d2438;border-bottom:1px dashed rgba(224,68,124,.18);"><span style="padding:9px 14px;font-family:'IBM Plex Mono',monospace;color:#e0447c;">#4473</span><span style="padding:9px 14px;border-left:1px solid rgba(224,68,124,.06);font-weight:700;">孫が魔法少女に助けられた。礼を言いたいだけ（80代）</span><span style="padding:9px 14px;border-left:1px solid rgba(224,68,124,.06);color:#2f8a5c;">応援</span><span style="padding:9px 14px;border-left:1px solid rgba(224,68,124,.06);font-family:'IBM Plex Mono',monospace;">00:31</span></div>
              <div style="display:grid;grid-template-columns:.8fr 1.5fr .9fr .7fr;font-size:13px;color:#2d2438;"><span style="padding:9px 14px;font-family:'IBM Plex Mono',monospace;color:#c65448;">#4474</span><span style="padding:9px 14px;border-left:1px solid rgba(224,68,124,.06);font-weight:700;">「今から世界を滅ぼすが、その前に言っておきたい」</span><span style="padding:9px 14px;border-left:1px solid rgba(224,68,124,.06);color:#c65448;font-weight:700;">敵幹部</span><span style="padding:9px 14px;border-left:1px solid rgba(224,68,124,.06);font-family:'IBM Plex Mono',monospace;color:#c65448;">保留中</span></div>
            </div>

            <p style="font-size:11px;letter-spacing:3px;color:#e0447c;font-weight:700;margin:0 0 12px;">■ シフト形態を選択</p>
            <div style="display:grid;grid-template-columns:{{ modeCols }};gap:12px;margin:0 0 28px;">
              <sc-for list="{{ playModes }}" as="m" hint-placeholder-count="3">
                <button onClick="{{ m.go }}" style="text-align:left;padding:14px 15px;border-radius:10px;cursor:pointer;border:{{ m.border }};background:{{ m.bg }};">
                  <div style="font-size:14px;font-weight:700;color:{{ m.titleColor }};margin-bottom:5px;">{{ m.t }}</div>
                  <div style="font-size:12px;line-height:1.7;color:#93829b;">{{ m.d }}</div>
                </button>
              </sc-for>
            </div>

            <button onClick="{{ goStory }}" style="display:inline-flex;align-items:center;gap:10px;padding:13px 30px;border:0;border-radius:999px;cursor:pointer;background:#e0447c;color:#fff;font-weight:900;font-size:15px;letter-spacing:3px;box-shadow:0 5px 0 #a82f5b;white-space:nowrap;">ヘッドセットを装着　➜</button>
          </div>
        </sc-if>

        <sc-if value="{{ isSheet }}" hint-placeholder-val="{{ false }}">
          <div data-screen-label="オペレーター名鑑" style="animation:scfade .4s ease;max-width:820px;margin:0 auto;">
            <div style="display:flex;gap:20px;align-items:flex-start;flex-wrap:wrap;margin-bottom:20px;">
              <div style="width:88px;height:110px;flex:none;border:1px solid rgba(224,68,124,.4);border-radius:8px;background:repeating-linear-gradient(45deg,rgba(224,68,124,.07) 0 6px,transparent 6px 12px),#fff;display:flex;align-items:center;justify-content:center;font-size:9px;letter-spacing:1px;color:#b3a3ba;text-align:center;">社員証写真<br>（ヘッドセット可）</div>
              <div style="flex:1;min-width:240px;">
                <p style="font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:2px;color:#93829b;margin:0 0 4px;">オペレーターID OP-0093 ・ 市民対応部 人事ファイル</p>
                <h1 style="font-weight:900;font-size:28px;margin:0 0 4px;color:#2d2438;">虹口 すず</h1>
                <p style="font-size:13px;color:#93829b;margin:0 0 10px;">夜勤オペレーター ・ 勤続4年 ・ 二十六歳 ・ 元・魔法少女（引退済）</p>
                <div style="display:flex;gap:7px;flex-wrap:wrap;">
                  <span style="font-size:11px;padding:3px 9px;border-radius:999px;border:1px solid rgba(224,68,124,.4);color:#54465f;">聞き上手</span>
                  <span style="font-size:11px;padding:3px 9px;border-radius:999px;border:1px solid rgba(224,68,124,.4);color:#54465f;">保留音の作曲担当</span>
                  <span style="font-size:11px;padding:3px 9px;border-radius:999px;border:1px solid rgba(122,90,158,.5);color:#7a5a9e;">変身資格：失効（本人談）</span>
                </div>
              </div>
            </div>

            <div style="display:grid;grid-template-columns:{{ modeCols }};gap:13px;margin-bottom:22px;">
              <div style="background:#fff;border:1px solid rgba(224,68,124,.2);border-radius:10px;padding:11px 13px;"><div style="display:flex;justify-content:space-between;font-size:12px;color:#93829b;margin-bottom:5px;"><span>声量（体力）</span><span style="font-family:'IBM Plex Mono',monospace;">{{ seiryo }} / 15</span></div><div style="height:9px;border-radius:6px;background:rgba(45,36,56,.06);overflow:hidden;"><div style="width:{{ seiryoPct }}%;height:100%;background:#e0447c;"></div></div><div style="display:flex;gap:5px;margin-top:6px;"><button onClick="{{ seiryoDown }}" style="width:24px;height:24px;border:1px solid rgba(224,68,124,.3);border-radius:8px;background:#fff;color:#93829b;cursor:pointer;font-size:13px;line-height:1;">−</button><button onClick="{{ seiryoUp }}" style="width:24px;height:24px;border:1px solid rgba(224,68,124,.3);border-radius:8px;background:#fff;color:#93829b;cursor:pointer;font-size:13px;line-height:1;">＋</button></div></div>
              <div style="background:#fff;border:1px solid rgba(224,68,124,.2);border-radius:10px;padding:11px 13px;"><div style="display:flex;justify-content:space-between;font-size:12px;color:#93829b;margin-bottom:5px;"><span>共感ゲージ</span><span style="font-family:'IBM Plex Mono',monospace;">{{ kyokan }} / 10</span></div><div style="height:9px;border-radius:6px;background:rgba(45,36,56,.06);overflow:hidden;"><div style="width:{{ kyokanPct }}%;height:100%;background:#7a5a9e;"></div></div><div style="font-size:9px;color:#b3a3ba;margin-top:4px;">※満タンで「もらい泣き」発動。応対+3、記録は涙で滲む</div><div style="display:flex;gap:5px;margin-top:6px;"><button onClick="{{ kyokanDown }}" style="width:24px;height:24px;border:1px solid rgba(224,68,124,.3);border-radius:8px;background:#fff;color:#93829b;cursor:pointer;font-size:13px;line-height:1;">−</button><button onClick="{{ kyokanUp }}" style="width:24px;height:24px;border:1px solid rgba(224,68,124,.3);border-radius:8px;background:#fff;color:#93829b;cursor:pointer;font-size:13px;line-height:1;">＋</button></div></div>
              <div style="background:#fff;border:1px solid rgba(224,68,124,.2);border-radius:10px;padding:11px 13px;"><div style="display:flex;justify-content:space-between;font-size:12px;color:#93829b;margin-bottom:5px;"><span>魔力残量（元職）</span><span style="font-family:'IBM Plex Mono',monospace;color:#e0447c;">{{ maryoku }}%</span></div><div style="height:9px;border-radius:6px;background:rgba(45,36,56,.06);overflow:hidden;"><div style="width:{{ maryoku }}%;height:100%;background:linear-gradient(90deg,#e0447c,#7a5a9e);"></div></div><div style="font-size:9px;color:#b3a3ba;margin-top:4px;">※引退時に返納したはず。なぜか3%だけ、戻ってくる</div></div>
            </div>

            <p style="font-size:11px;letter-spacing:3px;color:#e0447c;font-weight:700;margin:0 0 12px;">■ 能力</p>
            <div style="display:grid;grid-template-columns:repeat({{ abilityCols }},1fr);gap:0;border:1px solid rgba(224,68,124,.3);border-radius:10px;overflow:hidden;margin-bottom:24px;background:#fff;">
              <div style="padding:10px 4px;text-align:center;border-right:1px solid rgba(224,68,124,.12);background:rgba(224,68,124,.04);"><div style="font-size:10px;color:#e0447c;">傾聴</div><div style="font-family:'IBM Plex Mono',monospace;font-size:23px;font-weight:600;color:#e0447c;line-height:1.25;">17</div><div style="font-size:10px;color:#2f8a5c;">＋3</div></div>
              <div style="padding:10px 4px;text-align:center;border-right:1px solid rgba(224,68,124,.12);"><div style="font-size:10px;color:#93829b;">話術</div><div style="font-family:'IBM Plex Mono',monospace;font-size:23px;font-weight:600;color:#2d2438;line-height:1.25;">14</div><div style="font-size:10px;color:#2f8a5c;">＋2</div></div>
              <div style="padding:10px 4px;text-align:center;border-right:1px solid rgba(224,68,124,.12);"><div style="font-size:10px;color:#93829b;">規程知識</div><div style="font-family:'IBM Plex Mono',monospace;font-size:23px;font-weight:600;color:#2d2438;line-height:1.25;">13</div><div style="font-size:10px;color:#2f8a5c;">＋1</div></div>
              <div style="padding:10px 4px;text-align:center;border-right:1px solid rgba(224,68,124,.12);"><div style="font-size:10px;color:#93829b;">タイピング</div><div style="font-family:'IBM Plex Mono',monospace;font-size:23px;font-weight:600;color:#2d2438;line-height:1.25;">15</div><div style="font-size:10px;color:#2f8a5c;">＋2</div></div>
              <div style="padding:10px 4px;text-align:center;border-right:1px solid rgba(224,68,124,.12);"><div style="font-size:10px;color:#93829b;">胆力</div><div style="font-family:'IBM Plex Mono',monospace;font-size:23px;font-weight:600;color:#2d2438;line-height:1.25;">11</div><div style="font-size:10px;color:#93829b;">±0</div></div>
              <div style="padding:10px 4px;text-align:center;"><div style="font-size:10px;color:#93829b;">魔法知識</div><div style="font-family:'IBM Plex Mono',monospace;font-size:23px;font-weight:600;color:#2d2438;line-height:1.25;">16</div><div style="font-size:10px;color:#2f8a5c;">＋3（実務経験）</div></div>
            </div>

            <div style="display:grid;grid-template-columns:{{ twoCols }};gap:24px;">
              <div>
                <p style="font-size:11px;letter-spacing:3px;color:#e0447c;font-weight:700;margin:0 0 10px;">■ 技能</p>
                <div style="display:flex;justify-content:space-between;font-size:14px;color:#54465f;padding:6px 0;border-bottom:1px dashed rgba(224,68,124,.22);"><span>怒りの初期消火（最初の15秒）</span><span style="font-family:'IBM Plex Mono',monospace;color:#2f8a5c;">+6</span></div>
                <div style="display:flex;justify-content:space-between;font-size:14px;color:#54465f;padding:6px 0;border-bottom:1px dashed rgba(224,68,124,.22);"><span>魔法用語の平易な言い換え</span><span style="font-family:'IBM Plex Mono',monospace;color:#2f8a5c;">+5</span></div>
                <div style="display:flex;justify-content:space-between;font-size:14px;color:#54465f;padding:6px 0;border-bottom:1px dashed rgba(224,68,124,.22);"><span>保留にしない勇気</span><span style="font-family:'IBM Plex Mono',monospace;color:#2f8a5c;">+4</span></div>
                <div style="display:flex;justify-content:space-between;font-size:14px;color:#54465f;padding:6px 0;"><span>自分の過去を話す</span><span style="font-family:'IBM Plex Mono',monospace;color:#c65448;">−3（避けがち）</span></div>
              </div>
              <div>
                <p style="font-size:11px;letter-spacing:3px;color:#e0447c;font-weight:700;margin:0 0 10px;">■ 特性</p>
                <div style="border:1px solid rgba(224,68,124,.25);border-radius:10px;padding:11px 13px;margin-bottom:9px;background:#fff;"><div style="font-size:13px;font-weight:700;color:#2d2438;margin-bottom:3px;">声だけで正体がわかる</div><div style="font-size:12px;line-height:1.7;color:#93829b;">電話越しの声で、相手が変身中か、変身前か、泣くのを我慢しているかがわかる。元同業ゆえ。</div></div>
                <div style="border:1px solid rgba(122,90,158,.4);border-radius:10px;padding:11px 13px;background:rgba(122,90,158,.04);"><div style="font-size:13px;font-weight:700;color:#7a5a9e;margin-bottom:3px;">残り3%の使い道</div><div style="font-size:12px;line-height:1.7;color:#93829b;">一晩に一度だけ、電話越しに小さな魔法を送れる。眠れない子への子守唄程度。それ以上は、もう。</div></div>
              </div>
            </div>
            <p style="margin-top:22px;font-size:13px;line-height:1.9;color:#93829b;border-left:3px solid rgba(224,68,124,.4);padding-left:14px;">SV評価コメント：「引退の経緯は本人から聞かないこと。ただし#4472のような『本人相談』は、必ず虹口さんに回すこと。」</p>
          </div>
        </sc-if>

        <sc-if value="{{ isDice }}" hint-placeholder-val="{{ false }}">
          <div data-screen-label="応対判定" style="animation:scfade .4s ease;max-width:560px;margin:0 auto;text-align:center;">
            <p style="font-size:11px;letter-spacing:3px;color:#e0447c;font-weight:700;margin:0 0 4px;">{{ diceHead }}</p>
            <sc-if value="{{ diceIsCheck }}">
              <div style="display:flex;justify-content:center;align-items:center;gap:9px;margin:6px 0 0;">
                <button onClick="{{ dcMinus }}" style="width:24px;height:24px;border:1px solid rgba(224,68,124,.3);border-radius:8px;background:#fff;color:#93829b;cursor:pointer;font-size:13px;line-height:1;">−</button>
                <span style="font-size:12px;letter-spacing:2px;color:#93829b;">目標を調整</span>
                <button onClick="{{ dcPlus }}" style="width:24px;height:24px;border:1px solid rgba(224,68,124,.3);border-radius:8px;background:#fff;color:#93829b;cursor:pointer;font-size:13px;line-height:1;">＋</button>

            <div style="display:flex;flex-direction:column;align-items:center;gap:8px;margin:18px 0 24px;">

                <span style="font-size:10px;letter-spacing:2px;color:#93829b;">CSAT</span>
                <span style="font-family:'IBM Plex Mono',monospace;font-size:44px;font-weight:600;line-height:1.05;color:#2d2438;">{{ diceFace }}</span>
                <b style="display:inline-block;padding:1px 12px;border-radius:999px;background:{{ stampBg }};color:{{ stampColor }};font-size:12px;letter-spacing:1px;">{{ stampWord }}</b>
              </div>
              <div style="font-size:14px;color:#93829b;margin-top:6px;">{{ diceFormula }}</div>
              <div style="font-size:14px;letter-spacing:1px;color:{{ stampColor }};font-weight:700;">{{ diceVerdict }}</div>
              <p style="font-size:10px;color:#b3a3ba;margin:2px 0 0;">※出目1は「切電」。世界の平和度が0.3%下がり、SVが飛んでくる。</p>
            </div>
            <div style="display:flex;justify-content:center;gap:7px;flex-wrap:wrap;margin-bottom:14px;">
              <sc-for list="{{ diceTypes }}" as="dt">
                <button onClick="{{ dt.go }}" style="font-size:12px;font-family:'IBM Plex Mono',monospace;padding:7px 12px;border-radius:999px;cursor:pointer;border:{{ dt.border }};color:{{ dt.color }};background:{{ dt.bg }};font-weight:{{ dt.weight }};">{{ dt.label }}</button>
              </sc-for>
            </div>
            <sc-if value="{{ diceIsCheck }}">
              <div style="display:flex;justify-content:center;gap:7px;flex-wrap:wrap;margin-bottom:16px;">
                <sc-for list="{{ diceSkills }}" as="sk">
                  <button onClick="{{ sk.go }}" style="font-family:'Zen Kaku Gothic New',sans-serif;font-size:12px;padding:5px 11px;border-radius:999px;cursor:pointer;border:{{ sk.border }};color:{{ sk.color }};background:{{ sk.bg }};">{{ sk.label }}</button>
                </sc-for>
              </div>
            </sc-if>
            <button onClick="{{ rollNow }}" style="display:inline-flex;align-items:center;gap:10px;padding:12px 30px;border:0;border-radius:999px;cursor:pointer;background:#e0447c;color:#fff;font-weight:900;font-size:15px;letter-spacing:3px;font-family:'Zen Kaku Gothic New',sans-serif;box-shadow:0 5px 0 #a82f5b;white-space:nowrap;">応対を開始する</button>
            <div style="margin-top:26px;text-align:left;">
              <p style="font-size:11px;letter-spacing:3px;color:#e0447c;font-weight:700;margin:0 0 9px;">■ 本日の応対スコア</p>
              <sc-for list="{{ logRows }}" as="r">
                <div style="display:flex;justify-content:space-between;gap:10px;font-size:13px;color:#54465f;padding:7px 0;border-bottom:1px dashed rgba(224,68,124,.22);"><span>{{ r.left }}</span><span style="font-family:'IBM Plex Mono',monospace;color:{{ r.color }};flex:none;">{{ r.right }}</span></div>
              </sc-for>
            </div>
          </div>
        </sc-if>

        <sc-if value="{{ isCombat }}" hint-placeholder-val="{{ false }}">
          <div data-screen-label="入電の嵐" style="animation:scfade .4s ease;max-width:780px;margin:0 auto;">
            <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:6px;">
              <h1 style="font-weight:900;font-size:24px;margin:0;color:#2d2438;">入電の嵐 ・ 駅前に怪人出現中</h1>
              <div style="display:flex;gap:8px;"><button onClick="{{ notifyAll }}" style="padding:8px 15px;border:1px solid rgba(224,68,124,.35);border-radius:999px;background:#fff;color:#93829b;cursor:pointer;font-size:13px;font-family:'Zen Kaku Gothic New',sans-serif;white-space:nowrap;flex:none;">全員に周知</button><button onClick="{{ nextCall }}" style="padding:8px 15px;border:0;border-radius:999px;background:#e0447c;color:#fff;cursor:pointer;font-weight:700;font-size:13px;font-family:'Zen Kaku Gothic New',sans-serif;box-shadow:0 4px 0 #a82f5b;white-space:nowrap;flex:none;">次の呼を取る</button></div>
            </div>
            <p style="font-size:12px;color:#b3a3ba;margin:0 0 14px;">※怪人出現中は入電が10倍。放棄呼が増えるほど街のパニックが進行します。電話で戦うタイプの戦闘です。</p>

            <div style="border:2px solid #c65448;border-radius:12px;padding:12px 14px;margin-bottom:14px;background:rgba(198,84,72,.03);">
              <div style="display:flex;align-items:baseline;justify-content:space-between;flex-wrap:wrap;gap:6px;margin-bottom:6px;"><span style="font-size:15px;font-weight:900;color:#c65448;">事案：駅前ロータリー怪人「シメキリの獣」</span><span style="font-family:'IBM Plex Mono',monospace;font-size:11px;color:#c65448;white-space:nowrap;">対応中：プリズム・ノヴァ（現地）</span></div>
              <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;">
                <div><div style="display:flex;justify-content:space-between;font-size:11px;color:#93829b;margin-bottom:3px;"><span>街のパニック度</span><span style="font-family:'IBM Plex Mono',monospace;">{{ panic }}/100</span></div><div style="height:8px;border-radius:5px;background:rgba(45,36,56,.06);overflow:hidden;"><div style="width:{{ panic }}%;height:100%;background:#c65448;"></div></div></div>
                <div><div style="display:flex;justify-content:space-between;font-size:11px;color:#93829b;margin-bottom:3px;"><span>待呼</span><span style="font-family:'IBM Plex Mono',monospace;">{{ machiko }}件</span></div><div style="height:8px;border-radius:5px;background:rgba(45,36,56,.06);overflow:hidden;"><div style="width:{{ machikoPct }}%;height:100%;background:#e0447c;"></div></div></div>
                <div><div style="display:flex;justify-content:space-between;font-size:11px;color:#93829b;margin-bottom:3px;"><span>ノヴァの魔力</span><span style="font-family:'IBM Plex Mono',monospace;">{{ novaMp }}%</span></div><div style="height:8px;border-radius:5px;background:rgba(45,36,56,.06);overflow:hidden;"><div style="width:{{ novaMp }}%;height:100%;background:#7a5a9e;"></div></div></div>
              </div>
            </div>

            <p style="font-size:11px;letter-spacing:3px;color:#e0447c;font-weight:700;margin:0 0 10px;">■ 回線状況（手番順）</p>
            <sc-for list="{{ lines }}" as="ln">
              <div style="display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:12px;border:{{ ln.border }};background:{{ ln.bg }};margin-bottom:8px;opacity:{{ ln.op }};"><span style="width:30px;height:30px;flex:none;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:13px;background:{{ ln.numBg }};color:{{ ln.numColor }};border-radius:50%;">{{ ln.num }}</span><div style="flex:1;min-width:0;"><div style="font-size:15px;font-weight:700;color:{{ ln.titleColor }};">{{ ln.title }} <span style="font-size:11px;color:{{ ln.tagColor }};">{{ ln.tag }}</span></div><div style="display:flex;gap:5px;margin-top:3px;flex-wrap:wrap;"><span style="font-size:10px;padding:2px 8px;border-radius:999px;background:{{ ln.noteBg }};color:{{ ln.noteColor }};">{{ ln.note }}</span></div></div><div style="width:150px;flex:none;"><div style="display:flex;justify-content:space-between;font-size:11px;color:#93829b;margin-bottom:3px;"><span>{{ ln.gauge }}</span><span style="font-family:'IBM Plex Mono',monospace;">{{ ln.value }}</span></div><div style="height:8px;border-radius:5px;background:rgba(45,36,56,.06);overflow:hidden;"><div style="width:{{ ln.pct }}%;height:100%;background:{{ ln.barColor }};"></div></div>
                <div style="display:flex;gap:4px;margin-top:5px;justify-content:flex-end;"><button onClick="{{ ln.dec }}" style="font-size:10px;padding:2px 6px;border:1px solid rgba(224,68,124,.3);border-radius:8px;background:#fff;color:#2f8a5c;cursor:pointer;">進める</button><button onClick="{{ ln.inc }}" style="font-size:10px;padding:2px 6px;border:1px solid rgba(224,68,124,.3);border-radius:8px;background:#fff;color:#c65448;cursor:pointer;">戻す</button></div>
              </div></div>
            </sc-for>
          </div>
        </sc-if>

        <sc-if value="{{ isInv }}" hint-placeholder-val="{{ false }}">
          <div data-screen-label="ナレッジ" style="animation:scfade .4s ease;max-width:820px;margin:0 auto;">
            <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:18px;">
              <h1 style="font-weight:900;font-size:24px;margin:0;color:#2d2438;">ナレッジベース ・ 応対ツール</h1>
              <span style="font-family:'IBM Plex Mono',monospace;font-size:12px;color:#93829b;white-space:nowrap;">スクリプト登録数 412件</span>
            </div>
            <div style="display:grid;grid-template-columns:{{ invCols }};gap:22px;">
              <div>
                <p style="font-size:11px;letter-spacing:3px;color:#e0447c;font-weight:700;margin:0 0 11px;">■ 装備（デスク周り）</p>
                <div style="padding:12px 14px;border:1px solid rgba(224,68,124,.25);border-radius:10px;margin-bottom:8px;background:#fff;"><div style="display:flex;justify-content:space-between;gap:8px;"><div style="font-size:14px;font-weight:700;color:#2d2438;">ヘッドセット（退魔加工済）</div><span style="font-size:10px;color:#2f8a5c;font-family:'IBM Plex Mono',monospace;flex:none;">装備中</span></div><div style="font-size:12px;color:#93829b;margin-top:3px;line-height:1.7;">呪詛系クレームの精神ダメージを50%軽減。月一で聖水拭き上げ。</div></div>
                <div style="padding:12px 14px;border:1px solid rgba(224,68,124,.25);border-radius:10px;margin-bottom:8px;background:#fff;"><div style="display:flex;justify-content:space-between;gap:8px;"><div style="font-size:14px;font-weight:700;color:#2d2438;">エスカレーションボタン（赤）</div><span style="font-size:10px;color:#a5851f;font-family:'IBM Plex Mono',monospace;flex:none;">使用は慎重に</span></div><div style="font-size:12px;color:#93829b;margin-top:3px;line-height:1.7;">押すとSVが来る。二度押しすると統括機構の偉い人が来る。三度押した者はまだいない。</div></div>
                <div style="padding:12px 14px;border:1px solid rgba(122,90,158,.4);border-radius:10px;background:rgba(122,90,158,.04);"><div style="display:flex;justify-content:space-between;gap:8px;align-items:center;"><div style="font-size:14px;font-weight:700;color:#7a5a9e;">私物のマグカップ</div><span style="display:flex;align-items:center;gap:8px;"><sc-if value="{{ mugSilent }}"><button onClick="{{ talkToMug }}" style="font-size:10px;padding:2px 10px;border:1px solid rgba(122,90,158,.5);border-radius:999px;background:#fff;color:#7a5a9e;cursor:pointer;">話しかけてみる</button></sc-if><span style="font-size:10px;color:#7a5a9e;font-family:'IBM Plex Mono',monospace;flex:none;">魔力反応：微</span></span></div><div style="font-size:12px;color:#93829b;margin-top:3px;line-height:1.7;">{{ mugText }}</div></div>
              </div>
              <div>
                <p style="font-size:11px;letter-spacing:3px;color:#e0447c;font-weight:700;margin:0 0 11px;">■ よく使うスクリプト</p>
                <div style="border:1px solid rgba(224,68,124,.25);border-radius:10px;padding:10px 13px;margin-bottom:8px;background:#fff;"><div style="display:flex;justify-content:space-between;gap:8px;font-size:13px;color:#2d2438;"><span style="font-weight:700;">KB-012 変身閃光への謝罪と補償案内</span><span style="font-family:'IBM Plex Mono',monospace;color:#e0447c;flex:none;">使用率 高</span></div><div style="font-size:11px;color:#93829b;margin-top:2px;">「眩しさはお守りの光でもあります」の一文で満足度が平均+2。</div></div>
                <div style="border:1px solid rgba(224,68,124,.25);border-radius:10px;padding:10px 13px;margin-bottom:8px;background:#fff;"><div style="display:flex;justify-content:space-between;gap:8px;font-size:13px;color:#2d2438;"><span style="font-weight:700;">KB-077 本人相談（進路・引退）</span><span style="font-family:'IBM Plex Mono',monospace;color:#7a5a9e;flex:none;">担当指定</span></div><div style="font-size:11px;color:#93829b;margin-top:2px;">スクリプトなし。「マニュアルを読まずに聞くこと」とだけ書いてある。</div></div>
                <div style="border:1px solid rgba(224,68,124,.25);border-radius:10px;padding:10px 13px;margin-bottom:8px;background:#fff;"><div style="display:flex;justify-content:space-between;gap:8px;font-size:13px;color:#2d2438;"><span style="font-weight:700;">KB-101 敵組織からの入電</span><span style="font-family:'IBM Plex Mono',monospace;color:#c65448;flex:none;">改訂中</span></div><div style="font-size:11px;color:#93829b;margin-top:2px;">「世界滅亡の予告は、まず日時と場所を復唱して確認」——復唱すると、だいたい向こうが恥ずかしくなってやめる。</div></div>
                <div style="border:2px solid rgba(224,68,124,.5);border-radius:10px;padding:10px 13px;background:rgba(224,68,124,.03);"><div style="display:flex;justify-content:space-between;gap:8px;font-size:13px;color:#2d2438;"><span style="font-weight:700;">KB-000 最初のマニュアル（初代直筆）</span><span style="font-family:'IBM Plex Mono',monospace;color:#e0447c;flex:none;">閲覧注意</span></div><div style="font-size:11px;color:#e0447c;margin-top:2px;">一行だけ。「電話を取った人が、その子の味方です」</div></div>
                <div style="margin-top:14px;border:1px solid rgba(224,68,124,.3);border-radius:10px;padding:13px 15px;background:#fff;"><div style="font-size:13px;font-weight:700;color:#2d2438;margin-bottom:5px;">SVメモ</div><div style="font-size:12px;line-height:1.8;color:#93829b;">スクリプトは盾であって台本ではない。読み上げた瞬間、相手には伝わります。</div></div>
              </div>
            </div>
          </div>
        </sc-if>

        <sc-if value="{{ isStory }}" hint-placeholder-val="{{ false }}">
          <div data-screen-label="通話ログ" style="animation:scfade .4s ease;max-width:640px;margin:0 auto;">
            <p style="font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:2px;color:#93829b;text-align:center;margin:0 0 6px;">{{ storyKicker }}</p>
            <h1 style="font-family:'Shippori Mincho',serif;font-weight:800;font-size:28px;text-align:center;margin:0 0 4px;color:#2d2438;">{{ storyTitle }}</h1>
            <div style="display:flex;align-items:center;gap:12px;margin:16px 0 22px;color:#e0447c;"><span style="flex:1;height:1px;background:rgba(224,68,124,.35);"></span><span style="font-size:12px;">☎</span><span style="flex:1;height:1px;background:rgba(224,68,124,.35);"></span></div>
            <sc-if value="{{ storyHasNote }}">
              <p style="text-align:center;font-size:13px;letter-spacing:1px;color:{{ storyNoteColor }};margin:0 0 16px;">{{ storyNote }}</p>
            </sc-if>
            <sc-for list="{{ storyBlocks }}" as="b">
              <sc-if value="{{ b.isP }}"><p style="font-family:'Shippori Mincho',serif;font-size:16px;line-height:2.1;color:#3c3246;margin:0 0 18px;">{{ b.t }}</p></sc-if>
              <sc-if value="{{ b.isQ }}"><blockquote style="margin:22px 0;padding:14px 20px;border-left:3px solid #e0447c;background:rgba(224,68,124,.03);font-family:'Shippori Mincho',serif;font-size:16px;line-height:1.9;color:#54465f;">{{ b.t }}</blockquote></sc-if>
            </sc-for>
            <p style="font-size:11px;letter-spacing:3px;color:#e0447c;font-weight:700;margin:0 0 12px;">■ どう応対する</p>
            <sc-for list="{{ storyChoices }}" as="c">
              <button onClick="{{ c.go }}" style="display:block;width:100%;text-align:left;padding:13px 16px;margin-bottom:9px;border:1px solid rgba(224,68,124,.35);border-radius:10px;background:#fff;cursor:pointer;font-family:'Zen Kaku Gothic New',sans-serif;font-size:14px;color:#3c3246;">{{ c.num }}　{{ c.pre }}<span style="color:#7a5a9e;font-weight:700;">{{ c.skillText }}</span>{{ c.post }} <span style="float:right;color:#7a5a9e;font-weight:700;">{{ c.dcLabel }}</span></button>
            </sc-for>
            <div style="margin-top:24px;height:5px;border-radius:3px;background:rgba(45,36,56,.06);overflow:hidden;"><div style="width:{{ storyPct }}%;height:100%;background:#e0447c;"></div></div>
            <p style="text-align:center;font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:2px;color:#b3a3ba;margin:7px 0 0;">{{ storyPctLabel }}</p>
            <sc-if value="{{ storyCanRestart }}">
              <p style="text-align:center;margin:16px 0 0;"><button onClick="{{ storyRestart }}" style="border:0;background:transparent;color:#b3a3ba;font-size:11px;letter-spacing:2px;cursor:pointer;text-decoration:underline;font-family:'Zen Kaku Gothic New',sans-serif;">通話ログを最初からやり直す</button></p>
            </sc-if>
          </div>
        </sc-if>

        <sc-if value="{{ isMap }}" hint-placeholder-val="{{ false }}">
          <div data-screen-label="管轄マップ" style="animation:scfade .4s ease;max-width:840px;margin:0 auto;">
            <h1 style="font-weight:900;font-size:24px;margin:0 0 4px;color:#2d2438;">管轄マップ ・ 入電ヒートマップ</h1>
            <p style="font-size:12px;color:#b3a3ba;margin:0 0 16px;">濃いピンク＝入電集中。魔法少女の配置と苦情の発生は、だいたい同じ場所で起きる。</p>
            <div style="display:grid;grid-template-columns:{{ mapCols }};gap:20px;">
              <div style="position:relative;height:340px;border:1px solid rgba(224,68,124,.35);border-radius:10px;background:repeating-linear-gradient(0deg,rgba(224,68,124,.03) 0 1px,transparent 1px 28px),repeating-linear-gradient(90deg,rgba(224,68,124,.03) 0 1px,transparent 1px 28px),#fff;overflow:hidden;">
                <div style="position:absolute;left:8%;top:10%;width:38%;height:30%;border:2px solid #c65448;border-radius:10px;background:radial-gradient(circle at 50% 50%,rgba(198,84,72,.15),rgba(198,84,72,.03));padding:7px 10px;box-sizing:border-box;"><div style="font-size:12px;font-weight:900;color:#c65448;">駅前ロータリー ⚠</div><div style="font-size:10px;color:#93829b;margin-top:2px;">怪人出現中 ・ 入電の68%がここ<br>担当:プリズム・ノヴァ（現地）</div></div>
                <div style="position:absolute;right:8%;top:12%;width:34%;height:26%;border:2px solid rgba(224,68,124,.45);border-radius:10px;background:rgba(224,68,124,.05);padding:7px 10px;box-sizing:border-box;"><div style="font-size:12px;font-weight:700;color:#e0447c;">商店街</div><div style="font-size:10px;color:#93829b;margin-top:2px;">防犯カメラ感光事案 ・ 補償手続き中</div></div>
                <div style="position:absolute;left:8%;bottom:12%;width:34%;height:26%;border:2px solid rgba(122,90,158,.5);border-radius:10px;background:rgba(122,90,158,.05);padding:7px 10px;box-sizing:border-box;"><div style="font-size:12px;font-weight:700;color:#7a5a9e;">住宅地（夜間）</div><div style="font-size:10px;color:#93829b;margin-top:2px;">「必殺技の声量」苦情が微増<br>22時以降は囁き変身を推奨中</div></div>
                <div style="position:absolute;right:8%;bottom:10%;width:38%;height:30%;border:2px dashed rgba(147,130,155,.5);border-radius:10px;background:rgba(45,36,56,.02);padding:7px 10px;box-sizing:border-box;opacity:.9;"><div style="font-size:12px;font-weight:700;color:#7d7086;">旧・変身ポイント（廃止）</div><div style="font-size:10px;color:#b3a3ba;margin-top:2px;">三年前まで使われていた給水塔。<br>すずが最後に変身した場所。入電はもう、ない。</div></div>
                <div style="position:absolute;left:47%;top:44%;display:flex;flex-direction:column;align-items:center;gap:3px;"><span style="width:16px;height:16px;border-radius:50%;background:#e0447c;border:2px solid #fff;box-shadow:0 0 0 4px rgba(224,68,124,.2);animation:ringpulse 2s ease-in-out infinite;"></span><span style="font-size:10px;color:#e0447c;font-weight:700;">当センター</span></div>
                <div style="position:absolute;right:10px;bottom:8px;font-size:10px;letter-spacing:1px;color:#b3a3ba;">入電密度 ・ 22:00–23:00</div>
              </div>
              <div>

<script>
/*
 * Claude Design の x-dc テンプレート（sc-if / sc-for / {{ 変数 }} / onClick）を
 * そのまま解釈して描画するミニランタイム。support.js（React ベースのプレビュー用）の代替。
 * 状態変更のたびにテンプレート全体を再構築する（プロトタイプの再レンダーと同等）。
 */
(function () {
  var cache = new Map();
  function compile(expr) {
    var fn = cache.get(expr);
    if (!fn) {
      fn = new Function('__s', 'with(__s){return(' + expr + ');}');
      cache.set(expr, fn);
    }
    return fn;
  }
  function evalExpr(expr, scope) {
    return compile(expr)(scope);
  }
  // "{{ expr }}" 単体の属性値から式を取り出す
  function single(text) {
    var m = /^\s*\{\{\s*([\s\S]+?)\s*\}\}\s*$/.exec(text || '');
    return m ? m[1] : null;
  }
  function interpolate(text, scope) {
    if (text.indexOf('{{') === -1) return text;
    return text.replace(/\{\{\s*([\s\S]+?)\s*\}\}/g, function (_, expr) {
      var v = evalExpr(expr, scope);
      return v == null ? '' : String(v);
    });
  }
  function build(nodes, scope, parent) {
    for (var i = 0; i < nodes.length; i++) {
      var node = nodes[i];
      if (node.nodeType === Node.TEXT_NODE) {
        parent.appendChild(document.createTextNode(interpolate(node.nodeValue, scope)));
        continue;
      }
      if (node.nodeType !== Node.ELEMENT_NODE) continue;
      var tag = node.localName;
      if (tag === 'sc-if') {
        var cond = single(node.getAttribute('value'));
        if (cond && evalExpr(cond, scope)) build(node.childNodes, scope, parent);
        continue;
      }
      if (tag === 'sc-for') {
        var listExpr = single(node.getAttribute('list'));
        var as = node.getAttribute('as') || 'item';
        var list = (listExpr && evalExpr(listExpr, scope)) || [];
        for (var j = 0; j < list.length; j++) {
          var child = Object.assign({}, scope);
          child[as] = list[j];
          build(node.childNodes, child, parent);
        }
        continue;
      }
      var el = document.createElementNS(node.namespaceURI, tag);
      for (var k = 0; k < node.attributes.length; k++) {
        var attr = node.attributes[k];
        if (attr.name.indexOf('hint-placeholder') === 0) continue;
        if (attr.name === 'onclick') {
          var handlerExpr = single(attr.value);
          var fn = handlerExpr ? evalExpr(handlerExpr, scope) : null;
          if (typeof fn === 'function') el.addEventListener('click', fn);
          continue;
        }
        el.setAttribute(attr.name, interpolate(attr.value, scope));
      }
      build(node.childNodes, scope, el);
      parent.appendChild(el);
    }
  }
  window.DCLogic = class DCLogic {
    mount(rootEl, templateEl) {
      this._root = rootEl;
      this._tpl = templateEl.content;
      this.render();
    }
    setState(update) {
      var patch = typeof update === 'function' ? update(this.state) : update;
      Object.assign(this.state, patch);
      this.render();
    }
    render() {
      var scope = this.renderVals();
      var frag = document.createDocumentFragment();
      build(this._tpl.childNodes, scope, frag);
      this._root.replaceChildren(frag);
    }
  };
})();

class Component extends DCLogic {
  state = { device: 'desktop', play: 'gmpl', screen: 'top' };

  renderVals() {
    const { device, play, screen } = this.state;

      isTop: screen === 'top', isSheet: screen === 'sheet', isDice: screen === 'dice',

      isMap: screen === 'map', isGM: screen === 'gm',

/*
 * 全作品共通のゲームエンジン。ダイス・d20判定・localStorage 永続化と、
 * シェル（DCLogic コンポーネント）へのゲーム状態の合流（attach）を担う。
 * 作品ごとの中身（シナリオ・画面の値）は games/<id>.game.js が window.__GAME__ に定義する。
 */
(function () {
  function rollDie(sides) {
    return 1 + Math.floor(Math.random() * sides);
  }
  function pickKeys(obj, keys) {
    var o = {};
    for (var i = 0; i < keys.length; i++) o[keys[i]] = obj[keys[i]];
    return o;
  }
  window.GameEngine = {
    rollDie: rollDie,
    clamp: function (v, lo, hi) {
      return Math.max(lo, Math.min(hi, v));
    },
    // d20 判定。20 は大成功、1 は大失敗（出目優先）
    check: function (mod, dc) {
      var die = rollDie(20);
      var total = die + mod;
      var outcome = die === 20 ? 'crit' : die === 1 ? 'fumble' : total >= dc ? 'success' : 'fail';
      return { die: die, mod: mod, total: total, dc: dc, outcome: outcome, ok: outcome === 'crit' || outcome === 'success' };
    },
    outcomeText: function (outcome) {
      return { crit: '大成功', success: '成功', fail: '失敗', fumble: '大失敗' }[outcome] || '';
    },
    attach: function (app, game) {
      var key = 'trpg-game-' + game.id;
      var saved = null;
      try { saved = JSON.parse(localStorage.getItem(key) || 'null'); } catch (e) {}
      Object.assign(app.state, game.initialState(), saved || {});
      if (game.migrate) game.migrate(app.state);
      var baseRenderVals = app.renderVals.bind(app);
      app.renderVals = function () {
        var vals = baseRenderVals();
        return Object.assign(vals, game.vals(app, vals));
      };
      var baseSetState = app.setState.bind(app);
      app.setState = function (update) {
        baseSetState(update);
        try { localStorage.setItem(key, JSON.stringify(pickKeys(app.state, game.persist))); } catch (e) {}
      };
      // ゲーム状態のみ初期値へ戻す（device / play / screen は保持）
      app._resetGame = function () {
        try { localStorage.removeItem(key); } catch (e) {}
        Object.assign(app.state, game.initialState());
        app.render();
      };
    },
  };
})();

/*
 * 1k-魔法少女コールセンター のゲーム内容。
 * - 応対判定: d4〜d100。d20 判定はCSAT（大変満足〜切電）で結果を示す。出目1は特殊な「切電」
 * - オペレーター名鑑: 声量（体力） / 共感ゲージ / 魔力残量 の増減
 * - 入電の嵐: 4本の回線を並行して「進める／戻す」トラッカー。共有の街のパニック度も表示
 * - ナレッジ: 「私物のマグカップ」だけ話しかけられ、応じると隠しダイアログが読める
 * - 通話ログ: 分岐シナリオ「必殺技の名前が、決められない」（声量・共感ゲージルール・複数エンディング）。
 *   GM 秘匿（敵幹部の正体＝初代魔法少女）とすず自身の過去（技名「また明日」）を回収する真ルートあり
 * - SV席: 幕切替・世界の平和度・入電ハプニング表 d6
 */
(function () {
  var E = null;
  function eng() { return E || (E = window.GameEngine); }

  var SEIRYO_MAX = 15, KYOKAN_MAX = 10;

  var SKILLS = [
    { name: '怒りの初期消火（最初の15秒）', mod: 6 },
    { name: '魔法用語の平易な言い換え', mod: 5 },
    { name: '保留にしない勇気', mod: 4 },
    { name: '自分の過去を話す', mod: -3 },
    { name: '傾聴', mod: 3 },
  ];
  var DICE_SIDES = [4, 6, 8, 10, 12, 20, 100];

  // CSAT: 出目1は「切電」。それ以外は総合値に応じて満足度が変化
  function csatInfo(r) {
    if (r.die === 1) return { word: '切電', color: '#c65448', bg: 'rgba(198,84,72,.14)', verdict: '＝ ' + r.total + ' ・ ガチャ切りされた。世界の平和度が0.3%下がる' };
    if (r.total >= r.dc + 6) return { word: '大変満足', color: '#2f8a5c', bg: 'rgba(47,138,92,.12)', verdict: '＝ ' + r.total + ' ・ 相手の心が、電話越しでも動いた' };
    if (r.total >= r.dc) return { word: '満足', color: '#2f8a5c', bg: 'rgba(47,138,92,.12)', verdict: '＝ ' + r.total + ' ・ 無事に着地。良い応対だった' };
    if (r.total >= r.dc - 4) return { word: '「もう少し考える」', color: '#a5851f', bg: 'rgba(201,168,46,.14)', verdict: '＝ ' + r.total + ' ・ 結論は持ち越し。次のコールへ' };
    return { word: '不満', color: '#c65448', bg: 'rgba(198,84,72,.14)', verdict: '＝ ' + r.total + ' ・ 手応えのないまま通話終了' };
  }

  var LINE_DEFS = [
    { key: 'novaLine', num: 1, title: 'すず ⇄ プリズム・ノヴァ（現地から入電）', gauge: '共感ゲージ', max: 10, unit: '', tag: '通話中 04:22', tagColor: '#e0447c', note: '「弱点がわからない、調べて」', noteBg: 'rgba(122,90,158,.1)', noteColor: '#7a5a9e', titleColor: '#2d2438', border: '2px solid #e0447c', bg: 'rgba(224,68,124,.04)', numBg: '#e0447c', numColor: '#fff', barColor: '#7a5a9e' },

          numBg: d.numBg, numColor: d.numColor, barColor: d.barColor,
          gauge: d.gauge, value: v + d.unit, pct: Math.round((v / d.max) * 100),
          dec: adj(goodDir), inc: adj(-goodDir),
        };
      });

      // ── ナレッジ ──
      out.mugSilent = !st.items.mugTalked;
      out.mugText = st.items.mugTalked ? MUG_TEXT_TALK : MUG_TEXT;
      out.talkToMug = function () {
        var items = Object.assign({}, st.items);
        items.mugTalked = 1;
        app.setState({ items: items });
      };

      // ── 通話ログ ──
      var node = NODES[st.storyNode] || NODES.k1;
      out.storyKicker = node.kicker;
      out.storyTitle = node.title;
      out.storyBlocks = node.text.map(function (b) {
        return typeof b === 'string' ? { isP: true, isQ: false, t: b } : { isP: false, isQ: true, t: b.q };
      });
      out.storyHasNote = !!st.storyNote;
      out.storyNote = st.storyNote || '';
      out.storyNoteColor = st.storyNoteColor || '#93829b';
      out.storyPct = node.pct;
      out.storyPctLabel = node.end
        ? '通話終了 ・ 通話ログ 結審'
        : '通話 ' + (28 + Math.round(node.pct / 4)) + ':11 ・ 共感ゲージ ' + st.kyokan + '/10';
      out.storyCanRestart = st.storyNode !== 'k1';
      out.storyRestart = function () { app._resetGame(); };

      function choose(c) {
        return function () {
          var patch = { storyNote: null, storyNoteColor: '#93829b' };
          var target = c.to;
          if (c.check) {
            var dc = typeof c.check.dc === 'function' ? c.check.dc(st) : c.check.dc;
            var r = E.check(c.check.mod, dc);
            patch.storyNote = c.check.name + '判定 — d20〈' + r.die + '〉＋' + r.mod + ' ＝ ' + r.total + ' ／ 難度' + dc + ' ・ ' + (r.ok ? '成功' : '失敗');
            patch.storyNoteColor = r.ok ? '#2f8a5c' : '#c65448';
            pushLog(st, 'すず ・ ' + c.check.name + '（通話ログ）', r.total + ' ／ ' + (r.ok ? '成功' : '失敗'), r.ok ? '#2f8a5c' : '#c65448');
            patch.rollLog = st.rollLog;
            target = r.ok ? c.success : c.fail;
          }
          var nextNode = NODES[target];
          applyFx(st, nextNode.fx, patch);
          var seiryoNow = 'seiryo' in patch ? patch.seiryo : st.seiryo;
          var kyokanNow = 'kyokan' in patch ? patch.kyokan : st.kyokan;
          if (seiryoNow <= 0 && !nextNode.end) {
            target = 'E_voice_gone';
            applyFx(st, NODES.E_voice_gone.fx, patch);
          } else if (kyokanNow <= 0 && !nextNode.end) {
            target = 'E_shutdown';
            applyFx(st, NODES.E_shutdown.fx, patch);
          }
          patch.storyNode = target;
          app.setState(patch);
        };
      }
      var defs = node.end ? END_CHOICES : node.choices;
      out.storyChoices = defs.filter(function (c) {
        return !c.if || c.if(st);
      }).map(function (c) {
        var dc = c.check ? (typeof c.check.dc === 'function' ? c.check.dc(st) : c.check.dc) : null;
        return {
          num: c.num || '', pre: c.pre, skillText: c.skillText || '', post: c.post || '',
          dcLabel: dc != null ? '難度' + dc : '',
          go: c.restart ? function () { app._resetGame(); }
            : c.top ? function () { app.setState({ screen: 'top' }); }
            : choose(c),
        };
      });

      // ── SV席 ──
      out.gmScenes = GM_SCENES.map(function (t, i) {
        var active = i === st.gmScene;
        return {
          t: t, tag: active ? '進行中' : '',
          go: function () { app.setState({ gmScene: i }); },
          border: active ? '2px solid #e0447c' : '1px solid rgba(224,68,124,.3)',
          bg: active ? 'rgba(224,68,124,.04)' : '#fff',
          color: active ? '#2d2438' : '#93829b',
          weight: active ? '700' : '400',
        };
      });
      out.heiwa = st.heiwa;
      out.heiwaMinus = function () { app.setState({ heiwa: E.clamp(st.heiwa - 1, 0, 100) }); };
      out.heiwaPlus = function () { app.setState({ heiwa: E.clamp(st.heiwa + 1, 0, 100) }); };
      out.gmHasTable = !!st.gmTable;
      out.gmTableD = st.gmTable ? st.gmTable.d : '';
      out.gmTableText = st.gmTable ? st.gmTable.text : '';
      out.rollTable = function () {
        var d = E.rollDie(6);
        var text = GM_TABLE[d - 1];
        pushLog(st, 'SV ・ 入電ハプニング表', d + ' ／ ' + text, '#e0447c');
        app.setState({ gmTable: { d: d, text: text }, rollLog: st.rollLog });
      };

      return out;
    },
  };
})();

window.__dcApp = new Component();
if (typeof GameEngine !== 'undefined' && window.__GAME__) GameEngine.attach(window.__dcApp, window.__GAME__);
window.__dcApp.mount(document.getElementById('app'), document.getElementById('dc-template'));
</script>
