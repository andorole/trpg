<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>転生前人間ドック</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700;900&family=Shippori+Mincho:wght@500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  body{margin:0;background:#0e181b;}
  @keyframes scfade{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:none}}
  @keyframes pulseline{0%,100%{opacity:.5}50%{opacity:1}}
  @keyframes stampin{0%{transform:rotate(6deg) scale(1.6);opacity:0}60%{transform:rotate(-2deg) scale(.97);opacity:1}100%{transform:rotate(-2deg) scale(1)}}
  ::-webkit-scrollbar{width:10px;height:10px}
  ::-webkit-scrollbar-thumb{background:rgba(58,158,140,.35);border-radius:8px}
  ::-webkit-scrollbar-track{background:transparent}
</style>
</head>
<body>
<div id="app"></div>
<template id="dc-template">
<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:34px 20px 96px;box-sizing:border-box;font-family:'Zen Kaku Gothic New',sans-serif;background:radial-gradient(120% 95% at 50% 0%,#15262b 0%,#0e181b 58%,#090f12 100%);color:#28343a;">

  <div style="position:relative;width:{{ frameW }}px;height:{{ frameH }}px;max-width:100%;background:#f6fafa;border:1px solid #d3e2e2;border-radius:6px;box-shadow:0 34px 90px -22px rgba(0,0,0,.75),0 0 0 8px rgba(7,11,13,.55);overflow:hidden;display:flex;flex-direction:column;">

    <div style="position:absolute;inset:0;pointer-events:none;background-image:repeating-linear-gradient(0deg,rgba(58,158,140,.03) 0 1px,transparent 1px 32px);"></div>

    <header style="position:relative;z-index:2;display:flex;align-items:center;justify-content:space-between;gap:14px;padding:12px 22px;border-bottom:2px solid #3a9e8c;background:linear-gradient(180deg,#ffffff,#eff6f5);">
      <div style="display:flex;align-items:center;gap:12px;">
        <span style="display:inline-flex;align-items:center;justify-content:center;width:30px;height:30px;flex:none;border-radius:6px;background:#3a9e8c;color:#fff;font-weight:900;font-size:14px;">魂</span>
        <div>
          <div style="font-size:9px;letter-spacing:2px;color:#7e948f;display:{{ taglineDisp }};">彼岸医療法人 輪廻会 ・ 転生前総合健診センター</div>
          <div style="display:flex;align-items:baseline;gap:10px;">
            <span style="font-weight:900;font-size:{{ titleSize }}px;letter-spacing:2px;color:#28343a;white-space:nowrap;">魂の人間ドック</span>
            <span style="font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:1px;color:#3a9e8c;display:{{ enDisp }};">PRE-REINCARNATION CHECKUP</span>
          </div>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:10px;">
        <span style="font-size:12px;letter-spacing:1px;color:#7e948f;display:{{ playLabelDisp }};white-space:nowrap;">{{ playLabel }}</span>
        <span style="font-family:'IBM Plex Mono',monospace;font-size:11px;padding:4px 10px;border:1px solid rgba(58,158,140,.4);border-radius:3px;color:#3a9e8c;background:rgba(58,158,140,.05);white-space:nowrap;">受付番号 め-042</span>
      </div>
    </header>

    <div style="position:relative;z-index:2;flex:1;display:flex;min-height:0;">

      <sc-if value="{{ showRail }}" hint-placeholder-val="{{ true }}">
        <nav style="width:{{ railW }}px;flex:none;border-right:1px solid rgba(58,158,140,.2);background:linear-gradient(180deg,rgba(58,158,140,.04),transparent);padding:15px 10px;display:flex;flex-direction:column;gap:3px;overflow-y:auto;">
          <sc-for list="{{ nav }}" as="item" hint-placeholder-count="8">
            <button onClick="{{ item.go }}" style="display:flex;align-items:center;gap:11px;width:100%;padding:9px 11px;border:0;border-radius:6px;cursor:pointer;text-align:left;background:{{ item.bg }};color:{{ item.color }};font-family:'Zen Kaku Gothic New',sans-serif;font-size:14px;font-weight:{{ item.weight }};">
              <span style="width:22px;height:22px;flex:none;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;border-radius:6px;background:{{ item.badgeBg }};color:{{ item.badgeColor }};border:{{ item.badgeBorder }};">{{ item.badge }}</span>
              <span style="{{ item.labelStyle }}">{{ item.label }}</span>
            </button>
          </sc-for>
        </nav>
      </sc-if>

      <main style="flex:1;min-width:0;overflow-y:auto;padding:{{ mainPad }};">

        <sc-if value="{{ isTop }}" hint-placeholder-val="{{ true }}">
          <div data-screen-label="受付" style="animation:scfade .4s ease;max-width:760px;margin:0 auto;">
            <p style="font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:2px;color:#7e948f;margin:0 0 7px;">本日の健診 ・ 死後7日目コース ・ 午前の部</p>
            <h1 style="font-weight:900;font-size:31px;line-height:1.4;margin:0 0 14px;color:#28343a;">お亡くなりになった皆さま、<br>まずは検査着にお着替えください。</h1>
            <p style="font-size:15px;line-height:2.0;color:#48575c;margin:0 0 10px;max-width:58ch;">転生には健康な魂が必要です。当センターでは、来世に旅立つ前の魂を対象に、徳値・業値・未練残量などの<b style="color:#3a9e8c;">14項目精密健診</b>を実施しています。結果はその場で帳票にてお渡しし、<b style="color:#c9722e;">判定C以下の項目は処置室にて清算</b>となります。</p>
            <p style="font-size:12px;color:#9fb2ad;margin:0 0 24px;">※本日の飲食はお控えください（もう不要のはずですが、癖で召し上がる方が多いため）。</p>

            <div style="border:1px solid rgba(58,158,140,.3);border-radius:8px;overflow:hidden;margin:0 0 26px;background:#fff;">
              <div style="padding:9px 14px;background:rgba(58,158,140,.07);border-bottom:1px solid rgba(58,158,140,.2);font-size:11px;font-weight:700;letter-spacing:2px;color:#3a9e8c;">■ 本日の受診予定（午前）</div>
              <div style="display:grid;grid-template-columns:.7fr 1.2fr 1fr 1fr;font-size:11px;color:#7e948f;border-bottom:1px solid rgba(58,158,140,.15);background:rgba(40,52,58,.02);"><span style="padding:7px 14px;font-weight:700;">受付</span><span style="padding:7px 14px;border-left:1px solid rgba(58,158,140,.1);font-weight:700;">魂名（享年）</span><span style="padding:7px 14px;border-left:1px solid rgba(58,158,140,.1);font-weight:700;">死因</span><span style="padding:7px 14px;border-left:1px solid rgba(58,158,140,.1);font-weight:700;">状態</span></div>
              <div style="display:grid;grid-template-columns:.7fr 1.2fr 1fr 1fr;font-size:13px;color:#28343a;border-bottom:1px dashed rgba(58,158,140,.2);"><span style="padding:9px 14px;font-family:'IBM Plex Mono',monospace;color:#3a9e8c;">め-042</span><span style="padding:9px 14px;border-left:1px solid rgba(58,158,140,.06);font-weight:700;">春日野 誠（68）</span><span style="padding:9px 14px;border-left:1px solid rgba(58,158,140,.06);">そば湯の飲みすぎ（本人談）</span><span style="padding:9px 14px;border-left:1px solid rgba(58,158,140,.06);color:#3a9e8c;font-weight:700;">問診中</span></div>
              <div style="display:grid;grid-template-columns:.7fr 1.2fr 1fr 1fr;font-size:13px;color:#28343a;border-bottom:1px dashed rgba(58,158,140,.2);"><span style="padding:9px 14px;font-family:'IBM Plex Mono',monospace;color:#3a9e8c;">め-043</span><span style="padding:9px 14px;border-left:1px solid rgba(58,158,140,.06);font-weight:700;">凪 マチ（19）</span><span style="padding:9px 14px;border-left:1px solid rgba(58,158,140,.06);">非公開（本人希望）</span><span style="padding:9px 14px;border-left:1px solid rgba(58,158,140,.06);color:#c9722e;">採血待ち（緊張）</span></div>
              <div style="display:grid;grid-template-columns:.7fr 1.2fr 1fr 1fr;font-size:13px;color:#28343a;"><span style="padding:9px 14px;font-family:'IBM Plex Mono',monospace;color:#3a9e8c;">め-044</span><span style="padding:9px 14px;border-left:1px solid rgba(58,158,140,.06);font-weight:700;">初代・玉のれん（412）</span><span style="padding:9px 14px;border-left:1px solid rgba(58,158,140,.06);">寿命（のれんとして）</span><span style="padding:9px 14px;border-left:1px solid rgba(58,158,140,.06);color:#7e948f;">付喪神枠 ・ 特診</span></div>
            </div>

            <p style="font-size:11px;letter-spacing:3px;color:#3a9e8c;font-weight:700;margin:0 0 12px;">■ 受診形態を選択</p>
            <div style="display:grid;grid-template-columns:{{ modeCols }};gap:12px;margin:0 0 28px;">
              <sc-for list="{{ playModes }}" as="m" hint-placeholder-count="3">
                <button onClick="{{ m.go }}" style="text-align:left;padding:14px 15px;border-radius:8px;cursor:pointer;border:{{ m.border }};background:{{ m.bg }};">
                  <div style="font-size:14px;font-weight:700;color:{{ m.titleColor }};margin-bottom:5px;">{{ m.t }}</div>
                  <div style="font-size:12px;line-height:1.7;color:#7e948f;">{{ m.d }}</div>
                </button>
              </sc-for>
            </div>

            <button onClick="{{ goStory }}" style="display:inline-flex;align-items:center;gap:10px;padding:13px 30px;border:0;border-radius:8px;cursor:pointer;background:#3a9e8c;color:#fff;font-weight:900;font-size:15px;letter-spacing:3px;box-shadow:0 5px 0 #2a7568;white-space:nowrap;">受付を済ませる　➜</button>
          </div>
        </sc-if>

        <sc-if value="{{ isSheet }}" hint-placeholder-val="{{ false }}">
          <div data-screen-label="検査結果報告書" style="animation:scfade .4s ease;max-width:820px;margin:0 auto;">
            <div style="display:flex;gap:20px;align-items:flex-start;flex-wrap:wrap;margin-bottom:20px;">
              <div style="width:88px;height:110px;flex:none;border:1px solid rgba(58,158,140,.4);border-radius:6px;background:radial-gradient(circle at 50% 40%,rgba(58,158,140,.2),rgba(58,158,140,.04)),#fff;display:flex;align-items:center;justify-content:center;font-size:9px;letter-spacing:1px;color:#9fb2ad;text-align:center;">魂影写真<br>（透けます）</div>
              <div style="flex:1;min-width:240px;">
                <p style="font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:2px;color:#7e948f;margin:0 0 4px;">魂ID SOUL-1957-0042 ・ 転生前総合健診 結果報告書</p>
                <h1 style="font-weight:900;font-size:28px;margin:0 0 4px;color:#28343a;">春日野 誠 <span style="font-size:15px;font-weight:700;color:#7e948f;">様（故）</span></h1>
                <p style="font-size:13px;color:#7e948f;margin:0 0 10px;">享年68 ・ 前職：そば屋（三代目） ・ 輪廻歴：7周目 ・ 死後7日</p>
                <div style="display:flex;gap:7px;flex-wrap:wrap;">
                  <span style="font-size:11px;padding:3px 9px;border-radius:3px;border:1px solid rgba(58,158,140,.4);color:#48575c;">既往歴：前世でも蕎麦屋</span>
                  <span style="font-size:11px;padding:3px 9px;border-radius:3px;border:1px solid rgba(58,158,140,.4);color:#48575c;">アレルギー：不義理</span>
                  <span style="font-size:11px;padding:3px 9px;border-radius:3px;border:1px solid rgba(201,114,46,.5);color:#c9722e;">要観察：未練残量が基準値超</span>
                </div>
              </div>
            </div>

            <p style="font-size:11px;letter-spacing:3px;color:#3a9e8c;font-weight:700;margin:0 0 10px;">■ 検査結果（魂体基礎14項目より抜粋）</p>
            <div style="border:1px solid rgba(58,158,140,.3);border-radius:8px;overflow:hidden;margin-bottom:20px;background:#fff;">
              <div style="display:grid;grid-template-columns:1.4fr .8fr 1fr .6fr;font-size:11px;color:#7e948f;background:rgba(58,158,140,.06);border-bottom:1px solid rgba(58,158,140,.2);"><span style="padding:8px 14px;font-weight:700;">検査項目</span><span style="padding:8px 14px;border-left:1px solid rgba(58,158,140,.12);font-weight:700;">結果</span><span style="padding:8px 14px;border-left:1px solid rgba(58,158,140,.12);font-weight:700;">基準値</span><span style="padding:8px 14px;border-left:1px solid rgba(58,158,140,.12);font-weight:700;">判定</span></div>
              <div style="display:grid;grid-template-columns:1.4fr .8fr 1fr .6fr;font-size:13px;color:#28343a;border-bottom:1px dashed rgba(58,158,140,.18);align-items:center;"><span style="padding:9px 14px;">徳値（善行コレステロール）</span><span style="padding:9px 14px;border-left:1px solid rgba(58,158,140,.06);font-family:'IBM Plex Mono',monospace;font-weight:600;">{{ toku }}<button onClick="{{ tokuDown }}" style="margin-left:6px;width:24px;height:24px;border:1px solid rgba(58,158,140,.3);border-radius:6px;background:#fff;color:#7e948f;cursor:pointer;font-size:13px;line-height:1;">−</button><button onClick="{{ tokuUp }}" style="width:24px;height:24px;border:1px solid rgba(58,158,140,.3);border-radius:6px;background:#fff;color:#7e948f;cursor:pointer;font-size:13px;line-height:1;">＋</button></span><span style="padding:9px 14px;border-left:1px solid rgba(58,158,140,.06);font-family:'IBM Plex Mono',monospace;color:#7e948f;">80–160</span><span style="padding:6px 14px;border-left:1px solid rgba(58,158,140,.06);"><b style="display:inline-block;width:26px;height:26px;border-radius:50%;background:{{ tokuGradeBg }};color:{{ tokuGradeColor }};text-align:center;line-height:26px;">{{ tokuGrade }}</b></span></div>
              <div style="display:grid;grid-template-columns:1.4fr .8fr 1fr .6fr;font-size:13px;color:#28343a;border-bottom:1px dashed rgba(58,158,140,.18);align-items:center;"><span style="padding:9px 14px;">業値（カルマ γ-GTP）</span><span style="padding:9px 14px;border-left:1px solid rgba(58,158,140,.06);font-family:'IBM Plex Mono',monospace;font-weight:600;">{{ gou }}<button onClick="{{ gouDown }}" style="margin-left:6px;width:24px;height:24px;border:1px solid rgba(58,158,140,.3);border-radius:6px;background:#fff;color:#7e948f;cursor:pointer;font-size:13px;line-height:1;">−</button><button onClick="{{ gouUp }}" style="width:24px;height:24px;border:1px solid rgba(58,158,140,.3);border-radius:6px;background:#fff;color:#7e948f;cursor:pointer;font-size:13px;line-height:1;">＋</button></span><span style="padding:9px 14px;border-left:1px solid rgba(58,158,140,.06);font-family:'IBM Plex Mono',monospace;color:#7e948f;">0–50</span><span style="padding:6px 14px;border-left:1px solid rgba(58,158,140,.06);"><b style="display:inline-block;width:26px;height:26px;border-radius:50%;background:{{ gouGradeBg }};color:{{ gouGradeColor }};text-align:center;line-height:26px;">{{ gouGrade }}</b></span></div>
              <div style="display:grid;grid-template-columns:1.4fr .8fr 1fr .6fr;font-size:13px;color:#28343a;border-bottom:1px dashed rgba(58,158,140,.18);align-items:center;background:rgba(198,84,72,.03);"><span style="padding:9px 14px;font-weight:700;">未練残量</span><span style="padding:9px 14px;border-left:1px solid rgba(58,158,140,.06);font-family:'IBM Plex Mono',monospace;font-weight:600;color:#c65448;">{{ miren }}<button onClick="{{ mirenDown }}" style="margin-left:6px;width:24px;height:24px;border:1px solid rgba(58,158,140,.3);border-radius:6px;background:#fff;color:#7e948f;cursor:pointer;font-size:13px;line-height:1;">−</button><button onClick="{{ mirenUp }}" style="width:24px;height:24px;border:1px solid rgba(58,158,140,.3);border-radius:6px;background:#fff;color:#7e948f;cursor:pointer;font-size:13px;line-height:1;">＋</button></span><span style="padding:9px 14px;border-left:1px solid rgba(58,158,140,.06);font-family:'IBM Plex Mono',monospace;color:#7e948f;">0–120</span><span style="padding:6px 14px;border-left:1px solid rgba(58,158,140,.06);"><b style="display:inline-block;width:26px;height:26px;border-radius:50%;background:{{ mirenGradeBg }};color:{{ mirenGradeColor }};text-align:center;line-height:26px;">{{ mirenGrade }}</b></span></div>
              <div style="display:grid;grid-template-columns:1.4fr .8fr 1fr .6fr;font-size:13px;color:#28343a;border-bottom:1px dashed rgba(58,158,140,.18);align-items:center;"><span style="padding:9px 14px;">好奇心飽和度</span><span style="padding:9px 14px;border-left:1px solid rgba(58,158,140,.06);font-family:'IBM Plex Mono',monospace;font-weight:600;">88%</span><span style="padding:9px 14px;border-left:1px solid rgba(58,158,140,.06);font-family:'IBM Plex Mono',monospace;color:#7e948f;">60–100%</span><span style="padding:6px 14px;border-left:1px solid rgba(58,158,140,.06);"><b style="display:inline-block;width:26px;height:26px;border-radius:50%;background:rgba(62,164,110,.12);color:#2f8a5c;text-align:center;line-height:26px;">A</b></span></div>
              <div style="display:grid;grid-template-columns:1.4fr .8fr 1fr .6fr;font-size:13px;color:#28343a;border-bottom:1px dashed rgba(58,158,140,.18);align-items:center;"><span style="padding:9px 14px;">縁の血中濃度</span><span style="padding:9px 14px;border-left:1px solid rgba(58,158,140,.06);font-family:'IBM Plex Mono',monospace;font-weight:600;">高</span><span style="padding:9px 14px;border-left:1px solid rgba(58,158,140,.06);font-family:'IBM Plex Mono',monospace;color:#7e948f;">中〜高</span><span style="padding:6px 14px;border-left:1px solid rgba(58,158,140,.06);"><b style="display:inline-block;width:26px;height:26px;border-radius:50%;background:rgba(62,164,110,.12);color:#2f8a5c;text-align:center;line-height:26px;">A</b></span></div>
              <div style="display:grid;grid-template-columns:1.4fr .8fr 1fr .6fr;font-size:13px;color:#28343a;align-items:center;"><span style="padding:9px 14px;">記憶清算率</span><span style="padding:9px 14px;border-left:1px solid rgba(58,158,140,.06);font-family:'IBM Plex Mono',monospace;font-weight:600;color:#c9722e;">{{ seisan }}%<button onClick="{{ seisanDown }}" style="margin-left:6px;width:24px;height:24px;border:1px solid rgba(58,158,140,.3);border-radius:6px;background:#fff;color:#7e948f;cursor:pointer;font-size:13px;line-height:1;">−</button><button onClick="{{ seisanUp }}" style="width:24px;height:24px;border:1px solid rgba(58,158,140,.3);border-radius:6px;background:#fff;color:#7e948f;cursor:pointer;font-size:13px;line-height:1;">＋</button></span><span style="padding:9px 14px;border-left:1px solid rgba(58,158,140,.06);font-family:'IBM Plex Mono',monospace;color:#7e948f;">≧95%</span><span style="padding:6px 14px;border-left:1px solid rgba(58,158,140,.06);"><b style="display:inline-block;width:26px;height:26px;border-radius:50%;background:{{ seisanGradeBg }};color:{{ seisanGradeColor }};text-align:center;line-height:26px;">{{ seisanGrade }}</b></span></div>
            </div>

            <div style="display:grid;grid-template-columns:{{ twoCols }};gap:24px;">
              <div>
                <p style="font-size:11px;letter-spacing:3px;color:#3a9e8c;font-weight:700;margin:0 0 10px;">■ 技能（来世持越可否 審査済）</p>
                <div style="display:flex;justify-content:space-between;font-size:14px;color:#48575c;padding:6px 0;border-bottom:1px dashed rgba(58,158,140,.22);"><span>蕎麦打ち（三代分）</span><span style="font-family:'IBM Plex Mono',monospace;color:#2f8a5c;">持越可 +6</span></div>
                <div style="display:flex;justify-content:space-between;font-size:14px;color:#48575c;padding:6px 0;border-bottom:1px dashed rgba(58,158,140,.22);"><span>常連の顔を覚える</span><span style="font-family:'IBM Plex Mono',monospace;color:#2f8a5c;">持越可 +4</span></div>
                <div style="display:flex;justify-content:space-between;font-size:14px;color:#48575c;padding:6px 0;border-bottom:1px dashed rgba(58,158,140,.22);"><span>頑固</span><span style="font-family:'IBM Plex Mono',monospace;color:#a5851f;">条件付 −1/+3</span></div>
                <div style="display:flex;justify-content:space-between;font-size:14px;color:#48575c;padding:6px 0;"><span>そば湯の一気飲み</span><span style="font-family:'IBM Plex Mono',monospace;color:#c65448;">持越不可（死因）</span></div>
              </div>
              <div>
                <p style="font-size:11px;letter-spacing:3px;color:#3a9e8c;font-weight:700;margin:0 0 10px;">■ 医師所見</p>
                <div style="border:1px solid rgba(58,158,140,.3);border-radius:8px;padding:11px 13px;margin-bottom:9px;background:#fff;"><div style="font-size:13px;font-weight:700;color:#28343a;margin-bottom:3px;">総合判定：転生保留（要処置）</div><div style="font-size:12px;line-height:1.7;color:#7e948f;">未練残量388は当院歴代3位。ただし内訳が特殊であり、単純な清算は推奨しない（問診記録参照）。</div></div>
                <div style="border:1px solid rgba(198,84,72,.4);border-radius:8px;padding:11px 13px;background:rgba(198,84,72,.03);"><div style="font-size:13px;font-weight:700;color:#c65448;margin-bottom:3px;">特記事項</div><div style="font-size:12px;line-height:1.7;color:#7e948f;">記憶清算を強く拒否。「忘れたら、誰があいつの蕎麦を褒めるんだ」と発言。処置室での説得が必要。</div></div>
              </div>
            </div>

              </div>

            <div style="display:flex;flex-direction:column;align-items:center;gap:8px;margin:18px 0 24px;">

                <b style="display:inline-block;padding:1px 12px;border-radius:999px;background:{{ gradeBg }};color:{{ gradeColor }};font-size:13px;letter-spacing:2px;">判定 {{ stampWord }}</b>
              </div>
              <div style="font-size:14px;color:#7e948f;margin-top:6px;">{{ diceFormula }}</div>
              <div style="font-size:14px;letter-spacing:1px;color:{{ gradeColor }};font-weight:700;">{{ diceVerdict }}</div>
              <p style="font-size:10px;color:#9fb2ad;margin:2px 0 0;">※判定E（出目1）の場合、魂が検査室から逃走します。院内放送が入ります。</p>
            </div>
            <div style="display:flex;justify-content:center;gap:7px;flex-wrap:wrap;margin-bottom:14px;">
              <sc-for list="{{ diceTypes }}" as="dt">
                <button onClick="{{ dt.go }}" style="font-size:12px;font-family:'IBM Plex Mono',monospace;padding:7px 12px;border-radius:6px;cursor:pointer;border:{{ dt.border }};color:{{ dt.color }};background:{{ dt.bg }};font-weight:{{ dt.weight }};">{{ dt.label }}</button>
              </sc-for>
            </div>
            <sc-if value="{{ diceIsCheck }}">
              <div style="display:flex;justify-content:center;gap:7px;flex-wrap:wrap;margin-bottom:16px;">
                <sc-for list="{{ diceSkills }}" as="sk">
                  <button onClick="{{ sk.go }}" style="font-family:'Zen Kaku Gothic New',sans-serif;font-size:12px;padding:5px 11px;border-radius:6px;cursor:pointer;border:{{ sk.border }};color:{{ sk.color }};background:{{ sk.bg }};">{{ sk.label }}</button>
                </sc-for>
              </div>
            </sc-if>
            <button onClick="{{ rollNow }}" style="display:inline-flex;align-items:center;gap:10px;padding:12px 30px;border:0;border-radius:8px;cursor:pointer;background:#3a9e8c;color:#fff;font-weight:900;font-size:15px;letter-spacing:3px;font-family:'Zen Kaku Gothic New',sans-serif;box-shadow:0 5px 0 #2a7568;white-space:nowrap;">検体を分析にかける</button>

            </div>
          </div>

        <sc-if value="{{ isCombat }}" hint-placeholder-val="{{ false }}">
          <div data-screen-label="処置室" style="animation:scfade .4s ease;max-width:780px;margin:0 auto;">
            <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:6px;">
              <h1 style="font-weight:900;font-size:24px;margin:0;color:#28343a;">処置室 ・ 未練清算オペ</h1>
              <div style="display:flex;gap:8px;"><button onClick="{{ checkVital }}" style="padding:8px 15px;border:1px solid rgba(58,158,140,.35);border-radius:6px;background:#fff;color:#7e948f;cursor:pointer;font-size:13px;font-family:'Zen Kaku Gothic New',sans-serif;white-space:nowrap;flex:none;">バイタル確認</button><button onClick="{{ nextOp }}" style="padding:8px 15px;border:0;border-radius:6px;background:#3a9e8c;color:#fff;cursor:pointer;font-weight:700;font-size:13px;font-family:'Zen Kaku Gothic New',sans-serif;box-shadow:0 4px 0 #2a7568;white-space:nowrap;flex:none;">次の処置へ</button></div>
            </div>
            <p style="font-size:12px;color:#9fb2ad;margin:0 0 14px;">※未練は「消す」のではなく「畳む」処置です。畳み方を誤ると、来世で開きます（デジャヴの正体）。</p>

            <div style="border:2px solid #3a9e8c;border-radius:10px;padding:12px 14px;margin-bottom:14px;background:#fff;">
              <div style="display:flex;align-items:baseline;justify-content:space-between;flex-wrap:wrap;gap:6px;margin-bottom:4px;"><span style="font-size:15px;font-weight:900;color:#28343a;">患者：春日野 誠 様（魂体）</span><span style="font-family:'IBM Plex Mono',monospace;font-size:11px;color:#3a9e8c;white-space:nowrap;">魂圧 118/76 ・ 徳拍 {{ tokuhaku }}</span></div>
              <div style="position:relative;height:34px;border-radius:6px;background:rgba(58,158,140,.05);overflow:hidden;border:1px solid rgba(58,158,140,.2);">
                <svg viewBox="0 0 400 34" preserveAspectRatio="none" style="position:absolute;inset:0;width:100%;height:100%;animation:pulseline 2s ease-in-out infinite;"><polyline points="0,17 40,17 52,17 58,6 64,28 70,17 130,17 142,17 148,5 154,29 160,17 230,17 242,17 248,6 254,28 260,17 330,17 342,17 348,5 354,29 360,17 400,17" fill="none" stroke="#3a9e8c" stroke-width="2"></polyline></svg>
              </div>
              <div style="font-size:10px;color:#9fb2ad;margin-top:4px;">魂電図：安定。ただし「橋のたもと」という語で徳拍が跳ねる。</div>
              <div style="display:flex;gap:4px;margin-top:6px;justify-content:flex-end;"><button onClick="{{ tokuhakuDown }}" style="font-size:10px;padding:2px 6px;border:1px solid rgba(58,158,140,.3);border-radius:6px;background:#fff;color:#c65448;cursor:pointer;">−5</button><button onClick="{{ tokuhakuUp }}" style="font-size:10px;padding:2px 6px;border:1px solid rgba(58,158,140,.3);border-radius:6px;background:#fff;color:#2f8a5c;cursor:pointer;">＋5</button></div>
            </div>

            <p style="font-size:11px;letter-spacing:3px;color:#3a9e8c;font-weight:700;margin:0 0 10px;">■ 清算対象の未練（大きい順）</p>
            <sc-for list="{{ regrets }}" as="rg">
              <div style="display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:10px;border:{{ rg.border }};background:{{ rg.bg }};margin-bottom:8px;opacity:{{ rg.op }};"><span style="width:30px;height:30px;flex:none;display:flex;align-items:center;justify-content:center;font-family:'IBM Plex Mono',monospace;font-size:13px;background:{{ rg.numBg }};color:{{ rg.numColor }};border-radius:6px;">{{ rg.num }}</span><div style="flex:1;min-width:0;"><div style="font-size:15px;font-weight:700;color:#28343a;">{{ rg.title }} <span style="font-size:11px;color:{{ rg.tagColor }};">{{ rg.tag }}</span></div><div style="display:flex;gap:5px;margin-top:3px;flex-wrap:wrap;"><span style="font-size:10px;padding:2px 8px;border-radius:3px;background:{{ rg.noteBg }};color:{{ rg.noteColor }};">{{ rg.note }}</span></div></div><div style="width:150px;flex:none;"><div style="display:flex;justify-content:space-between;font-size:11px;color:#7e948f;margin-bottom:3px;"><span>未練量</span><span style="font-family:'IBM Plex Mono',monospace;">{{ rg.value }}</span></div><div style="height:8px;border-radius:5px;background:rgba(40,52,58,.06);overflow:hidden;"><div style="width:{{ rg.pct }}%;height:100%;background:{{ rg.barColor }};"></div></div>
                <div style="display:flex;gap:4px;margin-top:5px;justify-content:flex-end;"><button onClick="{{ rg.dmg }}" style="font-size:10px;padding:2px 6px;border:1px solid rgba(58,158,140,.3);border-radius:6px;background:#fff;color:#2f8a5c;cursor:pointer;">畳む</button><button onClick="{{ rg.heal }}" style="font-size:10px;padding:2px 6px;border:1px solid rgba(58,158,140,.3);border-radius:6px;background:#fff;color:#c65448;cursor:pointer;">戻す</button></div>
              </div></div>
            </sc-for>

            <div style="display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:10px;border:1px dashed rgba(58,158,140,.4);background:rgba(58,158,140,.03);"><span style="width:30px;height:30px;flex:none;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900;background:#3a9e8c;color:#fff;border-radius:50%;">看</span><div style="flex:1;min-width:0;"><div style="font-size:15px;font-weight:700;color:#28343a;">担当整理士：三途 看（みと・かん）</div><div style="font-size:12px;color:#7e948f;margin-top:2px;">未練の畳み方は千差万別。「大きいのは、無理に畳まない主義です」</div></div><div style="width:150px;flex:none;"><div style="display:flex;justify-content:space-between;font-size:11px;color:#7e948f;margin-bottom:3px;"><span>集中力</span><span style="font-family:'IBM Plex Mono',monospace;">{{ shuchu }}/100</span></div><div style="height:8px;border-radius:5px;background:rgba(40,52,58,.06);overflow:hidden;"><div style="width:{{ shuchu }}%;height:100%;background:#3a9e8c;"></div></div></div></div>
          </div>
        </sc-if>

        <sc-if value="{{ isInv }}" hint-placeholder-val="{{ false }}">
          <div data-screen-label="お預かり窓口" style="animation:scfade .4s ease;max-width:820px;margin:0 auto;">
            <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:18px;">
              <h1 style="font-weight:900;font-size:24px;margin:0;color:#28343a;">お預かり窓口 ・ 持越品審査</h1>
              <span style="font-family:'IBM Plex Mono',monospace;font-size:12px;color:#7e948f;white-space:nowrap;">持越枠：3品まで（技能除く）</span>
            </div>
            <div style="display:grid;grid-template-columns:{{ invCols }};gap:22px;">
              <div>
                <p style="font-size:11px;letter-spacing:3px;color:#3a9e8c;font-weight:700;margin:0 0 11px;">■ 持越申請中（来世へ持っていく）</p>
                <div style="padding:12px 14px;border:1px solid rgba(58,158,140,.3);border-radius:8px;margin-bottom:8px;background:#fff;"><div style="display:flex;justify-content:space-between;gap:8px;"><div style="font-size:14px;font-weight:700;color:#28343a;">蕎麦打ちの手（筋肉記憶）</div><span style="font-size:10px;color:#2f8a5c;font-family:'IBM Plex Mono',monospace;flex:none;">審査通過</span></div><div style="font-size:12px;color:#7e948f;margin-top:3px;line-height:1.7;">技能扱いのため枠外。来世では「なぜか手先が器用な子」になる。</div></div>
                <div style="padding:12px 14px;border:1px solid rgba(58,158,140,.3);border-radius:8px;margin-bottom:8px;background:#fff;"><div style="display:flex;justify-content:space-between;gap:8px;align-items:center;"><div style="font-size:14px;font-weight:700;color:#28343a;">橋のたもとの景色（記憶一枚）</div><span style="display:flex;align-items:center;gap:8px;"><sc-if value="{{ sceneryPending }}"><button onClick="{{ approveScenery }}" style="font-size:10px;padding:2px 10px;border:1px solid rgba(165,133,31,.5);border-radius:999px;background:#fff;color:#a5851f;cursor:pointer;">審査を進める</button></sc-if><span style="font-size:10px;color:{{ sceneryColor }};font-family:'IBM Plex Mono',monospace;flex:none;">{{ sceneryStatus }}</span></span></div><div style="font-size:12px;color:#7e948f;margin-top:3px;line-height:1.7;">記憶の持越は原則不可。ただし「風景一枚まで」の特例あり。夕方の川面で申請中。</div></div>
                <div style="padding:12px 14px;border:1px solid rgba(198,84,72,.4);border-radius:8px;background:rgba(198,84,72,.03);"><div style="display:flex;justify-content:space-between;gap:8px;"><div style="font-size:14px;font-weight:700;color:#c65448;">「褒めそびれ」一式</div><span style="font-size:10px;color:#c65448;font-family:'IBM Plex Mono',monospace;flex:none;">持越不可</span></div><div style="font-size:12px;color:#7e948f;margin-top:3px;line-height:1.7;">未練は持越禁止品目の筆頭。当窓口では預かれません。処置室へ。</div></div>
              </div>
              <div>
                <p style="font-size:11px;letter-spacing:3px;color:#3a9e8c;font-weight:700;margin:0 0 11px;">■ 遺失物・お忘れ物台帳（今週分）</p>
                <div style="display:flex;align-items:center;gap:11px;font-size:14px;color:#48575c;padding:9px 4px;border-bottom:1px dashed rgba(58,158,140,.22);"><span style="width:8px;height:8px;border-radius:2px;background:#3a9e8c;flex:none;"></span><span style="flex:1;">初恋（持ち主不明・保管3年目）</span><span style="color:#7e948f;font-family:'IBM Plex Mono',monospace;">忘-201</span></div>
                <div style="display:flex;align-items:center;gap:11px;font-size:14px;color:#48575c;padding:9px 4px;border-bottom:1px dashed rgba(58,158,140,.22);"><span style="width:8px;height:8px;border-radius:2px;background:#a5851f;flex:none;"></span><span style="flex:1;">九九の七の段（誰かが置いていった）</span><span style="color:#7e948f;font-family:'IBM Plex Mono',monospace;">忘-202</span></div>
                <div style="display:flex;align-items:center;gap:11px;font-size:14px;color:#48575c;padding:9px 4px;border-bottom:1px dashed rgba(58,158,140,.22);"><span style="width:8px;height:8px;border-radius:2px;background:#c65448;flex:none;"></span><span style="flex:1;">誰かへの謝罪（宛先不明・要冷蔵）</span><span style="color:#7e948f;font-family:'IBM Plex Mono',monospace;">忘-203</span></div>
                <div style="display:flex;align-items:center;gap:11px;font-size:14px;color:#48575c;padding:9px 4px;"><span style="width:8px;height:8px;border-radius:2px;background:#7e948f;flex:none;"></span><span style="flex:1;">五円玉（濡れている。またか）</span><span style="color:#7e948f;font-family:'IBM Plex Mono',monospace;">忘-204</span></div>
                <div style="margin-top:14px;border:1px solid rgba(58,158,140,.3);border-radius:8px;padding:13px 15px;background:#fff;"><div style="font-size:13px;font-weight:700;color:#28343a;margin-bottom:5px;">窓口係メモ</div><div style="font-size:12px;line-height:1.8;color:#7e948f;">お忘れ物は「前の人生に置いてきたもの」。引き取り手が現れることは稀ですが、忘-201は毎年、様子を見に来る魂がいます。</div></div>
              </div>
            </div>
          </div>

        <sc-if value="{{ isStory }}" hint-placeholder-val="{{ false }}">

              <p style="text-align:center;font-size:13px;letter-spacing:1px;color:{{ storyNoteColor }};margin:0 0 16px;">{{ storyNote }}</p>

            <sc-for list="{{ storyBlocks }}" as="b">
              <sc-if value="{{ b.isP }}"><p style="font-family:'Shippori Mincho',serif;font-size:16px;line-height:2.1;color:#33424a;margin:0 0 18px;">{{ b.t }}</p></sc-if>

            <p style="text-align:center;font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:2px;color:#9fb2ad;margin:7px 0 0;">{{ storyPctLabel }}</p>
            <sc-if value="{{ storyCanRestart }}">
              <p style="text-align:center;margin:16px 0 0;"><button onClick="{{ storyRestart }}" style="border:0;background:transparent;color:#9fb2ad;font-size:11px;letter-spacing:2px;cursor:pointer;text-decoration:underline;font-family:'Zen Kaku Gothic New',sans-serif;">問診記録を最初からやり直す</button></p>
            </sc-if>
          </div>
        </sc-if>

        <sc-if value="{{ isMap }}" hint-placeholder-val="{{ false }}">
          <div data-screen-label="院内図" style="animation:scfade .4s ease;max-width:840px;margin:0 auto;">
            <h1 style="font-weight:900;font-size:24px;margin:0 0 4px;color:#28343a;">院内のご案内 ・ 転生前総合健診センター</h1>
            <p style="font-size:12px;color:#9fb2ad;margin:0 0 16px;">順路は矢印に沿ってお進みください。逆走すると前世に戻りかけます。</p>
            <div style="display:grid;grid-template-columns:{{ mapCols }};gap:20px;">
              <div style="position:relative;height:340px;border:1px solid rgba(58,158,140,.35);border-radius:8px;background:repeating-linear-gradient(0deg,rgba(58,158,140,.03) 0 1px,transparent 1px 28px),repeating-linear-gradient(90deg,rgba(58,158,140,.03) 0 1px,transparent 1px 28px),#fff;overflow:hidden;">
                <div style="position:absolute;left:5%;top:7%;width:42%;height:22%;border:2px solid #3a9e8c;border-radius:8px;background:rgba(58,158,140,.05);padding:7px 10px;box-sizing:border-box;"><div style="font-size:12px;font-weight:900;color:#3a9e8c;">受付ロビー ◉ 現在地</div><div style="font-size:10px;color:#7e948f;margin-top:2px;">番号札と検査着。靴は脱げます（物理的に）</div></div>
                <div style="position:absolute;right:5%;top:7%;width:42%;height:22%;border:2px solid rgba(126,148,143,.6);border-radius:8px;background:rgba(126,148,143,.05);padding:7px 10px;box-sizing:border-box;"><div style="font-size:12px;font-weight:700;color:#5c6f6a;">検査棟</div><div style="font-size:10px;color:#7e948f;margin-top:2px;">魂体計測 ・ 記憶レントゲン ・ 徳値採血</div></div>

<script>
/*
 * Claude Design の x-dc テンプレート（sc-if / sc-for / {{ 変数 }} / onClick）を
 * そのまま解釈して描画するミニランタイム。support.js（React ベースのプレビュー用）の代替。
 * 状態変更のたびにテンプレート全体を再構築する（プロトタイプの再レンダーと同等）。
 */
(function () {
  var cache = new Map();
  function compile(expr) {
    var fn = cache.get(expr);
    if (!fn) {
      fn = new Function('__s', 'with(__s){return(' + expr + ');}');
      cache.set(expr, fn);
    }
    return fn;
  }
  function evalExpr(expr, scope) {
    return compile(expr)(scope);
  }
  // "{{ expr }}" 単体の属性値から式を取り出す
  function single(text) {
    var m = /^\s*\{\{\s*([\s\S]+?)\s*\}\}\s*$/.exec(text || '');
    return m ? m[1] : null;
  }
  function interpolate(text, scope) {
    if (text.indexOf('{{') === -1) return text;
    return text.replace(/\{\{\s*([\s\S]+?)\s*\}\}/g, function (_, expr) {
      var v = evalExpr(expr, scope);
      return v == null ? '' : String(v);
    });
  }
  function build(nodes, scope, parent) {
    for (var i = 0; i < nodes.length; i++) {
      var node = nodes[i];
      if (node.nodeType === Node.TEXT_NODE) {
        parent.appendChild(document.createTextNode(interpolate(node.nodeValue, scope)));
        continue;
      }
      if (node.nodeType !== Node.ELEMENT_NODE) continue;
      var tag = node.localName;
      if (tag === 'sc-if') {
        var cond = single(node.getAttribute('value'));
        if (cond && evalExpr(cond, scope)) build(node.childNodes, scope, parent);
        continue;
      }
      if (tag === 'sc-for') {
        var listExpr = single(node.getAttribute('list'));
        var as = node.getAttribute('as') || 'item';
        var list = (listExpr && evalExpr(listExpr, scope)) || [];
        for (var j = 0; j < list.length; j++) {
          var child = Object.assign({}, scope);
          child[as] = list[j];
          build(node.childNodes, child, parent);
        }
        continue;
      }
      var el = document.createElementNS(node.namespaceURI, tag);
      for (var k = 0; k < node.attributes.length; k++) {
        var attr = node.attributes[k];
        if (attr.name.indexOf('hint-placeholder') === 0) continue;
        if (attr.name === 'onclick') {
          var handlerExpr = single(attr.value);
          var fn = handlerExpr ? evalExpr(handlerExpr, scope) : null;
          if (typeof fn === 'function') el.addEventListener('click', fn);
          continue;
        }
        el.setAttribute(attr.name, interpolate(attr.value, scope));
      }
      build(node.childNodes, scope, el);
      parent.appendChild(el);
    }
  }
  window.DCLogic = class DCLogic {
    mount(rootEl, templateEl) {
      this._root = rootEl;
      this._tpl = templateEl.content;
      this.render();
    }
    setState(update) {
      var patch = typeof update === 'function' ? update(this.state) : update;
      Object.assign(this.state, patch);
      this.render();
    }
    render() {
      var scope = this.renderVals();
      var frag = document.createDocumentFragment();
      build(this._tpl.childNodes, scope, frag);
      this._root.replaceChildren(frag);
    }
  };
})();

class Component extends DCLogic {
  state = { device: 'desktop', play: 'gmpl', screen: 'top' };

  renderVals() {
    const { device, play, screen } = this.state;
    const frames = { phone: { w: 392, h: 828 }, tablet: { w: 900, h: 660 }, desktop: { w: 1240, h: 772 } };

    const playLabel = { solo: '自主受診', gmpl: '医療チームと患者', gmless: '合同カンファ' }[play] || '';

    const navDefs = [

      ['gm', play === 'gmless' ? '合同カンファ' : '医局', '医'],
    ];
    const nav = navDefs
      .filter((d) => d[0] !== 'gm' || play !== 'solo')
      .map(([id, label, badge]) => {

        return {
          id, label, badge, active,
          go: () => setScreen(id),
          color: active ? '#3a9e8c' : '#7e948f',

    const playModes = [
      ['solo', '自主受診', '医療スタッフ不在。問診票と結果帳票だけで、自分の魂と向き合う一人受診。'],
      ['gmpl', '医療チームと患者', '医療チーム役（GM）が院内と検査を、魂たちが受診と清算を担う通常診療。'],

    const devs = [
      ['phone', 'スマホ'], ['tablet', 'タブ'], ['desktop', 'PC'],
    ].map(([id, label]) => {
      const active = id === device;
      return {
        id, label, active,
        go: () => setDevice(id),

    return {
      frameW: f.w, frameH: f.h, railW: compact ? 66 : 214,
      mainPad: isPhone ? '22px 18px 26px' : '30px 34px 38px',
      showRail: !isPhone, showTabbar: isPhone,
      taglineDisp: isPhone ? 'none' : 'block', enDisp: isPhone ? 'none' : 'inline',
      playLabelDisp: isPhone ? 'none' : 'inline',
      titleSize: isPhone ? 16 : 19,

      twoCols: isPhone ? '1fr' : '1fr 1fr',
      invCols: isPhone ? '1fr' : '1fr 1.4fr',
      mapCols: isPhone ? '1fr' : '1.5fr 1fr',
      playLabel, nav, playModes, devs,
      isTop: screen === 'top', isSheet: screen === 'sheet', isDice: screen === 'dice',
      isCombat: screen === 'combat', isInv: screen === 'inventory', isStory: screen === 'story',
      isMap: screen === 'map', isGM: screen === 'gm',
      gmTitle: play === 'gmless' ? '合同カンファ — カルテの回し読み' : '医局 — 施錠されたカルテ庫',
    };

/*
 * 全作品共通のゲームエンジン。ダイス・d20判定・localStorage 永続化と、
 * シェル（DCLogic コンポーネント）へのゲーム状態の合流（attach）を担う。
 * 作品ごとの中身（シナリオ・画面の値）は games/<id>.game.js が window.__GAME__ に定義する。
 */
(function () {
  function rollDie(sides) {
    return 1 + Math.floor(Math.random() * sides);
  }
  function pickKeys(obj, keys) {
    var o = {};
    for (var i = 0; i < keys.length; i++) o[keys[i]] = obj[keys[i]];
    return o;
  }
  window.GameEngine = {
    rollDie: rollDie,
    clamp: function (v, lo, hi) {
      return Math.max(lo, Math.min(hi, v));
    },
    // d20 判定。20 は大成功、1 は大失敗（出目優先）
    check: function (mod, dc) {
      var die = rollDie(20);
      var total = die + mod;
      var outcome = die === 20 ? 'crit' : die === 1 ? 'fumble' : total >= dc ? 'success' : 'fail';
      return { die: die, mod: mod, total: total, dc: dc, outcome: outcome, ok: outcome === 'crit' || outcome === 'success' };
    },
    outcomeText: function (outcome) {
      return { crit: '大成功', success: '成功', fail: '失敗', fumble: '大失敗' }[outcome] || '';
    },
    attach: function (app, game) {
      var key = 'trpg-game-' + game.id;
      var saved = null;
      try { saved = JSON.parse(localStorage.getItem(key) || 'null'); } catch (e) {}
      Object.assign(app.state, game.initialState(), saved || {});
      if (game.migrate) game.migrate(app.state);
      var baseRenderVals = app.renderVals.bind(app);
      app.renderVals = function () {
        var vals = baseRenderVals();
        return Object.assign(vals, game.vals(app, vals));
      };
      var baseSetState = app.setState.bind(app);
      app.setState = function (update) {
        baseSetState(update);
        try { localStorage.setItem(key, JSON.stringify(pickKeys(app.state, game.persist))); } catch (e) {}
      };
      // ゲーム状態のみ初期値へ戻す（device / play / screen は保持）
      app._resetGame = function () {
        try { localStorage.removeItem(key); } catch (e) {}
        Object.assign(app.state, game.initialState());
        app.render();
      };
    },
  };
})();

/*
 * 1j-転生前人間ドック のゲーム内容。
 * - 精密検査: d4〜d100。d20 判定は5段階の医療判定（A〜E）で結果を示す。出目1は判定E「魂が逃走」
 * - 検査結果報告書: 徳値 / 業値 / 未練残量 / 記憶清算率 の増減。値に応じて判定バッジ(A〜D)が自動更新
 * - 処置室: 未練3件（大きい順）を「畳む／戻す」で清算するトラッカー。最大の未練を0にするのが目標
 * - お預かり窓口: 「橋のたもとの景色」だけ審査を進められ、承認すると問診記録の終盤で贈り物にできる
 * - 問診記録: 分岐シナリオ「問診票の、最後の質問」（徳拍・記憶清算率ルール・複数エンディング）。
 *   GM 秘匿は今回参照のみ（凪マチの生死）。本筋は春日野の50年分の後悔とその清算
 * - 医局: 症例切替・院内の混雑度・院内ハプニング表 d6
 */
(function () {
  var E = null;
  function eng() { return E || (E = window.GameEngine); }

  var TOKUHAKU_MAX = 150;

  var SKILLS = [
    { name: '縁の濃度補正', mod: 3 },
    { name: '徳値判定', mod: 2 },
    { name: '記憶感度', mod: 1 },
    { name: '業値解析', mod: -1 },
    { name: '経過観察眼', mod: 0 },
  ];
  var DICE_SIDES = [4, 6, 8, 10, 12, 20, 100];

  function gradeFromDev(dev, width) {
    var ratio = width > 0 ? dev / width : 0;
    if (ratio <= 0) return { grade: 'A', bg: 'rgba(62,164,110,.12)', color: '#2f8a5c' };
    if (ratio <= 0.3) return { grade: 'B', bg: 'rgba(201,168,46,.14)', color: '#a5851f' };
    if (ratio <= 1.0) return { grade: 'C', bg: 'rgba(201,114,46,.14)', color: '#c9722e' };
    return { grade: 'D', bg: 'rgba(198,84,72,.14)', color: '#c65448' };

        var sel = i === st.skillIdx;
        return {
          label: sk.name + '（' + (sk.mod >= 0 ? '+' + sk.mod : sk.mod) + '）',
          go: function () { app.setState({ skillIdx: i }); },
          border: sel ? '1px solid #3a9e8c' : '1px solid rgba(58,158,140,.3)',
          color: sel ? '#3a9e8c' : '#7e948f',
          bg: sel ? 'rgba(58,158,140,.05)' : '#fff',
        };
      });
      out.rollNow = function () {
        if (st.diceSides === 20) {
          var r = E.check(skill.mod, st.diceDc);
          var ci = checkupGrade(r);
          pushLog(st, '春日野様 ・ ' + skill.name, r.total + ' ／ ' + ci.grade + ' 判定', ci.color);
          app.setState({ lastRoll: { kind: 'check', die: r.die, mod: r.mod, total: r.total, dc: r.dc, outcome: r.outcome, ok: r.ok, skillName: skill.name }, rollLog: st.rollLog });
        } else {
          var v = E.rollDie(st.diceSides);
          pushLog(st, '春日野様 ・ d' + st.diceSides, v + ' ／ 出目', '#7e948f');
          app.setState({ lastRoll: { kind: 'plain', sides: st.diceSides, value: v }, rollLog: st.rollLog });
        }
      };
      out.logRows = st.rollLog;

      // ── 処置室 ──
      out.tokuhaku = st.tokuhaku;
      out.tokuhakuUp = function () { app.setState({ tokuhaku: E.clamp(st.tokuhaku + 5, 0, TOKUHAKU_MAX) }); };
      out.tokuhakuDown = function () { app.setState({ tokuhaku: E.clamp(st.tokuhaku - 5, 0, TOKUHAKU_MAX) }); };
      out.checkVital = function () { app.setState({ shuchu: E.clamp(st.shuchu + 3, 0, 100) }); };
      out.shuchu = st.shuchu;
      out.nextOp = function () {
        var vals = Object.assign({}, st.regretVals);
        REGRET_DEFS.forEach(function (d) {
          var step = Math.max(1, Math.round(d.max * 0.15));
          vals[d.key] = E.clamp(vals[d.key] - Math.round(step / 2), 0, d.max);
        });
        app.setState({ regretVals: vals, shuchu: E.clamp(st.shuchu - 2, 0, 100) });
      };
      out.regrets = REGRET_DEFS.map(function (d) {
        var v = st.regretVals[d.key];
        var done = v <= 0;
        var step = Math.max(1, Math.round(d.max * 0.15));
        function adj(delta) {
          return function () {
            var vals = Object.assign({}, st.regretVals);
            vals[d.key] = E.clamp(v + delta, 0, d.max);
            app.setState({ regretVals: vals });
          };
        }
        return {
          num: d.num, title: d.title, tag: done ? '清算済み' : d.tag, tagColor: done ? '#2f8a5c' : d.tagColor,
          note: d.note, noteBg: d.noteBg, noteColor: d.noteColor,
          border: d.border, bg: d.bg, op: done ? '.6' : '1',
          numBg: d.numBg, numColor: d.numColor, barColor: d.barColor,
          value: v, pct: Math.round((v / d.max) * 100),
          dmg: adj(-step), heal: adj(step),
        };
      });

      // ── お預かり窓口 ──
      out.sceneryPending = st.items.sceneryStatus === 'pending';
      out.sceneryStatus = st.items.sceneryStatus === 'pending' ? '審査中' : '許可';
      out.sceneryColor = st.items.sceneryStatus === 'pending' ? '#a5851f' : '#2f8a5c';
      out.approveScenery = function () {
        var items = Object.assign({}, st.items);
        items.sceneryStatus = 'approved';
        app.setState({ items: items, flags: Object.assign({}, st.flags, { sceneryApproved: 1 }) });
      };

      // ── 問診記録 ──
      var node = NODES[st.storyNode] || NODES.j1;
      out.storyKicker = node.kicker;
      out.storyTitle = node.title;
      out.storyBlocks = node.text.map(function (b) {
        return typeof b === 'string' ? { isP: true, isQ: false, t: b } : { isP: false, isQ: true, t: b.q };
      });
      out.storyHasNote = !!st.storyNote;
      out.storyNote = st.storyNote || '';
      out.storyNoteColor = st.storyNoteColor || '#7e948f';
      out.storyPct = node.pct;
      out.storyPctLabel = node.end
        ? '問診記録 ・ 結審'
        : '問診進捗 ' + node.pct + '% ・ 午前の部 終了まで ' + Math.max(0, 60 - Math.round(node.pct / 2)) + '分';
      out.storyCanRestart = st.storyNode !== 'j1';
      out.storyRestart = function () { app._resetGame(); };

      function choose(c) {
        return function () {
          var patch = { storyNote: null, storyNoteColor: '#7e948f' };
          var target = c.to;
          if (c.check) {
            var dc = typeof c.check.dc === 'function' ? c.check.dc(st) : c.check.dc;
            var r = E.check(c.check.mod, dc);
            patch.storyNote = c.check.name + '判定 — d20〈' + r.die + '〉＋' + r.mod + ' ＝ ' + r.total + ' ／ 難度' + dc + ' ・ ' + (r.ok ? '成功' : '失敗');
            patch.storyNoteColor = r.ok ? '#2f8a5c' : '#c65448';
            pushLog(st, '春日野様 ・ ' + c.check.name + '（問診記録）', r.total + ' ／ ' + (r.ok ? '成功' : '失敗'), r.ok ? '#2f8a5c' : '#c65448');
            patch.rollLog = st.rollLog;
            target = r.ok ? c.success : c.fail;
          }
          var nextNode = NODES[target];
          applyFx(st, nextNode.fx, patch);
          var tokuhakuNow = 'tokuhaku' in patch ? patch.tokuhaku : st.tokuhaku;
          var seisanNow = 'seisan' in patch ? patch.seisan : st.seisan;
          if (tokuhakuNow <= 0 && !nextNode.end) {
            target = 'E_faint';
            applyFx(st, NODES.E_faint.fx, patch);
          } else if (seisanNow >= 100 && !nextNode.end) {
            target = 'E_erased';
            applyFx(st, NODES.E_erased.fx, patch);
          }
          patch.storyNode = target;
          app.setState(patch);
        };
      }
      var defs = node.end ? END_CHOICES : node.choices;
      out.storyChoices = defs.filter(function (c) {
        return !c.if || c.if(st);
      }).map(function (c) {
        var dc = c.check ? (typeof c.check.dc === 'function' ? c.check.dc(st) : c.check.dc) : null;
        return {
          num: c.num || '', pre: c.pre, skillText: c.skillText || '', post: c.post || '',
          dcLabel: dc != null ? '難度' + dc : '',
          go: c.restart ? function () { app._resetGame(); }
            : c.top ? function () { app.setState({ screen: 'top' }); }
            : choose(c),
        };
      });

      // ── 医局 ──
      out.gmScenes = GM_SCENES.map(function (t, i) {
        var active = i === st.gmScene;
        return {
          t: t, tag: active ? '進行中' : '',
          go: function () { app.setState({ gmScene: i }); },
          border: active ? '2px solid #3a9e8c' : '1px solid rgba(58,158,140,.3)',
          bg: active ? 'rgba(58,158,140,.04)' : '#fff',
          color: active ? '#28343a' : '#7e948f',
          weight: active ? '700' : '400',
        };
      });
      out.konzatsu = st.konzatsu;
      out.konzatsuMinus = function () { app.setState({ konzatsu: E.clamp(st.konzatsu - 5, 0, 100) }); };
      out.konzatsuPlus = function () { app.setState({ konzatsu: E.clamp(st.konzatsu + 5, 0, 100) }); };
      out.gmHasTable = !!st.gmTable;
      out.gmTableD = st.gmTable ? st.gmTable.d : '';
      out.gmTableText = st.gmTable ? st.gmTable.text : '';
      out.rollTable = function () {
        var d = E.rollDie(6);
        var text = GM_TABLE[d - 1];
        pushLog(st, '医局 ・ 院内ハプニング表', d + ' ／ ' + text, '#3a9e8c');
        app.setState({ gmTable: { d: d, text: text }, rollLog: st.rollLog });
      };

      return out;
    },
  };
})();

window.__dcApp = new Component();
if (typeof GameEngine !== 'undefined' && window.__GAME__) GameEngine.attach(window.__dcApp, window.__GAME__);
window.__dcApp.mount(document.getElementById('app'), document.getElementById('dc-template'));
</script>
