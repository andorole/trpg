<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>確定申告ダンジョン</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;600;700;800&family=Zen+Kaku+Gothic+New:wght@400;500;700;900&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  body{margin:0;background:#14161a;}
  @keyframes scfade{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:none}}
  @keyframes stampin{0%{transform:rotate(-14deg) scale(1.7);opacity:0}60%{transform:rotate(-8deg) scale(.96);opacity:1}100%{transform:rotate(-8deg) scale(1)}}
  ::-webkit-scrollbar{width:10px;height:10px}
  ::-webkit-scrollbar-thumb{background:rgba(35,50,74,.3);border-radius:8px}
  ::-webkit-scrollbar-track{background:transparent}
</style>
</head>
<body>
<div id="app"></div>
<template id="dc-template">
<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:34px 20px 96px;box-sizing:border-box;font-family:'Zen Kaku Gothic New',sans-serif;background:radial-gradient(120% 95% at 50% 0%,#1d2128 0%,#14161a 58%,#0c0d10 100%);color:#23324a;">

  <div style="position:relative;width:{{ frameW }}px;height:{{ frameH }}px;max-width:100%;background:#f6f3e9;border:1px solid #c9bd97;border-radius:4px;box-shadow:0 34px 90px -22px rgba(0,0,0,.72),0 0 0 8px rgba(10,12,16,.55);overflow:hidden;display:flex;flex-direction:column;">

    <div style="position:absolute;inset:0;pointer-events:none;background-image:repeating-linear-gradient(0deg,rgba(35,50,74,.028) 0 1px,transparent 1px 28px),radial-gradient(circle at 88% 8%,rgba(191,58,43,.05),transparent 30%);"></div>

    <header style="position:relative;z-index:2;display:flex;align-items:center;justify-content:space-between;gap:14px;padding:12px 22px;border-bottom:3px double rgba(35,50,74,.55);background:linear-gradient(180deg,#faf8f0,#f2eedf);">
      <div style="display:flex;align-items:center;gap:12px;">
        <span style="display:inline-flex;align-items:center;justify-content:center;width:30px;height:30px;flex:none;border-radius:50%;border:2px solid #23324a;color:#23324a;font-family:'Shippori Mincho',serif;font-weight:800;font-size:13px;">歳</span>
        <div>
          <div style="font-size:9px;letter-spacing:2px;color:#5b6472;">王国歳入庁 冒険所得課 ・ 様式第20号</div>
          <div style="display:flex;align-items:baseline;gap:10px;">
            <span style="font-family:'Shippori Mincho',serif;font-weight:800;font-size:20px;letter-spacing:2px;color:#23324a;">確定申告ダンジョン</span>
            <span style="font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:1px;color:#bf3a2b;">ADVENTURER'S TAX RETURN</span>
          </div>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:10px;">
        <span style="font-size:12px;letter-spacing:1px;color:#5b6472;">{{ playLabel }}</span>
        <span style="font-family:'IBM Plex Mono',monospace;font-size:11px;padding:4px 10px;border:1px solid #bf3a2b;border-radius:3px;color:#bf3a2b;background:rgba(191,58,43,.06);">期限まで 残り3日</span>
      </div>
    </header>

    <div style="position:relative;z-index:2;flex:1;display:flex;min-height:0;">

      <sc-if value="{{ showRail }}" hint-placeholder-val="{{ true }}">
        <nav style="width:{{ railW }}px;flex:none;border-right:1px solid rgba(35,50,74,.22);background:linear-gradient(180deg,rgba(35,50,74,.04),transparent);padding:15px 10px;display:flex;flex-direction:column;gap:3px;overflow-y:auto;">
          <sc-for list="{{ nav }}" as="item" hint-placeholder-count="8">
            <button onClick="{{ item.go }}" style="display:flex;align-items:center;gap:11px;width:100%;padding:9px 11px;border:0;border-radius:4px;cursor:pointer;text-align:left;background:{{ item.bg }};color:{{ item.color }};font-family:'Zen Kaku Gothic New',sans-serif;font-size:14px;font-weight:{{ item.weight }};">
              <span style="width:22px;height:22px;flex:none;display:flex;align-items:center;justify-content:center;font-size:11px;font-family:'Shippori Mincho',serif;font-weight:700;border-radius:3px;transform:rotate(-4deg);background:{{ item.badgeBg }};color:{{ item.badgeColor }};border:{{ item.badgeBorder }};">{{ item.badge }}</span>
              <span style="{{ item.labelStyle }}">{{ item.label }}</span>
            </button>
          </sc-for>
        </nav>
      </sc-if>

      <main style="flex:1;min-width:0;overflow-y:auto;padding:{{ mainPad }};">

        <sc-if value="{{ isTop }}" hint-placeholder-val="{{ true }}">
          <div data-screen-label="受付" style="animation:scfade .4s ease;max-width:760px;margin:0 auto;">
            <div style="position:relative;">
              <p style="font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:2px;color:#5b6472;margin:0 0 7px;">受付番号 No.087 ・ 令和八年度分</p>
              <h1 style="font-family:'Shippori Mincho',serif;font-weight:800;font-size:36px;line-height:1.2;margin:0 0 14px;color:#23324a;">冒険所得の確定申告</h1>
              <div style="position:absolute;top:-6px;right:6px;width:76px;height:76px;border:3px solid rgba(191,58,43,.75);border-radius:50%;transform:rotate(-8deg);display:flex;flex-direction:column;align-items:center;justify-content:center;color:#bf3a2b;animation:stampin .5s ease;pointer-events:none;">
                <span style="font-family:'Shippori Mincho',serif;font-weight:700;font-size:17px;letter-spacing:3px;">受付</span>
                <span style="font-family:'IBM Plex Mono',monospace;font-size:9px;">8.7.02</span>
              </div>
            </div>
            <p style="font-size:15px;line-height:1.95;color:#3a4657;margin:0 0 10px;max-width:60ch;">地下迷宮より生還されたみなさまへ。おかえりなさいませ。竜の財宝、呪いの武具、瓶詰めの妖精——それらはすべて<b style="color:#bf3a2b;">課税対象</b>です。申告期限は三日後。領収書はお手元にございますか。</p>
            <p style="font-size:12px;color:#8a8264;margin:0 0 26px;">※虚偽の申告が発覚した場合、追徴ダメージおよび重加算税が課されます。</p>

            <p style="font-size:11px;letter-spacing:3px;color:#bf3a2b;font-weight:700;margin:0 0 12px;">■ 申告の形式を選択してください</p>
            <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:0 0 30px;">
              <sc-for list="{{ playModes }}" as="m" hint-placeholder-count="3">
                <button onClick="{{ m.go }}" style="text-align:left;padding:14px 15px;border-radius:4px;cursor:pointer;border:{{ m.border }};background:{{ m.bg }};">
                  <div style="font-size:14px;font-weight:700;color:{{ m.titleColor }};margin-bottom:5px;">{{ m.t }}</div>
                  <div style="font-size:12px;line-height:1.6;color:#5b6472;">{{ m.d }}</div>
                </button>
              </sc-for>
            </div>

            <p style="font-size:11px;letter-spacing:3px;color:#bf3a2b;font-weight:700;margin:0 0 14px;">■ 連署人（パーティ）</p>
            <div style="border:1px solid rgba(35,50,74,.3);border-radius:4px;overflow:hidden;margin-bottom:28px;">
              <div style="display:grid;grid-template-columns:1.2fr 1fr 1fr .8fr;background:rgba(35,50,74,.07);border-bottom:1px solid rgba(35,50,74,.25);font-size:11px;font-weight:700;color:#5b6472;"><span style="padding:7px 12px;">氏名</span><span style="padding:7px 12px;border-left:1px solid rgba(35,50,74,.15);">職業（業種）</span><span style="padding:7px 12px;border-left:1px solid rgba(35,50,74,.15);">申告区分</span><span style="padding:7px 12px;border-left:1px solid rgba(35,50,74,.15);">信用</span></div>
              <div style="display:grid;grid-template-columns:1.2fr 1fr 1fr .8fr;border-bottom:1px dotted rgba(35,50,74,.25);font-size:13px;color:#23324a;"><span style="padding:9px 12px;font-weight:700;">アリエル</span><span style="padding:9px 12px;border-left:1px solid rgba(35,50,74,.1);">剣士（自営業）</span><span style="padding:9px 12px;border-left:1px solid rgba(35,50,74,.1);">青色</span><span style="padding:9px 12px;border-left:1px solid rgba(35,50,74,.1);color:#1f6e50;font-family:'IBM Plex Mono',monospace;">A</span></div>
              <div style="display:grid;grid-template-columns:1.2fr 1fr 1fr .8fr;border-bottom:1px dotted rgba(35,50,74,.25);font-size:13px;color:#23324a;"><span style="padding:9px 12px;font-weight:700;">モルガ</span><span style="padding:9px 12px;border-left:1px solid rgba(35,50,74,.1);">魔導士（フリーランス）</span><span style="padding:9px 12px;border-left:1px solid rgba(35,50,74,.1);">青色</span><span style="padding:9px 12px;border-left:1px solid rgba(35,50,74,.1);color:#1f6e50;font-family:'IBM Plex Mono',monospace;">B</span></div>
              <div style="display:grid;grid-template-columns:1.2fr 1fr 1fr .8fr;border-bottom:1px dotted rgba(35,50,74,.25);font-size:13px;color:#23324a;"><span style="padding:9px 12px;font-weight:700;">グレイ</span><span style="padding:9px 12px;border-left:1px solid rgba(35,50,74,.1);">僧侶（宗教法人）</span><span style="padding:9px 12px;border-left:1px solid rgba(35,50,74,.1);">非課税※係争中</span><span style="padding:9px 12px;border-left:1px solid rgba(35,50,74,.1);color:#b58a1f;font-family:'IBM Plex Mono',monospace;">C</span></div>
              <div style="display:grid;grid-template-columns:1.2fr 1fr 1fr .8fr;font-size:13px;color:#23324a;"><span style="padding:9px 12px;font-weight:700;">ヴェル</span><span style="padding:9px 12px;border-left:1px solid rgba(35,50,74,.1);">盗賊（無申告）</span><span style="padding:9px 12px;border-left:1px solid rgba(35,50,74,.1);color:#bf3a2b;">白色・要指導</span><span style="padding:9px 12px;border-left:1px solid rgba(35,50,74,.1);color:#bf3a2b;font-family:'IBM Plex Mono',monospace;">E</span></div>
            </div>

            <button onClick="{{ goStory }}" style="display:inline-flex;align-items:center;gap:10px;padding:13px 30px;border:2px solid #23324a;border-radius:4px;cursor:pointer;background:#23324a;color:#f6f3e9;font-family:'Zen Kaku Gothic New',sans-serif;font-weight:700;font-size:15px;letter-spacing:3px;box-shadow:3px 3px 0 rgba(35,50,74,.25);">申告を開始する　➜</button>
          </div>
        </sc-if>

        <sc-if value="{{ isSheet }}" hint-placeholder-val="{{ false }}">
          <div data-screen-label="納税者票" style="animation:scfade .4s ease;max-width:820px;margin:0 auto;">
            <div style="display:flex;gap:20px;align-items:flex-start;margin-bottom:20px;">
              <div style="width:88px;height:110px;flex:none;border:1px solid rgba(35,50,74,.4);background:repeating-linear-gradient(45deg,rgba(35,50,74,.07) 0 6px,transparent 6px 12px),#fdfcf7;display:flex;align-items:center;justify-content:center;font-size:9px;letter-spacing:1px;color:#8a8264;text-align:center;">証明写真<br>4.5×3.5</div>
              <div style="flex:1;min-width:0;">
                <p style="font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:2px;color:#5b6472;margin:0 0 4px;">納税者整理番号 KR-0087-A</p>
                <h1 style="font-family:'Shippori Mincho',serif;font-weight:800;font-size:28px;margin:0 0 4px;color:#23324a;">アリエル・ダスク</h1>
                <p style="font-size:13px;color:#5b6472;margin:0 0 10px;">人間 ・ 剣士〔業種コード 084：斬撃業〕 ・ 冒険歴6年</p>
                <div style="display:flex;gap:7px;flex-wrap:wrap;">
                  <span style="font-size:11px;padding:3px 9px;border-radius:2px;border:1px solid rgba(35,50,74,.35);color:#5b6472;">青色申告</span>
                  <span style="font-size:11px;padding:3px 9px;border-radius:2px;border:1px solid rgba(35,50,74,.35);color:#5b6472;">帳簿：複式</span>
                  <span style="font-size:11px;padding:3px 9px;border-radius:2px;border:1px solid #bf3a2b;color:#bf3a2b;">要注意：領収書を食べる癖</span>
                </div>
              </div>
            </div>

            <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:13px;margin-bottom:22px;">
              <div><div style="display:flex;justify-content:space-between;font-size:12px;color:#5b6472;margin-bottom:4px;"><span>体力 HP</span><span style="font-family:'IBM Plex Mono',monospace;">{{ tai }} / 41</span></div><div style="height:9px;border-radius:2px;background:rgba(35,50,74,.12);overflow:hidden;"><div style="width:{{ taiPct }}%;height:100%;background:#bf3a2b;"></div></div><div style="display:flex;gap:5px;margin-top:6px;"><button onClick="{{ taiDown }}" style="width:24px;height:24px;border:1px solid rgba(35,50,74,.35);border-radius:3px;background:#fdfcf7;color:#5b6472;cursor:pointer;font-size:13px;line-height:1;">−</button><button onClick="{{ taiUp }}" style="width:24px;height:24px;border:1px solid rgba(35,50,74,.35);border-radius:3px;background:#fdfcf7;color:#5b6472;cursor:pointer;font-size:13px;line-height:1;">＋</button></div></div>
              <div><div style="display:flex;justify-content:space-between;font-size:12px;color:#5b6472;margin-bottom:4px;"><span>気力 MP</span><span style="font-family:'IBM Plex Mono',monospace;">{{ mp }} / 18</span></div><div style="height:9px;border-radius:2px;background:rgba(35,50,74,.12);overflow:hidden;"><div style="width:{{ mpPct }}%;height:100%;background:#2c5f8a;"></div></div><div style="display:flex;gap:5px;margin-top:6px;"><button onClick="{{ mpDown }}" style="width:24px;height:24px;border:1px solid rgba(35,50,74,.35);border-radius:3px;background:#fdfcf7;color:#5b6472;cursor:pointer;font-size:13px;line-height:1;">−</button><button onClick="{{ mpUp }}" style="width:24px;height:24px;border:1px solid rgba(35,50,74,.35);border-radius:3px;background:#fdfcf7;color:#5b6472;cursor:pointer;font-size:13px;line-height:1;">＋</button></div></div>
              <div><div style="display:flex;justify-content:space-between;font-size:12px;color:#5b6472;margin-bottom:4px;"><span>税務信用スコア</span><span style="font-family:'IBM Plex Mono',monospace;">{{ shinyoRank }}（{{ shinyo }}）</span></div><div style="height:9px;border-radius:2px;background:rgba(35,50,74,.12);overflow:hidden;"><div style="width:{{ shinyoPct }}%;height:100%;background:{{ shinyoColor }};"></div></div><div style="display:flex;gap:5px;margin-top:6px;"><button onClick="{{ shinyoDown }}" style="width:24px;height:24px;border:1px solid rgba(35,50,74,.35);border-radius:3px;background:#fdfcf7;color:#5b6472;cursor:pointer;font-size:13px;line-height:1;">−</button><button onClick="{{ shinyoUp }}" style="width:24px;height:24px;border:1px solid rgba(35,50,74,.35);border-radius:3px;background:#fdfcf7;color:#5b6472;cursor:pointer;font-size:13px;line-height:1;">＋</button></div></div>
            </div>

            <p style="font-size:11px;letter-spacing:3px;color:#bf3a2b;font-weight:700;margin:0 0 12px;">■ 能力値（控除算定基礎）</p>
            <div style="display:grid;grid-template-columns:repeat(6,1fr);gap:0;border:1px solid rgba(35,50,74,.35);border-radius:4px;overflow:hidden;margin-bottom:24px;background:#fdfcf7;">
              <div style="padding:10px 4px;text-align:center;border-right:1px solid rgba(35,50,74,.18);"><div style="font-size:10px;color:#5b6472;">筋力</div><div style="font-family:'IBM Plex Mono',monospace;font-size:23px;font-weight:600;color:#23324a;line-height:1.25;">13</div><div style="font-size:10px;color:#1f6e50;">控除+1</div></div>
              <div style="padding:10px 4px;text-align:center;border-right:1px solid rgba(35,50,74,.18);background:rgba(31,110,80,.06);"><div style="font-size:10px;color:#5b6472;">敏捷</div><div style="font-family:'IBM Plex Mono',monospace;font-size:23px;font-weight:600;color:#23324a;line-height:1.25;">18</div><div style="font-size:10px;color:#1f6e50;">控除+4</div></div>
              <div style="padding:10px 4px;text-align:center;border-right:1px solid rgba(35,50,74,.18);"><div style="font-size:10px;color:#5b6472;">耐久</div><div style="font-family:'IBM Plex Mono',monospace;font-size:23px;font-weight:600;color:#23324a;line-height:1.25;">14</div><div style="font-size:10px;color:#1f6e50;">控除+2</div></div>
              <div style="padding:10px 4px;text-align:center;border-right:1px solid rgba(35,50,74,.18);"><div style="font-size:10px;color:#5b6472;">知力</div><div style="font-family:'IBM Plex Mono',monospace;font-size:23px;font-weight:600;color:#23324a;line-height:1.25;">12</div><div style="font-size:10px;color:#1f6e50;">控除+1</div></div>
              <div style="padding:10px 4px;text-align:center;border-right:1px solid rgba(35,50,74,.18);"><div style="font-size:10px;color:#5b6472;">感応</div><div style="font-family:'IBM Plex Mono',monospace;font-size:23px;font-weight:600;color:#23324a;line-height:1.25;">15</div><div style="font-size:10px;color:#1f6e50;">控除+2</div></div>
              <div style="padding:10px 4px;text-align:center;"><div style="font-size:10px;color:#5b6472;">経理</div><div style="font-family:'IBM Plex Mono',monospace;font-size:23px;font-weight:600;color:#bf3a2b;line-height:1.25;">7</div><div style="font-size:10px;color:#bf3a2b;">加算−2</div></div>
            </div>

            <div style="display:grid;grid-template-columns:1fr 1fr;gap:24px;">
              <div>
                <p style="font-size:11px;letter-spacing:3px;color:#bf3a2b;font-weight:700;margin:0 0 10px;">■ 技能</p>
                <div style="display:flex;justify-content:space-between;font-size:14px;color:#3a4657;padding:6px 0;border-bottom:1px dotted rgba(35,50,74,.3);"><span>剣術</span><span style="font-family:'IBM Plex Mono',monospace;color:#1f6e50;">+7</span></div>
                <div style="display:flex;justify-content:space-between;font-size:14px;color:#3a4657;padding:6px 0;border-bottom:1px dotted rgba(35,50,74,.3);"><span>値切り交渉</span><span style="font-family:'IBM Plex Mono',monospace;color:#1f6e50;">+5</span></div>
                <div style="display:flex;justify-content:space-between;font-size:14px;color:#3a4657;padding:6px 0;border-bottom:1px dotted rgba(35,50,74,.3);"><span>逃走</span><span style="font-family:'IBM Plex Mono',monospace;color:#1f6e50;">+4</span></div>
                <div style="display:flex;justify-content:space-between;font-size:14px;color:#3a4657;padding:6px 0;"><span>帳簿づけ</span><span style="font-family:'IBM Plex Mono',monospace;color:#bf3a2b;">−2</span></div>
              </div>
              <div>
                <p style="font-size:11px;letter-spacing:3px;color:#bf3a2b;font-weight:700;margin:0 0 10px;">■ 特性</p>
                <div style="border:1px solid rgba(35,50,74,.3);border-radius:4px;padding:11px 13px;margin-bottom:9px;background:#fdfcf7;"><div style="font-size:13px;font-weight:700;color:#23324a;margin-bottom:3px;">経費の目利き</div><div style="font-size:12px;line-height:1.6;color:#5b6472;">戦利品を経費として計上する判定に有利。「これは業務に必要な魔剣です」</div></div>
                <div style="border:1px solid rgba(191,58,43,.4);border-radius:4px;padding:11px 13px;background:rgba(191,58,43,.04);"><div style="font-size:13px;font-weight:700;color:#bf3a2b;margin-bottom:3px;">白色申告の呪い</div><div style="font-size:12px;line-height:1.6;color:#5b6472;">古代の会計士の呪いにより、記した帳簿が満月の夜に白紙へ戻る。</div></div>
              </div>
            </div>
            <p style="margin-top:22px;font-size:13px;line-height:1.8;color:#5b6472;border-left:3px solid rgba(35,50,74,.4);padding-left:14px;">備考欄：「ドラゴンは倒せる。でも、医療費控除とセルフメディケーション税制の違いだけは、いまだに倒せない」</p>
          </div>
        </sc-if>

        <sc-if value="{{ isDice }}" hint-placeholder-val="{{ false }}">
          <div data-screen-label="税額査定" style="animation:scfade .4s ease;max-width:560px;margin:0 auto;text-align:center;">
            <p style="font-size:11px;letter-spacing:3px;color:#bf3a2b;font-weight:700;margin:0 0 4px;">{{ diceHead }}</p>
            <sc-if value="{{ diceIsCheck }}">
              <div style="display:flex;justify-content:center;align-items:center;gap:9px;margin:6px 0 0;">
                <button onClick="{{ dcMinus }}" style="width:24px;height:24px;border:1px solid rgba(35,50,74,.35);border-radius:3px;background:#fdfcf7;color:#5b6472;cursor:pointer;font-size:13px;line-height:1;">−</button>
                <span style="font-size:12px;letter-spacing:2px;color:#5b6472;">認定基準を調整</span>
                <button onClick="{{ dcPlus }}" style="width:24px;height:24px;border:1px solid rgba(35,50,74,.35);border-radius:3px;background:#fdfcf7;color:#5b6472;cursor:pointer;font-size:13px;line-height:1;">＋</button>
              </div>
            </sc-if>
            <div style="display:flex;flex-direction:column;align-items:center;gap:8px;margin:18px 0 24px;">
              <div style="width:118px;height:118px;border:4px solid #bf3a2b;border-radius:6px;transform:rotate(-8deg);animation:stampin .5s ease;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#bf3a2b;background:rgba(191,58,43,.03);">
                <span style="font-family:'IBM Plex Mono',monospace;font-size:44px;font-weight:600;line-height:1;">{{ diceFace }}</span>

                <div style="margin-top:14px;border:1px solid rgba(35,50,74,.3);border-radius:4px;padding:13px 15px;background:#fdfcf7;"><div style="font-size:13px;font-weight:700;color:#23324a;margin-bottom:5px;">鑑定メモ：謎の壺</div><div style="font-size:12px;line-height:1.7;color:#5b6472;">夜中に「経費で落ちたい」と呟く。中の声は先代の税理士のものと酷似。開栓は自己責任。</div></div>

        <sc-if value="{{ isMap }}" hint-placeholder-val="{{ false }}">

                <div style="position:absolute;left:10%;right:10%;top:33%;height:44px;border:2px solid #bf3a2b;border-radius:3px;background:rgba(191,58,43,.07);display:flex;align-items:center;justify-content:space-between;padding:0 14px;"><span style="font-size:12px;font-weight:700;color:#bf3a2b;">1F 総合受付 ◉ 現在地</span><span style="font-size:10px;color:#5b6472;">整理券の列</span></div>

                <div style="position:absolute;right:10px;bottom:9px;font-size:10px;letter-spacing:1px;color:#8a8264;">B2F〜B6Fの存在は公式には認められていない</div>

            </div>
          </div>

/*
 * Claude Design の x-dc テンプレート（sc-if / sc-for / {{ 変数 }} / onClick）を
 * そのまま解釈して描画するミニランタイム。support.js（React ベースのプレビュー用）の代替。
 * 状態変更のたびにテンプレート全体を再構築する（プロトタイプの再レンダーと同等）。
 */
(function () {
  var cache = new Map();
  function compile(expr) {
    var fn = cache.get(expr);
    if (!fn) {
      fn = new Function('__s', 'with(__s){return(' + expr + ');}');
      cache.set(expr, fn);
    }
    return fn;
  }
  function evalExpr(expr, scope) {
    return compile(expr)(scope);
  }
  // "{{ expr }}" 単体の属性値から式を取り出す
  function single(text) {
    var m = /^\s*\{\{\s*([\s\S]+?)\s*\}\}\s*$/.exec(text || '');
    return m ? m[1] : null;
  }
  function interpolate(text, scope) {
    if (text.indexOf('{{') === -1) return text;
    return text.replace(/\{\{\s*([\s\S]+?)\s*\}\}/g, function (_, expr) {
      var v = evalExpr(expr, scope);
      return v == null ? '' : String(v);
    });
  }
  function build(nodes, scope, parent) {
    for (var i = 0; i < nodes.length; i++) {
      var node = nodes[i];
      if (node.nodeType === Node.TEXT_NODE) {
        parent.appendChild(document.createTextNode(interpolate(node.nodeValue, scope)));
        continue;
      }
      if (node.nodeType !== Node.ELEMENT_NODE) continue;
      var tag = node.localName;
      if (tag === 'sc-if') {
        var cond = single(node.getAttribute('value'));
        if (cond && evalExpr(cond, scope)) build(node.childNodes, scope, parent);
        continue;
      }
      if (tag === 'sc-for') {
        var listExpr = single(node.getAttribute('list'));
        var as = node.getAttribute('as') || 'item';
        var list = (listExpr && evalExpr(listExpr, scope)) || [];
        for (var j = 0; j < list.length; j++) {
          var child = Object.assign({}, scope);
          child[as] = list[j];
          build(node.childNodes, child, parent);
        }
        continue;
      }
      var el = document.createElementNS(node.namespaceURI, tag);
      for (var k = 0; k < node.attributes.length; k++) {
        var attr = node.attributes[k];
        if (attr.name.indexOf('hint-placeholder') === 0) continue;
        if (attr.name === 'onclick') {
          var handlerExpr = single(attr.value);
          var fn = handlerExpr ? evalExpr(handlerExpr, scope) : null;
          if (typeof fn === 'function') el.addEventListener('click', fn);
          continue;
        }
        el.setAttribute(attr.name, interpolate(attr.value, scope));
      }
      build(node.childNodes, scope, el);
      parent.appendChild(el);
    }
  }
  window.DCLogic = class DCLogic {
    mount(rootEl, templateEl) {
      this._root = rootEl;
      this._tpl = templateEl.content;
      this.render();
    }
    setState(update) {
      var patch = typeof update === 'function' ? update(this.state) : update;
      Object.assign(this.state, patch);
      this.render();
    }
    render() {
      var scope = this.renderVals();
      var frag = document.createDocumentFragment();
      build(this._tpl.childNodes, scope, frag);
      this._root.replaceChildren(frag);
    }
  };
})();

/*
 * 全作品共通のゲームエンジン。ダイス・d20判定・localStorage 永続化と、
 * シェル（DCLogic コンポーネント）へのゲーム状態の合流（attach）を担う。
 * 作品ごとの中身（シナリオ・画面の値）は games/<id>.game.js が window.__GAME__ に定義する。
 */
(function () {
  function rollDie(sides) {
    return 1 + Math.floor(Math.random() * sides);
  }
  function pickKeys(obj, keys) {
    var o = {};
    for (var i = 0; i < keys.length; i++) o[keys[i]] = obj[keys[i]];
    return o;
  }
  window.GameEngine = {
    rollDie: rollDie,
    clamp: function (v, lo, hi) {
      return Math.max(lo, Math.min(hi, v));
    },
    // d20 判定。20 は大成功、1 は大失敗（出目優先）
    check: function (mod, dc) {
      var die = rollDie(20);
      var total = die + mod;
      var outcome = die === 20 ? 'crit' : die === 1 ? 'fumble' : total >= dc ? 'success' : 'fail';
      return { die: die, mod: mod, total: total, dc: dc, outcome: outcome, ok: outcome === 'crit' || outcome === 'success' };
    },
    outcomeText: function (outcome) {
      return { crit: '大成功', success: '成功', fail: '失敗', fumble: '大失敗' }[outcome] || '';
    },
    attach: function (app, game) {
      var key = 'trpg-game-' + game.id;
      var saved = null;
      try { saved = JSON.parse(localStorage.getItem(key) || 'null'); } catch (e) {}
      Object.assign(app.state, game.initialState(), saved || {});
      if (game.migrate) game.migrate(app.state);
      var baseRenderVals = app.renderVals.bind(app);
      app.renderVals = function () {
        var vals = baseRenderVals();
        return Object.assign(vals, game.vals(app, vals));
      };
      var baseSetState = app.setState.bind(app);
      app.setState = function (update) {
        baseSetState(update);
        try { localStorage.setItem(key, JSON.stringify(pickKeys(app.state, game.persist))); } catch (e) {}
      };
      // ゲーム状態のみ初期値へ戻す（device / play / screen は保持）
      app._resetGame = function () {
        try { localStorage.removeItem(key); } catch (e) {}
        Object.assign(app.state, game.initialState());
        app.render();
      };
    },
  };
})();

      out.tai = st.tai;
      out.taiPct = Math.round((st.tai / TAI_MAX) * 100);
      out.mp = st.mp;
      out.mpPct = Math.round((st.mp / MP_MAX) * 100);
      var sInfo = shinyoInfo(st.shinyo);
      out.shinyo = st.shinyo;
      out.shinyoRank = sInfo.rank;
      out.shinyoColor = sInfo.color;
      out.shinyoPct = Math.round((E.clamp(st.shinyo, 0, SHINYO_MAX) / SHINYO_MAX) * 100);
      out.taiUp = function () { app.setState({ tai: E.clamp(st.tai + 1, 0, TAI_MAX) }); };
      out.taiDown = function () { app.setState({ tai: E.clamp(st.tai - 1, 0, TAI_MAX) }); };
      out.mpUp = function () { app.setState({ mp: E.clamp(st.mp + 1, 0, MP_MAX) }); };
      out.mpDown = function () { app.setState({ mp: E.clamp(st.mp - 1, 0, MP_MAX) }); };
      out.shinyoUp = function () { app.setState({ shinyo: E.clamp(st.shinyo + 10, 0, SHINYO_MAX) }); };
      out.shinyoDown = function () { app.setState({ shinyo: E.clamp(st.shinyo - 10, 0, SHINYO_MAX) }); };

      // ── 税額査定 ──
      var isCheck = st.diceSides === 20;
      var skill = SKILLS[st.skillIdx] || SKILLS[0];
      out.diceIsCheck = isCheck;
      out.diceHead = isCheck ? '■ ' + skill.name + 'の査定 ・ 認定基準 ' + st.diceDc : 'd' + st.diceSides + ' を振る';
      out.dcMinus = function () { app.setState({ diceDc: E.clamp(st.diceDc - 1, 2, 30) }); };
      out.dcPlus = function () { app.setState({ diceDc: E.clamp(st.diceDc + 1, 2, 30) }); };
      var lr = st.lastRoll;
      if (!lr) {
        out.diceFace = '—'; out.stampWord = ''; out.diceFormula = 'まだ査定印は押していない'; out.diceVerdict = ''; out.diceVerdictColor = '#5b6472';
      } else if (lr.kind === 'check') {
        var si = stampInfo(lr);
        out.diceFace = lr.die;
        out.stampWord = si.word;
        out.diceFormula = 'd20 ＝ ' + lr.die + ' ＋ 控除修正 ' + lr.mod;
        out.diceVerdict = si.verdict;
        out.diceVerdictColor = si.color;
      } else {
        out.diceFace = lr.value;
        out.stampWord = '出目';
        out.diceFormula = 'd' + lr.sides + ' の出目';
        out.diceVerdict = '＝ ' + lr.value;
        out.diceVerdictColor = '#5b6472';
      }
      out.diceTypes = DICE_SIDES.map(function (s) {
        var sel = s === st.diceSides;
        return {
          label: 'd' + s,
          go: function () { app.setState({ diceSides: s }); },
          border: sel ? '2px solid #23324a' : '1px solid rgba(35,50,74,.3)',
          color: sel ? '#23324a' : '#5b6472',
          bg: sel ? 'rgba(35,50,74,.06)' : 'transparent',
          weight: sel ? '600' : '400',
        };
      });
      out.diceSkills = SKILLS.map(function (sk, i) {
        var sel = i === st.skillIdx;
        return {
          label: sk.name + '（' + (sk.mod >= 0 ? '+' + sk.mod : sk.mod) + '）',
          go: function () { app.setState({ skillIdx: i }); },
          border: sel ? '1px solid #23324a' : '1px solid rgba(35,50,74,.3)',
          color: sel ? '#23324a' : '#5b6472',
          bg: sel ? 'rgba(35,50,74,.06)' : 'transparent',
        };
      });
      out.rollNow = function () {
        if (st.diceSides === 20) {
          var r = E.check(skill.mod, st.diceDc);
          var si = stampInfo(r);
          pushLog(st, 'アリエル ・ ' + skill.name, r.total + ' ／ ' + si.word, si.color);
          var patch = { lastRoll: { kind: 'check', die: r.die, mod: r.mod, total: r.total, dc: r.dc, outcome: r.outcome, ok: r.ok, skillName: skill.name }, rollLog: st.rollLog };
          if (si.refund) patch.decGold = Math.max(0, st.decGold + si.refund);
          app.setState(patch);
        } else {
          var v = E.rollDie(st.diceSides);
          pushLog(st, 'アリエル ・ d' + st.diceSides, v + ' ／ 出目', '#5b6472');
          app.setState({ lastRoll: { kind: 'plain', sides: st.diceSides, value: v }, rollLog: st.rollLog });
        }
      };
      out.logRows = st.rollLog;

      // ── 税務調査 ──
      out.kaiTitle = '税務調査 ・ 第' + st.kai + '回 質問検査';
      function aliveIdx(from) {
        for (var i = 1; i <= COMBATANTS.length; i++) {
          var idx = (from + i) % COMBATANTS.length;
          if (st[COMBATANTS[idx].key] > 0) return idx;
        }
        return from;
      }
      out.nextTurn = function () {
        var next = aliveIdx(st.turnIdx);
        var patch = { turnIdx: next };
        if (next <= st.turnIdx) patch.kai = st.kai + 1;
        app.setState(patch);
      };
      out.takeBreak = function () {
        var patch = {};
        COMBATANTS.forEach(function (c) {
          if (!c.boss && st[c.key] > 0) patch[c.key] = E.clamp(st[c.key] + 2, 0, c.max);
        });
        app.setState(patch);
      };
      out.combatants = COMBATANTS.map(function (c, i) {
        var hp = st[c.key];
        var dead = hp <= 0;
        var active = i === st.turnIdx && !dead;
        var tags = dead
          ? [{ t: c.deadTag, bg: c.boss ? 'rgba(31,110,80,.14)' : 'rgba(191,58,43,.14)', color: c.boss ? '#1f6e50' : '#bf3a2b' }]
          : c.tags;
        function adj(d) {
          return function () {
            var patch = {};
            patch[c.key] = E.clamp(hp + d, 0, c.max);
            app.setState(patch);
          };
        }
        var btns = c.boss
          ? [
              { t: '−3万', color: '#1f6e50', go: adj(-30000) },
              { t: '−1万', color: '#1f6e50', go: adj(-10000) },
              { t: '+1万', color: '#bf3a2b', go: adj(10000) },
              { t: '+3万', color: '#bf3a2b', go: adj(30000) },
            ]
          : [
              { t: '−5', color: '#bf3a2b', go: adj(-5) },
              { t: '−1', color: '#bf3a2b', go: adj(-1) },
              { t: '+1', color: '#2c5f8a', go: adj(1) },
              { t: '+5', color: '#2c5f8a', go: adj(5) },
            ];
        return {
          name: c.name, init: c.init, gauge: c.boss ? '追徴予定額' : '精神力',
          valLabel: c.boss ? commaG(hp) : hp + '/' + c.max,
          pct: Math.round((hp / c.max) * 100),
          side: active ? '答弁中' : c.boss ? '査察官' : '',
          sideColor: c.boss ? '#8a8264' : '#bf3a2b',
          isBoss: c.boss,
          pad: c.boss ? '12px 14px' : '11px 14px',
          mb: c.boss ? '14px' : '8px',
          border: active ? '2px solid #bf3a2b' : c.boss ? '2px solid #bf3a2b' : '1px solid rgba(35,50,74,.25)',
          bg: active ? 'rgba(191,58,43,.05)' : c.boss ? 'rgba(191,58,43,.05)' : i % 2 ? '#fdfcf7' : 'rgba(35,50,74,.05)',
          op: dead ? '.55' : '1',
          initBg: active || c.boss ? '#bf3a2b' : 'rgba(35,50,74,.12)',
          initColor: active || c.boss ? '#f6f3e9' : '#5b6472',
          tokenBorder: c.boss ? '#bf3a2b' : '#23324a',
          tokenPat: c.boss ? 'rgba(191,58,43,.14)' : 'rgba(35,50,74,.12)',
          nameColor: c.boss ? '#bf3a2b' : '#23324a',
          barBg: c.boss ? 'linear-gradient(90deg,#b58a1f,#bf3a2b)' : '#2c5f8a',
          hasTags: tags.length > 0, tags: tags,
          btns: btns,
        };
      });

      // ── 領収書綴 ──
      out.decLabel = commaG(st.decGold);
      out.undecLabel = commaG(st.undecGold) + (st.undecGold > 0 ? ' ⚠' : '');
      out.undecColor = st.undecGold > 0 ? '#bf3a2b' : '#1f6e50';
      out.receipts = RECEIPT_DEFS.filter(function (d) {
        return !(d.hidden0 && (st.items[d.k] || 0) <= 0);
      }).map(function (d) {
        var resolved = !!st.receiptState[d.k];
        var actionable = !!d.actionable && !resolved;
        return {
          title: d.title, amt: resolved ? '計上済' : d.amt, amtColor: resolved ? '#1f6e50' : (d.amtColor || '#23324a'),
          bd: d.bd, bg: d.bg, note: resolved ? 'この件は解決済み' : d.note,
          noteColor: resolved ? '#1f6e50' : d.noteColor, mark: resolved ? '✓' : d.mark, markColor: resolved ? '#1f6e50' : d.markColor,
          op: '1', actionable: actionable, actLabel: d.actLabel,
          act: function () {
            var rs = Object.assign({}, st.receiptState);
            rs[d.k] = 1;
            var patch = { receiptState: rs };
            if (d.k === 'scale') { patch.decGold = st.decGold + 900; patch.undecGold = Math.max(0, st.undecGold - 900); pushLog(st, 'アリエル ・ ドラゴンの鱗の鑑定計上', '900G ／ 承認', '#1f6e50'); }
            if (d.k === 'jar') { patch.mp = E.clamp(st.mp - 1, 0, MP_MAX); pushLog(st, 'アリエル ・ 謎の壺を開ける', '中から声が漏れた', '#7a5a9e'); }
            if (d.k === 'blank') { patch.shinyo = E.clamp(st.shinyo + 20, 0, SHINYO_MAX); pushLog(st, '一同 ・ 白紙の領収書を廃棄', '信用 ＋20', '#1f6e50'); }
            patch.rollLog = st.rollLog;
            app.setState(patch);
          },
        };
      });

      // ── 申述書 ──
      var node = NODES[st.storyNode] || NODES.t1;
      out.storyKicker = node.kicker;
      out.storyTitle = node.title;
      out.storyBlocks = node.text.map(function (b) {
        return typeof b === 'string' ? { isP: true, isQ: false, t: b } : { isP: false, isQ: true, t: b.q };
      });
      out.storyHasNote = !!st.storyNote;
      out.storyNote = st.storyNote || '';
      out.storyNoteColor = st.storyNoteColor || '#5b6472';
      out.storyPct = node.pct;
      out.storyPctLabel = node.end ? '事案087 ・ 結審' : '事案087 ・ 審理進捗 ' + node.pct + '%';
      out.storyCanRestart = st.storyNode !== 't1';
      out.storyRestart = function () { app._resetGame(); };

      function choose(c) {
        return function () {
          var patch = { storyNote: null, storyNoteColor: '#5b6472' };
          var target = c.to;
          if (c.check) {
            var dc = typeof c.check.dc === 'function' ? c.check.dc(st) : c.check.dc;
            var r = E.check(c.check.mod, dc);
            patch.storyNote = c.check.name + '判定 — d20〈' + r.die + '〉＋' + r.mod + ' ＝ ' + r.total + ' ／ 基準' + dc + ' ・ ' + (r.ok ? '承認' : '差戻');
            patch.storyNoteColor = r.ok ? '#1f6e50' : '#bf3a2b';
            pushLog(st, 'アリエル ・ ' + c.check.name + '（申述書）', r.total + ' ／ ' + (r.ok ? '承認' : '差戻'), r.ok ? '#1f6e50' : '#bf3a2b');
            patch.rollLog = st.rollLog;
            target = r.ok ? c.success : c.fail;
          }
          var nextNode = NODES[target];
          applyFx(st, nextNode.fx, patch);
          var taiNow = 'tai' in patch ? patch.tai : st.tai;
          var shinyoNow = 'shinyo' in patch ? patch.shinyo : st.shinyo;
          if (taiNow <= 0 && !nextNode.end) {
            target = 'E_faint';
            applyFx(st, NODES.E_faint.fx, patch);
          } else if (shinyoNow <= 0 && !nextNode.end) {
            target = 'E_shinyoZero';
            applyFx(st, NODES.E_shinyoZero.fx, patch);
          }
          patch.storyNode = target;
          app.setState(patch);
        };
      }
      var defs = node.end ? END_CHOICES : node.choices;
      out.storyChoices = defs.filter(function (c) {
        return !c.if || c.if(st);
      }).map(function (c) {
        var dc = c.check ? (typeof c.check.dc === 'function' ? c.check.dc(st) : c.check.dc) : null;
        return {
          num: c.num || '', pre: c.pre, skillText: c.skillText || '', post: c.post || '',
          dcLabel: dc != null ? '難度' + dc : '',
          go: c.restart ? function () { app._resetGame(); }
            : c.top ? function () { app.setState({ screen: 'top' }); }
            : choose(c),
        };
      });

      // ── 署長室 ──
      out.gmScenes = GM_SCENES.map(function (t, i) {
        var active = i === st.gmScene;
        return {
          t: t, tag: active ? '進行中' : '',
          go: function () { app.setState({ gmScene: i }); },
          border: active ? '2px solid #bf3a2b' : '1px solid rgba(35,50,74,.3)',
          bg: active ? 'rgba(191,58,43,.04)' : '#fdfcf7',
          color: active ? '#23324a' : '#5b6472',
          weight: active ? '700' : '400',
        };
      });
      out.depth = st.depth;
      out.depthMinus = function () { app.setState({ depth: E.clamp(st.depth - 5, 0, 100) }); };
      out.depthPlus = function () { app.setState({ depth: E.clamp(st.depth + 5, 0, 100) }); };
      out.gmHasTable = !!st.gmTable;
      out.gmTableD = st.gmTable ? st.gmTable.d : '';
      out.gmTableText = st.gmTable ? st.gmTable.text : '';
      out.rollTable = function () {
        var d = E.rollDie(6);
        var text = GM_TABLE[d - 1];
        pushLog(st, '署長 ・ 庁舎の異変表', d + ' ／ ' + text, '#23324a');
        app.setState({ gmTable: { d: d, text: text }, rollLog: st.rollLog });
      };

      return out;
    },
  };
})();

window.__dcApp = new Component();
if (typeof GameEngine !== 'undefined' && window.__GAME__) GameEngine.attach(window.__dcApp, window.__GAME__);
window.__dcApp.mount(document.getElementById('app'), document.getElementById('dc-template'));
</script>
</body>
