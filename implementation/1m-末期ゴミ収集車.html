<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>末期ゴミ収集車</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700;900&family=Shippori+Mincho:wght@500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  body{margin:0;background:#131417;}
  @keyframes scfade{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:none}}
  @keyframes blinkled{0%,100%{opacity:.35}50%{opacity:1}}
  @keyframes truckbob{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}
  @keyframes stampin{0%{transform:rotate(6deg) scale(1.6);opacity:0}60%{transform:rotate(-2deg) scale(.97);opacity:1}100%{transform:rotate(-2deg) scale(1)}}
  ::-webkit-scrollbar{width:10px;height:10px}
  ::-webkit-scrollbar-thumb{background:rgba(58,123,168,.35);border-radius:8px}
  ::-webkit-scrollbar-track{background:transparent}
</style>
</head>
<body>
<div id="app"></div>
<template id="dc-template">
<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:34px 20px 96px;box-sizing:border-box;font-family:'Zen Maru Gothic',sans-serif;background:radial-gradient(120% 95% at 50% 0%,#22242a 0%,#131417 58%,#0c0d10 100%);color:#2c3440;">

  <div style="position:relative;width:{{ frameW }}px;height:{{ frameH }}px;max-width:100%;background:#f4f7f9;border:1px solid #d8e0e6;border-radius:8px;box-shadow:0 34px 90px -22px rgba(0,0,0,.75),0 0 0 8px rgba(8,9,11,.55);overflow:hidden;display:flex;flex-direction:column;">

    <div style="height:7px;flex:none;background:repeating-linear-gradient(135deg,#e8b432 0 16px,#2c3440 16px 32px);opacity:.85;"></div>

    <header style="position:relative;z-index:2;display:flex;align-items:center;justify-content:space-between;gap:14px;padding:11px 22px;border-bottom:2px solid #3a7ba8;background:linear-gradient(180deg,#ffffff,#eef4f7);">
      <div style="display:flex;align-items:center;gap:12px;">
        <span style="display:inline-flex;align-items:center;justify-content:center;width:30px;height:30px;flex:none;border-radius:8px;background:#3a7ba8;color:#fff;font-weight:900;font-size:14px;animation:truckbob 2.4s ease-in-out infinite;">🚛</span>
        <div>
          <div style="font-size:9px;letter-spacing:2px;color:#84919c;display:{{ taglineDisp }};">旧・市環境局 清掃事業課 ・ 稼働車両：最終1号車のみ</div>
          <div style="display:flex;align-items:baseline;gap:10px;">
            <span style="font-weight:900;font-size:{{ titleSize }}px;letter-spacing:2px;color:#2c3440;white-space:nowrap;">思い出分別収集アプリ</span>
            <span style="font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:1px;color:#3a7ba8;display:{{ enDisp }};">v9.4.1（最終更新：文明滅亡前日）</span>
          </div>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:10px;">
        <span style="font-size:12px;letter-spacing:1px;color:#84919c;display:{{ playLabelDisp }};white-space:nowrap;">{{ playLabel }}</span>
        <span style="display:inline-flex;align-items:center;gap:6px;font-family:'IBM Plex Mono',monospace;font-size:11px;padding:4px 10px;border:1px solid rgba(232,180,50,.5);border-radius:6px;color:#a5851f;background:rgba(232,180,50,.07);white-space:nowrap;"><span style="width:7px;height:7px;border-radius:50%;background:#e8b432;animation:blinkled 1.6s ease-in-out infinite;"></span>本日：燃えない思い出の日</span>
      </div>
    </header>

    <div style="position:relative;z-index:2;flex:1;display:flex;min-height:0;">

      <sc-if value="{{ showRail }}" hint-placeholder-val="{{ true }}">
        <nav style="width:{{ railW }}px;flex:none;border-right:1px solid rgba(58,123,168,.2);background:linear-gradient(180deg,rgba(58,123,168,.04),transparent);padding:15px 10px;display:flex;flex-direction:column;gap:3px;overflow-y:auto;">
          <sc-for list="{{ nav }}" as="item" hint-placeholder-count="8">
            <button onClick="{{ item.go }}" style="display:flex;align-items:center;gap:11px;width:100%;padding:9px 11px;border:0;border-radius:8px;cursor:pointer;text-align:left;background:{{ item.bg }};color:{{ item.color }};font-family:'Zen Maru Gothic',sans-serif;font-size:14px;font-weight:{{ item.weight }};">
              <span style="width:22px;height:22px;flex:none;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;border-radius:7px;background:{{ item.badgeBg }};color:{{ item.badgeColor }};border:{{ item.badgeBorder }};">{{ item.badge }}</span>
              <span style="{{ item.labelStyle }}">{{ item.label }}</span>
            </button>
          </sc-for>
        </nav>
      </sc-if>

      <main style="flex:1;min-width:0;overflow-y:auto;padding:{{ mainPad }};">

        <sc-if value="{{ isTop }}" hint-placeholder-val="{{ true }}">
          <div data-screen-label="収集カレンダー" style="animation:scfade .4s ease;max-width:760px;margin:0 auto;">
            <p style="font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:2px;color:#84919c;margin:0 0 7px;">滅亡後 第1247日 ・ 晴れ ・ 花粉（鉄錆）多め</p>
            <h1 style="font-weight:900;font-size:31px;line-height:1.4;margin:0 0 14px;color:#2c3440;">今日は、燃えない思い出の<br>収集日です。</h1>
            <p style="font-size:15px;line-height:2.0;color:#4e5a66;margin:0 0 10px;max-width:58ch;">文明は三年前に終わった。けれど収集車は今日も走る。滅びた街には、置き去りにされた思い出——<b style="color:#3a7ba8;">燃えるもの、燃えないもの、まだ再生できるもの</b>——が転がっていて、正しく分別された思い出だけが、安らかに眠れるからだ。あなたたちは最後の清掃班。<b style="color:#a5851f;">回収漏れは、夜に泣きます。</b></p>
            <p style="font-size:12px;color:#a7b3bc;margin:0 0 24px;">※このアプリは自動配信を続けています。管理者は、もういません。</p>

            <div style="border:1px solid rgba(58,123,168,.3);border-radius:12px;overflow:hidden;margin:0 0 26px;background:#fff;">
              <div style="padding:9px 14px;background:rgba(58,123,168,.06);border-bottom:1px solid rgba(58,123,168,.2);font-size:11px;font-weight:700;letter-spacing:2px;color:#3a7ba8;">■ 今週の収集カレンダー</div>
              <div style="display:grid;grid-template-columns:repeat({{ calCols }},1fr);gap:0;">
                <div style="padding:12px 8px;text-align:center;border-right:1px solid rgba(58,123,168,.12);"><div style="font-size:10px;color:#84919c;">月</div><div style="width:34px;height:34px;margin:6px auto 4px;border-radius:8px;background:rgba(224,104,68,.14);border:1.5px solid #e06844;display:flex;align-items:center;justify-content:center;font-size:15px;">🔥</div><div style="font-size:10px;font-weight:700;color:#e06844;">燃える思い出</div><div style="font-size:9px;color:#a7b3bc;">口喧嘩・置き手紙</div></div>
                <div style="padding:12px 8px;text-align:center;border-right:1px solid rgba(58,123,168,.12);background:rgba(58,123,168,.05);"><div style="font-size:10px;color:#3a7ba8;font-weight:700;">火 ◉ 今日</div><div style="width:34px;height:34px;margin:6px auto 4px;border-radius:8px;background:rgba(58,123,168,.14);border:2px solid #3a7ba8;display:flex;align-items:center;justify-content:center;font-size:15px;">🧊</div><div style="font-size:10px;font-weight:900;color:#3a7ba8;">燃えない思い出</div><div style="font-size:9px;color:#a7b3bc;">指輪・鍵・約束</div></div>
                <div style="padding:12px 8px;text-align:center;border-right:1px solid rgba(58,123,168,.12);"><div style="font-size:10px;color:#84919c;">水</div><div style="width:34px;height:34px;margin:6px auto 4px;border-radius:8px;background:rgba(63,158,106,.14);border:1.5px solid #3f9e6a;display:flex;align-items:center;justify-content:center;font-size:15px;">♻</div><div style="font-size:10px;font-weight:700;color:#3f9e6a;">資源（希望）</div><div style="font-size:9px;color:#a7b3bc;">種・楽譜・レシピ</div></div>
                <div style="padding:12px 8px;text-align:center;border-right:1px solid rgba(58,123,168,.12);"><div style="font-size:10px;color:#84919c;">木</div><div style="width:34px;height:34px;margin:6px auto 4px;border-radius:8px;background:rgba(122,90,158,.14);border:1.5px solid #7a5a9e;display:flex;align-items:center;justify-content:center;font-size:15px;">🛋</div><div style="font-size:10px;font-weight:700;color:#7a5a9e;">粗大（後悔）</div><div style="font-size:9px;color:#a7b3bc;">要・予約シール</div></div>
                <div style="padding:12px 8px;text-align:center;"><div style="font-size:10px;color:#84919c;">金</div><div style="width:34px;height:34px;margin:6px auto 4px;border-radius:8px;background:rgba(132,145,156,.14);border:1.5px dashed #84919c;display:flex;align-items:center;justify-content:center;font-size:15px;">？</div><div style="font-size:10px;font-weight:700;color:#84919c;">分別不能の日</div><div style="font-size:9px;color:#a7b3bc;">職員判断</div></div>
              </div>
            </div>

            <p style="font-size:11px;letter-spacing:3px;color:#3a7ba8;font-weight:700;margin:0 0 12px;">■ 勤務形態を選択</p>
            <div style="display:grid;grid-template-columns:{{ modeCols }};gap:12px;margin:0 0 28px;">
              <sc-for list="{{ playModes }}" as="m" hint-placeholder-count="3">
                <button onClick="{{ m.go }}" style="text-align:left;padding:14px 15px;border-radius:12px;cursor:pointer;border:{{ m.border }};background:{{ m.bg }};">
                  <div style="font-size:14px;font-weight:700;color:{{ m.titleColor }};margin-bottom:5px;">{{ m.t }}</div>
                  <div style="font-size:12px;line-height:1.7;color:#84919c;">{{ m.d }}</div>
                </button>
              </sc-for>
            </div>

            <p style="font-size:11px;letter-spacing:3px;color:#3a7ba8;font-weight:700;margin:0 0 14px;">■ 最終清掃班</p>
            <div style="display:flex;gap:16px;flex-wrap:wrap;margin-bottom:26px;">
              <div style="display:flex;flex-direction:column;align-items:center;gap:7px;width:96px;"><div style="width:62px;height:62px;border-radius:50%;border:2px solid #3a7ba8;background:repeating-linear-gradient(45deg,rgba(58,123,168,.1) 0 5px,transparent 5px 10px),#fff;"></div><div style="font-size:13px;font-weight:700;color:#2c3440;">灰田 ソラ</div><div style="font-size:11px;color:#84919c;">収集員（最後の新人）</div></div>
              <div style="display:flex;flex-direction:column;align-items:center;gap:7px;width:96px;"><div style="width:62px;height:62px;border-radius:50%;border:2px solid #e8b432;background:repeating-linear-gradient(45deg,rgba(232,180,50,.14) 0 5px,transparent 5px 10px),#fff;"></div><div style="font-size:13px;font-weight:700;color:#2c3440;">ポリ助</div><div style="font-size:11px;color:#84919c;">回収ユニット（旧型）</div></div>
              <div style="display:flex;flex-direction:column;align-items:center;gap:7px;width:96px;"><div style="width:62px;height:62px;border-radius:50%;border:2px solid #3f9e6a;background:repeating-linear-gradient(45deg,rgba(63,158,106,.12) 0 5px,transparent 5px 10px),#fff;"></div><div style="font-size:13px;font-weight:700;color:#2c3440;">運転手のジジ</div><div style="font-size:11px;color:#84919c;">勤続42年（滅亡を跨ぐ）</div></div>
              <div style="display:flex;flex-direction:column;align-items:center;gap:7px;width:96px;"><div style="width:62px;height:62px;border-radius:50%;border:2px dashed #84919c;background:radial-gradient(circle at 40% 35%,rgba(58,123,168,.2),rgba(58,123,168,.05)),#fff;"></div><div style="font-size:13px;font-weight:700;color:#2c3440;">ジチタイちゃん</div><div style="font-size:11px;color:#84919c;">アプリ内AI（元気なまま）</div></div>
            </div>

            <button onClick="{{ goStory }}" style="display:inline-flex;align-items:center;gap:10px;padding:13px 30px;border:0;border-radius:12px;cursor:pointer;background:#3a7ba8;color:#fff;font-weight:900;font-size:15px;letter-spacing:3px;box-shadow:0 5px 0 #2a5a7c;white-space:nowrap;">収集車を出す　➜</button>
          </div>
        </sc-if>

        <sc-if value="{{ isSheet }}" hint-placeholder-val="{{ false }}">
          <div data-screen-label="隊員手帳" style="animation:scfade .4s ease;max-width:820px;margin:0 auto;">
            <div style="display:flex;gap:20px;align-items:flex-start;flex-wrap:wrap;margin-bottom:20px;">
              <div style="width:88px;height:110px;flex:none;border:1px solid rgba(58,123,168,.4);border-radius:10px;background:repeating-linear-gradient(45deg,rgba(58,123,168,.07) 0 6px,transparent 6px 12px),#fff;display:flex;align-items:center;justify-content:center;font-size:9px;letter-spacing:1px;color:#a7b3bc;text-align:center;">職員証写真<br>（反射ベスト着用）</div>
              <div style="flex:1;min-width:240px;">
                <p style="font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:2px;color:#84919c;margin:0 0 4px;">職員番号 SE-1247 ・ 清掃事業課 職員手帳</p>
                <h1 style="font-weight:900;font-size:28px;margin:0 0 4px;color:#2c3440;">灰田 ソラ</h1>
                <p style="font-size:13px;color:#84919c;margin:0 0 10px;">収集員 ・ 十九歳 ・ 滅亡時は十六歳 ・ 前職：なし（学生だった）</p>
                <div style="display:flex;gap:7px;flex-wrap:wrap;">
                  <span style="font-size:11px;padding:3px 9px;border-radius:8px;border:1px solid rgba(58,123,168,.4);color:#4e5a66;">早起きが得意になった</span>
                  <span style="font-size:11px;padding:3px 9px;border-radius:8px;border:1px solid rgba(58,123,168,.4);color:#4e5a66;">思い出の声が聞こえる</span>
                  <span style="font-size:11px;padding:3px 9px;border-radius:8px;border:1px solid rgba(232,180,50,.6);color:#a5851f;">自分の家の分別が、まだ</span>
                </div>
              </div>
            </div>

            <div style="display:grid;grid-template-columns:{{ modeCols }};gap:13px;margin-bottom:22px;">
              <div style="background:#fff;border:1px solid rgba(58,123,168,.2);border-radius:12px;padding:11px 13px;"><div style="display:flex;justify-content:space-between;font-size:12px;color:#84919c;margin-bottom:5px;"><span>体力</span><span style="font-family:'IBM Plex Mono',monospace;">{{ tai }} / 15</span></div><div style="height:9px;border-radius:6px;background:rgba(44,52,64,.06);overflow:hidden;"><div style="width:{{ taiPct }}%;height:100%;background:#3a7ba8;"></div></div><div style="display:flex;gap:6px;margin-top:6px;"><button onClick="{{ taiDown }}" style="width:26px;height:26px;border:1.5px solid #3a7ba8;border-radius:7px;background:#fff;color:#3a7ba8;font-weight:700;font-size:14px;cursor:pointer;line-height:1;">−</button><button onClick="{{ taiUp }}" style="width:26px;height:26px;border:1.5px solid #3a7ba8;border-radius:7px;background:#fff;color:#3a7ba8;font-weight:700;font-size:14px;cursor:pointer;line-height:1;">＋</button></div></div>
              <div style="background:#fff;border:1px solid rgba(58,123,168,.2);border-radius:12px;padding:11px 13px;"><div style="display:flex;justify-content:space-between;font-size:12px;color:#84919c;margin-bottom:5px;"><span>心の積載量</span><span style="font-family:'IBM Plex Mono',monospace;">{{ kokoro }} / 10</span></div><div style="height:9px;border-radius:6px;background:rgba(44,52,64,.06);overflow:hidden;"><div style="width:{{ kokoroPct }}%;height:100%;background:#7a5a9e;"></div></div><div style="font-size:9px;color:#a7b3bc;margin:4px 0 6px;">※他人の思い出を積みすぎると、自分の記憶と混線する</div><div style="display:flex;gap:6px;"><button onClick="{{ kokoroDown }}" style="width:26px;height:26px;border:1.5px solid #3a7ba8;border-radius:7px;background:#fff;color:#3a7ba8;font-weight:700;font-size:14px;cursor:pointer;line-height:1;">−</button><button onClick="{{ kokoroUp }}" style="width:26px;height:26px;border:1.5px solid #3a7ba8;border-radius:7px;background:#fff;color:#3a7ba8;font-weight:700;font-size:14px;cursor:pointer;line-height:1;">＋</button></div></div>
              <div style="background:#fff;border:1px solid rgba(58,123,168,.2);border-radius:12px;padding:11px 13px;"><div style="display:flex;justify-content:space-between;font-size:12px;color:#84919c;margin-bottom:5px;"><span>街の清浄度</span><span style="font-family:'IBM Plex Mono',monospace;color:#3f9e6a;">{{ seijou }} / 100</span></div><div style="height:9px;border-radius:6px;background:rgba(44,52,64,.06);overflow:hidden;"><div style="width:{{ seijou }}%;height:100%;background:linear-gradient(90deg,#3a7ba8,#3f9e6a);"></div></div><div style="font-size:9px;color:#a7b3bc;margin:4px 0 6px;">※100で「この街の収集、完了」。その先は、まだ誰も考えていない</div><div style="display:flex;gap:6px;"><button onClick="{{ seijouDown }}" style="width:26px;height:26px;border:1.5px solid #3a7ba8;border-radius:7px;background:#fff;color:#3a7ba8;font-weight:700;font-size:14px;cursor:pointer;line-height:1;">−</button><button onClick="{{ seijouUp }}" style="width:26px;height:26px;border:1.5px solid #3a7ba8;border-radius:7px;background:#fff;color:#3a7ba8;font-weight:700;font-size:14px;cursor:pointer;line-height:1;">＋</button></div></div>
            </div>

            <p style="font-size:11px;letter-spacing:3px;color:#3a7ba8;font-weight:700;margin:0 0 12px;">■ 能力</p>
            <div style="display:grid;grid-template-columns:repeat({{ abilityCols }},1fr);gap:0;border:1px solid rgba(58,123,168,.3);border-radius:12px;overflow:hidden;margin-bottom:24px;background:#fff;">
              <div style="padding:10px 4px;text-align:center;border-right:1px solid rgba(58,123,168,.12);background:rgba(58,123,168,.04);"><div style="font-size:10px;color:#3a7ba8;">分別眼</div><div style="font-family:'IBM Plex Mono',monospace;font-size:23px;font-weight:600;color:#3a7ba8;line-height:1.25;">16</div><div style="font-size:10px;color:#2f8a5c;">＋3</div></div>
              <div style="padding:10px 4px;text-align:center;border-right:1px solid rgba(58,123,168,.12);"><div style="font-size:10px;color:#84919c;">運搬</div><div style="font-family:'IBM Plex Mono',monospace;font-size:23px;font-weight:600;color:#2c3440;line-height:1.25;">13</div><div style="font-size:10px;color:#2f8a5c;">＋1</div></div>
              <div style="padding:10px 4px;text-align:center;border-right:1px solid rgba(58,123,168,.12);"><div style="font-size:10px;color:#84919c;">傾聴</div><div style="font-family:'IBM Plex Mono',monospace;font-size:23px;font-weight:600;color:#2c3440;line-height:1.25;">15</div><div style="font-size:10px;color:#2f8a5c;">＋2</div></div>
              <div style="padding:10px 4px;text-align:center;border-right:1px solid rgba(58,123,168,.12);"><div style="font-size:10px;color:#84919c;">探索</div><div style="font-family:'IBM Plex Mono',monospace;font-size:23px;font-weight:600;color:#2c3440;line-height:1.25;">14</div><div style="font-size:10px;color:#2f8a5c;">＋2</div></div>
              <div style="padding:10px 4px;text-align:center;border-right:1px solid rgba(58,123,168,.12);"><div style="font-size:10px;color:#84919c;">機械いじり</div><div style="font-family:'IBM Plex Mono',monospace;font-size:23px;font-weight:600;color:#2c3440;line-height:1.25;">9</div><div style="font-size:10px;color:#c65448;">−1</div></div>
              <div style="padding:10px 4px;text-align:center;"><div style="font-size:10px;color:#84919c;">胆力</div><div style="font-family:'IBM Plex Mono',monospace;font-size:23px;font-weight:600;color:#2c3440;line-height:1.25;">12</div><div style="font-size:10px;color:#84919c;">±0</div></div>
            </div>

            <div style="display:grid;grid-template-columns:{{ twoCols }};gap:24px;">
              <div>
                <p style="font-size:11px;letter-spacing:3px;color:#3a7ba8;font-weight:700;margin:0 0 10px;">■ 技能</p>
                <div style="display:flex;justify-content:space-between;font-size:14px;color:#4e5a66;padding:6px 0;border-bottom:1px dashed rgba(58,123,168,.25);"><span>思い出の持ち主を推定する</span><span style="font-family:'IBM Plex Mono',monospace;color:#2f8a5c;">+5</span></div>
                <div style="display:flex;justify-content:space-between;font-size:14px;color:#4e5a66;padding:6px 0;border-bottom:1px dashed rgba(58,123,168,.25);"><span>「これは資源です」と言い張る</span><span style="font-family:'IBM Plex Mono',monospace;color:#2f8a5c;">+4</span></div>
                <div style="display:flex;justify-content:space-between;font-size:14px;color:#4e5a66;padding:6px 0;border-bottom:1px dashed rgba(58,123,168,.25);"><span>重いものを丁寧に持つ</span><span style="font-family:'IBM Plex Mono',monospace;color:#2f8a5c;">+4</span></div>

        <sc-if value="{{ isDice }}" hint-placeholder-val="{{ false }}">      <div data-screen-label="分別判定" style="animation:scfade .4s ease;max-width:560px;margin:0 auto;text-align:center;">        <p style="font-size:11px;letter-spacing:3px;color:#3a7ba8;font-weight:700;margin:0 0 4px;">■ 分別判定 ・ 目標 <button onClick="{{ dcMinus }}" style="border:0;background:none;color:#c65448;font-weight:700;font-size:13px;cursor:pointer;padding:2px 6px;">－</button>{{ diceDc }}<button onClick="{{ dcPlus }}" style="border:0;background:none;color:#2f8a5c;font-weight:700;font-size:13px;cursor:pointer;padding:2px 6px;">＋</button> ・ 技能：{{ skillLabel }}</p>        <div style="display:flex;flex-direction:column;align-items:center;gap:8px;margin:18px 0 24px;">          <div style="width:122px;height:122px;border:3px solid {{ stampColor }};border-radius:14px;animation:stampin .5s ease;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#fff;box-shadow:0 8px 20px -8px rgba(58,123,168,.35);gap:2px;">            <span style="font-size:10px;letter-spacing:2px;color:#84919c;">判定値</span>            <span style="font-family:'IBM Plex Mono',monospace;font-size:44px;font-weight:600;line-height:1.05;color:#2c3440;">{{ diceFace }}</span>            <b style="display:inline-block;padding:1px 12px;border-radius:999px;background:rgba(58,123,168,.12);color:{{ stampColor }};font-size:12px;letter-spacing:1px;">{{ stampWord }}</b>          </div>          <div style="font-size:14px;color:#84919c;margin-top:6px;">{{ diceFormula }}</div>          <div style="font-size:14px;letter-spacing:1px;color:{{ stampColor }};font-weight:700;">{{ diceVerdict }}</div>          <p style="font-size:10px;color:#a7b3bc;margin:2px 0 0;">※誤分別は思い出が「化けて」出ます。粗大（後悔）を燃やすのは特に厳禁。</p>        </div>        <div style="display:flex;justify-content:center;gap:7px;flex-wrap:wrap;margin-bottom:10px;">          <sc-for list="{{ diceTypes }}" as="dt" hint-placeholder-count="7">            <button onClick="{{         <sc-if value="{{ isCombat }}" hint-placeholder-val="{{ false }}">      <div data-screen-label="収集ルート" style="animation:scfade .4s ease;max-width:780px;margin:0 auto;">        <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:6px;">          <h1 style="font-weight:900;font-size:24px;margin:0;color:#2c3440;">収集ルート ・ 第3区（旧・住宅街）</h1>          <div style="display:flex;gap:8px;"><button onClick="{{ shortRest }}" style="padding:8px 15px;border:1px solid rgba(58,123,168,.35);border-radius:8px;background:#fff;color:#84919c;cursor:pointer;font-size:13px;font-family:'Zen Maru Gothic',sans-serif;white-space:nowrap;flex:none;">小休止</button><button onClick="{{ nextStop }}" style="padding:8px 15px;border:0;border-radius:8px;background:#3a7ba8;color:#fff;cursor:pointer;font-weight:700;font-size:13px;font-family:'Zen Maru Gothic',sans-serif;box-shadow:0 4px 0 #2a5a7c;white-space:nowrap;flex:none;">次の集積所へ</button></div>        </div>        <p style="font-size:12px;color:#a7b3bc;margin:0 0 14px;">※集積所ごとに全員一手番。日没までに車庫へ戻れないと、荷台の思い出が里心をつけて逃げ出します。</p>        <div style="border:2px solid #e8b432;border-radius:12px;padding:12px 14px;margin-bottom:14px;background:rgba(232,180,50,.04);">          <div style="display:flex;align-items:baseline;justify-content:space-between;flex-wrap:wrap;gap:6px;margin-bottom:6px;"><span style="font-size:15px;font-weight:900;color:#a5851f;">1号車 ・ 荷台積載 {{ truckLoad }}%</span><span style="font-family:'IBM Plex Mono',monospace;font-size:11px;color:#a5851f;white-space:nowrap;">日没まで {{ duskLabel }}</span></div>          <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;">            <div><div style="display:flex;justify-content:space-between;font-size:11px;color:#84919c;margin-bottom:3px;"><span>燃料（軽油＋鼻歌）</span><span style="font-family:'IBM Plex Mono',monospace;">{{ fuel }}%</span></div><div style="height:8px;border-radius:5px;background:rgba(44,52,64,.06);overflow:hidden;"><div style="width:{{ fuel }}%;height:100%;background:#3f9e6a;"></div></div></div>            <div><div style="display:flex;justify-content:space-between;font-size:11px;color:#84919c;margin-bottom:3px;"><span>回転板の機嫌</span><span style="font-family:'IBM Plex Mono',monospace;">{{ wheelLabel }}</span></div><div style="height:8px;border-radius:5px;background:rgba(44,52,64,.06);overflow:hidden;"><div style="width:{{ wheel }}%;height:100%;background:#e8b432;"></div></div></div>            <div><div style="display:flex;justify-content:space-between;font-size:11px;color:#84919c;margin-bottom:3px;"><span>ソラの心の積載</span><span style="font-family:'IBM Plex Mono',monospace;">{{ kokoro }}/10</span></div><div style="height:8px;border-radius:5px;background:rgba(44,52,64,.06);overflow:hidden;"><div style="width:{{ kokoroPct }}%;height:100%;background:#7a5a9e;"></div></div></div>          </div>        </div>        <p style="font-size:11px;letter-spacing:3px;color:#3a7ba8;font-weight:700;margin:0 0 10px;">■ 本日の集積所（対応順）</p>        <sc-for list="{{ stops }}" as="s" hint-placeholder-count="4">          <div style="display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:12px;border:{{ s.border }};background:{{ s.bg }};margin-bottom:8px;">            <span style="width:30px;height:30px;flex:none;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:13px;background:{{ s.numBg }};color:{{ s.numColor }};border-radius:8px;">{{ s.num }}</span>            <div style="flex:1;min-width:0;"><div style="font-size:15px;font-weight:700;color:{{ s.titleColor }};">{{ s.title }} <span style="font-size:11px;color:{{ s.tagColor }};">{{ s.tag }}</span></div><div style="font-size:12px;color:#84919c;margin-top:2px;">{{ s.note }}</div></div>            <div style="width:150px;flex:none;"><div style="display:flex;justify-content:space-between;font-size:11px;color:#84919c;margin-bottom:3px;"><span>{{ s.gauge }}</span><span style="font-family:'IBM Plex Mono',monospace;">{{ s.value }}</span></div><div style="height:8px;border-radius:5px;background:rgba(44,52,64,.06);overflow:hidden;"><div style="width:{{ s.pct }}%;height:100%;background:{{ s.barColor }};"></div></div>              <sc-if value="{{ s.hasBtns }}" hint-placeholder-val="{{ true }}">                <div style="display:flex;gap:5px;margin-top:5px;justify-content:flex-end;"><button onClick="{{ s.dec }}" style="border:0;background:none;color:#c65448;font-weight:700;font-size:13px;cursor:pointer;padding:2px 6px;">－</button><button onClick="{{ s.inc }}" style="border:0;background:none;color:#2f8a5c;font-weight:700;font-size:13px;cursor:pointer;padding:2px 6px;">＋</button></div>              </sc-if>            </div>          </div>        </sc-for>      </div>      </sc-if>

        <sc-if value="{{ isInv }}" hint-placeholder-val="{{ false }}">

              <h1 style="font-weight:900;font-size:24px;margin:0;color:#2c3440;">荷台マニフェスト ・ 積載62%</h1>
              <span style="font-family:'IBM Plex Mono',monospace;font-size:12px;color:#84919c;white-space:nowrap;">本日回収 47件 ・ 要持ち主照会 3件</span>
            </div>
            <div style="display:grid;grid-template-columns:{{ invCols }};gap:22px;">
              <div>
                <p style="font-size:11px;letter-spacing:3px;color:#3a7ba8;font-weight:700;margin:0 0 11px;">■ 車両装備</p>
                <div style="padding:12px 14px;border:1px solid rgba(58,123,168,.3);border-radius:12px;margin-bottom:8px;background:#fff;"><div style="display:flex;justify-content:space-between;gap:8px;"><div style="font-size:14px;font-weight:700;color:#2c3440;">白手袋（思い出用）</div><span style="font-size:10px;color:#2f8a5c;font-family:'IBM Plex Mono',monospace;flex:none;">全員分</span></div><div style="font-size:12px;color:#84919c;margin-top:3px;line-height:1.7;">素手で触ると思い出が「懐く」。懐かれると分別しづらくなる。</div></div>
                <div style="padding:12px 14px;border:1px solid rgba(58,123,168,.3);border-radius:12px;margin-bottom:8px;background:#fff;"><div style="display:flex;justify-content:space-between;gap:8px;"><div style="font-size:14px;font-weight:700;color:#2c3440;">持ち主照会端末（電池式）</div><span style="font-size:10px;color:#a5851f;font-family:'IBM Plex Mono',monospace;flex:none;">電池 残2本</span></div><div style="font-size:12px;color:#84919c;margin-top:3px;line-height:1.7;">思い出をかざすと持ち主の氏名が出る。「該当者なし」が出た思い出は、まだ持ち主が生きている。</div></div>
                <div style="padding:12px 14px;border:1px solid rgba(232,180,50,.5);border-radius:12px;background:rgba(232,180,50,.05);"><div style="display:flex;justify-content:space-between;gap:8px;"><div style="font-size:14px;font-weight:700;color:#a5851f;">粗大（後悔）用 予約シール</div><span style="font-size:10px;color:#a5851f;font-family:'IBM Plex Mono',monospace;flex:none;">残9枚</span></div><div style="font-size:12px;color:#84919c;margin-top:3px;line-height:1.7;">貼ると後悔が「順番を待てる」ようになる。発行元はもう無いので、使い切ったら終わり。</div></div>
              </div>
              <div>

                <div style="border:1px solid rgba(58,123,168,.25);border-radius:12px;padding:10px 13px;margin-bottom:8px;background:#fff;"><div style="display:flex;justify-content:space-between;gap:8px;font-size:13px;color:#2c3440;"><span style="font-weight:700;">婚約指輪（郵便受け内・未開封）</span><span style="font-family:'IBM Plex Mono',monospace;color:#3a7ba8;flex:none;">燃えない</span></div><div style="font-size:11px;color:{{ ringColor }};margin-top:2px;">{{ ringNote }}</div><sc-if value="{{ ringPending }}" hint-placeholder-val="{{ true }}"><button onClick="{{ lookupRing }}" style="margin-top:7px;font-size:11px;padding:5px 12px;border-radius:7px;border:1px solid #3a7ba8;background:rgba(58,123,168,.05);color:#3a7ba8;cursor:pointer;font-family:'Zen Maru Gothic',sans-serif;">照会端末にかざす（電池 残{{ battery }}本）</button></sc-if></div>
                <div style="border:1px solid rgba(58,123,168,.25);border-radius:12px;padding:10px 13px;margin-bottom:8px;background:#fff;"><div style="display:flex;justify-content:space-between;gap:8px;font-size:13px;color:#2c3440;"><span style="font-weight:700;">鍵束×7（どの家のでもない）</span><span style="font-family:'IBM Plex Mono',monospace;color:#3a7ba8;flex:none;">燃えない</span></div><div style="font-size:11px;color:#84919c;margin-top:2px;">7本とも同じ形。ジジいわく「昔この街に7つ、同じ扉があった」。詳細は語らず。</div></div>

                <div style="border:2px solid rgba(122,90,158,.5);border-radius:12px;padding:10px 13px;background:rgba(122,90,158,.03);"><div style="display:flex;justify-content:space-between;gap:8px;font-size:13px;color:#2c3440;"><span style="font-weight:700;">「ごめん」だけの留守電（テープ）</span><span style="font-family:'IBM Plex Mono',monospace;color:#7a5a9e;flex:none;">粗大（後悔）</span></div><div style="font-size:11px;color:#7a5a9e;margin-top:2px;">予約シール貼付済。ただし再生するたび「ごめん」の声が少しずつ若返っている。要観察。</div></div>

rsor:pointer;font-family:'Zen Maru Gothic',sans-serif;font-size:14px;color:#333d47;">{{ c.num }}　{{ c.pre }} <span style="color:#c9722e;font-weight:700;">{{ c.skillText }}</span>{{ c.post }} <span style="color:#c9722e;font-weight:700;">{{ c.dcLabel }}</span></button>        </sc-for>        <div style="margin-top:24px;height:5px;border-radius:3px;background:rgba(44,52,64,.06);overflow:hidden;"><div style="width:{{ storyPct }}%;height:100%;background:#3a7ba8;"></div></div>        <p style="text-align:center;font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:2px;color:#a7b3bc;margin:7px 0 0;">{{ storyPctLabel }}</p>      </div>      </sc-if>

<script>
/*
 * Claude Design の x-dc テンプレート（sc-if / sc-for / {{ 変数 }} / onClick）を
 * そのまま解釈して描画するミニランタイム。support.js（React ベースのプレビュー用）の代替。
 * 状態変更のたびにテンプレート全体を再構築する（プロトタイプの再レンダーと同等）。
 */
(function () {
  var cache = new Map();
  function compile(expr) {
    var fn = cache.get(expr);
    if (!fn) {
      fn = new Function('__s', 'with(__s){return(' + expr + ');}');
      cache.set(expr, fn);
    }
    return fn;
  }
  function evalExpr(expr, scope) {
    return compile(expr)(scope);
  }
  // "{{ expr }}" 単体の属性値から式を取り出す
  function single(text) {
    var m = /^\s*\{\{\s*([\s\S]+?)\s*\}\}\s*$/.exec(text || '');
    return m ? m[1] : null;
  }
  function interpolate(text, scope) {
    if (text.indexOf('{{') === -1) return text;
    return text.replace(/\{\{\s*([\s\S]+?)\s*\}\}/g, function (_, expr) {
      var v = evalExpr(expr, scope);
      return v == null ? '' : String(v);
    });
  }
  function build(nodes, scope, parent) {
    for (var i = 0; i < nodes.length; i++) {
      var node = nodes[i];
      if (node.nodeType === Node.TEXT_NODE) {
        parent.appendChild(document.createTextNode(interpolate(node.nodeValue, scope)));
        continue;
      }
      if (node.nodeType !== Node.ELEMENT_NODE) continue;
      var tag = node.localName;
      if (tag === 'sc-if') {
        var cond = single(node.getAttribute('value'));
        if (cond && evalExpr(cond, scope)) build(node.childNodes, scope, parent);
        continue;
      }
      if (tag === 'sc-for') {
        var listExpr = single(node.getAttribute('list'));
        var as = node.getAttribute('as') || 'item';
        var list = (listExpr && evalExpr(listExpr, scope)) || [];
        for (var j = 0; j < list.length; j++) {
          var child = Object.assign({}, scope);
          child[as] = list[j];
          build(node.childNodes, child, parent);
        }
        continue;
      }
      var el = document.createElementNS(node.namespaceURI, tag);
      for (var k = 0; k < node.attributes.length; k++) {
        var attr = node.attributes[k];
        if (attr.name.indexOf('hint-placeholder') === 0) continue;
        if (attr.name === 'onclick') {
          var handlerExpr = single(attr.value);
          var fn = handlerExpr ? evalExpr(handlerExpr, scope) : null;
          if (typeof fn === 'function') el.addEventListener('click', fn);
          continue;
        }
        el.setAttribute(attr.name, interpolate(attr.value, scope));
      }
      build(node.childNodes, scope, el);
      parent.appendChild(el);
    }
  }
  window.DCLogic = class DCLogic {
    mount(rootEl, templateEl) {
      this._root = rootEl;
      this._tpl = templateEl.content;
      this.render();
    }
    setState(update) {
      var patch = typeof update === 'function' ? update(this.state) : update;
      Object.assign(this.state, patch);
      this.render();
    }
    render() {
      var scope = this.renderVals();
      var frag = document.createDocumentFragment();
      build(this._tpl.childNodes, scope, frag);
      this._root.replaceChildren(frag);
    }
  };
})();

class Component extends DCLogic {
  state = { device: 'desktop', play: 'gmpl', screen: 'top' };

  renderVals() {
    const { device, play, screen } = this.state;
    const frames = { phone: { w: 392, h: 828 }, tablet: { w: 900, h: 660 }, desktop: { w: 1240, h: 772 } };

    const setScreen = (s) => this.setState({ screen: s });
    const setPlay = (p) => this.setState((st) => ({ play: p, screen: (p === 'solo' && st.screen === 'gm') ? 'top' : st.screen }));

    const playLabel = { solo: '単独乗務', gmpl: '事業課と清掃班', gmless: '合同乗務' }[play] || '';

    const navDefs = [

    ];
    const nav = navDefs
      .filter((d) => d[0] !== 'gm' || play !== 'solo')
      .map(([id, label, badge]) => {
        const active = id === screen;
        return {
          id, label, badge, active,
          go: () => setScreen(id),
          color: active ? '#3a7ba8' : '#84919c',
          bg: active ? 'rgba(58,123,168,0.08)' : 'transparent',
          tbBg: active ? 'rgba(58,123,168,0.08)' : 'transparent',
          weight: active ? '700' : '500',

      isTop: screen === 'top', isSheet: screen === 'sheet', isDice: screen === 'dice',
      isCombat: screen === 'combat', isInv: screen === 'inventory', isStory: screen === 'story',
      isMap: screen === 'map', isGM: screen === 'gm',
      gmTitle: play === 'gmless' ? '日報回覧 — 42年分の申し送り' : '事業課端末 — ジジの日報とアプリ管理画面',

/*
 * 全作品共通のゲームエンジン。ダイス・d20判定・localStorage 永続化と、
 * シェル（DCLogic コンポーネント）へのゲーム状態の合流（attach）を担う。
 * 作品ごとの中身（シナリオ・画面の値）は games/<id>.game.js が window.__GAME__ に定義する。
 */
(function () {
  function rollDie(sides) {
    return 1 + Math.floor(Math.random() * sides);
  }
  function pickKeys(obj, keys) {
    var o = {};
    for (var i = 0; i < keys.length; i++) o[keys[i]] = obj[keys[i]];
    return o;
  }
  window.GameEngine = {
    rollDie: rollDie,
    clamp: function (v, lo, hi) {
      return Math.max(lo, Math.min(hi, v));
    },
    // d20 判定。20 は大成功、1 は大失敗（出目優先）
    check: function (mod, dc) {
      var die = rollDie(20);
      var total = die + mod;
      var outcome = die === 20 ? 'crit' : die === 1 ? 'fumble' : total >= dc ? 'success' : 'fail';
      return { die: die, mod: mod, total: total, dc: dc, outcome: outcome, ok: outcome === 'crit' || outcome === 'success' };
    },
    outcomeText: function (outcome) {
      return { crit: '大成功', success: '成功', fail: '失敗', fumble: '大失敗' }[outcome] || '';
    },
    attach: function (app, game) {
      var key = 'trpg-game-' + game.id;
      var saved = null;
      try { saved = JSON.parse(localStorage.getItem(key) || 'null'); } catch (e) {}
      Object.assign(app.state, game.initialState(), saved || {});
      if (game.migrate) game.migrate(app.state);
      var baseRenderVals = app.renderVals.bind(app);
      app.renderVals = function () {
        var vals = baseRenderVals();
        return Object.assign(vals, game.vals(app, vals));
      };
      var baseSetState = app.setState.bind(app);
      app.setState = function (update) {
        baseSetState(update);
        try { localStorage.setItem(key, JSON.stringify(pickKeys(app.state, game.persist))); } catch (e) {}
      };
      // ゲーム状態のみ初期値へ戻す（device / play / screen は保持）
      app._resetGame = function () {
        try { localStorage.removeItem(key); } catch (e) {}
        Object.assign(app.state, game.initialState());
        app.render();
      };
    },
  };
})();

/*
 * 1m-末期ゴミ収集車 のゲーム内容。
 * - 分別判定: d4〜d100。d20判定はレシート印字ならぬ「判定値スタンプ」で3段階（正しく分別／
 *   保留・要再確認／誤分別）。出目1は特殊な「誤分別・大化け」
 * - 隊員手帳: 体力 / 心の積載量 / 街の清浄度 の増減
 * - 収集ルート: 日没までの共有カウントダウン＋荷台積載＋4件の集積所トラッカー
 *   （桜通り／第二小学校／灰田家／昨夜の誤分別＝追跡してくる化けたマット）
 * - 荷台マニフェスト: 「婚約指輪」だけ照会端末（電池2本）にかざして持ち主を照会でき、
 *   結果が業務日報の選択肢を左右する
 * - 収集記録: 分岐シナリオ「整然と出された、燃えないもの」。GM秘匿2件
 *   （桜通りのゴミ出し主＝ジジ本人／ジチタイちゃん＝市民の思い出のバックアップ保管者）を
 *   条件付きで発見する真ルートあり
 * - 事業課端末: 幕切替・街の清浄度±・収集ハプニング表 d6
 */
(function () {

    if (fx.kokoroSet != null) patch.kokoro = fx.kokoroSet;
    if (fx.seijou) patch.seijou = eng().clamp(get('seijou') + fx.seijou, 0, 100);
    if (fx.flags) patch.flags = Object.assign({}, get('flags'), fx.flags);
  }

  window.__GAME__ = {
    id: '1m',
    initialState: initialState,
    persist: [
      'diceSides', 'skillIdx', 'diceDc', 'lastRoll', 'rollLog',
      'tai', 'kokoro', 'seijou', 'duskSec', 'fuel', 'wheel', 'truckLoad',
      'stopVals', 'items', 'flags', 'storyNode', 'storyNote', 'storyNoteColor',
      'gmScene', 'gmTable',
    ],
    migrate: function (st) {
      var init = initialState();
      if (!NODES[st.storyNode]) { st.storyNode = 'm1'; st.storyNote = null; st.flags = {}; }
      st.items = Object.assign({}, init.items, st.items || {});
      st.stopVals = Object.assign({}, init.stopVals, st.stopVals || {});
      st.flags = st.flags || {};
      if (!Array.isArray(st.rollLog)) st.rollLog = init.rollLog;
    },

    vals: function (app) {
      var st = app.state;
      var E = eng();
      var out = {};

      // ── top ──
      out.goStory = function () { app.setState({ screen: 'story' }); };

      // ── 隊員手帳 ──
      out.tai = st.tai;
      out.taiPct = Math.round((st.tai / TAI_MAX) * 100);
      out.kokoro = st.kokoro;
      out.kokoroPct = Math.round((st.kokoro / KOKORO_MAX) * 100);
      out.seijou = st.seijou;
      out.taiUp = function () { app.setState({ tai: E.clamp(st.tai + 1, 0, TAI_MAX) }); };
      out.taiDown = function () { app.setState({ tai: E.clamp(st.tai - 1, 0, TAI_MAX) }); };
      out.kokoroUp = function () { app.setState({ kokoro: E.clamp(st.kokoro + 1, 0, KOKORO_MAX) }); };
      out.kokoroDown = function () { app.setState({ kokoro: E.clamp(st.kokoro - 1, 0, KOKORO_MAX) }); };
      out.seijouUp = function () { app.setState({ seijou: E.clamp(st.seijou + 5, 0, 100) }); };
      out.seijouDown = function () { app.setState({ seijou: E.clamp(st.seijou - 5, 0, 100) }); };

      // ── 分別判定 ──
      var isCheck = st.diceSides === 20;
      var skill = SKILLS[st.skillIdx] || SKILLS[4];
      out.diceDc = st.diceDc;
      out.dcMinus = function () { app.setState({ diceDc: E.clamp(st.diceDc - 1, 2, 30) }); };
      out.dcPlus = function () { app.setState({ diceDc: E.clamp(st.diceDc + 1, 2, 30) }); };
      out.skillLabel = isCheck ? skill.name : 'ー';
      var lr = st.lastRoll;
      if (!lr) {
        out.diceFace = '—'; out.stampWord = ''; out.diceFormula = 'まだ分別していない'; out.diceVerdict = ''; out.stampColor = '#84919c';
      } else if (lr.kind === 'check') {
        var si = sortInfo(lr);
        out.diceFace = lr.die;
        out.stampWord = si.word;
        out.diceFormula = 'd20 ＝ ' + lr.die + ' ＋ ' + lr.skillName + ' ' + lr.mod;
        out.diceVerdict = si.verdict;
        out.stampColor = si.color;
      } else {
        out.diceFace = lr.value;
        out.stampWord = '出目';
        out.diceFormula = 'd' + lr.sides + ' の出目';
        out.diceVerdict = '＝ ' + lr.value;
        out.stampColor = '#84919c';
      }
      out.diceTypes = DICE_SIDES.map(function (s) {
        var sel = s === st.diceSides;
        return {
          label: 'd' + s,
          go: function () { app.setState({ diceSides: s }); },
          border: sel ? '2px solid #3a7ba8' : '1px solid rgba(58,123,168,.3)',
          color: sel ? '#3a7ba8' : '#84919c',
          bg: sel ? 'rgba(58,123,168,.05)' : '#fff',
          weight: sel ? '600' : '400',
        };
      });
      out.diceSkills = SKILLS.map(function (sk, i) {
        var sel = i === st.skillIdx;
        return {
          label: sk.name + '（' + (sk.mod >= 0 ? '+' + sk.mod : sk.mod) + '）',
          go: function () { app.setState({ skillIdx: i }); },
          border: sel ? '1px solid #3a7ba8' : '1px solid rgba(58,123,168,.3)',
          color: sel ? '#3a7ba8' : '#84919c',
          bg: sel ? 'rgba(58,123,168,.05)' : '#fff',
        };
      });
      out.rollNow = function () {
        if (st.diceSides === 20) {
          var r = E.check(skill.mod, st.diceDc);
          var si = sortInfo(r);
          pushLog(st, 'ソラ ・ ' + skill.name, r.total + ' ／ ' + si.word, si.color);
          app.setState({ lastRoll: { kind: 'check', die: r.die, mod: r.mod, total: r.total, dc: r.dc, outcome: r.outcome, ok: r.ok, skillName: skill.name }, rollLog: st.rollLog });
        } else {
          var v = E.rollDie(st.diceSides);
          pushLog(st, 'ソラ ・ d' + st.diceSides, v + ' ／ 出目', '#84919c');
          app.setState({ lastRoll: { kind: 'plain', sides: st.diceSides, value: v }, rollLog: st.rollLog });
        }
      };
      out.logRows = st.rollLog;

      // ── 収集ルート ──
      out.truckLoad = st.truckLoad;
      out.duskLabel = fmtClock(st.duskSec);
      out.fuel = st.fuel;
      out.wheel = st.wheel;
      out.wheelLabel = st.wheel >= 60 ? '良' : st.wheel >= 30 ? '普通' : '不機嫌';
      out.shortRest = function () {
        app.setState({ fuel: E.clamp(st.fuel + 10, 0, 100), tai: E.clamp(st.tai + 1, 0, TAI_MAX), duskSec: E.clamp(st.duskSec - 15, 0, 999) });
      };
      out.nextStop = function () {
        app.setState({ duskSec: E.clamp(st.duskSec - 40, 0, 999), truckLoad: E.clamp(st.truckLoad + 8, 0, 100) });
      };
      out.stops = STOP_DEFS.map(function (d) {
        var v = st.stopVals[d.key];
        function adj(delta) {
          return function () {
            var vals = Object.assign({}, st.stopVals);
            vals[d.key] = E.clamp(v + delta, 0, d.max);
            app.setState({ stopVals: vals });
          };
        }
        return {
          num: d.num, title: d.title, titleColor: d.titleColor, tag: d.tag, tagColor: d.tagColor, note: d.note,
          border: d.border, bg: d.bg, numBg: d.numBg, numColor: d.numColor,
          gauge: d.gauge, value: v + d.unit, pct: Math.round((v / d.max) * 100), barColor: d.barColor,
          hasBtns: true, dec: adj(-d.step), inc: adj(d.step),
        };
      });

      // ── 荷台マニフェスト ──
      out.ringPending = st.items.ringStatus === 'pending';
      out.battery = st.items.battery;
      out.ringColor = st.items.ringStatus === 'pending' ? '#84919c' : '#3a7ba8';
      out.ringNote = st.items.ringStatus === 'pending'
        ? '照会前。照会端末にかざせば持ち主がわかるかもしれない。'
        : '照会結果：持ち主「該当者なし」。——つまり、渡すはずだった人がまだどこかに。';
      out.lookupRing = function () {
        if (st.items.ringStatus !== 'pending' || st.items.battery <= 0) return;
        var items = Object.assign({}, st.items);
        items.ringStatus = 'done';
        items.battery -= 1;
        app.setState({ items: items });
      };

      // ── 収集記録 ──
      var node = NODES[st.storyNode] || NODES.m1;
      out.storyKicker = node.kicker;
      out.storyTitle = node.title;
      out.storyBlocks = node.text.map(function (b) {
        return typeof b === 'string' ? { isP: true, isQ: false, t: b } : { isP: false, isQ: true, t: b.q };
      });
      out.storyHasNote = !!st.storyNote;
      out.storyNote = st.storyNote || '';
      out.storyNoteColor = st.storyNoteColor || '#7f927f';
      out.storyPct = node.pct;
      out.storyPctLabel = node.end
        ? '収集記録 提出完了 ・ 結'
        : '収集記録 ' + node.pct + '% ・ 日没まで ' + fmtClock(st.duskSec) + ' ・ 心の積載 ' + st.kokoro + '/10';
      out.storyCanRestart = st.storyNode !== 'm1';
      out.storyRestart = function () { app._resetGame(); };

      function choose(c) {
        return function () {
          var patch = { storyNote: null, storyNoteColor: '#7f927f' };
          var target = c.to;
          if (c.check) {
            var dc = typeof c.check.dc === 'function' ? c.check.dc(st) : c.check.dc;
            var r = E.check(c.check.mod, dc);
            patch.storyNote = c.check.name + '判定 — d20〈' + r.die + '〉＋' + r.mod + ' ＝ ' + r.total + ' ／ 難度' + dc + ' ・ ' + (r.ok ? '成功' : '失敗');
            patch.storyNoteColor = r.ok ? '#2f8a5c' : '#c65448';
            pushLog(st, 'ソラ ・ ' + c.check.name + '（収集記録）', r.total + ' ／ ' + (r.ok ? '成功' : '失敗'), r.ok ? '#2f8a5c' : '#c65448');
            patch.rollLog = st.rollLog;
            target = r.ok ? c.success : c.fail;
          }
          var nextNode = NODES[target];
          applyFx(st, nextNode.fx, patch);
          var taiNow = 'tai' in patch ? patch.tai : st.tai;
          var kokoroNow = 'kokoro' in patch ? patch.kokoro : st.kokoro;
          if (taiNow <= 0 && !nextNode.end) {
            target = 'E_collapse';
            applyFx(st, NODES.E_collapse.fx, patch);
          } else if (kokoroNow >= KOKORO_MAX && !nextNode.end) {
            target = 'E_overload';
            applyFx(st, NODES.E_overload.fx, patch);
          }
          patch.storyNode = target;
          app.setState(patch);
        };
      }
      var defs = node.end ? END_CHOICES : node.choices;
      out.storyChoices = defs.filter(function (c) {
        return !c.if || c.if(st);
      }).map(function (c) {
        var dc = c.check ? (typeof c.check.dc === 'function' ? c.check.dc(st) : c.check.dc) : null;
        return {
          num: c.num || '', pre: c.pre, skillText: c.skillText || '', post: c.post || '',
          dcLabel: dc != null ? '難度' + dc : '',
          go: c.restart ? function () { app._resetGame(); }
            : c.top ? function () { app.setState({ screen: 'top' }); }
            : choose(c),
        };
      });

      // ── 事業課端末 ──
      out.gmScenes = GM_SCENES.map(function (t, i) {
        var active = i === st.gmScene;
        return {
          t: t, tag: active ? '進行中' : '',
          go: function () { app.setState({ gmScene: i }); },
          border: active ? '2px solid #3a7ba8' : '1px solid rgba(58,123,168,.3)',
          bg: active ? 'rgba(58,123,168,.04)' : '#fff',
          color: active ? '#2c3440' : '#84919c',
          weight: active ? '700' : '400',
        };
      });
      out.gmHasTable = !!st.gmTable;
      out.gmTableD = st.gmTable ? st.gmTable.d : '';
      out.gmTableText = st.gmTable ? st.gmTable.text : '';
      out.rollTable = function () {
        var d = E.rollDie(6);
        var text = GM_TABLE[d - 1];
        pushLog(st, '事業課端末 ・ 収集ハプニング表', d + ' ／ ' + text, '#3a7ba8');
        app.setState({ gmTable: { d: d, text: text }, rollLog: st.rollLog });
      };

      return out;
    },
  };
})();

window.__dcApp = new Component();
if (typeof GameEngine !== 'undefined' && window.__GAME__) GameEngine.attach(window.__dcApp, window.__GAME__);
window.__dcApp.mount(document.getElementById('app'), document.getElementById('dc-template'));
</script>
</body>
