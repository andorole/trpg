<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>洗濯龍</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700;900&family=Shippori+Mincho:wght@500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  body{margin:0;background:#0d1a1d;}
  @keyframes scfade{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:none}}
  @keyframes drumspin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
  @keyframes bubble{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
  @keyframes blinkled{0%,100%{opacity:.35}50%{opacity:1}}
  ::-webkit-scrollbar{width:10px;height:10px}
  ::-webkit-scrollbar-thumb{background:rgba(43,158,174,.35);border-radius:8px}
  ::-webkit-scrollbar-track{background:transparent}
</style>
</head>
<body>
<div id="app"></div>
<template id="dc-template">
<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:34px 20px 96px;box-sizing:border-box;font-family:'Zen Maru Gothic',sans-serif;background:radial-gradient(120% 95% at 50% 0%,#14262b 0%,#0d1a1d 58%,#080f12 100%);color:#26343a;">

  <div style="position:relative;width:{{ frameW }}px;height:{{ frameH }}px;max-width:100%;background:#f2f8f8;border:1px solid #cfe0e0;border-radius:8px;box-shadow:0 34px 90px -22px rgba(0,0,0,.75),0 0 0 8px rgba(6,10,12,.55);overflow:hidden;display:flex;flex-direction:column;">

    <div style="position:absolute;inset:0;pointer-events:none;background-image:repeating-linear-gradient(0deg,rgba(43,158,174,.05) 0 1px,transparent 1px 44px),repeating-linear-gradient(90deg,rgba(43,158,174,.05) 0 1px,transparent 1px 44px);"></div>

    <header style="position:relative;z-index:2;display:flex;align-items:center;justify-content:space-between;gap:14px;padding:12px 22px;border-bottom:2px solid #2b9eae;background:linear-gradient(180deg,#ffffff,#eef6f6);">
      <div style="display:flex;align-items:center;gap:12px;">
        <span style="display:inline-flex;align-items:center;justify-content:center;width:32px;height:32px;flex:none;border-radius:50%;border:2.5px solid #2b9eae;color:#2b9eae;font-weight:900;font-size:15px;background:#fff;">龍</span>
        <div>
          <div style="font-size:9px;letter-spacing:2px;color:#7d9298;display:{{ taglineDisp }};">24時間営業 ・ 年中無休 ・ 呪い洗い承ります</div>
          <div style="display:flex;align-items:baseline;gap:10px;">
            <span style="font-family:'Zen Maru Gothic',sans-serif;font-weight:900;font-size:{{ titleSize }}px;letter-spacing:2px;color:#26343a;white-space:nowrap;">コインランドリー 龍の湯洗い</span>
            <span style="font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:1px;color:#2b9eae;display:{{ enDisp }};">DRAGON LAUNDRY 24H</span>
          </div>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:10px;">
        <span style="font-size:12px;letter-spacing:1px;color:#7d9298;display:{{ playLabelDisp }};white-space:nowrap;">{{ playLabel }}</span>
        <span style="display:{{ pillDisp }};align-items:center;gap:6px;font-family:'IBM Plex Mono',monospace;font-size:11px;padding:4px 10px;border:1px solid rgba(43,158,174,.4);border-radius:999px;color:#2b9eae;background:rgba(43,158,174,.05);white-space:nowrap;"><span style="width:7px;height:7px;border-radius:50%;background:#3ec98a;animation:blinkled 1.6s ease-in-out infinite;"></span>7号機 稼働中</span>
      </div>
    </header>

    <div style="position:relative;z-index:2;flex:1;display:flex;min-height:0;">

      <sc-if value="{{ showRail }}" hint-placeholder-val="{{ true }}">
        <nav style="width:{{ railW }}px;flex:none;border-right:1px solid rgba(43,158,174,.2);background:linear-gradient(180deg,rgba(43,158,174,.04),transparent);padding:15px 10px;display:flex;flex-direction:column;gap:3px;overflow-y:auto;">
          <sc-for list="{{ nav }}" as="item" hint-placeholder-count="8">
            <button onClick="{{ item.go }}" style="display:flex;align-items:center;gap:11px;width:100%;padding:9px 11px;border:0;border-radius:999px;cursor:pointer;text-align:left;background:{{ item.bg }};color:{{ item.color }};font-family:'Zen Maru Gothic',sans-serif;font-size:14px;font-weight:{{ item.weight }};">
              <span style="width:22px;height:22px;flex:none;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;border-radius:50%;background:{{ item.badgeBg }};color:{{ item.badgeColor }};border:{{ item.badgeBorder }};">{{ item.badge }}</span>
              <span style="{{ item.labelStyle }}">{{ item.label }}</span>
            </button>
          </sc-for>
        </nav>
      </sc-if>

      <main style="flex:1;min-width:0;overflow-y:auto;padding:{{ mainPad }};">

        <sc-if value="{{ isTop }}" hint-placeholder-val="{{ true }}">
          <div data-screen-label="店内案内" style="animation:scfade .4s ease;max-width:760px;margin:0 auto;">
            <p style="font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:2px;color:#7d9298;margin:0 0 7px;">本日の夜番日報 ・ 午前1時20分 ・ 小雨</p>
            <h1 style="font-family:'Zen Maru Gothic',sans-serif;font-weight:900;font-size:33px;line-height:1.4;margin:0 0 14px;color:#26343a;">世界の汚れは、<br>7号機で洗っています。</h1>
            <p style="font-size:15px;line-height:2.0;color:#4a5d63;margin:0 0 10px;max-width:58ch;">商店街の外れの24時間コインランドリー。7号機だけ、中に<b style="color:#2b9eae;">龍</b>が住んでいる。呪い、怨念、拭えない後悔——普通の洗濯機で落ちない汚れは、龍が湯洗いしてくれる。あなたは今夜の店番。仕事は接客と、龍の機嫌取りと、<b style="color:#c9722e;">すすぎ水の行方を誰にも見られないこと。</b></p>
            <p style="font-size:12px;color:#9db1b5;margin:0 0 24px;">※店内掲示「呪いは他のお客様の洗濯物と一緒に洗わないでください」</p>

            <div style="border:1px solid rgba(43,158,174,.3);border-radius:10px;overflow:hidden;margin:0 0 26px;background:#fff;">
              <div style="padding:9px 14px;background:rgba(43,158,174,.07);border-bottom:1px solid rgba(43,158,174,.2);font-size:11px;font-weight:700;letter-spacing:2px;color:#2b9eae;">■ 稼働状況</div>
              <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:0;">
                <div style="padding:12px 10px;text-align:center;border-right:1px solid rgba(43,158,174,.14);"><div style="width:44px;height:44px;margin:0 auto 6px;border-radius:50%;border:3px solid #cfe0e0;background:radial-gradient(circle at 50% 45%,#eef6f6 42%,#cfe0e0 43% 47%,#eef6f6 48%);"></div><div style="font-size:11px;font-weight:700;color:#26343a;">1〜4号機</div><div style="font-size:10px;color:#3ec98a;">空き</div></div>
                <div style="padding:12px 10px;text-align:center;border-right:1px solid rgba(43,158,174,.14);"><div style="width:44px;height:44px;margin:0 auto 6px;border-radius:50%;border:3px solid #7d9298;background:radial-gradient(circle at 50% 45%,#d9e6e8 42%,#7d9298 43% 47%,#d9e6e8 48%);animation:drumspin 3.2s linear infinite;"></div><div style="font-size:11px;font-weight:700;color:#26343a;">5号機</div><div style="font-size:10px;color:#7d9298;">通常洗濯（常連の柔道着）</div></div>
                <div style="padding:12px 10px;text-align:center;border-right:1px solid rgba(43,158,174,.14);"><div style="width:44px;height:44px;margin:0 auto 6px;border-radius:50%;border:3px solid #c9722e;background:radial-gradient(circle at 50% 45%,#f7e8d8 42%,#c9722e 43% 47%,#f7e8d8 48%);"></div><div style="font-size:11px;font-weight:700;color:#26343a;">6号機</div><div style="font-size:10px;color:#c9722e;">故障中（中から声がする）</div></div>
                <div style="padding:12px 10px;text-align:center;background:rgba(43,158,174,.05);"><div style="width:44px;height:44px;margin:0 auto 6px;border-radius:50%;border:3px solid #2b9eae;background:radial-gradient(circle at 50% 45%,#d8f0f2 30%,#2b9eae 31% 36%,#d8f0f2 37%);animation:drumspin 1.6s linear infinite;box-shadow:0 0 14px rgba(43,158,174,.4);"></div><div style="font-size:11px;font-weight:900;color:#2b9eae;">7号機（龍）</div><div style="font-size:10px;color:#2b9eae;">呪い洗い 脱水前</div></div>
              </div>
            </div>

            <p style="font-size:11px;letter-spacing:3px;color:#2b9eae;font-weight:700;margin:0 0 12px;">■ 夜番の形態を選択</p>
            <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:0 0 28px;">
              <sc-for list="{{ playModes }}" as="m" hint-placeholder-count="3">
                <button onClick="{{ m.go }}" style="text-align:left;padding:14px 15px;border-radius:10px;cursor:pointer;border:{{ m.border }};background:{{ m.bg }};">
                  <div style="font-size:14px;font-weight:700;color:{{ m.titleColor }};margin-bottom:5px;">{{ m.t }}</div>
                  <div style="font-size:12px;line-height:1.7;color:#7d9298;">{{ m.d }}</div>
                </button>
              </sc-for>
            </div>

            <p style="font-size:11px;letter-spacing:3px;color:#2b9eae;font-weight:700;margin:0 0 14px;">■ 今夜のシフト</p>
            <div style="display:flex;gap:16px;flex-wrap:wrap;margin-bottom:26px;">
              <div style="display:flex;flex-direction:column;align-items:center;gap:7px;width:96px;"><div style="width:62px;height:62px;border-radius:50%;border:2px solid #2b9eae;background:repeating-linear-gradient(45deg,rgba(43,158,174,.1) 0 5px,transparent 5px 10px),#fff;"></div><div style="font-size:13px;font-weight:700;color:#26343a;">真砂 潤</div><div style="font-size:11px;color:#7d9298;">夜番（バイト2年目）</div></div>
              <div style="display:flex;flex-direction:column;align-items:center;gap:7px;width:96px;"><div style="width:62px;height:62px;border-radius:50%;border:2px solid #e88aa0;background:repeating-linear-gradient(45deg,rgba(232,138,160,.12) 0 5px,transparent 5px 10px),#fff;"></div><div style="font-size:13px;font-weight:700;color:#26343a;">柚木さん</div><div style="font-size:11px;color:#7d9298;">常連（毎晩0時に来る）</div></div>
              <div style="display:flex;flex-direction:column;align-items:center;gap:7px;width:96px;"><div style="width:62px;height:62px;border-radius:50%;border:2px solid #c9722e;background:repeating-linear-gradient(45deg,rgba(201,114,46,.12) 0 5px,transparent 5px 10px),#fff;"></div><div style="font-size:13px;font-weight:700;color:#26343a;">店長</div><div style="font-size:11px;color:#7d9298;">龍の世話人（今夜は不在）</div></div>
              <div style="display:flex;flex-direction:column;align-items:center;gap:7px;width:96px;"><div style="width:62px;height:62px;border-radius:50%;border:3px solid #2b9eae;background:radial-gradient(circle at 40% 35%,rgba(43,158,174,.35),rgba(43,158,174,.08)),#fff;box-shadow:0 0 12px rgba(43,158,174,.3);"></div><div style="font-size:13px;font-weight:900;color:#2b9eae;">7号機の龍</div><div style="font-size:11px;color:#7d9298;">推定三千歳</div></div>
            </div>

            <button onClick="{{ goStory }}" style="display:inline-flex;align-items:center;gap:10px;padding:13px 30px;border:0;border-radius:999px;cursor:pointer;background:#2b9eae;color:#fff;font-family:'Zen Maru Gothic',sans-serif;font-weight:900;font-size:15px;letter-spacing:3px;box-shadow:0 6px 0 #1f7683;">夜番をはじめる　➜</button>
          </div>
        </sc-if>

        <sc-if value="{{ isSheet }}" hint-placeholder-val="{{ false }}">
          <div data-screen-label="従業員名札" style="animation:scfade .4s ease;max-width:820px;margin:0 auto;">
            <div style="display:flex;gap:20px;align-items:flex-start;margin-bottom:20px;">
              <div style="width:88px;height:110px;flex:none;border:2px solid rgba(43,158,174,.4);border-radius:8px;background:repeating-linear-gradient(45deg,rgba(43,158,174,.07) 0 6px,transparent 6px 12px),#fff;display:flex;align-items:center;justify-content:center;font-size:9px;letter-spacing:1px;color:#9db1b5;text-align:center;">名札用写真<br>（エプロン着用）</div>
              <div style="flex:1;min-width:0;">
                <p style="font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:2px;color:#7d9298;margin:0 0 4px;">従業員No. 007 ・ 夜番シフト従業員カード</p>
                <h1 style="font-family:'Zen Maru Gothic',sans-serif;font-weight:900;font-size:28px;margin:0 0 4px;color:#26343a;">真砂 潤</h1>
                <p style="font-size:13px;color:#7d9298;margin:0 0 10px;">夜番アルバイト ・ 週4 ・ 時給1,150円＋龍手当300円 ・ 二十二歳</p>
                <div style="display:flex;gap:7px;flex-wrap:wrap;">
                  <span style="font-size:11px;padding:3px 9px;border-radius:999px;border:1px solid rgba(43,158,174,.4);color:#4a5d63;">洗濯表示マニア</span>
                  <span style="font-size:11px;padding:3px 9px;border-radius:999px;border:1px solid rgba(43,158,174,.4);color:#4a5d63;">小銭の音で金額がわかる</span>
                  <span style="font-size:11px;padding:3px 9px;border-radius:999px;border:1px solid rgba(201,114,46,.5);color:#c9722e;">龍語：日常会話レベル</span>
                </div>
              </div>
            </div>

            <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:13px;margin-bottom:22px;">
              <div style="background:#fff;border:1px solid rgba(43,158,174,.2);border-radius:10px;padding:11px 13px;"><div style="display:flex;justify-content:space-between;font-size:12px;color:#7d9298;margin-bottom:5px;"><span>体力</span><span style="font-family:'IBM Plex Mono',monospace;">{{ tai }} / 16</span></div><div style="height:9px;border-radius:6px;background:rgba(38,52,58,.07);overflow:hidden;"><div style="width:{{ taiPct }}%;height:100%;background:#2b9eae;"></div></div><div style="display:flex;gap:5px;margin-top:6px;"><button onClick="{{ taiDown }}" style="width:24px;height:24px;border:1px solid rgba(43,158,174,.3);border-radius:6px;background:#fff;color:#7d9298;cursor:pointer;font-size:13px;line-height:1;">−</button><button onClick="{{ taiUp }}" style="width:24px;height:24px;border:1px solid rgba(43,158,174,.3);border-radius:6px;background:#fff;color:#7d9298;cursor:pointer;font-size:13px;line-height:1;">＋</button></div></div>
              <div style="background:#fff;border:1px solid rgba(43,158,174,.2);border-radius:10px;padding:11px 13px;"><div style="display:flex;justify-content:space-between;font-size:12px;color:#7d9298;margin-bottom:5px;"><span>清潔感（心の）</span><span style="font-family:'IBM Plex Mono',monospace;">{{ seiketsu }} / 10</span></div><div style="height:9px;border-radius:6px;background:rgba(38,52,58,.07);overflow:hidden;"><div style="width:{{ seiketsuPct }}%;height:100%;background:#3ec98a;"></div></div><div style="font-size:9px;color:#9db1b5;margin-top:4px;">※呪いに触れると汚れる。汚れた心は龍が湯洗い可（要予約）</div><div style="display:flex;gap:5px;margin-top:6px;"><button onClick="{{ seiketsuDown }}" style="width:24px;height:24px;border:1px solid rgba(43,158,174,.3);border-radius:6px;background:#fff;color:#7d9298;cursor:pointer;font-size:13px;line-height:1;">−</button><button onClick="{{ seiketsuUp }}" style="width:24px;height:24px;border:1px solid rgba(43,158,174,.3);border-radius:6px;background:#fff;color:#7d9298;cursor:pointer;font-size:13px;line-height:1;">＋</button></div></div>
              <div style="background:#fff;border:1px solid rgba(43,158,174,.2);border-radius:10px;padding:11px 13px;"><div style="display:flex;justify-content:space-between;font-size:12px;color:#7d9298;margin-bottom:5px;"><span>龍との信頼</span><span style="font-family:'IBM Plex Mono',monospace;color:#2b9eae;">{{ shinrai }} / 100</span></div><div style="height:9px;border-radius:6px;background:rgba(38,52,58,.07);overflow:hidden;"><div style="width:{{ shinrai }}%;height:100%;background:linear-gradient(90deg,#2b9eae,#3ec98a);"></div></div><div style="font-size:9px;color:#9db1b5;margin-top:4px;">※100で龍が「背中に乗せてくれる」らしい（店長談）</div><div style="display:flex;gap:5px;margin-top:6px;"><button onClick="{{ shinraiDown }}" style="width:24px;height:24px;border:1px solid rgba(43,158,174,.3);border-radius:6px;background:#fff;color:#7d9298;cursor:pointer;font-size:13px;line-height:1;">−</button><button onClick="{{ shinraiUp }}" style="width:24px;height:24px;border:1px solid rgba(43,158,174,.3);border-radius:6px;background:#fff;color:#7d9298;cursor:pointer;font-size:13px;line-height:1;">＋</button></div></div>
            </div>

            <p style="font-size:11px;letter-spacing:3px;color:#2b9eae;font-weight:700;margin:0 0 12px;">■ 能力</p>
            <div style="display:grid;grid-template-columns:repeat(6,1fr);gap:0;border:1px solid rgba(43,158,174,.3);border-radius:10px;overflow:hidden;margin-bottom:24px;background:#fff;">
              <div style="padding:10px 4px;text-align:center;border-right:1px solid rgba(43,158,174,.14);background:rgba(43,158,174,.05);"><div style="font-size:10px;color:#2b9eae;">洗浄</div><div style="font-family:'IBM Plex Mono',monospace;font-size:23px;font-weight:600;color:#2b9eae;line-height:1.25;">16</div><div style="font-size:10px;color:#3ec98a;">＋3</div></div>
              <div style="padding:10px 4px;text-align:center;border-right:1px solid rgba(43,158,174,.14);"><div style="font-size:10px;color:#7d9298;">すすぎ</div><div style="font-family:'IBM Plex Mono',monospace;font-size:23px;font-weight:600;color:#26343a;line-height:1.25;">14</div><div style="font-size:10px;color:#3ec98a;">＋2</div></div>
              <div style="padding:10px 4px;text-align:center;border-right:1px solid rgba(43,158,174,.14);"><div style="font-size:10px;color:#7d9298;">脱水</div><div style="font-family:'IBM Plex Mono',monospace;font-size:23px;font-weight:600;color:#26343a;line-height:1.25;">10</div><div style="font-size:10px;color:#7d9298;">±0</div></div>
              <div style="padding:10px 4px;text-align:center;border-right:1px solid rgba(43,158,174,.14);"><div style="font-size:10px;color:#7d9298;">観察</div><div style="font-family:'IBM Plex Mono',monospace;font-size:23px;font-weight:600;color:#26343a;line-height:1.25;">13</div><div style="font-size:10px;color:#3ec98a;">＋1</div></div>
              <div style="padding:10px 4px;text-align:center;border-right:1px solid rgba(43,158,174,.14);"><div style="font-size:10px;color:#7d9298;">接客</div><div style="font-family:'IBM Plex Mono',monospace;font-size:23px;font-weight:600;color:#26343a;line-height:1.25;">12</div><div style="font-size:10px;color:#3ec98a;">＋1</div></div>
              <div style="padding:10px 4px;text-align:center;"><div style="font-size:10px;color:#7d9298;">龍語</div><div style="font-family:'IBM Plex Mono',monospace;font-size:23px;font-weight:600;color:#26343a;line-height:1.25;">9</div><div style="font-size:10px;color:#c9722e;">−1（敬語が苦手）</div></div>
            </div>

            <div style="display:grid;grid-template-columns:1fr 1fr;gap:24px;">
              <div>
                <p style="font-size:11px;letter-spacing:3px;color:#2b9eae;font-weight:700;margin:0 0 10px;">■ 技能</p>
                <div style="display:flex;justify-content:space-between;font-size:14px;color:#4a5d63;padding:6px 0;border-bottom:1px dashed rgba(43,158,174,.25);"><span>洗濯表示の解読（呪物対応版）</span><span style="font-family:'IBM Plex Mono',monospace;color:#3ec98a;">+6</span></div>
                <div style="display:flex;justify-content:space-between;font-size:14px;color:#4a5d63;padding:6px 0;border-bottom:1px dashed rgba(43,158,174,.25);"><span>しみ抜き（物理・因果両対応）</span><span style="font-family:'IBM Plex Mono',monospace;color:#3ec98a;">+5</span></div>
                <div style="display:flex;justify-content:space-between;font-size:14px;color:#4a5d63;padding:6px 0;border-bottom:1px dashed rgba(43,158,174,.25);"><span>両替機の説得（叩かずに直す）</span><span style="font-family:'IBM Plex Mono',monospace;color:#3ec98a;">+4</span></div>
                <div style="display:flex;justify-content:space-between;font-size:14px;color:#4a5d63;padding:6px 0;"><span>深夜の客への声かけ</span><span style="font-family:'IBM Plex Mono',monospace;color:#c9722e;">−2（人見知り）</span></div>
              </div>
              <div>
                <p style="font-size:11px;letter-spacing:3px;color:#2b9eae;font-weight:700;margin:0 0 10px;">■ 特性</p>
                <div style="border:1px solid rgba(43,158,174,.25);border-radius:10px;padding:11px 13px;margin-bottom:9px;background:#fff;"><div style="font-size:13px;font-weight:700;color:#26343a;margin-bottom:3px;">汚れの声が聞こえる</div><div style="font-size:12px;line-height:1.7;color:#7d9298;">染みに耳を近づけると、付いた時の状況が聞こえる。カレーは陽気。呪いは、だいたい泣いている。</div></div>

                  <span title="タンブル乾燥禁止" style="width:34px;height:34px;border:2px solid {{ markBatsuColor }};border-radius:6px;display:flex;align-items:center;justify-content:center;color:{{ markBatsuColor }};font-weight:900;">◻✕</span>
                  <span title="祓い済み" style="width:34px;height:34px;border:2px solid #7d9298;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px;color:#7d9298;font-weight:900;">祓</span>

              <p style="font-size:10px;color:#9db1b5;margin:4px 0 0;">※判定結果は「洗濯表示」で記録されます。〇=成功 △=部分成功 ✕=洗濯不可（イベント発生）</p>

        <sc-if value="{{ isCombat }}" hint-placeholder-val="{{ false }}">

            <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:6px;">

              <div style="display:flex;gap:8px;"><button onClick="{{ pauseProcess }}" style="padding:8px 15px;border:1px solid rgba(43,158,174,.35);border-radius:999px;background:#fff;color:#7d9298;cursor:pointer;font-size:13px;font-family:'Zen Maru Gothic',sans-serif;white-space:nowrap;flex:none;">一時停止</button><button onClick="{{ nextStage }}" style="padding:8px 15px;border:0;border-radius:999px;background:#2b9eae;color:#fff;cursor:pointer;font-weight:700;font-size:13px;font-family:'Zen Maru Gothic',sans-serif;box-shadow:0 4px 0 #1f7683;white-space:nowrap;flex:none;">次の工程へ</button></div>
            </div>
            <p style="font-size:12px;color:#9db1b5;margin:0 0 14px;">※呪いとの戦闘は「洗い工程」で進みます。工程ごとに全員が一手番。脱水で暴れます、たいてい。</p>

            <div style="display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:12px;border:2px solid #6b4a8f;background:rgba(107,74,143,.05);margin-bottom:14px;"><span style="width:34px;height:34px;flex:none;border-radius:50%;background:radial-gradient(circle at 38% 32%,#b79ad4,#6b4a8f);box-shadow:0 0 10px rgba(107,74,143,.4);"></span><div style="flex:1;"><div style="font-size:15px;font-weight:900;color:#6b4a8f;">花嫁衣装の呪い <span style="font-size:11px;color:#7d9298;">「式は、雨だった」</span></div><div style="display:flex;gap:5px;margin-top:3px;"><span style="font-size:10px;padding:2px 8px;border-radius:999px;background:rgba(107,74,143,.12);color:#6b4a8f;">水に強い（すすぎ抵抗+2）</span><span style="font-size:10px;padding:2px 8px;border-radius:999px;background:rgba(201,114,46,.1);color:#c9722e;">泡立ちに弱い</span></div></div><div style="width:180px;"><div style="display:flex;justify-content:space-between;font-size:11px;color:#7d9298;margin-bottom:3px;"><span>汚れ残り</span><span style="font-family:'IBM Plex Mono',monospace;">{{ yogore }} / 100</span></div><div style="height:9px;border-radius:6px;background:rgba(38,52,58,.07);overflow:hidden;"><div style="width:{{ yogore }}%;height:100%;background:linear-gradient(90deg,#6b4a8f,#9d7bc4);"></div></div><div style="font-size:9px;color:#9db1b5;margin-top:2px;">※0で洗い上がり。呪いは「思い出」に戻る</div>
              <div style="display:flex;gap:4px;margin-top:5px;justify-content:flex-end;"><button onClick="{{ yogoreDown5 }}" style="font-size:10px;padding:2px 6px;border:1px solid rgba(43,158,174,.3);border-radius:6px;background:#fff;color:#3ec98a;cursor:pointer;">−5</button><button onClick="{{ yogoreDown1 }}" style="font-size:10px;padding:2px 6px;border:1px solid rgba(43,158,174,.3);border-radius:6px;background:#fff;color:#3ec98a;cursor:pointer;">−1</button><button onClick="{{ yogoreUp1 }}" style="font-size:10px;padding:2px 6px;border:1px solid rgba(43,158,174,.3);border-radius:6px;background:#fff;color:#c9722e;cursor:pointer;">＋1</button></div>
            </div></div>

            <div style="display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:12px;border:2px solid #2b9eae;background:rgba(43,158,174,.04);margin-bottom:8px;"><span style="width:30px;height:30px;flex:none;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:13px;background:#2b9eae;color:#fff;border-radius:50%;animation:bubble 2s ease-in-out infinite;">龍</span><div style="flex:1;"><div style="font-size:15px;font-weight:900;color:#2b9eae;">7号機の龍 <span style="font-size:11px;color:#7d9298;">{{ ryuStatus }}</span></div><div style="display:flex;gap:5px;margin-top:3px;"><span style="font-size:10px;padding:2px 8px;border-radius:999px;background:{{ ryuTagBg }};color:{{ ryuTagColor }};">{{ ryuTag }}</span></div></div><div style="width:180px;"><div style="display:flex;justify-content:space-between;font-size:11px;color:#7d9298;margin-bottom:3px;"><span>機嫌</span><span style="font-family:'IBM Plex Mono',monospace;">{{ kigen }}/100</span></div><div style="height:9px;border-radius:6px;background:rgba(38,52,58,.07);overflow:hidden;"><div style="width:{{ kigen }}%;height:100%;background:linear-gradient(90deg,#2b9eae,#3ec98a);"></div></div><div style="font-size:9px;color:#9db1b5;margin-top:2px;">※30未満で回転拒否（おやつで+15）</div>
              <div style="display:flex;gap:4px;margin-top:5px;justify-content:flex-end;"><button onClick="{{ kigenDown }}" style="font-size:10px;padding:2px 6px;border:1px solid rgba(43,158,174,.3);border-radius:6px;background:#fff;color:#c9722e;cursor:pointer;">−5</button><button onClick="{{ kigenUp }}" style="font-size:10px;padding:2px 6px;border:1px solid rgba(43,158,174,.3);border-radius:6px;background:#fff;color:#3ec98a;cursor:pointer;">＋5</button></div>
            </div></div>

            <div style="display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:12px;border:1px solid rgba(43,158,174,.25);background:#fff;margin-bottom:8px;"><span style="width:30px;height:30px;flex:none;display:flex;align-items:center;justify-content:center;font-family:'IBM Plex Mono',monospace;font-size:13px;background:rgba(43,158,174,.1);color:#2b9eae;border-radius:50%;">潤</span><div style="flex:1;"><div style="font-size:15px;font-weight:700;color:#26343a;">真砂 潤 <span style="font-size:11px;color:#2b9eae;">手番</span></div><div style="display:flex;gap:5px;margin-top:3px;"><span style="font-size:10px;padding:2px 8px;border-radius:999px;background:rgba(62,201,138,.12);color:#2f9a68;">泡ブースト準備完了</span></div></div><div style="width:180px;"><div style="display:flex;justify-content:space-between;font-size:11px;color:#7d9298;margin-bottom:3px;"><span>体力</span><span style="font-family:'IBM Plex Mono',monospace;">{{ tai }}/16</span></div><div style="height:9px;border-radius:6px;background:rgba(38,52,58,.07);overflow:hidden;"><div style="width:{{ taiPct }}%;height:100%;background:#2b9eae;"></div></div>

          </div>

        <sc-if value="{{ isInv }}" hint-placeholder-val="{{ false }}">
          <div data-screen-label="洗剤棚" style="animation:scfade .4s ease;max-width:820px;margin:0 auto;">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;">
              <h1 style="font-family:'Zen Maru Gothic',sans-serif;font-weight:900;font-size:24px;margin:0;color:#26343a;">洗剤棚 ・ 業務用在庫</h1>
              <span style="font-family:'IBM Plex Mono',monospace;font-size:12px;color:#7d9298;">小銭：¥4,180（両替機の中は数えない約束）</span>

                <div style="padding:12px 14px;border:1px solid rgba(43,158,174,.3);border-radius:10px;margin-bottom:8px;background:#fff;"><div style="display:flex;justify-content:space-between;"><div style="font-size:14px;font-weight:700;color:#26343a;">泡の御守（あわのおまもり）</div><span style="font-size:10px;color:#2b9eae;font-family:'IBM Plex Mono',monospace;">×3</span></div><div style="font-size:12px;color:#7d9298;margin-top:3px;line-height:1.7;">洗い判定+2。泡がきれいな半球のうちに投入すること。</div></div>
                <div style="padding:12px 14px;border:1px solid rgba(43,158,174,.3);border-radius:10px;margin-bottom:8px;background:#fff;"><div style="display:flex;justify-content:space-between;"><div style="font-size:14px;font-weight:700;color:#26343a;">因果柔軟剤「なかったコトに」</div><span style="font-size:10px;color:#c9722e;font-family:'IBM Plex Mono',monospace;">残りわずか</span></div><div style="font-size:12px;color:#7d9298;margin-top:3px;line-height:1.7;">仕上がりの記憶を柔らかくする。使いすぎると依頼人が依頼を忘れる。</div></div>
                <div style="padding:12px 14px;border:1px solid rgba(201,114,46,.5);border-radius:10px;background:rgba(201,114,46,.04);"><div style="display:flex;justify-content:space-between;align-items:center;"><div style="font-size:14px;font-weight:700;color:#c9722e;">龍のおやつ（乾燥イワシ）</div><span style="display:flex;align-items:center;gap:8px;"><sc-if value="{{ snackAvailable }}"><button onClick="{{ giveSnack }}" style="font-size:10px;padding:2px 10px;border:1px solid rgba(201,114,46,.5);border-radius:999px;background:#fff;color:#c9722e;cursor:pointer;">あげる</button></sc-if><span style="font-size:10px;color:#c9722e;font-family:'IBM Plex Mono',monospace;">×{{ snackQty }}</span></span></div><div style="font-size:12px;color:#7d9298;margin-top:3px;line-height:1.7;">機嫌+15。あげすぎると排水口から鱗が出る（掃除は夜番の仕事）。</div></div>
              </div>
              <div>
                <p style="font-size:11px;letter-spacing:3px;color:#2b9eae;font-weight:700;margin:0 0 11px;">■ 預かり品・落とし物台帳</p>
                <div style="border:1px solid rgba(43,158,174,.25);border-radius:10px;padding:10px 13px;margin-bottom:8px;background:#fff;"><div style="display:flex;justify-content:space-between;font-size:13px;color:#26343a;"><span style="font-weight:700;">ウェディングドレス（呪い洗い中）</span><span style="font-family:'IBM Plex Mono',monospace;color:#2b9eae;">7号機</span></div><div style="font-size:11px;color:#7d9298;margin-top:2px;">持込：柚木さん ・ タグに刺繍「Y.Y」 ・ 落ちない染みは左袖に一箇所</div></div>

                <div style="border:2px solid rgba(107,74,143,.5);border-radius:10px;padding:10px 13px;background:rgba(107,74,143,.03);"><div style="display:flex;justify-content:space-between;font-size:13px;color:#26343a;"><span style="font-weight:700;">6号機の中の「声」</span><span style="font-family:'IBM Plex Mono',monospace;color:#6b4a8f;">未回収</span></div><div style="font-size:11px;color:#6b4a8f;margin-top:2px;">故障中の6号機から、時々ノックの音。店長曰く「前の夜番が濯ぎ忘れたモノ」。</div></div>
                <div style="margin-top:14px;border:1px solid rgba(43,158,174,.3);border-radius:10px;padding:13px 15px;background:#fff;"><div style="font-size:13px;font-weight:700;color:#26343a;margin-bottom:5px;">夜番メモ</div><div style="font-size:12px;line-height:1.8;color:#7d9298;">呪いの洗濯代は一律¥700（乾燥別）。ただし本当に困ってる客からは、5円玉一枚で引き受けるのが店のしきたり。</div></div>
              </div>
            </div>
          </div>
        </sc-if>

<script>
/*
 * Claude Design の x-dc テンプレート（sc-if / sc-for / {{ 変数 }} / onClick）を
 * そのまま解釈して描画するミニランタイム。support.js（React ベースのプレビュー用）の代替。
 * 状態変更のたびにテンプレート全体を再構築する（プロトタイプの再レンダーと同等）。
 */
(function () {
  var cache = new Map();
  function compile(expr) {
    var fn = cache.get(expr);
    if (!fn) {
      fn = new Function('__s', 'with(__s){return(' + expr + ');}');
      cache.set(expr, fn);
    }
    return fn;
  }
  function evalExpr(expr, scope) {
    return compile(expr)(scope);
  }
  // "{{ expr }}" 単体の属性値から式を取り出す
  function single(text) {
    var m = /^\s*\{\{\s*([\s\S]+?)\s*\}\}\s*$/.exec(text || '');
    return m ? m[1] : null;
  }
  function interpolate(text, scope) {
    if (text.indexOf('{{') === -1) return text;
    return text.replace(/\{\{\s*([\s\S]+?)\s*\}\}/g, function (_, expr) {
      var v = evalExpr(expr, scope);
      return v == null ? '' : String(v);
    });
  }
  function build(nodes, scope, parent) {
    for (var i = 0; i < nodes.length; i++) {
      var node = nodes[i];
      if (node.nodeType === Node.TEXT_NODE) {
        parent.appendChild(document.createTextNode(interpolate(node.nodeValue, scope)));
        continue;
      }
      if (node.nodeType !== Node.ELEMENT_NODE) continue;
      var tag = node.localName;
      if (tag === 'sc-if') {
        var cond = single(node.getAttribute('value'));
        if (cond && evalExpr(cond, scope)) build(node.childNodes, scope, parent);
        continue;
      }
      if (tag === 'sc-for') {
        var listExpr = single(node.getAttribute('list'));
        var as = node.getAttribute('as') || 'item';
        var list = (listExpr && evalExpr(listExpr, scope)) || [];
        for (var j = 0; j < list.length; j++) {
          var child = Object.assign({}, scope);
          child[as] = list[j];
          build(node.childNodes, child, parent);
        }
        continue;
      }
      var el = document.createElementNS(node.namespaceURI, tag);
      for (var k = 0; k < node.attributes.length; k++) {
        var attr = node.attributes[k];
        if (attr.name.indexOf('hint-placeholder') === 0) continue;
        if (attr.name === 'onclick') {
          var handlerExpr = single(attr.value);
          var fn = handlerExpr ? evalExpr(handlerExpr, scope) : null;
          if (typeof fn === 'function') el.addEventListener('click', fn);
          continue;
        }
        el.setAttribute(attr.name, interpolate(attr.value, scope));
      }
      build(node.childNodes, scope, el);
      parent.appendChild(el);
    }
  }
  window.DCLogic = class DCLogic {
    mount(rootEl, templateEl) {
      this._root = rootEl;
      this._tpl = templateEl.content;
      this.render();
    }
    setState(update) {
      var patch = typeof update === 'function' ? update(this.state) : update;
      Object.assign(this.state, patch);
      this.render();
    }
    render() {
      var scope = this.renderVals();
      var frag = document.createDocumentFragment();
      build(this._tpl.childNodes, scope, frag);
      this._root.replaceChildren(frag);
    }
  };
})();

class Component extends DCLogic {
  state = { device: 'desktop', play: 'gmpl', screen: 'top' };

  renderVals() {
    const { device, play, screen } = this.state;
    const frames = { phone: { w: 392, h: 828 }, tablet: { w: 900, h: 660 }, desktop: { w: 1240, h: 772 } };
    const f = frames[device] || frames.desktop;
    const isPhone = device === 'phone';
    const compact = device === 'tablet';

    const setScreen = (s) => this.setState({ screen: s });
    const setPlay = (p) => this.setState((st) => ({ play: p, screen: (p === 'solo' && st.screen === 'gm') ? 'top' : st.screen }));
    const setDevice = (d) => this.setState({ device: d });

    const playLabel = { solo: '一人夜番', gmpl: '店長と夜番', gmless: '常連会' }[play] || '';

    const navDefs = [
      ['top', '店内案内', '店'],
      ['sheet', '名札', '札'],
      ['dice', '洗い判定', '洗'],
      ['combat', '工程', '程'],
      ['inventory', '洗剤棚', '棚'],
      ['story', '夜番日誌', '誌'],
      ['map', '店内図', '図'],
      ['gm', play === 'gmless' ? '回覧ノート' : '店長ノート', '長'],
    ];
    const nav = navDefs
      .filter((d) => d[0] !== 'gm' || play !== 'solo')
      .map(([id, label, badge]) => {
        const active = id === screen;
        return {
          id, label, badge, active,
          go: () => setScreen(id),
          color: active ? '#2b9eae' : '#7d9298',
          bg: active ? 'rgba(43,158,174,0.08)' : 'transparent',
          tbBg: active ? 'rgba(43,158,174,0.08)' : 'transparent',
          weight: active ? '700' : '500',
          badgeBg: active ? '#2b9eae' : 'transparent',
          badgeColor: active ? '#fff' : '#2b9eae',
          badgeBorder: active ? 'none' : '1.5px solid rgba(43,158,174,.5)',
          labelStyle: compact ? 'display:none' : 'display:inline',
        };
      });

    const playModes = [
      ['solo', '一人夜番', '店番はあなただけ。日誌と龍の機嫌を頼りに、朝まで店を回す。'],
      ['gmpl', '店長と夜番', '店長役（GM）が客と呪いを、夜番たちが洗濯を担う通常シフト。'],
      ['gmless', '常連会', '店長不在。常連たちが持ち寄った呪いを、皆で洗って回す卓。'],
    ].map(([id, t, d]) => {
      const active = id === play;
      return {
        id, t, d, active,
        go: () => setPlay(id),
        border: active ? '2px solid #2b9eae' : '1px solid rgba(43,158,174,.3)',
        bg: active ? 'rgba(43,158,174,.05)' : '#fff',
        titleColor: active ? '#2b9eae' : '#33424a',
      };
    });

    const devs = [
      ['phone', 'スマホ'], ['tablet', 'タブ'], ['desktop', 'PC'],
    ].map(([id, label]) => {
      const active = id === device;
      return {
        id, label, active,
        go: () => setDevice(id),
        bg: active ? '#2b9eae' : 'transparent',
        color: active ? '#fff' : '#a8c4c9',
      };
    });

    return {
      frameW: f.w, frameH: f.h, railW: compact ? 66 : 214,
      taglineDisp: isPhone ? 'none' : 'block', enDisp: isPhone ? 'none' : 'inline',
      playLabelDisp: isPhone ? 'none' : 'inline', pillDisp: isPhone ? 'none' : 'inline-flex',
      titleSize: isPhone ? 16 : 20,
      mainPad: isPhone ? '22px 18px 26px' : '30px 34px 38px',
      showRail: !isPhone, showTabbar: isPhone,
      playLabel, nav, playModes, devs,
      isTop: screen === 'top', isSheet: screen === 'sheet', isDice: screen === 'dice',
      isCombat: screen === 'combat', isInv: screen === 'inventory', isStory: screen === 'story',
      isMap: screen === 'map', isGM: screen === 'gm',
      gmTitle: play === 'gmless' ? '回覧ノート — 常連たちの申し送り' : '店長ノート — レジ下二重底',
    };
  }
}

/*
 * 全作品共通のゲームエンジン。ダイス・d20判定・localStorage 永続化と、
 * シェル（DCLogic コンポーネント）へのゲーム状態の合流（attach）を担う。
 * 作品ごとの中身（シナリオ・画面の値）は games/<id>.game.js が window.__GAME__ に定義する。
 */
(function () {
  function rollDie(sides) {
    return 1 + Math.floor(Math.random() * sides);
  }
  function pickKeys(obj, keys) {
    var o = {};
    for (var i = 0; i < keys.length; i++) o[keys[i]] = obj[keys[i]];
    return o;
  }
  window.GameEngine = {
    rollDie: rollDie,
    clamp: function (v, lo, hi) {
      return Math.max(lo, Math.min(hi, v));
    },
    // d20 判定。20 は大成功、1 は大失敗（出目優先）
    check: function (mod, dc) {
      var die = rollDie(20);

        out.stampColor = '#7d9298'; out.markOColor = '#dfe4e4'; out.markSanColor = '#dfe4e4'; out.markBatsuColor = '#dfe4e4';
      } else if (lr.kind === 'check') {
        var wi = washInfo(lr.total, lr.dc, lr.dice);
        out.diceFace = lr.total;
        out.stampWord = wi.word;
        out.diceFormula = '2d10 ＝ ' + lr.dice[0] + '+' + lr.dice[1] + ' ＋ ' + lr.skillName + ' ' + lr.mod;
        out.diceVerdict = wi.verdict;
        out.stampColor = wi.color;
        out.markOColor = wi.mark === 'O' ? '#3ec98a' : '#dfe4e4';
        out.markSanColor = wi.mark === 'SAN' ? '#2b9eae' : '#dfe4e4';
        out.markBatsuColor = wi.mark === 'BATSU' ? '#c9722e' : '#dfe4e4';
      } else {
        out.diceFace = lr.value;
        out.stampWord = '出目';
        out.diceFormula = (lr.sides === '2d10' ? '2d10' : 'd' + lr.sides) + ' の出目';
        out.diceVerdict = '＝ ' + lr.value;
        out.stampColor = '#7d9298';
        out.markOColor = '#dfe4e4'; out.markSanColor = '#dfe4e4'; out.markBatsuColor = '#dfe4e4';
      }
      out.diceTypes = DICE_SIDES.map(function (s) {
        var sel = s === st.diceSides;
        return {
          label: s === '2d10' ? '2d10' : 'd' + s,
          go: function () { app.setState({ diceSides: s }); },
          border: sel ? '2px solid #2b9eae' : '1px solid rgba(43,158,174,.3)',
          color: sel ? '#2b9eae' : '#7d9298',
          bg: sel ? 'rgba(43,158,174,.05)' : '#fff',
          weight: sel ? '600' : '400',
        };
      });
      out.diceSkills = SKILLS.map(function (sk, i) {
        var sel = i === st.skillIdx;
        return {
          label: sk.name + '（' + (sk.mod >= 0 ? '+' + sk.mod : sk.mod) + '）',
          go: function () { app.setState({ skillIdx: i }); },
          border: sel ? '1px solid #2b9eae' : '1px solid rgba(43,158,174,.3)',
          color: sel ? '#2b9eae' : '#7d9298',
          bg: sel ? 'rgba(43,158,174,.05)' : '#fff',
        };
      });
      out.rollNow = function () {
        if (st.diceSides === '2d10') {
          var d1 = E.rollDie(10), d2 = E.rollDie(10);
          var total = d1 + d2 + skill.mod;
          var wi = washInfo(total, st.diceDc, [d1, d2]);
          pushLog(st, '潤 ・ ' + skill.name, total + ' ／ ' + wi.word, wi.color);
          app.setState({ lastRoll: { kind: 'check', dice: [d1, d2], mod: skill.mod, total: total, dc: st.diceDc, skillName: skill.name }, rollLog: st.rollLog });
        } else {
          var v = E.rollDie(st.diceSides);
          pushLog(st, '潤 ・ d' + st.diceSides, v + ' ／ 出目', '#7d9298');
          app.setState({ lastRoll: { kind: 'plain', sides: st.diceSides, value: v }, rollLog: st.rollLog });
        }
      };
      out.logRows = st.rollLog;

      // ── 洗い工程 ──
      out.stages = STAGE_LABELS.map(function (label, i) {
        var done = i < st.stageIdx, active = i === st.stageIdx;
        return {
          label: label + (active ? ' ◉ 今ここ' : done ? ' ✓' : ''),
          weight: active || done ? '900' : '700',
          color: active || done ? '#fff' : '#7d9298',
          bg: done ? '#3ec98a' : active ? '#2b9eae' : '#eef6f6',
        };
      });
      out.nextStage = function () { app.setState({ stageIdx: Math.min(STAGE_LABELS.length - 1, st.stageIdx + 1) }); };
      out.pauseProcess = function () { app.setState({ kigen: E.clamp(st.kigen + 3, 0, 100) }); };
      out.yogore = st.yogore;
      out.yogoreDown5 = function () { app.setState({ yogore: E.clamp(st.yogore - 5, 0, 100) }); };
      out.yogoreDown1 = function () { app.setState({ yogore: E.clamp(st.yogore - 1, 0, 100) }); };
      out.yogoreUp1 = function () { app.setState({ yogore: E.clamp(st.yogore + 1, 0, 100) }); };
      out.kigen = st.kigen;
      out.ryuStatus = st.kigen < 30 ? '回転数：拒否中' : 'ごきげん';
      out.ryuTag = st.kigen < 30 ? '回転拒否（要おやつ）' : '龍の湯（52℃・呪い最適温）';
      out.ryuTagBg = st.kigen < 30 ? 'rgba(201,114,46,.12)' : 'rgba(43,158,174,.1)';
      out.ryuTagColor = st.kigen < 30 ? '#c9722e' : '#2b9eae';
      out.kigenDown = function () { app.setState({ kigen: E.clamp(st.kigen - 5, 0, 100) }); };
      out.kigenUp = function () { app.setState({ kigen: E.clamp(st.kigen + 5, 0, 100) }); };
      out.kokoro = st.kokoro;

      // ── 洗剤棚 ──
      out.snackQty = st.items.snackQty;
      out.snackAvailable = st.items.snackQty > 0 && st.kigen < 100;
      out.giveSnack = function () {
        var items = Object.assign({}, st.items);
        items.snackQty = Math.max(0, items.snackQty - 1);
        app.setState({ items: items, kigen: E.clamp(st.kigen + 15, 0, 100) });
      };

      // ── 夜番日誌 ──
      var node = NODES[st.storyNode] || NODES.i1;
      out.storyKicker = node.kicker;
      out.storyTitle = node.title;
      out.storyBlocks = node.text.map(function (b) {
        return typeof b === 'string' ? { isP: true, isQ: false, t: b } : { isP: false, isQ: true, t: b.q };
      });
      out.storyHasNote = !!st.storyNote;
      out.storyNote = st.storyNote || '';
      out.storyNoteColor = st.storyNoteColor || '#7d9298';
      out.storyPct = node.pct;
      out.storyPctLabel = node.end
        ? '洗い上がり ・ 夜番日誌 結審'
        : node.pct + '% ・ 脱水まで ' + Math.max(0, 20 - Math.round(node.pct / 5)) + '分 ・ 龍の機嫌 ' + st.kigen;
      out.storyCanRestart = st.storyNode !== 'i1';
      out.storyRestart = function () { app._resetGame(); };

      function choose(c) {
        return function () {
          var patch = { storyNote: null, storyNoteColor: '#7d9298' };
          var target = c.to;
          if (c.check) {
            var dc = typeof c.check.dc === 'function' ? c.check.dc(st) : c.check.dc;
            var r = E.check(c.check.mod, dc);
            patch.storyNote = c.check.name + '判定 — d20〈' + r.die + '〉＋' + r.mod + ' ＝ ' + r.total + ' ／ 難度' + dc + ' ・ ' + (r.ok ? '成功' : '失敗');
            patch.storyNoteColor = r.ok ? '#3ec98a' : '#c9722e';
            pushLog(st, '潤 ・ ' + c.check.name + '（夜番日誌）', r.total + ' ／ ' + (r.ok ? '成功' : '失敗'), r.ok ? '#3ec98a' : '#c9722e');
            patch.rollLog = st.rollLog;
            target = r.ok ? c.success : c.fail;
          }
          var nextNode = NODES[target];
          applyFx(st, nextNode.fx, patch);
          var taiNow = 'tai' in patch ? patch.tai : st.tai;
          var seiketsuNow = 'seiketsu' in patch ? patch.seiketsu : st.seiketsu;
          if (taiNow <= 0 && !nextNode.end) {
            target = 'E_faint';
            applyFx(st, NODES.E_faint.fx, patch);
          } else if (seiketsuNow <= 0 && !nextNode.end) {
            target = 'E_stained';
            applyFx(st, NODES.E_stained.fx, patch);
          }
          patch.storyNode = target;
          app.setState(patch);
        };
      }
      var defs = node.end ? END_CHOICES : node.choices;
      out.storyChoices = defs.filter(function (c) {
        return !c.if || c.if(st);
      }).map(function (c) {
        var dc = c.check ? (typeof c.check.dc === 'function' ? c.check.dc(st) : c.check.dc) : null;
        return {
          num: c.num || '', pre: c.pre, skillText: c.skillText || '', post: c.post || '',
          dcLabel: dc != null ? '難度' + dc : '',
          go: c.restart ? function () { app._resetGame(); }
            : c.top ? function () { app.setState({ screen: 'top' }); }
            : choose(c),
        };
      });

      // ── 店長ノート ──
      out.gmScenes = GM_SCENES.map(function (t, i) {
        var active = i === st.gmScene;
        return {
          t: t, tag: active ? '進行中' : '',
          go: function () { app.setState({ gmScene: i }); },
          border: active ? '2px solid #2b9eae' : '1px solid rgba(43,158,174,.3)',
          bg: active ? 'rgba(43,158,174,.04)' : '#fff',
          color: active ? '#26343a' : '#7d9298',
          weight: active ? '700' : '400',
        };
      });
      out.haisui = st.haisui;
      out.haisuiMinus = function () { app.setState({ haisui: E.clamp(st.haisui - 5, 0, 100) }); };
      out.haisuiPlus = function () { app.setState({ haisui: E.clamp(st.haisui + 5, 0, 100) }); };
      out.gmHasTable = !!st.gmTable;
      out.gmTableD = st.gmTable ? st.gmTable.d : '';
      out.gmTableText = st.gmTable ? st.gmTable.text : '';
      out.rollTable = function () {
        var d = E.rollDie(6);
        var text = GM_TABLE[d - 1];
        pushLog(st, '店長 ・ 深夜ハプニング表', d + ' ／ ' + text, '#2b9eae');
        app.setState({ gmTable: { d: d, text: text }, rollLog: st.rollLog });
      };

      return out;
    },
  };
})();

window.__dcApp = new Component();
if (typeof GameEngine !== 'undefined' && window.__GAME__) GameEngine.attach(window.__dcApp, window.__GAME__);
window.__dcApp.mount(document.getElementById('app'), document.getElementById('dc-template'));
</script>
