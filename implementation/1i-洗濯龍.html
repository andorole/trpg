<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>洗濯龍</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700;900&family=Shippori+Mincho:wght@500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  body{margin:0;background:#0d1a1d;}
  @keyframes scfade{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:none}}
  @keyframes drumspin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
  @keyframes bubble{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
  @keyframes blinkled{0%,100%{opacity:.35}50%{opacity:1}}
  ::-webkit-scrollbar{width:10px;height:10px}
  ::-webkit-scrollbar-thumb{background:rgba(43,158,174,.35);border-radius:8px}
  ::-webkit-scrollbar-track{background:transparent}
</style>
</head>
<body>
<div id="app"></div>
<template id="dc-template">
<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:34px 20px 96px;box-sizing:border-box;font-family:'Zen Maru Gothic',sans-serif;background:radial-gradient(120% 95% at 50% 0%,#14262b 0%,#0d1a1d 58%,#080f12 100%);color:#26343a;">

  <div style="position:relative;width:{{ frameW }}px;height:{{ frameH }}px;max-width:100%;background:#f2f8f8;border:1px solid #cfe0e0;border-radius:8px;box-shadow:0 34px 90px -22px rgba(0,0,0,.75),0 0 0 8px rgba(6,10,12,.55);overflow:hidden;display:flex;flex-direction:column;">

    <div style="position:absolute;inset:0;pointer-events:none;background-image:repeating-linear-gradient(0deg,rgba(43,158,174,.05) 0 1px,transparent 1px 44px),repeating-linear-gradient(90deg,rgba(43,158,174,.05) 0 1px,transparent 1px 44px);"></div>

    <header style="position:relative;z-index:2;display:flex;align-items:center;justify-content:space-between;gap:14px;padding:12px 22px;border-bottom:2px solid #2b9eae;background:linear-gradient(180deg,#ffffff,#eef6f6);">
      <div style="display:flex;align-items:center;gap:12px;">
        <span style="display:inline-flex;align-items:center;justify-content:center;width:32px;height:32px;flex:none;border-radius:50%;border:2.5px solid #2b9eae;color:#2b9eae;font-weight:900;font-size:15px;background:#fff;">龍</span>
        <div>
          <div style="font-size:9px;letter-spacing:2px;color:#7d9298;display:{{ taglineDisp }};">24時間営業 ・ 年中無休 ・ 呪い洗い承ります</div>
          <div style="display:flex;align-items:baseline;gap:10px;">
            <span style="font-family:'Zen Maru Gothic',sans-serif;font-weight:900;font-size:{{ titleSize }}px;letter-spacing:2px;color:#26343a;white-space:nowrap;">コインランドリー 龍の湯洗い</span>
            <span style="font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:1px;color:#2b9eae;display:{{ enDisp }};">DRAGON LAUNDRY 24H</span>
          </div>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:10px;">
        <span style="font-size:12px;letter-spacing:1px;color:#7d9298;display:{{ playLabelDisp }};white-space:nowrap;">{{ playLabel }}</span>
        <span style="display:{{ pillDisp }};align-items:center;gap:6px;font-family:'IBM Plex Mono',monospace;font-size:11px;padding:4px 10px;border:1px solid rgba(43,158,174,.4);border-radius:999px;color:#2b9eae;background:rgba(43,158,174,.05);white-space:nowrap;"><span style="width:7px;height:7px;border-radius:50%;background:#3ec98a;animation:blinkled 1.6s ease-in-out infinite;"></span>7号機 稼働中</span>
      </div>
    </header>

    <div style="position:relative;z-index:2;flex:1;display:flex;min-height:0;">

      <sc-if value="{{ showRail }}" hint-placeholder-val="{{ true }}">
        <nav style="width:{{ railW }}px;flex:none;border-right:1px solid rgba(43,158,174,.2);background:linear-gradient(180deg,rgba(43,158,174,.04),transparent);padding:15px 10px;display:flex;flex-direction:column;gap:3px;overflow-y:auto;">
          <sc-for list="{{ nav }}" as="item" hint-placeholder-count="8">
            <button onClick="{{ item.go }}" style="display:flex;align-items:center;gap:11px;width:100%;padding:9px 11px;border:0;border-radius:999px;cursor:pointer;text-align:left;background:{{ item.bg }};color:{{ item.color }};font-family:'Zen Maru Gothic',sans-serif;font-size:14px;font-weight:{{ item.weight }};">
              <span style="width:22px;height:22px;flex:none;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;border-radius:50%;background:{{ item.badgeBg }};color:{{ item.badgeColor }};border:{{ item.badgeBorder }};">{{ item.badge }}</span>
              <span style="{{ item.labelStyle }}">{{ item.label }}</span>
            </button>
          </sc-for>
        </nav>
      </sc-if>

      <main style="flex:1;min-width:0;overflow-y:auto;padding:{{ mainPad }};">

        <sc-if value="{{ isTop }}" hint-placeholder-val="{{ true }}">
          <div data-screen-label="店内案内" style="animation:scfade .4s ease;max-width:760px;margin:0 auto;">
            <p style="font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:2px;color:#7d9298;margin:0 0 7px;">本日の夜番日報 ・ 午前1時20分 ・ 小雨</p>
            <h1 style="font-family:'Zen Maru Gothic',sans-serif;font-weight:900;font-size:33px;line-height:1.4;margin:0 0 14px;color:#26343a;">世界の汚れは、<br>7号機で洗っています。</h1>
            <p style="font-size:15px;line-height:2.0;color:#4a5d63;margin:0 0 10px;max-width:58ch;">商店街の外れの24時間コインランドリー。7号機だけ、中に<b style="color:#2b9eae;">龍</b>が住んでいる。呪い、怨念、拭えない後悔——普通の洗濯機で落ちない汚れは、龍が湯洗いしてくれる。あなたは今夜の店番。仕事は接客と、龍の機嫌取りと、<b style="color:#c9722e;">すすぎ水の行方を誰にも見られないこと。</b></p>
            <p style="font-size:12px;color:#9db1b5;margin:0 0 24px;">※店内掲示「呪いは他のお客様の洗濯物と一緒に洗わないでください」</p>

            <div style="border:1px solid rgba(43,158,174,.3);border-radius:10px;overflow:hidden;margin:0 0 26px;background:#fff;">
              <div style="padding:9px 14px;background:rgba(43,158,174,.07);border-bottom:1px solid rgba(43,158,174,.2);font-size:11px;font-weight:700;letter-spacing:2px;color:#2b9eae;">■ 稼働状況</div>
              <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:0;">
                <div style="padding:12px 10px;text-align:center;border-right:1px solid rgba(43,158,174,.14);"><div style="width:44px;height:44px;margin:0 auto 6px;border-radius:50%;border:3px solid #cfe0e0;background:radial-gradient(circle at 50% 45%,#eef6f6 42%,#cfe0e0 43% 47%,#eef6f6 48%);"></div><div style="font-size:11px;font-weight:700;color:#26343a;">1〜4号機</div><div style="font-size:10px;color:#3ec98a;">空き</div></div>
                <div style="padding:12px 10px;text-align:center;border-right:1px solid rgba(43,158,174,.14);"><div style="width:44px;height:44px;margin:0 auto 6px;border-radius:50%;border:3px solid #7d9298;background:radial-gradient(circle at 50% 45%,#d9e6e8 42%,#7d9298 43% 47%,#d9e6e8 48%);animation:drumspin 3.2s linear infinite;"></div><div style="font-size:11px;font-weight:700;color:#26343a;">5号機</div><div style="font-size:10px;color:#7d9298;">通常洗濯（常連の柔道着）</div></div>
                <div style="padding:12px 10px;text-align:center;border-right:1px solid rgba(43,158,174,.14);"><div style="width:44px;height:44px;margin:0 auto 6px;border-radius:50%;border:3px solid #c9722e;background:radial-gradient(circle at 50% 45%,#f7e8d8 42%,#c9722e 43% 47%,#f7e8d8 48%);"></div><div style="font-size:11px;font-weight:700;color:#26343a;">6号機</div><div style="font-size:10px;color:#c9722e;">故障中（中から声がする）</div></div>
                <div style="padding:12px 10px;text-align:center;background:rgba(43,158,174,.05);"><div style="width:44px;height:44px;margin:0 auto 6px;border-radius:50%;border:3px solid #2b9eae;background:radial-gradient(circle at 50% 45%,#d8f0f2 30%,#2b9eae 31% 36%,#d8f0f2 37%);animation:drumspin 1.6s linear infinite;box-shadow:0 0 14px rgba(43,158,174,.4);"></div><div style="font-size:11px;font-weight:900;color:#2b9eae;">7号機（龍）</div><div style="font-size:10px;color:#2b9eae;">呪い洗い 脱水前</div></div>
              </div>
            </div>

            <p style="font-size:11px;letter-spacing:3px;color:#2b9eae;font-weight:700;margin:0 0 12px;">■ 夜番の形態を選択</p>
            <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:0 0 28px;">
              <sc-for list="{{ playModes }}" as="m" hint-placeholder-count="3">
                <button onClick="{{ m.go }}" style="text-align:left;padding:14px 15px;border-radius:10px;cursor:pointer;border:{{ m.border }};background:{{ m.bg }};">
                  <div style="font-size:14px;font-weight:700;color:{{ m.titleColor }};margin-bottom:5px;">{{ m.t }}</div>
                  <div style="font-size:12px;line-height:1.7;color:#7d9298;">{{ m.d }}</div>
                </button>
              </sc-for>
            </div>

            <p style="font-size:11px;letter-spacing:3px;color:#2b9eae;font-weight:700;margin:0 0 14px;">■ 今夜のシフト</p>
            <div style="display:flex;gap:16px;flex-wrap:wrap;margin-bottom:26px;">
              <div style="display:flex;flex-direction:column;align-items:center;gap:7px;width:96px;"><div style="width:62px;height:62px;border-radius:50%;border:2px solid #2b9eae;background:repeating-linear-gradient(45deg,rgba(43,158,174,.1) 0 5px,transparent 5px 10px),#fff;"></div><div style="font-size:13px;font-weight:700;color:#26343a;">真砂 潤</div><div style="font-size:11px;color:#7d9298;">夜番（バイト2年目）</div></div>
              <div style="display:flex;flex-direction:column;align-items:center;gap:7px;width:96px;"><div style="width:62px;height:62px;border-radius:50%;border:2px solid #e88aa0;background:repeating-linear-gradient(45deg,rgba(232,138,160,.12) 0 5px,transparent 5px 10px),#fff;"></div><div style="font-size:13px;font-weight:700;color:#26343a;">柚木さん</div><div style="font-size:11px;color:#7d9298;">常連（毎晩0時に来る）</div></div>
              <div style="display:flex;flex-direction:column;align-items:center;gap:7px;width:96px;"><div style="width:62px;height:62px;border-radius:50%;border:2px solid #c9722e;background:repeating-linear-gradient(45deg,rgba(201,114,46,.12) 0 5px,transparent 5px 10px),#fff;"></div><div style="font-size:13px;font-weight:700;color:#26343a;">店長</div><div style="font-size:11px;color:#7d9298;">龍の世話人（今夜は不在）</div></div>
              <div style="display:flex;flex-direction:column;align-items:center;gap:7px;width:96px;"><div style="width:62px;height:62px;border-radius:50%;border:3px solid #2b9eae;background:radial-gradient(circle at 40% 35%,rgba(43,158,174,.35),rgba(43,158,174,.08)),#fff;box-shadow:0 0 12px rgba(43,158,174,.3);"></div><div style="font-size:13px;font-weight:900;color:#2b9eae;">7号機の龍</div><div style="font-size:11px;color:#7d9298;">推定三千歳</div></div>
            </div>

            <button style="display:inline-flex;align-items:center;gap:10px;padding:13px 30px;border:0;border-radius:999px;cursor:pointer;background:#2b9eae;color:#fff;font-family:'Zen Maru Gothic',sans-serif;font-weight:900;font-size:15px;letter-spacing:3px;box-shadow:0 6px 0 #1f7683;">夜番をはじめる　➜</button>
          </div>
        </sc-if>

        <sc-if value="{{ isSheet }}" hint-placeholder-val="{{ false }}">
          <div data-screen-label="従業員名札" style="animation:scfade .4s ease;max-width:820px;margin:0 auto;">
            <div style="display:flex;gap:20px;align-items:flex-start;margin-bottom:20px;">
              <div style="width:88px;height:110px;flex:none;border:2px solid rgba(43,158,174,.4);border-radius:8px;background:repeating-linear-gradient(45deg,rgba(43,158,174,.07) 0 6px,transparent 6px 12px),#fff;display:flex;align-items:center;justify-content:center;font-size:9px;letter-spacing:1px;color:#9db1b5;text-align:center;">名札用写真<br>（エプロン着用）</div>
              <div style="flex:1;min-width:0;">
                <p style="font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:2px;color:#7d9298;margin:0 0 4px;">従業員No. 007 ・ 夜番シフト従業員カード</p>
                <h1 style="font-family:'Zen Maru Gothic',sans-serif;font-weight:900;font-size:28px;margin:0 0 4px;color:#26343a;">真砂 潤</h1>
                <p style="font-size:13px;color:#7d9298;margin:0 0 10px;">夜番アルバイト ・ 週4 ・ 時給1,150円＋龍手当300円 ・ 二十二歳</p>
                <div style="display:flex;gap:7px;flex-wrap:wrap;">
                  <span style="font-size:11px;padding:3px 9px;border-radius:999px;border:1px solid rgba(43,158,174,.4);color:#4a5d63;">洗濯表示マニア</span>
                  <span style="font-size:11px;padding:3px 9px;border-radius:999px;border:1px solid rgba(43,158,174,.4);color:#4a5d63;">小銭の音で金額がわかる</span>
                  <span style="font-size:11px;padding:3px 9px;border-radius:999px;border:1px solid rgba(201,114,46,.5);color:#c9722e;">龍語：日常会話レベル</span>
                </div>
              </div>
            </div>

            <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:13px;margin-bottom:22px;">
              <div style="background:#fff;border:1px solid rgba(43,158,174,.2);border-radius:10px;padding:11px 13px;"><div style="display:flex;justify-content:space-between;font-size:12px;color:#7d9298;margin-bottom:5px;"><span>体力</span><span style="font-family:'IBM Plex Mono',monospace;">11 / 16</span></div><div style="height:9px;border-radius:6px;background:rgba(38,52,58,.07);overflow:hidden;"><div style="width:69%;height:100%;background:#2b9eae;"></div></div></div>
              <div style="background:#fff;border:1px solid rgba(43,158,174,.2);border-radius:10px;padding:11px 13px;"><div style="display:flex;justify-content:space-between;font-size:12px;color:#7d9298;margin-bottom:5px;"><span>清潔感（心の）</span><span style="font-family:'IBM Plex Mono',monospace;">8 / 10</span></div><div style="height:9px;border-radius:6px;background:rgba(38,52,58,.07);overflow:hidden;"><div style="width:80%;height:100%;background:#3ec98a;"></div></div><div style="font-size:9px;color:#9db1b5;margin-top:4px;">※呪いに触れると汚れる。汚れた心は龍が湯洗い可（要予約）</div></div>
              <div style="background:#fff;border:1px solid rgba(43,158,174,.2);border-radius:10px;padding:11px 13px;"><div style="display:flex;justify-content:space-between;font-size:12px;color:#7d9298;margin-bottom:5px;"><span>龍との信頼</span><span style="font-family:'IBM Plex Mono',monospace;color:#2b9eae;">57 / 100</span></div><div style="height:9px;border-radius:6px;background:rgba(38,52,58,.07);overflow:hidden;"><div style="width:57%;height:100%;background:linear-gradient(90deg,#2b9eae,#3ec98a);"></div></div><div style="font-size:9px;color:#9db1b5;margin-top:4px;">※100で龍が「背中に乗せてくれる」らしい（店長談）</div></div>
            </div>

            <p style="font-size:11px;letter-spacing:3px;color:#2b9eae;font-weight:700;margin:0 0 12px;">■ 能力</p>
            <div style="display:grid;grid-template-columns:repeat(6,1fr);gap:0;border:1px solid rgba(43,158,174,.3);border-radius:10px;overflow:hidden;margin-bottom:24px;background:#fff;">
              <div style="padding:10px 4px;text-align:center;border-right:1px solid rgba(43,158,174,.14);background:rgba(43,158,174,.05);"><div style="font-size:10px;color:#2b9eae;">洗浄</div><div style="font-family:'IBM Plex Mono',monospace;font-size:23px;font-weight:600;color:#2b9eae;line-height:1.25;">16</div><div style="font-size:10px;color:#3ec98a;">＋3</div></div>
              <div style="padding:10px 4px;text-align:center;border-right:1px solid rgba(43,158,174,.14);"><div style="font-size:10px;color:#7d9298;">すすぎ</div><div style="font-family:'IBM Plex Mono',monospace;font-size:23px;font-weight:600;color:#26343a;line-height:1.25;">14</div><div style="font-size:10px;color:#3ec98a;">＋2</div></div>
              <div style="padding:10px 4px;text-align:center;border-right:1px solid rgba(43,158,174,.14);"><div style="font-size:10px;color:#7d9298;">脱水</div><div style="font-family:'IBM Plex Mono',monospace;font-size:23px;font-weight:600;color:#26343a;line-height:1.25;">10</div><div style="font-size:10px;color:#7d9298;">±0</div></div>
              <div style="padding:10px 4px;text-align:center;border-right:1px solid rgba(43,158,174,.14);"><div style="font-size:10px;color:#7d9298;">観察</div><div style="font-family:'IBM Plex Mono',monospace;font-size:23px;font-weight:600;color:#26343a;line-height:1.25;">13</div><div style="font-size:10px;color:#3ec98a;">＋1</div></div>
              <div style="padding:10px 4px;text-align:center;border-right:1px solid rgba(43,158,174,.14);"><div style="font-size:10px;color:#7d9298;">接客</div><div style="font-family:'IBM Plex Mono',monospace;font-size:23px;font-weight:600;color:#26343a;line-height:1.25;">12</div><div style="font-size:10px;color:#3ec98a;">＋1</div></div>
              <div style="padding:10px 4px;text-align:center;"><div style="font-size:10px;color:#7d9298;">龍語</div><div style="font-family:'IBM Plex Mono',monospace;font-size:23px;font-weight:600;color:#26343a;line-height:1.25;">9</div><div style="font-size:10px;color:#c9722e;">−1（敬語が苦手）</div></div>
            </div>

            <div style="display:grid;grid-template-columns:1fr 1fr;gap:24px;">
              <div>
                <p style="font-size:11px;letter-spacing:3px;color:#2b9eae;font-weight:700;margin:0 0 10px;">■ 技能</p>
                <div style="display:flex;justify-content:space-between;font-size:14px;color:#4a5d63;padding:6px 0;border-bottom:1px dashed rgba(43,158,174,.25);"><span>洗濯表示の解読（呪物対応版）</span><span style="font-family:'IBM Plex Mono',monospace;color:#3ec98a;">+6</span></div>
                <div style="display:flex;justify-content:space-between;font-size:14px;color:#4a5d63;padding:6px 0;border-bottom:1px dashed rgba(43,158,174,.25);"><span>しみ抜き（物理・因果両対応）</span><span style="font-family:'IBM Plex Mono',monospace;color:#3ec98a;">+5</span></div>
                <div style="display:flex;justify-content:space-between;font-size:14px;color:#4a5d63;padding:6px 0;border-bottom:1px dashed rgba(43,158,174,.25);"><span>両替機の説得（叩かずに直す）</span><span style="font-family:'IBM Plex Mono',monospace;color:#3ec98a;">+4</span></div>
                <div style="display:flex;justify-content:space-between;font-size:14px;color:#4a5d63;padding:6px 0;"><span>深夜の客への声かけ</span><span style="font-family:'IBM Plex Mono',monospace;color:#c9722e;">−2（人見知り）</span></div>
              </div>
              <div>
                <p style="font-size:11px;letter-spacing:3px;color:#2b9eae;font-weight:700;margin:0 0 10px;">■ 特性</p>
                <div style="border:1px solid rgba(43,158,174,.25);border-radius:10px;padding:11px 13px;margin-bottom:9px;background:#fff;"><div style="font-size:13px;font-weight:700;color:#26343a;margin-bottom:3px;">汚れの声が聞こえる</div><div style="font-size:12px;line-height:1.7;color:#7d9298;">染みに耳を近づけると、付いた時の状況が聞こえる。カレーは陽気。呪いは、だいたい泣いている。</div></div>
                <div style="border:1px solid rgba(201,114,46,.4);border-radius:10px;padding:11px 13px;background:rgba(201,114,46,.04);"><div style="font-size:13px;font-weight:700;color:#c9722e;margin-bottom:3px;">柔軟剤の加護</div><div style="font-size:12px;line-height:1.7;color:#7d9298;">エプロンから常にいい匂いがする。悪意ある存在の第一撃を、月に一度だけ「ふんわり」受け流せる。</div></div>
              </div>
            </div>
            <p style="margin-top:22px;font-size:13px;line-height:1.9;color:#7d9298;border-left:3px solid rgba(43,158,174,.4);padding-left:14px;">面接メモ（店長の字）：「志望動機が『実家の洗濯機に化け物が住んでいたので扱いに慣れている』。即採用。」</p>
          </div>
        </sc-if>

        <sc-if value="{{ isDice }}" hint-placeholder-val="{{ false }}">
          <div data-screen-label="洗い判定" style="animation:scfade .4s ease;max-width:560px;margin:0 auto;text-align:center;">
            <p style="font-size:11px;letter-spacing:3px;color:#2b9eae;font-weight:700;margin:0 0 4px;">■ 洗い上がり判定 ・ 基準 15 ・ 工程：しみ抜き</p>
            <div style="display:flex;flex-direction:column;align-items:center;gap:8px;margin:18px 0 24px;">
              <div style="position:relative;width:126px;height:126px;">

        <sc-if value="{{ isStory }}" hint-placeholder-val="{{ false }}">

            <p style="font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:2px;color:#7d9298;text-align:center;margin:0 0 6px;">夜番日誌 ・ 六月十七日 ・ 午前1時20分</p>
            <h1 style="font-family:'Shippori Mincho',serif;font-weight:800;font-size:28px;text-align:center;margin:0 0 4px;color:#26343a;">すすぎの水は、少し塩辛い</h1>
            <div style="display:flex;align-items:center;gap:12px;margin:16px 0 22px;color:#2b9eae;"><span style="flex:1;height:1px;background:rgba(43,158,174,.35);"></span><span style="font-size:12px;">〇</span><span style="flex:1;height:1px;background:rgba(43,158,174,.35);"></span></div>
            <p style="font-family:'Shippori Mincho',serif;font-size:16px;line-height:2.1;color:#33424a;margin:0 0 18px;">柚木さんがウェディングドレスを持ち込んだのは、日付が変わる少し前だった。「洗ってほしいの。着てないのに、汚れてるみたいだから」。畳まれたドレスは新品のままで、しかし持ち上げると、雨に濡れた犬みたいな重さがした。染みの声に耳を澄ます。——聞こえたのは、式場のキャンセル料の説明を延々と読み上げる、事務的な声だった。</p>
            <p style="font-family:'Shippori Mincho',serif;font-size:16px;line-height:2.1;color:#33424a;margin:0 0 18px;">7号機に入れると、龍はいつもより丁寧に湯を回した。回転窓の向こうで、白い布と鱗の影が、ゆっくり円を描く。柚木さんはベンチに座って、その円をずっと見ている。乾燥機の上の時計が1時20分を指す。<b style="color:#2b9eae;">すすぎ工程で、水が急に塩辛くなった。</b>龍が首を出して、こちらを見た。これは、涙の味がする案件だ。</p>
            <blockquote style="margin:22px 0;padding:14px 20px;border-left:3px solid #2b9eae;background:rgba(43,158,174,.04);font-family:'Shippori Mincho',serif;font-size:16px;line-height:1.9;color:#4a5d63;">汚れを落とすことと、なかったことにすることは、違う。<br>うちの龍は、その区別だけは絶対に間違えない。<br><span style="font-size:12px;color:#9db1b5;">——店長マニュアル 1頁目（他の頁は白紙）</span></blockquote>
            <p style="font-family:'Shippori Mincho',serif;font-size:16px;line-height:2.1;color:#33424a;margin:0 0 26px;">左袖の染みだけが、どうしても落ちない。近づけた耳に、今度は別の声がした。「——迎えに行けなくて、ごめん」。男の人の声だ。柚木さんは、まだ円を見ている。</p>

            <p style="font-size:11px;letter-spacing:3px;color:#2b9eae;font-weight:700;margin:0 0 12px;">■ どうする</p>
            <button style="display:block;width:100%;text-align:left;padding:13px 16px;margin-bottom:9px;border:1px solid rgba(43,158,174,.35);border-radius:10px;background:#fff;cursor:pointer;font-family:'Zen Maru Gothic',sans-serif;font-size:14px;color:#33424a;">①　染みの声を、柚木さんに伝える <span style="color:#c9722e;font-weight:700;">接客判定 ・ 難度14</span></button>

                <div style="padding:11px 13px;border:1px solid rgba(43,158,174,.3);border-radius:10px;background:#fff;"><div style="font-size:14px;color:#7d9298;">商店街の「汚れ」の増加傾向</div></div>

<script>
/*
 * Claude Design の x-dc テンプレート（sc-if / sc-for / {{ 変数 }} / onClick）を
 * そのまま解釈して描画するミニランタイム。support.js（React ベースのプレビュー用）の代替。
 * 状態変更のたびにテンプレート全体を再構築する（プロトタイプの再レンダーと同等）。
 */
(function () {
  var cache = new Map();
  function compile(expr) {
    var fn = cache.get(expr);
    if (!fn) {
      fn = new Function('__s', 'with(__s){return(' + expr + ');}');
      cache.set(expr, fn);
    }
    return fn;
  }
  function evalExpr(expr, scope) {
    return compile(expr)(scope);
  }
  // "{{ expr }}" 単体の属性値から式を取り出す
  function single(text) {
    var m = /^\s*\{\{\s*([\s\S]+?)\s*\}\}\s*$/.exec(text || '');
    return m ? m[1] : null;
  }
  function interpolate(text, scope) {
    if (text.indexOf('{{') === -1) return text;
    return text.replace(/\{\{\s*([\s\S]+?)\s*\}\}/g, function (_, expr) {
      var v = evalExpr(expr, scope);
      return v == null ? '' : String(v);
    });
  }
  function build(nodes, scope, parent) {
    for (var i = 0; i < nodes.length; i++) {
      var node = nodes[i];
      if (node.nodeType === Node.TEXT_NODE) {
        parent.appendChild(document.createTextNode(interpolate(node.nodeValue, scope)));
        continue;
      }
      if (node.nodeType !== Node.ELEMENT_NODE) continue;
      var tag = node.localName;
      if (tag === 'sc-if') {
        var cond = single(node.getAttribute('value'));
        if (cond && evalExpr(cond, scope)) build(node.childNodes, scope, parent);
        continue;
      }
      if (tag === 'sc-for') {
        var listExpr = single(node.getAttribute('list'));
        var as = node.getAttribute('as') || 'item';
        var list = (listExpr && evalExpr(listExpr, scope)) || [];
        for (var j = 0; j < list.length; j++) {
          var child = Object.assign({}, scope);
          child[as] = list[j];
          build(node.childNodes, child, parent);
        }
        continue;
      }
      var el = document.createElementNS(node.namespaceURI, tag);
      for (var k = 0; k < node.attributes.length; k++) {
        var attr = node.attributes[k];
        if (attr.name.indexOf('hint-placeholder') === 0) continue;
        if (attr.name === 'onclick') {
          var handlerExpr = single(attr.value);
          var fn = handlerExpr ? evalExpr(handlerExpr, scope) : null;
          if (typeof fn === 'function') el.addEventListener('click', fn);
          continue;
        }
        el.setAttribute(attr.name, interpolate(attr.value, scope));
      }
      build(node.childNodes, scope, el);
      parent.appendChild(el);
    }
  }
  window.DCLogic = class DCLogic {
    mount(rootEl, templateEl) {
      this._root = rootEl;
      this._tpl = templateEl.content;
      this.render();
    }
    setState(update) {
      var patch = typeof update === 'function' ? update(this.state) : update;
      Object.assign(this.state, patch);
      this.render();
    }
    render() {
      var scope = this.renderVals();
      var frag = document.createDocumentFragment();
      build(this._tpl.childNodes, scope, frag);
      this._root.replaceChildren(frag);
    }
  };
})();

class Component extends DCLogic {
  state = { device: 'desktop', play: 'gmpl', screen: 'top' };

  renderVals() {
    const { device, play, screen } = this.state;
    const frames = { phone: { w: 392, h: 828 }, tablet: { w: 900, h: 660 }, desktop: { w: 1240, h: 772 } };
    const f = frames[device] || frames.desktop;
    const isPhone = device === 'phone';
    const compact = device === 'tablet';

    const setScreen = (s) => this.setState({ screen: s });
    const setPlay = (p) => this.setState((st) => ({ play: p, screen: (p === 'solo' && st.screen === 'gm') ? 'top' : st.screen }));
    const setDevice = (d) => this.setState({ device: d });

    const playLabel = { solo: '一人夜番', gmpl: '店長と夜番', gmless: '常連会' }[play] || '';

    const navDefs = [
      ['top', '店内案内', '店'],
      ['sheet', '名札', '札'],
      ['dice', '洗い判定', '洗'],
      ['combat', '工程', '程'],
      ['inventory', '洗剤棚', '棚'],
      ['story', '夜番日誌', '誌'],
      ['map', '店内図', '図'],
      ['gm', play === 'gmless' ? '回覧ノート' : '店長ノート', '長'],
    ];
    const nav = navDefs
      .filter((d) => d[0] !== 'gm' || play !== 'solo')
      .map(([id, label, badge]) => {
        const active = id === screen;
        return {
          id, label, badge, active,
          go: () => setScreen(id),
          color: active ? '#2b9eae' : '#7d9298',
          bg: active ? 'rgba(43,158,174,0.08)' : 'transparent',
          tbBg: active ? 'rgba(43,158,174,0.08)' : 'transparent',
          weight: active ? '700' : '500',
          badgeBg: active ? '#2b9eae' : 'transparent',
          badgeColor: active ? '#fff' : '#2b9eae',
          badgeBorder: active ? 'none' : '1.5px solid rgba(43,158,174,.5)',
          labelStyle: compact ? 'display:none' : 'display:inline',
        };
      });

    const playModes = [
      ['solo', '一人夜番', '店番はあなただけ。日誌と龍の機嫌を頼りに、朝まで店を回す。'],
      ['gmpl', '店長と夜番', '店長役（GM）が客と呪いを、夜番たちが洗濯を担う通常シフト。'],
      ['gmless', '常連会', '店長不在。常連たちが持ち寄った呪いを、皆で洗って回す卓。'],
    ].map(([id, t, d]) => {
      const active = id === play;
      return {
        id, t, d, active,
        go: () => setPlay(id),
        border: active ? '2px solid #2b9eae' : '1px solid rgba(43,158,174,.3)',
        bg: active ? 'rgba(43,158,174,.05)' : '#fff',
        titleColor: active ? '#2b9eae' : '#33424a',
      };
    });

    const devs = [
      ['phone', 'スマホ'], ['tablet', 'タブ'], ['desktop', 'PC'],
    ].map(([id, label]) => {
      const active = id === device;
      return {
        id, label, active,
        go: () => setDevice(id),
        bg: active ? '#2b9eae' : 'transparent',
        color: active ? '#fff' : '#a8c4c9',
      };
    });

    return {
      frameW: f.w, frameH: f.h, railW: compact ? 66 : 214,
      taglineDisp: isPhone ? 'none' : 'block', enDisp: isPhone ? 'none' : 'inline',
      playLabelDisp: isPhone ? 'none' : 'inline', pillDisp: isPhone ? 'none' : 'inline-flex',
      titleSize: isPhone ? 16 : 20,
      mainPad: isPhone ? '22px 18px 26px' : '30px 34px 38px',
      showRail: !isPhone, showTabbar: isPhone,
      playLabel, nav, playModes, devs,
      isTop: screen === 'top', isSheet: screen === 'sheet', isDice: screen === 'dice',
      isCombat: screen === 'combat', isInv: screen === 'inventory', isStory: screen === 'story',
      isMap: screen === 'map', isGM: screen === 'gm',
      gmTitle: play === 'gmless' ? '回覧ノート — 常連たちの申し送り' : '店長ノート — レジ下二重底',
    };
  }
}

window.__dcApp = new Component();
if (typeof GameEngine !== 'undefined' && window.__GAME__) GameEngine.attach(window.__dcApp, window.__GAME__);
window.__dcApp.mount(document.getElementById('app'), document.getElementById('dc-template'));
</script>
